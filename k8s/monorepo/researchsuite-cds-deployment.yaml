apiVersion: apps/v1
kind: Deployment
metadata:
  name: researchsuite-cds
  namespace: medinovai
  labels:
    app: researchsuite-cds
    module: cds
    monorepo: medinovai-researchsuite
spec:
  replicas: 2
  selector:
    matchLabels:
      app: researchsuite-cds
  template:
    metadata:
      labels:
        app: researchsuite-cds
        module: cds
        monorepo: medinovai-researchsuite
    spec:
      containers:
      - name: researchsuite-cds
        image: medinovai/researchsuite:latest
        command: ["python", "-m", "researchsuite.modules.cds"]
        ports:
        - containerPort: 8081
        env:
        - name: MODULE_NAME
          value: "cds"
        - name: MONOREPO_NAME
          value: "medinovai-researchsuite"
        - name: SERVICE_PORT
          value: "8081"
        - name: DATABASE_URL
          value: "postgresql://postgres:password@postgres:5432/medinovai"
        - name: REDIS_URL
          value: "redis://redis:6379"
        resources:
          requests:
            cpu: 200m
            memory: 256Mi
          limits:
            cpu: 1000m
            memory: 1Gi
        livenessProbe:
          httpGet:
            path: /health
            port: 8081
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /ready
            port: 8081
          initialDelaySeconds: 5
          periodSeconds: 5

---
apiVersion: v1
kind: Service
metadata:
  name: researchsuite-cds
  namespace: medinovai
  labels:
    app: researchsuite-cds
    module: cds
    monorepo: medinovai-researchsuite
spec:
  selector:
    app: researchsuite-cds
  ports:
  - port: 8081
    targetPort: 8081
  type: ClusterIP


