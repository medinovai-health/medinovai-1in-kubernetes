# Service Mesh Configuration for medinovai-1in-kubernetes
# Sprint 7: API Gateway & Service Mesh

apiVersion: networking.istio.io/v1beta1
kind: VirtualService
metadata:
  name: medinovai-1in-kubernetes
  namespace: medinovai
spec:
  hosts:
    - medinovai-1in-kubernetes.medinovai.svc.cluster.local
  http:
    - match:
        - uri:
            prefix: /api/v1
      route:
        - destination:
            host: medinovai-1in-kubernetes
            port:
              number: 8080
          weight: 100
      retries:
        attempts: 3
        perTryTimeout: 5s
        retryOn: 5xx,reset,connect-failure
      timeout: 30s
---
apiVersion: networking.istio.io/v1beta1
kind: DestinationRule
metadata:
  name: medinovai-1in-kubernetes
  namespace: medinovai
spec:
  host: medinovai-1in-kubernetes.medinovai.svc.cluster.local
  trafficPolicy:
    connectionPool:
      tcp:
        maxConnections: 100
      http:
        h2UpgradePolicy: DEFAULT
        maxRequestsPerConnection: 10
    outlierDetection:
      consecutive5xxErrors: 5
      interval: 30s
      baseEjectionTime: 30s
      maxEjectionPercent: 50
    tls:
      mode: ISTIO_MUTUAL
