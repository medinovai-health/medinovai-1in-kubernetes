apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: medinovai-1in-kubernetes-hpa
  namespace: medinovai-prod
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: medinovai-1in-kubernetes
  minReplicas: 2
  maxReplicas: 10
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
