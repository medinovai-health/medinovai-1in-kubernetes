apiVersion: apps/v1
kind: Deployment
metadata:
  name: medinovai-real-time-stream-bus
  namespace: medinovai
  labels:
    app: medinovai-real-time-stream-bus
    tier: platform
spec:
  replicas: 1
  selector:
    matchLabels:
      app: medinovai-real-time-stream-bus
  template:
    metadata:
      labels:
        app: medinovai-real-time-stream-bus
    spec:
      containers:
        - name: rest-proxy
          image: medinovai-real-time-stream-bus:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 3140
              name: http
          env:
            - name: SERVICE_NAME
              value: "medinovai-real-time-stream-bus"
            - name: REGISTRY_URL
              value: "http://medinovai-registry.medinovai:8000"
            - name: PORT
              value: "3140"
            - name: KAFKA_BOOTSTRAP_SERVERS
              value: "kafka.infra.svc.cluster.local:9092"
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /health
              port: 3140
            initialDelaySeconds: 45
            periodSeconds: 15
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /ready
              port: 3140
            initialDelaySeconds: 15
            periodSeconds: 10
            failureThreshold: 2
---
apiVersion: v1
kind: Service
metadata:
  name: medinovai-real-time-stream-bus
  namespace: medinovai
  labels:
    app: medinovai-real-time-stream-bus
spec:
  type: ClusterIP
  ports:
    - port: 3140
      targetPort: 3140
      protocol: TCP
      name: http
  selector:
    app: medinovai-real-time-stream-bus
