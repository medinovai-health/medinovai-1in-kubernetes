---
apiVersion: v1
kind: Namespace
metadata:
  name: medinovai
  labels:
    name: medinovai
    istio-injection: enabled

---
apiVersion: v1
kind: Secret
metadata:
  name: mongodb-credentials
  namespace: medinovai
type: Opaque
stringData:
  root-password: "medinovai_mongo_secure_2025"
  app-password: "medinovai_app_secure_2025"

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: mongodb-init-script
  namespace: medinovai
data:
  init-mongodb.js: |
    print('=== MedinovAI MongoDB Initialization ===');
    db = db.getSiblingDB('medinovai');
    db.createUser({
      user: 'medinovai_app',
      pwd: 'medinovai_app_secure_2025',
      roles: [{ role: 'readWrite', db: 'medinovai' }]
    });
    db.createCollection('patients');
    db.createCollection('medical_records');
    db.createCollection('sessions');
    db.createCollection('logs');
    db.createCollection('audit_trail');
    db.patients.createIndex({ "patient_id": 1 }, { unique: true });
    db.medical_records.createIndex({ "patient_id": 1 });
    db.sessions.createIndex({ "session_id": 1 }, { unique: true });
    print('=== MongoDB Initialization Complete ===');

---
apiVersion: v1
kind: Service
metadata:
  name: mongodb
  namespace: medinovai
  labels:
    app: mongodb
    tier: database
spec:
  type: ClusterIP
  clusterIP: None  # Headless service for StatefulSet
  ports:
    - port: 27017
      targetPort: 27017
      name: mongodb
  selector:
    app: mongodb

---
apiVersion: v1
kind: Service
metadata:
  name: mongodb-external
  namespace: medinovai
  labels:
    app: mongodb
    tier: database
spec:
  type: LoadBalancer
  ports:
    - port: 27017
      targetPort: 27017
      name: mongodb
  selector:
    app: mongodb

---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: mongodb
  namespace: medinovai
  labels:
    app: mongodb
    tier: database
    version: "7.0"
spec:
  serviceName: mongodb
  replicas: 1
  selector:
    matchLabels:
      app: mongodb
  template:
    metadata:
      labels:
        app: mongodb
        tier: database
        version: "7.0"
    spec:
      containers:
      - name: mongodb
        image: mongo:7.0
        imagePullPolicy: IfNotPresent
        
        ports:
        - containerPort: 27017
          name: mongodb
        
        env:
        - name: MONGO_INITDB_ROOT_USERNAME
          value: "medinovai_admin"
        - name: MONGO_INITDB_ROOT_PASSWORD
          valueFrom:
            secretKeyRef:
              name: mongodb-credentials
              key: root-password
        - name: MONGO_INITDB_DATABASE
          value: "medinovai"
        
        resources:
          requests:
            cpu: "1000m"
            memory: "4Gi"
          limits:
            cpu: "2000m"
            memory: "8Gi"
        
        volumeMounts:
        - name: mongodb-data
          mountPath: /data/db
        - name: mongodb-config
          mountPath: /data/configdb
        - name: mongodb-init
          mountPath: /docker-entrypoint-initdb.d
          readOnly: true
        
        livenessProbe:
          exec:
            command:
            - mongosh
            - --eval
            - "db.adminCommand('ping')"
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        
        readinessProbe:
          exec:
            command:
            - mongosh
            - --eval
            - "db.adminCommand('ping')"
          initialDelaySeconds: 10
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3
      
      volumes:
      - name: mongodb-init
        configMap:
          name: mongodb-init-script
  
  volumeClaimTemplates:
  - metadata:
      name: mongodb-data
    spec:
      accessModes: [ "ReadWriteOnce" ]
      resources:
        requests:
          storage: 100Gi
  
  - metadata:
      name: mongodb-config
    spec:
      accessModes: [ "ReadWriteOnce" ]
      resources:
        requests:
          storage: 1Gi

---
apiVersion: v1
kind: Service
metadata:
  name: mongodb-metrics
  namespace: medinovai
  labels:
    app: mongodb
    component: metrics
spec:
  type: ClusterIP
  ports:
    - port: 9216
      targetPort: 9216
      name: metrics
  selector:
    app: mongodb

---
# Prometheus ServiceMonitor for MongoDB
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: mongodb
  namespace: medinovai
  labels:
    app: mongodb
spec:
  selector:
    matchLabels:
      app: mongodb
      component: metrics
  endpoints:
  - port: metrics
    interval: 30s

