    - name: request-transformer
      config:
        add:
          headers:
            - X-Correlation-ID:$(uuid)
            - X-Service-Tier:2

- name: infrastructure-alerts
  paths:
    - /api/v1/alerts
  service:
    name: infrastructure
    url: http://medinovai-infrastructure:8080
  plugins:
    - name: jwt
      config:
        claims_to_verify: [exp]
    - name: acl
      config:
        allow: [infrastructure-read, infrastructure-write, admin]
    - name: rate-limiting
      config:
        minute: 120
        policy: redis
    - name: request-transformer
      config:
        add:
          headers:
            - X-Correlation-ID:$(uuid)
            - X-Service-Tier:2

# Health check route (no auth)
- name: infrastructure-health
  paths:
    - /api/v1/infrastructure/health
  service:
    name: infrastructure
    url: http://medinovai-infrastructure:8080/health
  plugins: []

upstreams:
  - name: infrastructure-upstream
    algorithm: round-robin
    healthchecks:
      active:
        http_path: /health/ready
        healthy:
          interval: 10
          successes: 2
        unhealthy:
          interval: 5
          http_failures: 3
