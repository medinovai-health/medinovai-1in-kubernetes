# MedinovAI LIS - Docker Compose for Local Development
# Healthcare-compliant local development environment
# NOT for production use - use Kubernetes for production deployments

version: '3.9'

services:
  # LIS API
  lis-api:
    build:
      context: ../
      dockerfile: docker/Dockerfile.lis-api
    image: medinovai/lis-api:local
    container_name: lis-api
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:8080
      - ConnectionStrings__DefaultConnection=Server=mysql;Port=3306;Database=LIS;User=lis_app;Password=lis_dev_password;SslMode=Preferred
      - ConnectionStrings__Redis=redis:6379,password=redis_dev_password
      - RabbitMQ__Host=rabbitmq
      - RabbitMQ__Port=5672
      - RabbitMQ__Username=lis_app
      - RabbitMQ__Password=rabbitmq_dev_password
      - Logging__LogLevel__Default=Information
      - OTEL_SERVICE_NAME=lis-api
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4317
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - lis-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health/ready"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    volumes:
      - api-logs:/app/logs
    labels:
      - "com.medinovai.service=lis-api"
      - "com.medinovai.compliance=hipaa"

  # MySQL Database
  mysql:
    image: mysql:8.0
    container_name: lis-mysql
    restart: unless-stopped
    ports:
      - "3306:3306"
    environment:
      - MYSQL_ROOT_PASSWORD=root_dev_password
      - MYSQL_DATABASE=LIS
      - MYSQL_USER=lis_app
      - MYSQL_PASSWORD=lis_dev_password
    command: >
      --default-authentication-plugin=mysql_native_password
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
      --max_connections=1000
      --innodb_buffer_pool_size=1G
      --slow_query_log=ON
      --long_query_time=2
    volumes:
      - mysql-data:/var/lib/mysql
      - ./init-scripts/mysql:/docker-entrypoint-initdb.d:ro
    networks:
      - lis-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot_dev_password"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    labels:
      - "com.medinovai.service=mysql"
      - "com.medinovai.data=phi"

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: lis-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: >
      redis-server
      --requirepass redis_dev_password
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
      --appendonly yes
    volumes:
      - redis-data:/data
    networks:
      - lis-network
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "redis_dev_password", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    labels:
      - "com.medinovai.service=redis"

  # RabbitMQ Message Broker
  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: lis-rabbitmq
    restart: unless-stopped
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      - RABBITMQ_DEFAULT_USER=lis_app
      - RABBITMQ_DEFAULT_PASS=rabbitmq_dev_password
      - RABBITMQ_DEFAULT_VHOST=/
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    networks:
      - lis-network
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 30s
    labels:
      - "com.medinovai.service=rabbitmq"

  # Elasticsearch for logging
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.11.0
    container_name: lis-elasticsearch
    restart: unless-stopped
    ports:
      - "9200:9200"
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    volumes:
      - elasticsearch-data:/usr/share/elasticsearch/data
    networks:
      - lis-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9200/_cluster/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    labels:
      - "com.medinovai.service=elasticsearch"

  # Kibana for log visualization
  kibana:
    image: docker.elastic.co/kibana/kibana:8.11.0
    container_name: lis-kibana
    restart: unless-stopped
    ports:
      - "5601:5601"
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
    depends_on:
      elasticsearch:
        condition: service_healthy
    networks:
      - lis-network
    labels:
      - "com.medinovai.service=kibana"

  # OpenTelemetry Collector
  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.91.0
    container_name: lis-otel-collector
    restart: unless-stopped
    ports:
      - "4317:4317"   # OTLP gRPC
      - "4318:4318"   # OTLP HTTP
      - "8888:8888"   # Metrics
    command: ["--config=/etc/otel-collector-config.yaml"]
    volumes:
      - ./configs/otel-collector-config.yaml:/etc/otel-collector-config.yaml:ro
    networks:
      - lis-network
    labels:
      - "com.medinovai.service=otel-collector"

  # Prometheus for metrics
  prometheus:
    image: prom/prometheus:v2.48.0
    container_name: lis-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./configs/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.enable-lifecycle'
    networks:
      - lis-network
    labels:
      - "com.medinovai.service=prometheus"

  # Grafana for dashboards
  grafana:
    image: grafana/grafana:10.2.0
    container_name: lis-grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana-data:/var/lib/grafana
      - ./configs/grafana/provisioning:/etc/grafana/provisioning:ro
      - ../monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus
    networks:
      - lis-network
    labels:
      - "com.medinovai.service=grafana"

  # Jaeger for distributed tracing
  jaeger:
    image: jaegertracing/all-in-one:1.52
    container_name: lis-jaeger
    restart: unless-stopped
    ports:
      - "16686:16686"  # UI
      - "14268:14268"  # HTTP collector
    environment:
      - COLLECTOR_OTLP_ENABLED=true
    networks:
      - lis-network
    labels:
      - "com.medinovai.service=jaeger"

networks:
  lis-network:
    driver: bridge
    name: lis-network

volumes:
  mysql-data:
    name: lis-mysql-data
  redis-data:
    name: lis-redis-data
  rabbitmq-data:
    name: lis-rabbitmq-data
  elasticsearch-data:
    name: lis-elasticsearch-data
  prometheus-data:
    name: lis-prometheus-data
  grafana-data:
    name: lis-grafana-data
  api-logs:
    name: lis-api-logs
