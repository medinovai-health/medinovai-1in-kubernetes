version: '3.8'

services:
  # Traefik Load Balancer
  traefik:
    image: traefik:v3.0
    container_name: medinovai-traefik-central
    command:
      - --api.dashboard=true
      - --providers.docker=true
      - --providers.docker.exposedbydefault=false
      - --entrypoints.web.address=:80
      - --entrypoints.websecure.address=:443
      - --certificatesresolvers.letsencrypt.acme.tlschallenge=true
      - --certificatesresolvers.letsencrypt.acme.storage=/letsencrypt/acme.json
      - --certificatesresolvers.letsencrypt.acme.email=admin@medinovai.com
    ports:
      - "80:80"
      - "443:443"
      - "8080:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - traefik_data:/letsencrypt
    networks:
      - medinovai-central-net
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.traefik.rule=Host(`traefik.medinovai.com`)"
      - "traefik.http.routers.traefik.entrypoints=websecure"
      - "traefik.http.routers.traefik.tls.certresolver=letsencrypt"

  # PostgreSQL Central Database
  postgres-central:
    image: postgres:15-alpine
    container_name: medinovai-postgres-central
    environment:
      POSTGRES_DB: medinovai_central
      POSTGRES_USER: medinovai_admin
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-secure_password}
      POSTGRES_MULTIPLE_DATABASES: keycloak,audit,analytics
    volumes:
      - postgres_central_data:/var/lib/postgresql/data
      - ./postgres/init-multiple-databases.sh:/docker-entrypoint-initdb.d/init-multiple-databases.sh:ro
    ports:
      - "5432:5432"
    networks:
      - medinovai-central-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U medinovai_admin -d postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis Central Cache
  redis-central:
    image: redis:7-alpine
    container_name: medinovai-redis-central
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-redis_secure_pass}
    volumes:
      - redis_central_data:/data
    ports:
      - "6379:6379"
    networks:
      - medinovai-central-net
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # Elasticsearch Central Search
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.11.0
    container_name: medinovai-elasticsearch-central
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms1g -Xmx1g"
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
    ports:
      - "9200:9200"
    networks:
      - medinovai-central-net

  # Prometheus Monitoring
  prometheus:
    image: prom/prometheus:latest
    container_name: medinovai-prometheus-central
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--storage.tsdb.retention.time=200h'
      - '--web.enable-lifecycle'
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    networks:
      - medinovai-central-net

  # Grafana Dashboards
  grafana:
    image: grafana/grafana:latest
    container_name: medinovai-grafana-central
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: false
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
    networks:
      - medinovai-central-net
    depends_on:
      - prometheus

  # Jaeger Tracing
  jaeger:
    image: jaegertracing/all-in-one:latest
    container_name: medinovai-jaeger-central
    environment:
      COLLECTOR_OTLP_ENABLED: true
    ports:
      - "16686:16686"
      - "14268:14268"
      - "14250:14250"
    networks:
      - medinovai-central-net

  # MinIO Object Storage
  minio:
    image: minio/minio:latest
    container_name: medinovai-minio-central
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin123}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    networks:
      - medinovai-central-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3

  # Docker Registry
  registry:
    image: registry:2
    container_name: medinovai-registry-central
    environment:
      REGISTRY_AUTH: htpasswd
      REGISTRY_AUTH_HTPASSWD_REALM: Registry Realm
      REGISTRY_AUTH_HTPASSWD_PATH: /auth/htpasswd
      REGISTRY_STORAGE_FILESYSTEM_ROOTDIRECTORY: /var/lib/registry
    ports:
      - "5000:5000"
    volumes:
      - registry_data:/var/lib/registry
      - ./registry/auth:/auth:ro
    networks:
      - medinovai-central-net

volumes:
  traefik_data:
  postgres_central_data:
  redis_central_data:
  elasticsearch_data:
  prometheus_data:
  grafana_data:
  minio_data:
  registry_data:

networks:
  medinovai-central-net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.30.0.0/16
