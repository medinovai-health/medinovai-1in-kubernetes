apiVersion: apps/v1
kind: Deployment
metadata:
  name: service_mesh
  labels:
    app: service_mesh
    version: 1.0.0
spec:
  replicas: 3
  selector:
    matchLabels:
      app: service_mesh
  template:
    metadata:
      labels:
        app: service_mesh
        version: 1.0.0
    spec:
      containers:
      - name: service_mesh
        image: medinovai-service-mesh:1.0.0
        ports:
        - containerPort: 3145
        env:
        - name: NODE_ENV
          value: "production"
        - name: PORT
          value: "3145"
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /health
            port: 3145
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /ready
            port: 3145
          initialDelaySeconds: 5
          periodSeconds: 5
