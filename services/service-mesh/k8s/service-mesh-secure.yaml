apiVersion: apps/v1
kind: Deployment
metadata:
  name: service-mesh
  namespace: healthcare
  labels:
    app: service-mesh
    security: enabled
spec:
  replicas: 3
  selector:
    matchLabels:
      app: service-mesh
  template:
    metadata:
      labels:
        app: service-mesh
        security: enabled
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        readOnlyRootFilesystem: true
        allowPrivilegeEscalation: false
        capabilities:
          drop:
            - ALL
      containers:
      - name: service-mesh
        image: medinovai/service-mesh:latest
        ports:
        - containerPort: 1099
        securityContext:
          readOnlyRootFilesystem: true
          runAsNonRoot: true
          runAsUser: 1000
          allowPrivilegeEscalation: false
          capabilities:
            drop:
              - ALL
        resources:
          limits:
            cpu: "500m"
            memory: "512Mi"
          requests:
            cpu: "100m"
            memory: "128Mi"
        env:
        - name: JWT_SECRET_KEY
          valueFrom:
            secretKeyRef:
              name: service-mesh-secrets
              key: jwt-secret
        - name: ENCRYPTION_KEY
          valueFrom:
            secretKeyRef:
              name: service-mesh-secrets
              key: encryption-key
        - name: ENVIRONMENT
          value: "production"
        livenessProbe:
          httpGet:
            path: /health
            port: 1099
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 1099
          initialDelaySeconds: 5
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: service-mesh
  namespace: healthcare
spec:
  selector:
    app: service-mesh
  ports:
  - port: 1099
    targetPort: 1099
  type: ClusterIP
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: service-mesh-network
  namespace: healthcare
spec:
  podSelector:
    matchLabels:
      app: service-mesh
  policyTypes:
  - Ingress
  - Egress
  ingress:
  - from:
    - namespaceSelector:
        matchLabels:
          name: healthcare-frontend
    ports:
    - protocol: TCP
      port: 1099
  egress:
  - to:
    - namespaceSelector:
        matchLabels:
          name: healthcare-database
    ports:
    - protocol: TCP
      port: 5432
  - to: []
    ports:
    - protocol: TCP
      port: 53
    - protocol: UDP
      port: 53
