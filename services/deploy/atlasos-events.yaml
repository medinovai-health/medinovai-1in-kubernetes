# AutonomyOS Domain Event Catalog
# Deployment Service (medinovai-deploy) — Tier 2
#
# Event-driven architecture for the MedinovAI AutonomyOS platform.
# All events are published to ActiveMQ topics and consumed by registered subscribers.
# Events follow CloudEvents v1.0 specification.

module: deploy
version: "1.0.0"
domain: Deployment Service
tier: 2

event_defaults:
  content_type: application/json
  encoding: utf-8
  broker: activemq
  dead_letter_topic: "medinovai.deploy.dlq"
  retry_policy:
    max_retries: 3
    backoff: exponential
    initial_delay_ms: 1000

events:
  deploy.deployment.created:
    description: "Deployment was created"
    schema:
      type: object
      required: [event_id, timestamp, org_id, actor_id, deployment_id]
      properties:
        event_id:
          type: string
          format: uuid
        timestamp:
          type: string
          format: date-time
        org_id:
          type: string
          format: uuid
          description: Tenant organization
        actor_id:
          type: string
          format: uuid
          description: User who triggered the event
        deployment_id:
          type: string
          format: uuid
        action:
          type: string
          enum: [created]
        correlation_id:
          type: string
          format: uuid
    topic: "medinovai.deploy.deployment.created"
    retention: 30d
    consumers:
      - audit-trail
      - analytics-pipeline

  deploy.deployment.updated:
