# Docker Compose — Test Environment
# medinovai-deploy | Deployment Service | Tier 2
#
# Run: docker compose -f docker-compose.test.yml up --build --abort-on-container-exit

version: "3.8"

services:
  test-runner:
    image: ubuntu:22.04
    working_dir: /app
    volumes:
      - .:/app:ro
      - test-results:/app/test-results
    environment:
      - MEDINOVAI_ENV=test
      - MEDINOVAI_SERVICE=medinovai-deploy
      - MEDINOVAI_TIER=2
      - LOG_LEVEL=DEBUG
      # HIPAA: Never put real credentials in compose files
      - DATABASE_URL=sqlite:///tmp/test.db
    command: >
      sh -c "
        apt-get update -qq && apt-get install -y -qq bash coreutils &&
        bash tests/test_smoke.sh || echo 'No tests'
      "
    healthcheck:
      test: ["CMD", "echo", "ok"]
      interval: 10s
      timeout: 5s
      retries: 3

volumes:
  test-results:
