# =============================================================================
# MedinovAI Full-Stack Docker Compose
# Starts the COMPLETE MedinovAI platform in a single Docker environment.
# Uses 6-tier deployment order from UNIVERSAL_SELF_ASSEMBLY_ARCHITECTURE.md.
#
# Prerequisites:
#   1. docker network create medinovai-internal
#   2. Copy .env.example to .env and fill in secrets
#   3. docker-compose -f services/docker-compose.full-stack.yml up -d
#
# Tier 0: Infrastructure (Redis, PostgreSQL, Kafka, Vault, Prometheus)
# Tier 1: Security (Keycloak, SpiceDB, MedinovAI Security Service)
# Tier 2: Control Plane (Registry + 11 Provisioners + Healing + Orchestrator)
# Tier 3: Core Platform (medinovai-core, medinovai-atlas-os)
# Tier 4: AI/ML (healthLLM, Cortex, aifactory, Atlas)
# Tier 5: Domain Services (lis, ctms, etmf, data-services, etc.)
# Tier 6: Frontend (Uiux)
# =============================================================================

version: '3.8'

services:

  # ===========================================================================
  # TIER 0 — INFRASTRUCTURE
  # ===========================================================================

  redis:
    image: redis:7-alpine
    container_name: medinovai-redis
    ports: ["6379:6379"]
    volumes: [redis-data:/data]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s; timeout: 3s; retries: 5
    restart: unless-stopped
    networks: [medinovai-internal]
    labels: {medinovai.tier: "0", medinovai.domain: "infrastructure"}

  postgres:
    image: postgres:15-alpine
    container_name: medinovai-postgres
    ports: ["5432:5432"]
    environment:
      POSTGRES_USER: ${POSTGRES_ADMIN_USER:-medinovai_admin}
      POSTGRES_PASSWORD: ${POSTGRES_ADMIN_PASSWORD}
      POSTGRES_DB: medinovai_platform
    volumes: [postgres-data:/var/lib/postgresql/data]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U medinovai_admin"]
      interval: 10s; timeout: 5s; retries: 5
    restart: unless-stopped
    networks: [medinovai-internal]
    labels: {medinovai.tier: "0", medinovai.domain: "infrastructure"}

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: medinovai-kafka
    ports: ["9092:9092"]
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_DEFAULT_REPLICATION_FACTOR: 1
      KAFKA_LOG_RETENTION_HOURS: 168
    depends_on: [zookeeper]
    healthcheck:
      test: ["CMD", "kafka-topics", "--bootstrap-server", "localhost:9092", "--list"]
      interval: 30s; timeout: 10s; retries: 5
    restart: unless-stopped
    networks: [medinovai-internal]
    labels: {medinovai.tier: "0", medinovai.domain: "infrastructure"}

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: medinovai-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
    networks: [medinovai-internal]

  vault:
    image: hashicorp/vault:1.15
    container_name: medinovai-vault
    ports: ["8200:8200"]
    environment:
      VAULT_DEV_ROOT_TOKEN_ID: ${VAULT_TOKEN:-medinovai-dev-token}
      VAULT_DEV_LISTEN_ADDRESS: "0.0.0.0:8200"
    cap_add: [IPC_LOCK]
    command: vault server -dev
    healthcheck:
      test: ["CMD", "vault", "status"]
      interval: 10s; timeout: 5s; retries: 5
    restart: unless-stopped
    networks: [medinovai-internal]
    labels: {medinovai.tier: "0", medinovai.domain: "infrastructure"}

  prometheus:
    image: prom/prometheus:v2.48.0
    container_name: medinovai-prometheus
    ports: ["9090:9090"]
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    networks: [medinovai-internal]
    labels: {medinovai.tier: "0", medinovai.domain: "infrastructure"}

  grafana:
    image: grafana/grafana:10.2.0
    container_name: medinovai-grafana
    ports: ["3000:3000"]
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-medinovai-admin}
      GF_AUTH_ANONYMOUS_ENABLED: "false"
    volumes: [grafana-data:/var/lib/grafana]
    networks: [medinovai-internal]
    labels: {medinovai.tier: "0", medinovai.domain: "infrastructure"}

  kong:
    image: kong:3.5-alpine
    container_name: medinovai-kong
    ports: ["8000:8000", "8001:8001", "8443:8443"]
    environment:
      KONG_DATABASE: "off"
      KONG_DECLARATIVE_CONFIG: /etc/kong/kong.yml
      KONG_PROXY_ACCESS_LOG: /dev/stdout
      KONG_ADMIN_ACCESS_LOG: /dev/stdout
    volumes: [./gateway/kong.yml:/etc/kong/kong.yml:ro]
    networks: [medinovai-internal]
    labels: {medinovai.tier: "0", medinovai.domain: "infrastructure"}

  # ===========================================================================
  # TIER 1 — SECURITY
  # ===========================================================================

  keycloak:
    image: quay.io/keycloak/keycloak:23.0
    container_name: medinovai-keycloak
    ports: ["8080:8080"]
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/keycloak
      KC_DB_USERNAME: ${POSTGRES_ADMIN_USER:-medinovai_admin}
      KC_DB_PASSWORD: ${POSTGRES_ADMIN_PASSWORD}
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-medinovai-keycloak-admin}
      KC_HEALTH_ENABLED: "true"
    command: start-dev
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/health/ready"]
      interval: 30s; timeout: 10s; retries: 10; start_period: 60s
    restart: unless-stopped
    networks: [medinovai-internal]
    labels: {medinovai.tier: "1", medinovai.domain: "security"}

  spicedb:
    image: authzed/spicedb:v1.28.0
    container_name: medinovai-spicedb
    ports: ["50051:50051", "8443:8443"]
    command: serve --grpc-preshared-key ${SPICEDB_KEY:-medinovai-spicedb-key}
    healthcheck:
      test: ["CMD", "grpc_health_probe", "-addr=:50051"]
      interval: 10s; timeout: 5s; retries: 5
    restart: unless-stopped
    networks: [medinovai-internal]
    labels: {medinovai.tier: "1", medinovai.domain: "security"}

  medinovai-security-service:
    image: medinovai/security-service:latest
    container_name: medinovai-security-service
    ports: ["9013:9013"]
    environment:
      E_KEYCLOAK_URL: http://keycloak:8080
      E_SPICEDB_URL: spicedb:50051
      E_SPICEDB_KEY: ${SPICEDB_KEY:-medinovai-spicedb-key}
      E_DB_URL: postgresql://medinovai_admin:${POSTGRES_ADMIN_PASSWORD}@postgres:5432/medinovai_security
      E_REGISTRY_URL: http://medinovai-registry:9010
      E_VAULT_URL: http://vault:8200
      E_VAULT_TOKEN: ${VAULT_TOKEN:-medinovai-dev-token}
    depends_on:
      keycloak:
        condition: service_healthy
      spicedb:
        condition: service_healthy
      medinovai-registry:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:9013/health"]
      interval: 10s; timeout: 5s; retries: 5; start_period: 30s
    restart: unless-stopped
    networks: [medinovai-internal]
    labels: {medinovai.tier: "1", medinovai.domain: "security"}

  # ===========================================================================
  # TIER 2 — CONTROL PLANE (Registry + Provisioners + Healing + Orchestrator)
  # Extends docker-compose.control-plane.yml
  # ===========================================================================

  medinovai-registry:
    image: medinovai/registry:latest
    container_name: medinovai-registry
    ports: ["9010:9010"]
    environment:
      E_REGISTRY_PORT: 9010
      E_REDIS_URL: redis://redis:6379/0
      E_MSS_URL: http://medinovai-security-service:9013
      E_LOG_LEVEL: INFO
      E_AUDIT_LOG_ENABLED: "true"
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:9010/health"]
      interval: 10s; timeout: 5s; retries: 5; start_period: 15s
    restart: unless-stopped
    networks: [medinovai-internal]
    labels: {medinovai.tier: "2", medinovai.domain: "control-plane"}

  # ===========================================================================
  # TIER 3 — CORE PLATFORM
  # ===========================================================================

  medinovai-core:
    image: medinovai/core:latest
    container_name: medinovai-core
    ports: ["8100:8100"]
    environment:
      E_REGISTRY_URL: http://medinovai-registry:9010
      E_DB_URL: postgresql://medinovai_admin:${POSTGRES_ADMIN_PASSWORD}@postgres:5432/medinovai_core
      E_REDIS_URL: redis://redis:6379/10
      E_KAFKA_BOOTSTRAP: kafka:9092
      E_MSS_URL: http://medinovai-security-service:9013
    depends_on:
      medinovai-registry:
        condition: service_healthy
      medinovai-security-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8100/health"]
      interval: 10s; timeout: 5s; retries: 5; start_period: 30s
    restart: unless-stopped
    networks: [medinovai-internal]
    labels: {medinovai.tier: "3", medinovai.domain: "core"}

  # ===========================================================================
  # TIER 5 — DOMAIN SERVICES (abbreviated — full list managed by orchestrator)
  # ===========================================================================

  medinovai-lis:
    image: medinovai/lis:latest
    container_name: medinovai-lis
    ports: ["8020:8020"]
    environment:
      E_REGISTRY_URL: http://medinovai-registry:9010
      E_DB_URL: postgresql://medinovai_admin:${POSTGRES_ADMIN_PASSWORD}@postgres:5432/medinovai_lis_db
      E_REDIS_URL: redis://redis:6379/20
      E_KAFKA_BOOTSTRAP: kafka:9092
      E_MSS_URL: http://medinovai-security-service:9013
    depends_on:
      medinovai-core:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8020/health"]
      interval: 10s; timeout: 5s; retries: 5; start_period: 30s
    restart: unless-stopped
    networks: [medinovai-internal]
    labels: {medinovai.tier: "5", medinovai.domain: "diagnostics"}

volumes:
  redis-data:
  postgres-data:
  prometheus-data:
  grafana-data:

networks:
  medinovai-internal:
    external: true
