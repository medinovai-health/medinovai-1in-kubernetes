apiVersion: v1
kind: ServiceAccount
metadata:
  name: vault-auth
  namespace: vault
  labels:
    app.kubernetes.io/managed-by: medinovai-deploy
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: vault-auth-delegator
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: system:auth-delegator
subjects:
  - kind: ServiceAccount
    name: vault-auth
    namespace: vault
---
# Service accounts for each namespace that needs Vault access
apiVersion: v1
kind: ServiceAccount
metadata:
  name: vault-atlasos
  namespace: medinovai-services
  labels:
    app.kubernetes.io/managed-by: medinovai-deploy
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: vault-platform
  namespace: medinovai-services
  labels:
    app.kubernetes.io/managed-by: medinovai-deploy
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: vault-clinical
  namespace: medinovai-data
  labels:
    app.kubernetes.io/managed-by: medinovai-deploy
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: vault-ai
  namespace: medinovai-ai
  labels:
    app.kubernetes.io/managed-by: medinovai-deploy
