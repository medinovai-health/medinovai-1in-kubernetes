apiVersion: apps/v1
kind: Deployment
metadata:
  name: alertmanager
  namespace: medinovai-monitoring
  labels:
    app.kubernetes.io/name: alertmanager
    medinovai.com/tier: monitoring
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: alertmanager
  template:
    metadata:
      labels:
        app.kubernetes.io/name: alertmanager
    spec:
      nodeSelector:
        role: control-plane
      containers:
        - name: alertmanager
          image: prom/alertmanager:v0.27.0
          args: ["--config.file=/etc/alertmanager/alertmanager.yml"]
          ports:
            - containerPort: 9093
          resources:
            requests:
              memory: 64Mi
              cpu: 50m
            limits:
              memory: 256Mi
              cpu: 200m
          livenessProbe:
            httpGet:
              path: /-/healthy
              port: 9093
---
apiVersion: v1
kind: Service
metadata:
  name: alertmanager
  namespace: medinovai-monitoring
spec:
  selector:
    app.kubernetes.io/name: alertmanager
  ports:
    - port: 9093
      targetPort: 9093
