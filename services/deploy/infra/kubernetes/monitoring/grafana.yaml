apiVersion: apps/v1
kind: Deployment
metadata:
  name: grafana
  namespace: medinovai-monitoring
  labels:
    app.kubernetes.io/name: grafana
    medinovai.com/tier: monitoring
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: grafana
  template:
    metadata:
      labels:
        app.kubernetes.io/name: grafana
    spec:
      nodeSelector:
        role: control-plane
      containers:
        - name: grafana
          image: grafana/grafana:10.4.0
          ports:
            - containerPort: 3000
          env:
            - name: GF_SECURITY_ADMIN_PASSWORD
              value: "admin"
            - name: GF_INSTALL_PLUGINS
              value: "grafana-clock-panel"
          resources:
            requests:
              memory: 256Mi
              cpu: 100m
            limits:
              memory: 512Mi
              cpu: 500m
          volumeMounts:
            - name: data
              mountPath: /var/lib/grafana
            - name: dashboards
              mountPath: /etc/grafana/provisioning/dashboards
          livenessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 30
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: grafana-data
        - name: dashboards
          configMap:
            name: atlasos-dashboards
---
apiVersion: v1
kind: Service
metadata:
  name: grafana
  namespace: medinovai-monitoring
spec:
  selector:
    app.kubernetes.io/name: grafana
  ports:
    - port: 3000
      targetPort: 3000
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: grafana-data
  namespace: medinovai-monitoring
spec:
  accessModes: [ReadWriteOnce]
  storageClassName: hostpath
  resources:
    requests:
      storage: 5Gi
