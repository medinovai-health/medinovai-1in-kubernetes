apiVersion: v1
kind: Service
metadata:
  name: medinovai-data-services
  namespace: data
  labels:
    app: medinovai-data-services
    atlasos.io/managed: "true"
spec:
  selector:
    app: medinovai-data-services
  ports:
  - port: 3000
    targetPort: 3000
    protocol: TCP
    name: http
  type: ClusterIP
