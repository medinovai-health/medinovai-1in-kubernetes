apiVersion: apps/v1
kind: Deployment
metadata:
  name: employee-portal
  namespace: frontend
  labels:
    app: employee-portal
    atlasos.io/managed: "true"
  annotations:
    atlasos.io/sidecar-enabled: "true"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: employee-portal
  template:
    metadata:
      labels:
        app: employee-portal
        atlasos.io/managed: "true"
    spec:
      containers:
      - name: employee-portal
        image: employee-portal:latest
        ports:
        - containerPort: 3000
          name: http
        resources:
          requests:
            cpu: 50m
            memory: 128Mi
          limits:
            cpu: 100m
            memory: 256Mi

        livenessProbe:
          httpGet:
            path: /
            port: 3000
          initialDelaySeconds: 15
          periodSeconds: 20
        readinessProbe:
          httpGet:
            path: /
            port: 3000
          initialDelaySeconds: 5
          periodSeconds: 10

        volumeMounts:
        - name: secrets
          mountPath: /run/secrets/atlasos
          readOnly: true
      volumes:
      - name: secrets
        secret:
          secretName: atlasos-infra-secrets

