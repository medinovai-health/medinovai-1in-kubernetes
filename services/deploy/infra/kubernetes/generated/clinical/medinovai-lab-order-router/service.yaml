apiVersion: v1
kind: Service
metadata:
  name: medinovai-lab-order-router
  namespace: clinical
  labels:
    app: medinovai-lab-order-router
    atlasos.io/managed: "true"
spec:
  selector:
    app: medinovai-lab-order-router
  ports:
  - port: 3000
    targetPort: 3000
    protocol: TCP
    name: http
  type: ClusterIP
