apiVersion: apps/v1
kind: Deployment
metadata:
  name: mayanktrivedi-2
  namespace: platform
  labels:
    app: mayanktrivedi-2
    atlasos.io/managed: "true"
  annotations:
    atlasos.io/sidecar-enabled: "true"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mayanktrivedi-2
  template:
    metadata:
      labels:
        app: mayanktrivedi-2
        atlasos.io/managed: "true"
    spec:
      containers:
      - name: mayanktrivedi-2
        image: mayanktrivedi-2:latest
        ports:
        - containerPort: 3000
          name: http
        resources:
          requests:
            cpu: 100m
            memory: 256Mi
          limits:
            cpu: 200m
            memory: 512Mi

        livenessProbe:
          httpGet:
            path: /health
            port: 3000
          initialDelaySeconds: 15
          periodSeconds: 20
        readinessProbe:
          httpGet:
            path: /ready
            port: 3000
          initialDelaySeconds: 5
          periodSeconds: 10

        volumeMounts:
        - name: secrets
          mountPath: /run/secrets/atlasos
          readOnly: true
      volumes:
      - name: secrets
        secret:
          secretName: atlasos-infra-secrets

