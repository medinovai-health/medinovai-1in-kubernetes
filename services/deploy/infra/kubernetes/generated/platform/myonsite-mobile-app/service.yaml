apiVersion: v1
kind: Service
metadata:
  name: myonsite-mobile-app
  namespace: platform
  labels:
    app: myonsite-mobile-app
    atlasos.io/managed: "true"
spec:
  selector:
    app: myonsite-mobile-app
  ports:
  - port: 3000
    targetPort: 3000
    protocol: TCP
    name: http
  type: ClusterIP
