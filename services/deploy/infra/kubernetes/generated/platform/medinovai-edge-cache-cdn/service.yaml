apiVersion: v1
kind: Service
metadata:
  name: medinovai-edge-cache-cdn
  namespace: platform
  labels:
    app: medinovai-edge-cache-cdn
    atlasos.io/managed: "true"
spec:
  selector:
    app: medinovai-edge-cache-cdn
  ports:
  - port: 3000
    targetPort: 3000
    protocol: TCP
    name: http
  type: ClusterIP
