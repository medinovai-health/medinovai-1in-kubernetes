apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
# docker-desktop overlay — platform-wide resources
# Cross-cutting: namespaces, network policies, RBAC, quotas
# Includes generated platform and security service manifests
resources:
  - ../../base
  - ../../generated

# Patches for Docker Desktop environment
patches:
  # Ensure imagePullPolicy is Never for local Docker Desktop builds
  - target:
      kind: Deployment
      name: .*
    patch: |-
      - op: replace
        path: /spec/template/spec/containers/0/imagePullPolicy
        value: Never

commonLabels:
  environment: docker-desktop
  medinovai.io/overlay: docker-desktop
