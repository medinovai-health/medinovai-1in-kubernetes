# Reduced resource quotas for single-node Docker Desktop
apiVersion: v1
kind: ResourceQuota
metadata:
  name: services-quota
  namespace: medinovai-services
spec:
  hard:
    requests.cpu: "4"
    requests.memory: 4Gi
    limits.cpu: "8"
    limits.memory: 8Gi
    pods: "30"
---
apiVersion: v1
kind: ResourceQuota
metadata:
  name: ai-quota
  namespace: medinovai-ai
spec:
  hard:
    requests.cpu: "2"
    requests.memory: 2Gi
    limits.cpu: "4"
    limits.memory: 4Gi
    pods: "10"
---
apiVersion: v1
kind: ResourceQuota
metadata:
  name: monitoring-quota
  namespace: medinovai-monitoring
spec:
  hard:
    requests.cpu: "2"
    requests.memory: 2Gi
    limits.cpu: "4"
    limits.memory: 4Gi
    pods: "15"
