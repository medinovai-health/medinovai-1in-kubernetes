# Expose auth-service as NodePort — reachable via Tailscale IP from other machines.
# Access: http://<tailscale-ip>:30081
apiVersion: v1
kind: Service
metadata:
  name: auth-service
  namespace: medinovai-services
spec:
  type: NodePort
  ports:
    - port: 3000
      targetPort: 80
      nodePort: 30081
      protocol: TCP
      name: http
