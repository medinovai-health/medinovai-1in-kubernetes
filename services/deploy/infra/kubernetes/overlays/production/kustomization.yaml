# Production overlay: increased replicas, PDB enforcement
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ../../base
  - ../../services/api-gateway
  - ../../services/auth-service
  - ../../services/clinical-engine
  - ../../services/data-pipeline
  - ../../services/ai-inference
  - ../../services/notification-service
  - ../../ingress
  - ../../monitoring/prometheus
  - ../../monitoring/grafana
  - ../../monitoring/alertmanager
  - ../../monitoring/loki
  - ../../jobs
replicas:
  - name: api-gateway
    count: 3
  - name: auth-service
    count: 3
  - name: clinical-engine
    count: 3
  - name: data-pipeline
    count: 3
  - name: ai-inference
    count: 2
  - name: notification-service
    count: 2
patches:
  - path: production-pdb-enforcement.yaml
