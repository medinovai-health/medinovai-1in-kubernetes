apiVersion: apps/v1
kind: Deployment
metadata:
  name: medinovai-universal-sign-on
  namespace: medinovai-security
  labels:
    app: medinovai-universal-sign-on
    tier: security
    app.kubernetes.io/managed-by: medinovai-deploy
spec:
  replicas: 1
  selector:
    matchLabels:
      app: medinovai-universal-sign-on
  template:
    metadata:
      labels:
        app: medinovai-universal-sign-on
        tier: security
    spec:
      containers:
        - name: universal-sign-on
          image: medinovai-universal-sign-on:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 8000
          env:
            - name: SERVICE_NAME
              value: "medinovai-universal-sign-on"
            - name: PORT
              value: "8000"
            - name: REGISTRY_URL
              value: "http://medinovai-registry.medinovai-services:8080"
            - name: DATABASE_URL
              value: "postgresql://medinovai:medinovai_dev@postgres-primary.medinovai-data:5432/medinovai_main"
            - name: REDIS_URL
              value: "redis://:medinovai_dev@redis.medinovai-data:6379"
            - name: SECURITY_SERVICE_URL
              value: "http://medinovai-security.medinovai-security:9000"
            - name: KAFKA_BROKERS
              value: "kafka.medinovai-data:29092"
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 10
            failureThreshold: 2
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 45
            periodSeconds: 15
            failureThreshold: 3
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "512Mi"
              cpu: "500m"
---
apiVersion: v1
kind: Service
metadata:
  name: medinovai-universal-sign-on
  namespace: medinovai-security
spec:
  selector:
    app: medinovai-universal-sign-on
  ports:
    - port: 8000
      targetPort: 8000
