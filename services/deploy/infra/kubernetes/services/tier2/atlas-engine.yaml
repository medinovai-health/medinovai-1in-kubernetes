apiVersion: apps/v1
kind: Deployment
metadata:
  name: medinovai-atlas-engine
  namespace: medinovai-services
  labels:
    app: medinovai-atlas-engine
    tier: platform
    app.kubernetes.io/managed-by: medinovai-deploy
spec:
  replicas: 1
  selector:
    matchLabels:
      app: medinovai-atlas-engine
  template:
    metadata:
      labels:
        app: medinovai-atlas-engine
        tier: platform
        app.kubernetes.io/managed-by: medinovai-deploy
    spec:
      containers:
        - name: medinovai-atlas-engine
          image: medinovai-atlas-engine:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 8000
          env:
            - name: SERVICE_NAME
              value: medinovai-atlas-engine
            - name: PORT
              value: "8000"
            - name: REGISTRY_URL
              value: http://medinovai-registry.medinovai-services:8080
            - name: DATABASE_URL
              value: postgresql://medinovai:medinovai_dev@postgres-primary.medinovai-data:5432/medinovai_main
            - name: REDIS_URL
              value: redis://:medinovai_dev@redis.medinovai-data:6379
            - name: SECURITY_SERVICE_URL
              value: http://medinovai-security.medinovai-security:9000
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 10
            failureThreshold: 2
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 45
            periodSeconds: 15
            failureThreshold: 3
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "512Mi"
              cpu: "500m"
---
apiVersion: v1
kind: Service
metadata:
  name: medinovai-atlas-engine
  namespace: medinovai-services
  labels:
    app: medinovai-atlas-engine
    tier: platform
    app.kubernetes.io/managed-by: medinovai-deploy
spec:
  selector:
    app: medinovai-atlas-engine
  ports:
    - port: 8000
      targetPort: 8000
      protocol: TCP
      name: http
