apiVersion: apps/v1
kind: Deployment
metadata:
  name: medinovai-registry
  namespace: medinovai-services
  labels:
    app: medinovai-registry
    tier: platform
    app.kubernetes.io/managed-by: medinovai-deploy
spec:
  replicas: 1
  selector:
    matchLabels:
      app: medinovai-registry
  template:
    metadata:
      labels:
        app: medinovai-registry
        tier: platform
        app.kubernetes.io/managed-by: medinovai-deploy
    spec:
      containers:
        - name: medinovai-registry
          image: medinovai-registry:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 8000
          env:
            - name: SERVICE_NAME
              value: medinovai-registry
            - name: PORT
              value: "8000"
            - name: REGISTRY_URL
              value: http://medinovai-registry.medinovai-services:8000
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: postgres-credentials
                  key: DATABASE_URL
                  optional: true
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: redis-credentials
                  key: REDIS_URL
                  optional: true
            - name: SECURITY_SERVICE_URL
              value: http://medinovai-security.medinovai-security:8000
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 10
            failureThreshold: 2
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 45
            periodSeconds: 15
            failureThreshold: 3
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "512Mi"
              cpu: "500m"
---
apiVersion: v1
kind: Service
metadata:
  name: medinovai-registry
  namespace: medinovai-services
  labels:
    app: medinovai-registry
    tier: platform
    app.kubernetes.io/managed-by: medinovai-deploy
spec:
  selector:
    app: medinovai-registry
  ports:
    - port: 8000
      targetPort: 8000
      protocol: TCP
      name: http
  type: NodePort
