apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: atlasos-sidecar-cert
  namespace: atlasos
spec:
  secretName: atlasos-sidecar-tls
  issuerRef:
    name: atlasos-selfsigned
    kind: Issuer
  dnsNames:
    - atlasos-sidecar-webhook.atlasos.svc
    - atlasos-sidecar-webhook.atlasos.svc.cluster.local
