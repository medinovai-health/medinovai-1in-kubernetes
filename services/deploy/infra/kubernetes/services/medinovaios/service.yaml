apiVersion: v1
kind: Service
metadata:
  name: medinovaios
  namespace: medinovai-os
  labels:
    app.kubernetes.io/name: medinovaios
    app.kubernetes.io/component: portal
    app.kubernetes.io/part-of: medinovai
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: medinovaios
  ports:
    - name: http
      port: 3030
      targetPort: 3030
      protocol: TCP
---
# NodePort for direct access without ingress (Docker Desktop)
apiVersion: v1
kind: Service
metadata:
  name: medinovaios-nodeport
  namespace: medinovai-os
  labels:
    app.kubernetes.io/name: medinovaios
    app.kubernetes.io/component: portal
    app.kubernetes.io/part-of: medinovai
spec:
  type: NodePort
  selector:
    app.kubernetes.io/name: medinovaios
  ports:
    - name: http
      port: 3030
      targetPort: 3030
      nodePort: 30030
      protocol: TCP
