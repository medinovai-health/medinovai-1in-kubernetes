apiVersion: v1
kind: Service
metadata:
  name: ollama
  labels:
    app.kubernetes.io/name: ollama
    medinovai.com/tier: ai
spec:
  clusterIP: None
  ports:
    - port: 11434
      targetPort: 11434
      name: http
  selector:
    app.kubernetes.io/name: ollama
---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: ollama
  labels:
    app.kubernetes.io/name: ollama
    medinovai.com/tier: ai
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: ollama
  template:
    metadata:
      labels:
        app.kubernetes.io/name: ollama
        medinovai.com/tier: ai
    spec:
      nodeSelector:
        gpu: "true"
      tolerations:
        - key: nvidia.com/gpu
          operator: Exists
          effect: NoSchedule
      containers:
        - name: ollama
          image: ollama/ollama:latest
          ports:
            - containerPort: 11434
              name: http
          volumeMounts:
            - name: ollama-models
              mountPath: /root/.ollama
          resources:
            requests:
              memory: 4Gi
              nvidia.com/gpu: "1"
            limits:
              memory: 16Gi
              nvidia.com/gpu: "1"
      volumes:
        - name: ollama-models
          hostPath:
            path: /data/ollama-models
            type: DirectoryOrCreate
