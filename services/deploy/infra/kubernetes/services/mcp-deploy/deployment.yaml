apiVersion: apps/v1
kind: Deployment
metadata:
  name: mcp-deploy
  namespace: medinovai
  labels:
    app: mcp-deploy
    app.kubernetes.io/name: mcp-deploy
    app.kubernetes.io/part-of: atlasos
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mcp-deploy
  template:
    metadata:
      labels:
        app: mcp-deploy
    spec:
      containers:
        - name: mcp-deploy
          image: mcp-deploy-server:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 3120
          env:
            - name: REGISTRY_URL
              value: "http://medinovai-registry.medinovai:8000"
            - name: SERVICE_NAME
              value: "mcp-deploy"
            - name: PORT
              value: "3120"
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          readinessProbe:
            httpGet:
              path: /health
              port: 3120
            initialDelaySeconds: 15
            periodSeconds: 10
            failureThreshold: 2
          livenessProbe:
            httpGet:
              path: /health
              port: 3120
            initialDelaySeconds: 45
            periodSeconds: 15
            failureThreshold: 3
