apiVersion: apps/v1
kind: Deployment
metadata:
  name: stream-bus-bridge
  namespace: medinovai
  labels:
    app: stream-bus-bridge
    app.kubernetes.io/name: stream-bus-bridge
    app.kubernetes.io/part-of: atlasos
spec:
  replicas: 1
  selector:
    matchLabels:
      app: stream-bus-bridge
  template:
    metadata:
      labels:
        app: stream-bus-bridge
    spec:
      containers:
        - name: stream-bus-bridge
          image: atlasos-stream-bus-bridge:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 3110
          env:
            - name: REGISTRY_URL
              value: "http://medinovai-registry.medinovai:8000"
            - name: SERVICE_NAME
              value: "stream-bus-bridge"
            - name: PORT
              value: "3110"
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          readinessProbe:
            httpGet:
              path: /health
              port: 3110
            initialDelaySeconds: 15
            periodSeconds: 10
            failureThreshold: 2
          livenessProbe:
            httpGet:
              path: /health
              port: 3110
            initialDelaySeconds: 45
            periodSeconds: 15
            failureThreshold: 3
