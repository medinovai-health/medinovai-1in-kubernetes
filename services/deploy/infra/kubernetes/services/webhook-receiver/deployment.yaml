apiVersion: apps/v1
kind: Deployment
metadata:
  name: webhook-receiver
  namespace: medinovai
  labels:
    app: webhook-receiver
    app.kubernetes.io/name: webhook-receiver
    app.kubernetes.io/part-of: atlasos
spec:
  replicas: 1
  selector:
    matchLabels:
      app: webhook-receiver
  template:
    metadata:
      labels:
        app: webhook-receiver
    spec:
      containers:
        - name: webhook-receiver
          image: atlasos-webhook-receiver:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 3121
          env:
            - name: REGISTRY_URL
              value: "http://medinovai-registry.medinovai:8000"
            - name: SERVICE_NAME
              value: "webhook-receiver"
            - name: PORT
              value: "3121"
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          readinessProbe:
            httpGet:
              path: /health
              port: 3121
            initialDelaySeconds: 15
            periodSeconds: 10
            failureThreshold: 2
          livenessProbe:
            httpGet:
              path: /health
              port: 3121
            initialDelaySeconds: 45
            periodSeconds: 15
            failureThreshold: 3
