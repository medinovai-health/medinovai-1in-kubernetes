apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: atlasos-cluster-brain
  labels:
    app.kubernetes.io/name: atlasos-cluster-brain
    app.kubernetes.io/part-of: atlasos
rules:
  # Full read on cluster state
  - apiGroups: [""]
    resources: ["nodes", "pods", "services", "namespaces", "events", "configmaps", "secrets", "persistentvolumeclaims"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["apps"]
    resources: ["deployments", "statefulsets", "daemonsets", "replicasets"]
    verbs: ["get", "list", "watch", "update", "patch"]
  - apiGroups: ["batch"]
    resources: ["jobs", "cronjobs"]
    verbs: ["get", "list", "watch", "create", "update", "patch"]
  # Scaling
  - apiGroups: ["autoscaling"]
    resources: ["horizontalpodautoscalers"]
    verbs: ["get", "list", "watch", "create", "update", "patch"]
  # Pod disruption budgets (create/update/delete for brain operations)
  - apiGroups: ["policy"]
    resources: ["poddisruptionbudgets"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  # Pod eviction (for node drain)
  - apiGroups: [""]
    resources: ["pods/eviction"]
    verbs: ["create"]
  # Events (write for recording actions)
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["create", "patch"]
  # Network policies (create/update/delete for brain operations)
  - apiGroups: ["networking.k8s.io"]
    resources: ["networkpolicies"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  # Node management (read + cordon/uncordon)
  - apiGroups: [""]
    resources: ["nodes"]
    verbs: ["get", "list", "watch", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: atlasos-cluster-brain
  labels:
    app.kubernetes.io/name: atlasos-cluster-brain
    app.kubernetes.io/part-of: atlasos
subjects:
  - kind: ServiceAccount
    name: atlasos-cluster-brain-sa
    namespace: atlasos
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: atlasos-cluster-brain
