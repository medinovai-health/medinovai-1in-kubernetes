# Post-AGI Capability services
---
apiVersion: v1
kind: Service
metadata:
  name: self-learning
  namespace: atlasos
  labels:
    app.kubernetes.io/name: self-learning
    app.kubernetes.io/part-of: atlasos
spec:
  ports:
    - port: 8240
      targetPort: 8240
  selector:
    app: self-learning
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: self-learning
  namespace: atlasos
  labels:
    app: self-learning
    app.kubernetes.io/name: self-learning
    app.kubernetes.io/part-of: atlasos
    app.kubernetes.io/version: "4.0.0"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: self-learning
  template:
    metadata:
      labels:
        app: self-learning
        atlasos.medinovai.com/sidecar: "enabled"
    spec:
      serviceAccountName: atlasos-sa
      containers:
        - name: self-learning
          image: atlasos/self-learning:4.0.0
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8240
          envFrom:
            - secretRef:
                name: atlasos-integration-secrets
            - secretRef:
                name: atlasos-infra-secrets
          resources:
            requests:
              memory: 128Mi
              cpu: 50m
            limits:
              memory: 256Mi
              cpu: 250m
          readinessProbe:
            httpGet:
              path: /health
              port: 8240
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8240
            initialDelaySeconds: 30
            periodSeconds: 30
