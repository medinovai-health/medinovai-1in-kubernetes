apiVersion: v1
kind: Service
metadata:
  name: decision-tracker
  namespace: atlasos
  labels:
    app.kubernetes.io/name: decision-tracker
    app.kubernetes.io/part-of: atlasos
spec:
  ports:
    - port: 8087
      targetPort: 8087
  selector:
    app: decision-tracker
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: decision-tracker
  namespace: atlasos
  labels:
    app: decision-tracker
    app.kubernetes.io/name: decision-tracker
    app.kubernetes.io/part-of: atlasos
    app.kubernetes.io/version: "1.2.0"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: decision-tracker
  template:
    metadata:
      labels:
        app: decision-tracker
        atlasos.medinovai.com/sidecar: "enabled"
    spec:
      serviceAccountName: atlasos-sa
      containers:
        - name: decision-tracker
          image: atlasos/decision-tracker:1.2.0
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8087
          envFrom:
            - secretRef:
                name: atlasos-infra-secrets
          resources:
            requests:
              memory: 128Mi
              cpu: 50m
            limits:
              memory: 256Mi
              cpu: 250m
          readinessProbe:
            httpGet:
              path: /health
              port: 8087
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8087
            initialDelaySeconds: 30
            periodSeconds: 30
