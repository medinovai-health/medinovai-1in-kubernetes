apiVersion: v1
kind: Service
metadata:
  name: mcp-connectors
  namespace: atlasos
  labels:
    app.kubernetes.io/name: mcp-connectors
    app.kubernetes.io/part-of: atlasos
spec:
  ports:
    - port: 8080
      targetPort: 8080
  selector:
    app: mcp-connectors
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mcp-connectors
  namespace: atlasos
  labels:
    app: mcp-connectors
    app.kubernetes.io/name: mcp-connectors
    app.kubernetes.io/part-of: atlasos
    app.kubernetes.io/version: "1.2.0"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mcp-connectors
  template:
    metadata:
      labels:
        app: mcp-connectors
        atlasos.medinovai.com/sidecar: "enabled"
    spec:
      serviceAccountName: atlasos-sa
      containers:
        - name: mcp-connectors
          image: atlasos/mcp-connectors:1.2.0
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          envFrom:
            - secretRef:
                name: atlasos-integration-secrets
            - secretRef:
                name: atlasos-infra-secrets
          resources:
            requests:
              memory: 128Mi
              cpu: 50m
            limits:
              memory: 256Mi
              cpu: 250m
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 30
