# OODA Brain + Fleet Management
---
apiVersion: v1
kind: Service
metadata:
  name: ooda-brain
  namespace: atlasos
  labels:
    app.kubernetes.io/name: ooda-brain
    app.kubernetes.io/part-of: atlasos
spec:
  ports:
    - port: 8000
      targetPort: 8000
  selector:
    app: ooda-brain
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ooda-brain
  namespace: atlasos
  labels:
    app: ooda-brain
    app.kubernetes.io/name: ooda-brain
    app.kubernetes.io/part-of: atlasos
    app.kubernetes.io/version: "4.0.0"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ooda-brain
  template:
    metadata:
      labels:
        app: ooda-brain
        atlasos.medinovai.com/sidecar: "enabled"
    spec:
      serviceAccountName: atlasos-sa
      containers:
        - name: ooda-brain
          image: atlasos/ooda-brain:4.0.0
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
          envFrom:
            - secretRef:
                name: atlasos-integration-secrets
            - secretRef:
                name: atlasos-infra-secrets
          resources:
            requests:
              memory: 128Mi
              cpu: 50m
            limits:
              memory: 256Mi
              cpu: 250m
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 30
---
