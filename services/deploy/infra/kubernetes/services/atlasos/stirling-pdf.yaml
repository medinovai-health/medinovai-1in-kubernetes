apiVersion: v1
kind: Service
metadata:
  name: stirling-pdf
  namespace: atlasos
  labels:
    app.kubernetes.io/name: stirling-pdf
    app.kubernetes.io/part-of: atlasos
spec:
  ports:
    - port: 8083
      targetPort: 8080
  selector:
    app: stirling-pdf
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: stirling-pdf
  namespace: atlasos
  labels:
    app: stirling-pdf
    app.kubernetes.io/name: stirling-pdf
    app.kubernetes.io/part-of: atlasos
    app.kubernetes.io/version: "1.2.0"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: stirling-pdf
  template:
    metadata:
      labels:
        app: stirling-pdf
    spec:
      containers:
        - name: stirling-pdf
          image: frooodle/s-pdf:latest
          ports:
            - containerPort: 8080
          env:
            - name: DOCKER_ENABLE_SECURITY
              value: "true"
            - name: SECURITY_ENABLELOGIN
              value: "false"
            - name: STIRLING_PDF_API_KEY
              valueFrom:
                secretKeyRef:
                  name: atlasos-secrets
                  key: STIRLING_PDF_API_KEY
                  optional: true
          resources:
            requests:
              memory: 256Mi
              cpu: 100m
            limits:
              memory: 1Gi
              cpu: "1"
          readinessProbe:
            httpGet:
              path: /api/v1/info/status
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/v1/info/status
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 30
