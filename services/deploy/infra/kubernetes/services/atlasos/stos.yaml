# STOS (Safety, Trust, Observability, Security) services
---
apiVersion: v1
kind: Service
metadata:
  name: stos-orchestrator
  namespace: atlasos
  labels:
    app.kubernetes.io/name: stos-orchestrator
    app.kubernetes.io/part-of: atlasos
spec:
  ports:
    - port: 8100
      targetPort: 8100
  selector:
    app: stos-orchestrator
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: stos-orchestrator
  namespace: atlasos
  labels:
    app: stos-orchestrator
    app.kubernetes.io/name: stos-orchestrator
    app.kubernetes.io/part-of: atlasos
    app.kubernetes.io/version: "4.0.0"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: stos-orchestrator
  template:
    metadata:
      labels:
        app: stos-orchestrator
        atlasos.medinovai.com/sidecar: "enabled"
    spec:
      serviceAccountName: atlasos-sa
      containers:
        - name: stos-orchestrator
          image: atlasos/stos-orchestrator:4.0.0
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8100
          envFrom:
            - secretRef:
                name: atlasos-integration-secrets
            - secretRef:
                name: atlasos-infra-secrets
          resources:
            requests:
              memory: 128Mi
              cpu: 50m
            limits:
              memory: 256Mi
              cpu: 250m
          readinessProbe:
            httpGet:
              path: /health
              port: 8100
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8100
            initialDelaySeconds: 30
            periodSeconds: 30
---
