apiVersion: v1
kind: Service
metadata:
  name: voice-bridge
  namespace: atlasos
  labels:
    app.kubernetes.io/name: voice-bridge
    app.kubernetes.io/part-of: atlasos
spec:
  ports:
    - port: 7100
      targetPort: 7100
  selector:
    app: voice-bridge
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: voice-bridge
  namespace: atlasos
  labels:
    app: voice-bridge
    app.kubernetes.io/name: voice-bridge
    app.kubernetes.io/part-of: atlasos
    app.kubernetes.io/version: "1.2.0"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: voice-bridge
  template:
    metadata:
      labels:
        app: voice-bridge
        atlasos.medinovai.com/sidecar: "enabled"
    spec:
      containers:
        - name: voice-bridge
          image: medinovai-atlas-voice-bridge:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 7100
          envFrom:
            - secretRef:
                name: atlasos-secrets
          resources:
            requests:
              memory: 128Mi
              cpu: 100m
            limits:
              memory: 512Mi
              cpu: 500m
          readinessProbe:
            httpGet:
              path: /health
              port: 7100
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 7100
            initialDelaySeconds: 30
            periodSeconds: 30
