apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: ai-ml-aifactory
  namespace: medinovai-ai
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: aifactory-credentials
    creationPolicy: Owner
  data:
    - secretKey: AIFACTORY_ENDPOINT
      remoteRef:
        key: ai-ml/aifactory
        property: AIFACTORY_ENDPOINT
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: ai-ml-ollama
  namespace: medinovai-ai
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: ollama-config
    creationPolicy: Owner
  data:
    - secretKey: OLLAMA_HOST
      remoteRef:
        key: ai-ml/ollama
        property: OLLAMA_HOST
