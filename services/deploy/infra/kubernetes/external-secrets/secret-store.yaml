# ClusterSecretStore allows all namespaces to access Vault
apiVersion: external-secrets.io/v1beta1
kind: ClusterSecretStore
metadata:
  name: vault-backend
spec:
  provider:
    vault:
      server: "http://vault.vault.svc:8200"
      path: "medinovai-secrets"
      version: "v2"
      auth:
        kubernetes:
          mountPath: "kubernetes"
          role: "platform-services"
          serviceAccountRef:
            name: "default"
            namespace: "medinovai-services"
