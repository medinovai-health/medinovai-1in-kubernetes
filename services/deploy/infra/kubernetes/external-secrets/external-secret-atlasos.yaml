apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: atlasos-api-keys
  namespace: medinovai-services
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: atlasos-api-keys
    creationPolicy: Owner
  data:
    - secretKey: ANTHROPIC_API_KEY
      remoteRef:
        key: atlasos/anthropic
        property: ANTHROPIC_API_KEY
    - secretKey: OPENAI_API_KEY
      remoteRef:
        key: atlasos/openai
        property: OPENAI_API_KEY
    - secretKey: GOOGLE_AI_API_KEY
      remoteRef:
        key: atlasos/google-ai
        property: GOOGLE_AI_API_KEY
---
