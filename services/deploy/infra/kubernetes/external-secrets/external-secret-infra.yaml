apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: infra-postgres-primary
  namespace: medinovai-data
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: postgres-primary-credentials
    creationPolicy: Owner
  data:
    - secretKey: POSTGRES_URL
      remoteRef:
        key: infra/postgres-primary
        property: POSTGRES_URL
    - secretKey: POSTGRES_PASSWORD
      remoteRef:
        key: infra/postgres-primary
        property: POSTGRES_PASSWORD
---
