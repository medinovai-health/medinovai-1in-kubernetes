# Namespace-scoped SecretStores — one per K8s namespace, mapping to Vault tiers
apiVersion: external-secrets.io/v1beta1
kind: SecretStore
metadata:
  name: vault-backend
  namespace: medinovai-services
spec:
  provider:
    vault:
      server: "http://vault.vault.svc:8200"
      path: "medinovai-secrets"
      version: "v2"
      auth:
        kubernetes:
          mountPath: "kubernetes"
          role: "atlasos"
          serviceAccountRef:
            name: "vault-atlasos"
