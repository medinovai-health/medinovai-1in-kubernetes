apiVersion: v1
kind: Service
metadata:
  name: atlas
  namespace: medinovai-system
  labels:
    app: atlas
spec:
  selector:
    app: atlas
  ports:
    - name: http
      port: 3737
      targetPort: 80
      nodePort: 31737
  type: NodePort
---
# ExternalName service — routes in-cluster atlas.medinovai-system:3737
# to the host process started by `atlas start`
apiVersion: v1
kind: Service
metadata:
  name: atlas-host
  namespace: medinovai-system
  labels:
    app: atlas
spec:
  type: ExternalName
  externalName: host.docker.internal
  ports:
    - name: ui
      port: 3737
      targetPort: 3737
    - name: agent
      port: 8765
      targetPort: 8765
