# Atlas Secrets — Template (DO NOT APPLY DIRECTLY)
# This file is a reference template. Create the real secret manually:
#
#   kubectl create secret generic atlas-secrets -n medinovai-system \
#     --from-literal=ANTHROPIC_API_KEY="sk-ant-YOUR_KEY" \
#     --from-literal=SLACK_APP_TOKEN="xapp-YOUR_TOKEN" \
#     --from-literal=SLACK_BOT_TOKEN="xoxb-YOUR_TOKEN" \
#     --from-literal=HOOKS_TOKEN="$(openssl rand -hex 32)"
#
# Or from file (after filling in infra/docker/.env):
#   kubectl create secret generic atlas-secrets -n medinovai-system \
#     --from-env-file=infra/docker/.env
#
# To update secrets:
#   kubectl delete secret atlas-secrets -n medinovai-system
#   kubectl create secret generic atlas-secrets -n medinovai-system ...
#   kubectl rollout restart deployment/atlas -n medinovai-system
#
# THIS FILE IS INTENTIONALLY NOT A COMPLETE MANIFEST.
# Never put real credentials in a YAML file committed to Git.
