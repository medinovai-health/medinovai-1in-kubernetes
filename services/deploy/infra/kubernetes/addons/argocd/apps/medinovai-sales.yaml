# medinovai-sales — AI sales platform (Web :3000, Intelligence :8000)
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: medinovai-sales
  namespace: argocd
  labels:
    app.kubernetes.io/part-of: medinovai
    medinovai/tier: product
spec:
  project: default
  source:
    repoURL: git@github.com:myonsite-healthcare/medinovai-Deploy.git
    targetRevision: main
    path: infra/kubernetes/services/sales
  destination:
    server: https://kubernetes.default.svc
    namespace: medinovai-sales
  syncPolicy:
    automated:
      prune: false
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
    retry:
      limit: 3
      backoff: {duration: 5s, maxDuration: 3m, factor: 2}
