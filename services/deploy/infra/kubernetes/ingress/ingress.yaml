# Ingress for MedinovAI Platform
# Replace DOMAIN with your actual domain (e.g. api.medinovai.com)
# Note: /api/ai is routed via ingress-ai.yaml (medinovai-ai namespace).
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: medinovai-ingress
  namespace: medinovai-services
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    kubernetes.io/ingress.class: nginx
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - DOMAIN
      secretName: medinovai-tls
  rules:
    - host: DOMAIN
      http:
        paths:
          - path: /api/auth
            pathType: Prefix
            backend:
              service:
                name: auth-service
                port:
                  number: 3000
          - path: /api/clinical
            pathType: Prefix
            backend:
              service:
                name: clinical-engine
                port:
                  number: 8080
          - path: /api/data
            pathType: Prefix
            backend:
              service:
                name: data-pipeline
                port:
                  number: 8080
          - path: /
            pathType: Prefix
            backend:
              service:
                name: api-gateway
                port:
                  number: 3000
