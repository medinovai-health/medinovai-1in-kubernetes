# Database migration Job for MedinovAI
apiVersion: batch/v1
kind: Job
metadata:
  name: db-migrate
  namespace: medinovai-data
  labels:
    app.kubernetes.io/name: db-migrate
    app.kubernetes.io/component: migration
spec:
  backoffLimit: 3
  restartPolicy: Never
  template:
    metadata:
      labels:
        app.kubernetes.io/name: db-migrate
    spec:
      restartPolicy: Never
      containers:
        - name: migrate
          image: python:3.11-slim
          command:
            - /bin/sh
            - -c
            - "python -m alembic upgrade head"
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: db-credentials
                  key: url
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
