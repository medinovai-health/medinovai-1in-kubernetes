# Health check route (no auth)
- name: deploy-health
  paths:
    - /api/v1/deploy/health
  service:
    name: deploy
    url: http://medinovai-deploy:8080/health
  plugins: []

upstreams:
  - name: deploy-upstream
    algorithm: round-robin
    healthchecks:
      active:
        http_path: /health/ready
        healthy:
          interval: 10
          successes: 2
        unhealthy:
          interval: 5
          http_failures: 3
