# Kong API Gateway Configuration — Deployment Service (medinovai-deploy)
# Auto-generated from schemas/openapi.yaml
# Tier 2 — FDA-CLASS-I

_format_version: "3.0"

services:
  - name: deploy
    url: http://medinovai-deploy:8080
    connect_timeout: 5000
    write_timeout: 10000
    read_timeout: 30000
    retries: 3

routes:
- name: deploy-deployments
  paths:
    - /api/v1/deployments
  service:
    name: deploy
    url: http://medinovai-deploy:8080
  plugins:
    - name: jwt
      config:
        claims_to_verify: [exp]
    - name: acl
      config:
        allow: [deploy-read, deploy-write, admin]
    - name: rate-limiting
      config:
        minute: 120
        policy: redis
    - name: request-transformer
      config:
        add:
          headers:
            - X-Correlation-ID:$(uuid)
            - X-Service-Tier:2

- name: deploy-releases
  paths:
