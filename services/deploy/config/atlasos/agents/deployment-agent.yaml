# AtlasOS Agent Definition — deployment-agent
# Repository: medinovai-Deploy
# Generated: 2026-02-23
# Version: 1.0.0
# Status: Active

agent_id: deployment-agent
name: deployment-agent
version: "1.0.0"
squad: infrastructure-squad
tier: 1

capabilities:
  - canary_deploy
  - rollback
  - a_b_deployment

schedule:
  interval: 30s

approval_gates:
  - type: human
    condition: "anomaly_score > 0.8 OR action_type == destructive"
  - type: automated
    condition: "anomaly_score <= 0.8"

compliance:
  phi_handling: false
  audit_required: true
  tenant_scoped: true

ooda_integration:
  reports_to: ooda-brain
  escalation_channel: "#atlas-infrastructure-squad-escalation"
  heartbeat_interval: 5m
