apiVersion: v1
kind: ConfigMap
metadata:
  name: medinovai-security-service-config
  namespace: medinovai-services
  labels:
    app: medinovai-security-service
data:
  # Service Configuration
  SERVICE_NAME: "medinovai-security-service"
  VERSION: "1.0.0"
  DEBUG: "false"
  PORT: "8000"
  HOST: "0.0.0.0"

  # Database Configuration
  DATABASE_URL: "postgresql+asyncpg://postgres:postgres123@registry-postgres.medinovai:5432/security"
  REDIS_URL: "redis://:redis123@registry-redis.medinovai:6379/0"

  # Keycloak Integration - Uses in-cluster Keycloak
  KEYCLOAK_URL: "http://medinovai-keycloak.medinovai-security:8080"
  KEYCLOAK_REALM: "medinovai"
  KEYCLOAK_ADMIN: "admin"

  # Registry Integration
  REGISTRY_URL: "http://medinovai-registry.medinovai:8000"

  # Ollama Configuration - Tailscale Network Only
  # AIFACTORY_URL points to Tailscale Ollama endpoint
  AIFACTORY_URL: "http://100.106.54.9:8082/v1"
  USE_LOCAL_OLLAMA_ONLY: "true"

  # JWT Configuration
  JWT_ALGORITHM: "RS256"
  ACCESS_TOKEN_TTL_SECONDS: "300"
  TOKEN_CACHE_TTL_SECONDS: "300"
  PERMISSION_CACHE_TTL_SECONDS: "300"
  FIELD_POLICY_CACHE_TTL_SECONDS: "600"
