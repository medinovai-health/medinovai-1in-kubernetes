# External Secret for medinovai-security-service
# Pulls secrets from HashiCorp Vault via External Secrets Operator
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: medinovai-security-service-secrets
  namespace: medinovai-services
  labels:
    app: medinovai-security-service
spec:
  refreshInterval: "1h"
  secretStoreRef:
    name: vault-backend
    kind: SecretStore
  target:
    name: medinovai-security-service-secrets
    creationPolicy: Owner
  data:
    - secretKey: KEYCLOAK_ADMIN_PASSWORD
      remoteRef:
        key: secret/medinovai/infrastructure/security-service
        property: keycloak_admin_password
    - secretKey: POSTGRES_PASSWORD
      remoteRef:
        key: secret/medinovai/infrastructure/database/postgres
        property: password
    - secretKey: REDIS_PASSWORD
      remoteRef:
        key: secret/medinovai/infrastructure/cache/redis
        property: password
    - secretKey: JWT_SECRET
      remoteRef:
        key: secret/medinovai/shared
        property: jwt_signing_key
    - secretKey: ENCRYPTION_KEY
      remoteRef:
        key: secret/medinovai/shared
        property: encryption_key
---
# Placeholder Secret for development only
# In production, use ExternalSecret above with Vault
# This file should NOT be used in production - use external-secret.yaml instead
apiVersion: v1
kind: Secret
metadata:
  name: medinovai-security-service-secrets-dev
  namespace: medinovai-services
  labels:
    app: medinovai-security-service
    environment: development
  annotations:
    note: "DEVELOPMENT ONLY - Use external-secret.yaml for production"
type: Opaque
stringData:
  # These are placeholder values for local development only
  # In production, secrets are pulled from Vault via ExternalSecret
  KEYCLOAK_ADMIN_PASSWORD: "dev-keycloak-password-change-in-prod"
  POSTGRES_PASSWORD: "dev-postgres-password-change-in-prod"
  REDIS_PASSWORD: "dev-redis-password-change-in-prod"
