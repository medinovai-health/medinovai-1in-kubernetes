apiVersion: v1
kind: Service
metadata:
  name: {{ include "command-center.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "command-center.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: http
      protocol: TCP
      name: http
    - port: {{ .Values.service.metricsPort }}
      targetPort: metrics
      protocol: TCP
      name: metrics
  selector:
    {{- include "command-center.selectorLabels" . | nindent 4 }}
