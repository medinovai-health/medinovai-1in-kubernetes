apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "command-center.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "command-center.labels" . | nindent 4 }}
  annotations:
    medinovai.health/version: {{ .Values.image.tag | quote }}
    medinovai.health/migrated-from: "medinovai-2pl-atlas-os/ui"
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "command-center.selectorLabels" . | nindent 6 }}
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0  # Zero-downtime (Hardening Point 6)
  template:
    metadata:
      labels:
        {{- include "command-center.selectorLabels" . | nindent 8 }}
      annotations:
        {{- toYaml .Values.podAnnotations | nindent 8 }}
        rollme: {{ randAlphaNum 5 | quote }}  # Force pod restart on config change
    spec:
      serviceAccountName: {{ .Values.serviceAccount.name }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      
      # Hardening Point 9: Enforce least privilege
      automountServiceAccountToken: false
      
      terminationGracePeriodSeconds: 60
      
      containers:
        - name: command-center
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          ports:
            - name: http
              containerPort: {{ .Values.service.port }}
              protocol: TCP
            - name: metrics
              containerPort: {{ .Values.service.metricsPort }}
              protocol: TCP
          env:
            {{- range .Values.env }}
            - name: {{ .name | quote }}
              value: {{ .value | quote }}
            {{- end }}
            {{- range .Values.secretEnv }}
            - name: {{ .name | quote }}
              valueFrom:
                secretKeyRef:
                  name: {{ .secretName | quote }}
                  key: {{ .secretKey | quote }}
            {{- end }}
          livenessProbe:
            {{- toYaml .Values.livenessProbe | nindent 12 }}
          readinessProbe:
            {{- toYaml .Values.readinessProbe | nindent 12 }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          volumeMounts:
            - name: agent-memory
              mountPath: {{ .Values.persistence.mountPath }}
            - name: tmp
              mountPath: /tmp
            - name: next-cache
              mountPath: /app/.next/cache
      
      volumes:
        - name: agent-memory
          {{- if .Values.persistence.enabled }}
          persistentVolumeClaim:
            claimName: {{ include "command-center.fullname" . }}-memory
          {{- else }}
          emptyDir: {}
          {{- end }}
        - name: tmp
          emptyDir: {}
        - name: next-cache
          emptyDir: {}
      
      imagePullSecrets:
        {{- toYaml .Values.imagePullSecrets | nindent 8 }}
      
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
