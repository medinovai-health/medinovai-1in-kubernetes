name: Deploy — Command Center

on:
  push:
    branches: [main]
    paths:
      - 'services/command-center/**'
      - '.github/workflows/deploy-command-center.yml'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        default: 'dev'
        type: choice
        options: [dev, qa, staging, production]
      force_deploy:
        description: 'Force deploy even if no changes'
        required: false
        default: false
        type: boolean

concurrency:
  group: deploy-command-center-${{ github.ref }}
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: medinovai-health/command-center
  SERVICE_PATH: services/command-center

jobs:
  # ── Gate: Security Scan ────────────────────────────────────────────────
  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v4

      - name: Run Trivy vulnerability scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '${{ env.SERVICE_PATH }}'
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH'

      - name: Upload Trivy results
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: 'trivy-results.sarif'

  # ── Gate: Build & Test ─────────────────────────────────────────────────
  build-test:
    name: Build & Test
    runs-on: ubuntu-latest
    needs: security-scan
    permissions:
      contents: read
      packages: write
    outputs:
      image-digest: ${{ steps.build.outputs.digest }}
      image-tag: ${{ steps.meta.outputs.tags }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=sha-
            type=ref,event=branch
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value=3.0.0

      - name: Build and push Docker image
        id: build
        uses: docker/build-push-action@v5
        with:
          context: ${{ env.SERVICE_PATH }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            NEXT_PUBLIC_BUILD_ID=${{ github.sha }}
            NEXT_PUBLIC_ENVIRONMENT=production

      - name: Generate SBOM
        uses: anchore/sbom-action@v0
        with:
          image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          artifact-name: command-center-sbom.spdx.json

  # ── Deploy: AIFactory MacStudio (PRIMARY) ─────────────────────────────
  deploy-aifactory:
    name: Deploy → AIFactory (Primary)
    runs-on: [self-hosted, aifactory-macstudio]
    needs: build-test
    environment:
      name: ${{ github.event.inputs.environment || 'dev' }}
      url: http://localhost:9443
    steps:
      - name: Pull latest image
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
          docker pull ghcr.io/${{ env.IMAGE_NAME }}:latest

      - name: Zero-downtime deploy
        run: |
          # Start new container
          docker run -d \
            --name command-center-new \
            --network medinovai-network \
            -p 9443:9443 \
            -p 9444:9444 \
            -p 9445:9445 \
            -e GITHUB_TOKEN="${{ secrets.GITHUB_TOKEN }}" \
            -e OPENAI_API_KEY="${{ secrets.OPENAI_API_KEY }}" \
            -e ATLASOS_GATEWAY_URL="${{ secrets.ATLASOS_GATEWAY_URL }}" \
            -e OLLAMA_HOST="${{ secrets.OLLAMA_HOST }}" \
            -e NEXT_PUBLIC_ENVIRONMENT="${{ github.event.inputs.environment || 'dev' }}" \
            -e NEXT_PUBLIC_BUILD_ID="${{ github.sha }}" \
            --restart unless-stopped \
            --read-only \
            --tmpfs /tmp \
            --tmpfs /app/.next/cache \
            ghcr.io/${{ env.IMAGE_NAME }}:latest

          # Wait for health check
          sleep 30
          curl -f http://localhost:9443/api/health || (docker rm -f command-center-new && exit 1)

          # Swap containers
          docker rm -f command-center 2>/dev/null || true
          docker rename command-center-new command-center

      - name: Smoke test
        run: |
          curl -f http://localhost:9443/api/health
          curl -f http://localhost:9443/api/health?depth=deep

      - name: Notify success
        if: success()
        run: |
          echo "✅ Command Center v3.0.0 deployed to AIFactory at $(date)"

  # ── Deploy: GitHub-hosted fallback (if self-hosted runner offline) ─────
  deploy-github-hosted:
    name: Deploy → AIFactory (Fallback via Tailscale SSH)
    runs-on: ubuntu-latest
    needs: build-test
    if: failure() # Only runs if self-hosted deploy fails
    steps:
      - name: Connect to Tailscale
        uses: tailscale/github-action@v2
        with:
          oauth-client-id: ${{ secrets.TAILSCALE_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TAILSCALE_OAUTH_SECRET }}
          tags: tag:github-actions

      - name: Deploy via SSH over Tailscale
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: aifactory-medinovai
          username: medinovai
          key: ${{ secrets.AIFACTORY_SSH_KEY }}
          script: |
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            docker pull ghcr.io/${{ env.IMAGE_NAME }}:latest
            docker rm -f command-center 2>/dev/null || true
            docker run -d \
              --name command-center \
              --network medinovai-network \
              -p 9443:9443 \
              -e GITHUB_TOKEN="${{ secrets.GITHUB_TOKEN }}" \
              -e OPENAI_API_KEY="${{ secrets.OPENAI_API_KEY }}" \
              -e ATLASOS_GATEWAY_URL="${{ secrets.ATLASOS_GATEWAY_URL }}" \
              -e OLLAMA_HOST="${{ secrets.OLLAMA_HOST }}" \
              --restart unless-stopped \
              ghcr.io/${{ env.IMAGE_NAME }}:latest
            sleep 20
            curl -f http://localhost:9443/api/health
