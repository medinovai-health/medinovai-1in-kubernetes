<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1e3a5f"/>
    </linearGradient>
    <linearGradient id="pulse" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#38bdf8"/>
      <stop offset="50%" style="stop-color:#818cf8"/>
      <stop offset="100%" style="stop-color:#34d399"/>
    </linearGradient>
    <linearGradient id="cross" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#38bdf8"/>
      <stop offset="100%" style="stop-color:#818cf8"/>
    </linearGradient>
  </defs>
  <!-- Background circle -->
  <circle cx="32" cy="32" r="30" fill="url(#bg)" stroke="#1e40af" stroke-width="1.5"/>
  <!-- Medical cross -->
  <rect x="26" y="14" width="12" height="36" rx="3" fill="url(#cross)" opacity="0.9"/>
  <rect x="14" y="26" width="36" height="12" rx="3" fill="url(#cross)" opacity="0.9"/>
  <!-- Heartbeat pulse line over cross -->
  <polyline points="10,32 18,32 21,24 25,40 29,28 33,36 37,32 54,32"
    fill="none" stroke="url(#pulse)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" opacity="0.85"/>
  <!-- Outer ring accent -->
  <circle cx="32" cy="32" r="30" fill="none" stroke="url(#pulse)" stroke-width="1" opacity="0.4"/>
</svg>
