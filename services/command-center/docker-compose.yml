# Deployment: AIFactory MacStudio via GitHub Actions → Tailscale → SSH
# Port:       9443
# URL:        http://aifactory.local:9443
#
# Version: 3.0.0 | Build: 20260415.1 | Release: GA
version: "3.8"
services:
  command-center:
    build:
      context: ./ui
      dockerfile: ../Dockerfile
      target: production
      args:
        NEXT_PUBLIC_ENVIRONMENT:  "${NEXT_PUBLIC_ENVIRONMENT:-production}"
        NEXT_PUBLIC_BASE_URL:     "${NEXT_PUBLIC_BASE_URL:-http://localhost:9443}"
        NEXT_PUBLIC_COMMIT_SHA:   "${NEXT_PUBLIC_COMMIT_SHA:-local}"
        NEXT_TELEMETRY_DISABLED:  "1"
    image: medinovai/command-center:${IMAGE_TAG:-latest}
    container_name: medinovai-command-center
    restart: unless-stopped
    ports:
      - "${PORT:-9443}:9443"
    environment:
      - NODE_ENV=production
      - PORT=9443
      - NEXT_PUBLIC_ENVIRONMENT=${NEXT_PUBLIC_ENVIRONMENT:-production}
      - NEXT_PUBLIC_BASE_URL=${NEXT_PUBLIC_BASE_URL:-http://localhost:9443}
      - NEXT_PUBLIC_COMMIT_SHA=${NEXT_PUBLIC_COMMIT_SHA:-local}
      - NEXT_TELEMETRY_DISABLED=1
      - GITHUB_TOKEN=${GITHUB_TOKEN:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:9443/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 1G
        reservations:
          cpus: "0.5"
          memory: 256M
    security_opt:
      - no-new-privileges:true
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "5"
    labels:
      medinovai.service:    "command-center"
      medinovai.version:    "3.0.0"
      medinovai.port:       "9443"
      medinovai.tier:       "2"
    networks:
      - medinovai-mesh
volumes:
  nexus-memory:
    name: medinovai-nexus-memory
networks:
  medinovai-mesh:
    driver: bridge
    name: medinovai-mesh
