ai_monitoring:
  alert_threshold: 0.8
  anomaly_detection: true
  auto_remediation: true
  enabled: true
  predictive_analytics: true
alerting:
  ai_triage: true
  auto_escalation: true
  channels:
  - slack
  - email
  - pagerduty
prometheus:
  enabled: true
  metrics:
  - application_health
  - performance_metrics
  - security_events
  - compliance_status
  scrape_interval: 15s
