apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: api-gateway
    compliance.medinovaios.com/data-classification: phi
    reliability.medinovaios.com/baseline: enabled
  name: api-gateway
spec:
  replicas: 2
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      annotations:
        prometheus.io/port: '9090'
        prometheus.io/scrape: 'true'
        sidecar.istio.io/inject: 'true'
      labels:
        app: api-gateway
        compliance.medinovaios.com/data-classification: phi
    spec:
      containers:
      - env:
        - name: SERVICE_NAME
          value: api-gateway
        - name: LOG_LEVEL
          value: INFO
        - name: METRICS_ENABLED
          value: 'true'
        image: medinovaios/api-gateway:latest
        livenessProbe:
          failureThreshold: 3
          httpGet:
            path: /healthz
            port: 8080
          initialDelaySeconds: 60
          periodSeconds: 30
          timeoutSeconds: 10
        name: api-gateway
        ports:
        - containerPort: 8080
          name: http
        - containerPort: 9090
          name: metrics
        readinessProbe:
          failureThreshold: 3
          httpGet:
            path: /healthz
            port: 8080
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
        resources:
          limits:
            cpu: 500m
            memory: 512Mi
          requests:
            cpu: 100m
            memory: 128Mi
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL
          readOnlyRootFilesystem: true
      securityContext:
        fsGroup: 1000
        runAsNonRoot: true
        runAsUser: 1000
