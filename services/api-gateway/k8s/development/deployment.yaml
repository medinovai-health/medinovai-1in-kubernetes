apiVersion: apps/v1
kind: Deployment
metadata:
  name: api_gateway
  labels:
    app: api_gateway
    version: 1.0.0
spec:
  replicas: 3
  selector:
    matchLabels:
      app: api_gateway
  template:
    metadata:
      labels:
        app: api_gateway
        version: 1.0.0
    spec:
      containers:
      - name: api_gateway
        image: medinovai-api-gateway:1.0.0
        ports:
        - containerPort: 3208
        env:
        - name: NODE_ENV
          value: "production"
        - name: PORT
          value: "3208"
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /health
            port: 3208
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /ready
            port: 3208
          initialDelaySeconds: 5
          periodSeconds: 5
