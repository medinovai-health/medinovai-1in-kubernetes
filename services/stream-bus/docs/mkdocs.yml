# MkDocs Configuration for medinovai-real-time-stream-bus
site_name: medinovai-real-time-stream-bus
site_description: Documentation for medinovai-real-time-stream-bus
site_author: Medinovai Team

theme:
  name: material
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - search.suggest
    - search.highlight

nav:
  - Home: index.md
  - API Reference: api-reference.md
  - Architecture: architecture.md
  - Development: development.md
  - Deployment: deployment.md

plugins:
  - search
  - mkdocstrings:
      default_handler: python
      handlers:
        python:
          paths: [src, .]
          options:
            show_source: true
            show_root_heading: true

markdown_extensions:
  - admonition
  - codehilite
  - pymdownx.superfences
  - pymdownx.tabbed
  - pymdownx.arithmatex
