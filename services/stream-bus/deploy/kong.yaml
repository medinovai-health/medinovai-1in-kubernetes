# Health check route (no auth)
- name: real-time-stream-bus-health
  paths:
    - /api/v1/real-time-stream-bus/health
  service:
    name: real-time-stream-bus
    url: http://medinovai-real-time-stream-bus:8080/health
  plugins: []

upstreams:
  - name: real-time-stream-bus-upstream
    algorithm: round-robin
    healthchecks:
      active:
        http_path: /health/ready
        healthy:
          interval: 10
          successes: 2
        unhealthy:
          interval: 5
          http_failures: 3
