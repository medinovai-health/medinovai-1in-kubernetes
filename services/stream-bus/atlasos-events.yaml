# AutonomyOS Domain Event Catalog
# Real-time Stream Bus (medinovai-real-time-stream-bus) — Tier 2
#
# Event-driven architecture for the MedinovAI AutonomyOS platform.
# All events are published to ActiveMQ topics and consumed by registered subscribers.
# Events follow CloudEvents v1.0 specification.

module: real-time-stream-bus
version: "1.0.0"
domain: Real-time Stream Bus
tier: 2

event_defaults:
  content_type: application/json
  encoding: utf-8
  broker: activemq
  dead_letter_topic: "medinovai.real-time-stream-bus.dlq"
  retry_policy:
    max_retries: 3
    backoff: exponential
    initial_delay_ms: 1000

events:
  real-time-stream-bus.stream.created:
    description: "Stream was created"
    schema:
      type: object
      required: [event_id, timestamp, org_id, actor_id, stream_id]
      properties:
        event_id:
          type: string
          format: uuid
        timestamp:
          type: string
          format: date-time
        org_id:
          type: string
          format: uuid
          description: Tenant organization
        actor_id:
          type: string
          format: uuid
          description: User who triggered the event
        stream_id:
          type: string
          format: uuid
        action:
          type: string
          enum: [created]
        correlation_id:
          type: string
          format: uuid
    topic: "medinovai.real-time-stream-bus.stream.created"
    retention: 30d
    consumers:
      - audit-trail
      - analytics-pipeline

  real-time-stream-bus.stream.updated:
