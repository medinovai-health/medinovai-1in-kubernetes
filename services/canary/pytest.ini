[pytest]
markers =
    unit: marks tests as unit tests
    integration: marks tests as integration tests
    e2e: marks tests as end-to-end tests
    slow: marks tests as slow running tests

addopts = -ra -q

testpaths =
    tests

[coverage:run]
source = .
branch = True

[coverage:report]
fail_under = 80
show_missing = True
