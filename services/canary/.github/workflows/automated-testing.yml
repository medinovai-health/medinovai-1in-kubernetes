name: Automated Testing Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: [3.8, 3.9, 3.10, 3.11]
        node-version: [16, 18, 20]
    
    steps:
      - uses: actions/checkout@v6
      
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}
      
      - name: Set up Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
      
      - name: Cache dependencies
        uses: actions/cache@v3
        with:
          path: |
            ~/.cache/pip
            node_modules
          key: ${{ runner.os }}-deps-${{ hashFiles('**/requirements.txt', '**/package.json') }}
      
      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          if [ -f requirements-dev.txt ]; then pip install -r requirements-dev.txt; fi
      
      - name: Install Node.js dependencies
        run: |
          if [ -f package.json ]; then npm ci; fi
      
      - name: Run Python tests
        run: |
          if [ -f pytest.ini ] || [ -f pyproject.toml ]; then
            python -m pytest --cov=./ --cov-report=xml --cov-report=html
          elif [ -f tests/ ]; then
            python -m pytest tests/
          fi
      
      - name: Run JavaScript tests
        run: |
          if [ -f package.json ] && npm run test --if-present; then
            npm run test
          fi
      
      - name: Run linting
        run: |
          # Python linting
          if command -v flake8 &> /dev/null; then flake8 .; fi
          if command -v black &> /dev/null; then black --check .; fi
          if command -v isort &> /dev/null; then isort --check-only .; fi
          
          # JavaScript linting
          if [ -f package.json ] && npm run lint --if-present; then
            npm run lint
          fi
      
      - name: Upload coverage reports
        uses: codecov/codecov-action@v3
        with:
          file: ./coverage.xml
          flags: unittests
          name: codecov-umbrella
          fail_ci_if_error: false
      
      - name: Test summary
        run: |
          echo "## Test Results for medinovai-canary-rollout-orchestrator" >> $GITHUB_STEP_SUMMARY
          echo "- Python ${{ matrix.python-version }}: Tests completed" >> $GITHUB_STEP_SUMMARY
          echo "- Node.js ${{ matrix.node-version }}: Tests completed" >> $GITHUB_STEP_SUMMARY
          echo "- Coverage reports uploaded" >> $GITHUB_STEP_SUMMARY

  integration-test:
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'
    
    steps:
      - uses: actions/checkout@v6
      
      - name: Run integration tests
        run: |
          echo "Running integration tests for medinovai-canary-rollout-orchestrator"
          # Add integration test commands here
      
      - name: Performance test
        run: |
          echo "Running performance tests for medinovai-canary-rollout-orchestrator"
          # Add performance test commands here
