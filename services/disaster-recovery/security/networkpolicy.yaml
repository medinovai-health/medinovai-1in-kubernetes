apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: disaster-recovery-netpol
spec:
  egress:
  - ports:
    - port: 443
      protocol: TCP
    - port: 80
      protocol: TCP
    to: []
  ingress:
  - from:
    - namespaceSelector:
        matchLabels:
          name: medinovaios-core
    ports:
    - port: 8080
      protocol: TCP
  podSelector:
    matchLabels:
      app: disaster-recovery
  policyTypes:
  - Ingress
  - Egress
