# AtlasOS Agent Definition — infra-agent
# Repository: medinovai-infrastructure
# Generated: 2026-02-23
# Version: 1.0.0
# Status: Active

agent_id: infra-agent
name: infra-agent
version: "1.0.0"
squad: infrastructure-squad
tier: 1

capabilities:
  - k8s_provisioning
  - cost_metering
  - terraform_apply

schedule:
  interval: 30s

approval_gates:
  - type: human
    condition: "anomaly_score > 0.8 OR action_type == destructive"
  - type: automated
    condition: "anomaly_score <= 0.8"

compliance:
  phi_handling: false
  audit_required: true
  tenant_scoped: true

ooda_integration:
  reports_to: ooda-brain
  escalation_channel: "#atlas-infrastructure-squad-escalation"
  heartbeat_interval: 5m
