# config/secrets.template.yaml
# Sprint 9: Secrets Management Template
# NEVER commit actual values - use environment variables

database:
  host: ${DB_HOST}
  port: ${DB_PORT:-5432}
  name: ${DB_NAME}
  user: ${DB_USER}
  password: ${DB_PASSWORD}
  ssl_mode: ${DB_SSL_MODE:-require}

redis:
  url: ${REDIS_URL}
  password: ${REDIS_PASSWORD}

api_keys:
  openai: ${OPENAI_API_KEY}
  anthropic: ${ANTHROPIC_API_KEY}

jwt:
  secret: ${JWT_SECRET}
  expiry: ${JWT_EXPIRY:-3600}

encryption:
  key: ${ENCRYPTION_KEY}
  algorithm: ${ENCRYPTION_ALGO:-AES-256-GCM}
