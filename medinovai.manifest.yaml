service:
  name: medinovai-Deploy
  version: "1.0.0"
  tier: 1
  category: infrastructure
  health_endpoint: ""
  port: 0
  dependencies:
    - medinovai-core
    - medinovai-registry
  squad: infrastructure-squad

module:
  name: "medinovai-Deploy"
  version: "0.0.0"
  domain: platform
  profile: backend-service
  tier: 1
  status: active
  description: "medinovai-Deploy backend service"
  owner: "@myonsite-healthcare"

deployment:
  runtime: node
  containerized: true
  dockerfile: "./Dockerfile"
  k8s_namespace: platform
  health_endpoint: /health
  ready_endpoint: /ready
  port: 3000
  min_replicas: 1
  canary_enabled: false
  gpu_required: false
  sidecar_enabled: true
  secrets_required:
    - atlasos-infra-secrets

governance:
  compliance: [HIPAA]
  phi_handling: false
  audit_required: true
