events {
    worker_connections 1024;
}

http {
    upstream api_backend {
        server medinovai-api-gateway-v2:8000;
    }
    
    upstream healthllm_backend {
        server medinovai-healthllm-v3:8000;
    }
    
    upstream frontend_backend {
        server medinovai-frontend:80;
    }
    
    server {
        listen 80;
        server_name web.localhost;
        
        location / {
            proxy_pass http://frontend_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
    
    server {
        listen 80;
        server_name api.localhost;
        
        location / {
            proxy_pass http://api_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
    
    server {
        listen 80;
        server_name healthllm.localhost;
        
        location / {
            proxy_pass http://healthllm_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}
