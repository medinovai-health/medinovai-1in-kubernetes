apiVersion: v1
kind: Namespace
metadata:
  name: research-cloud
  labels:
    app.kubernetes.io/part-of: medinovai
    medinovai.com/product: research-cloud
    medinovai.com/compliance: hipaa
    pod-security.kubernetes.io/enforce: restricted
    pod-security.kubernetes.io/audit: restricted
  annotations:
    description: "MedinovAI Research Cloud platform services"
---
apiVersion: v1
kind: ResourceQuota
metadata:
  name: research-cloud-quota
  namespace: research-cloud
spec:
  hard:
    requests.cpu: "16"
    requests.memory: 32Gi
    limits.cpu: "32"
    limits.memory: 64Gi
    pods: "50"
    services: "20"
---
apiVersion: v1
kind: LimitRange
metadata:
  name: research-cloud-limits
  namespace: research-cloud
spec:
  limits:
    - default:
        cpu: "500m"
        memory: 512Mi
      defaultRequest:
        cpu: "100m"
        memory: 128Mi
      type: Container
