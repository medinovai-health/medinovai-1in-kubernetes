# MedinovAI LIS Infrastructure - Base ConfigMaps
# Application configuration for all environments
# Healthcare-specific settings with HIPAA compliance

apiVersion: v1
kind: ConfigMap
metadata:
  name: lis-api-config
  namespace: lis-platform
  labels:
    app.kubernetes.io/name: medinovai-lis
    app.kubernetes.io/component: api
    app.kubernetes.io/managed-by: argocd
data:
  # Application Settings
  ASPNETCORE_ENVIRONMENT: "Production"
  ASPNETCORE_URLS: "http://+:8080"
  
  # Logging Configuration
  Logging__LogLevel__Default: "Information"
  Logging__LogLevel__Microsoft: "Warning"
  Logging__LogLevel__Microsoft.Hosting.Lifetime: "Information"
  Logging__LogLevel__Microsoft.EntityFrameworkCore: "Warning"
  
  # OpenTelemetry Configuration
  OTEL_SERVICE_NAME: "lis-api"
  OTEL_EXPORTER_OTLP_ENDPOINT: "http://otel-collector.monitoring:4317"
  OTEL_EXPORTER_OTLP_PROTOCOL: "grpc"
  OTEL_TRACES_SAMPLER: "parentbased_traceidratio"
  OTEL_TRACES_SAMPLER_ARG: "0.1"
  
  # Health Check Configuration
  HealthChecks__Enabled: "true"
  HealthChecks__ReadinessPath: "/health/ready"
  HealthChecks__LivenessPath: "/health/live"
  HealthChecks__StartupPath: "/health/startup"
  
  # Rate Limiting
  RateLimiting__PermitLimit: "100"
  RateLimiting__Window: "60"
  RateLimiting__QueueLimit: "50"
  
  # Cache Configuration
  Cache__DefaultExpirationMinutes: "15"
  Cache__SlidingExpirationMinutes: "5"
  Cache__MaxCacheSize: "1073741824"
  
  # Feature Flags
  Features__EnableAdvancedAnalytics: "true"
  Features__EnableHL7Integration: "true"
  Features__EnableFHIRSupport: "true"
  Features__EnableAuditLogging: "true"
  
  # Healthcare Compliance
  Compliance__HIPAA__Enabled: "true"
  Compliance__HIPAA__AuditAllAccess: "true"
  Compliance__HIPAA__PHIEncryption: "true"
  Compliance__ISO13485__Enabled: "true"
  Compliance__ISO13485__DocumentControl: "true"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: lis-gateway-config
  namespace: lis-platform
  labels:
    app.kubernetes.io/name: medinovai-lis
    app.kubernetes.io/component: gateway
    app.kubernetes.io/managed-by: argocd
data:
  # Gateway Configuration
  GATEWAY_PORT: "8080"
  GATEWAY_METRICS_PORT: "9090"
  
  # Rate Limiting per client
  RATE_LIMIT_REQUESTS_PER_SECOND: "100"
  RATE_LIMIT_BURST: "200"
  
  # Timeout Configuration
  UPSTREAM_TIMEOUT_SECONDS: "30"
  CONNECT_TIMEOUT_SECONDS: "5"
  
  # Circuit Breaker
  CIRCUIT_BREAKER_THRESHOLD: "5"
  CIRCUIT_BREAKER_TIMEOUT_SECONDS: "30"
  
  # CORS Configuration
  CORS_ALLOWED_ORIGINS: "*"
  CORS_ALLOWED_METHODS: "GET,POST,PUT,DELETE,PATCH,OPTIONS"
  CORS_ALLOWED_HEADERS: "Authorization,Content-Type,X-Request-ID,X-Correlation-ID"
  
  # Routing Configuration (JSON)
  routes.json: |
    {
      "routes": [
        {
          "path": "/api/v1/patients/**",
          "service": "lis-api",
          "port": 8080
        },
        {
          "path": "/api/v1/orders/**",
          "service": "lis-api",
          "port": 8080
        },
        {
          "path": "/api/v1/results/**",
          "service": "lis-api",
          "port": 8080
        },
        {
          "path": "/api/v1/billing/**",
          "service": "lis-billing-service",
          "port": 8080
        },
        {
          "path": "/api/v1/reports/**",
          "service": "lis-reporting-service",
          "port": 8080
        }
      ]
    }
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: lis-database-config
  namespace: lis-platform
  labels:
    app.kubernetes.io/name: medinovai-lis
    app.kubernetes.io/component: database
    app.kubernetes.io/managed-by: argocd
data:
  # MySQL Configuration
  mysql.cnf: |
    [mysqld]
    # Character Set
    character-set-server=utf8mb4
    collation-server=utf8mb4_unicode_ci
    
    # Connections
    max_connections=1000
    max_connect_errors=1000000
    wait_timeout=28800
    interactive_timeout=28800
    
    # InnoDB Settings
    innodb_buffer_pool_size=8G
    innodb_buffer_pool_instances=8
    innodb_log_file_size=1G
    innodb_log_buffer_size=128M
    innodb_flush_log_at_trx_commit=1
    innodb_flush_method=O_DIRECT
    
    # Query Cache (disabled in MySQL 8)
    # Performance Schema
    performance_schema=ON
    
    # Slow Query Log
    slow_query_log=ON
    slow_query_log_file=/var/log/mysql/slow.log
    long_query_time=2
    
    # Binary Logging (for replication)
    log_bin=mysql-bin
    binlog_format=ROW
    binlog_row_image=FULL
    expire_logs_days=7
    
    # Security
    local_infile=OFF
    skip_symbolic_links=ON
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: lis-redis-config
  namespace: lis-platform
  labels:
    app.kubernetes.io/name: medinovai-lis
    app.kubernetes.io/component: cache
    app.kubernetes.io/managed-by: argocd
data:
  redis.conf: |
    # Memory Management
    maxmemory 4gb
    maxmemory-policy allkeys-lru
    
    # Persistence
    save 900 1
    save 300 10
    save 60 10000
    appendonly yes
    appendfsync everysec
    
    # Performance
    tcp-backlog 511
    tcp-keepalive 300
    timeout 0
    
    # Security
    protected-mode yes
    
    # Logging
    loglevel notice
    
    # Slow Log
    slowlog-log-slower-than 10000
    slowlog-max-len 128
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: lis-rabbitmq-config
  namespace: lis-platform
  labels:
    app.kubernetes.io/name: medinovai-lis
    app.kubernetes.io/component: messaging
    app.kubernetes.io/managed-by: argocd
data:
  rabbitmq.conf: |
    # Listeners
    listeners.tcp.default = 5672
    management.tcp.port = 15672
    
    # Memory
    vm_memory_high_watermark.relative = 0.7
    vm_memory_high_watermark_paging_ratio = 0.75
    
    # Disk
    disk_free_limit.relative = 1.5
    
    # Queue
    queue_master_locator = min-masters
    
    # Logging
    log.console = true
    log.console.level = info
    
    # Management
    management.load_definitions = /etc/rabbitmq/definitions.json
  
  definitions.json: |
    {
      "queues": [
        {
          "name": "lis.orders.created",
          "vhost": "/",
          "durable": true,
          "auto_delete": false,
          "arguments": {
            "x-queue-type": "quorum"
          }
        },
        {
          "name": "lis.results.completed",
          "vhost": "/",
          "durable": true,
          "auto_delete": false,
          "arguments": {
            "x-queue-type": "quorum"
          }
        },
        {
          "name": "lis.notifications.send",
          "vhost": "/",
          "durable": true,
          "auto_delete": false,
          "arguments": {
            "x-queue-type": "quorum"
          }
        },
        {
          "name": "lis.hl7.inbound",
          "vhost": "/",
          "durable": true,
          "auto_delete": false,
          "arguments": {
            "x-queue-type": "quorum"
          }
        },
        {
          "name": "lis.hl7.outbound",
          "vhost": "/",
          "durable": true,
          "auto_delete": false,
          "arguments": {
            "x-queue-type": "quorum"
          }
        }
      ],
      "exchanges": [
        {
          "name": "lis.events",
          "vhost": "/",
          "type": "topic",
          "durable": true,
          "auto_delete": false
        }
      ],
      "bindings": [
        {
          "source": "lis.events",
          "vhost": "/",
          "destination": "lis.orders.created",
          "destination_type": "queue",
          "routing_key": "orders.created"
        },
        {
          "source": "lis.events",
          "vhost": "/",
          "destination": "lis.results.completed",
          "destination_type": "queue",
          "routing_key": "results.completed"
        }
      ]
    }
