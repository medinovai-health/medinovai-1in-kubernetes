apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: research-cloud-default-deny
  namespace: research-cloud
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: research-cloud-allow-internal
  namespace: research-cloud
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/part-of: research-cloud
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              medinovai.com/product: research-cloud
        - podSelector:
            matchLabels:
              app.kubernetes.io/part-of: research-cloud
      ports:
        - protocol: TCP
          port: 8080
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              medinovai.com/product: research-cloud
      ports:
        - protocol: TCP
          port: 8080
    - to: []
      ports:
        - protocol: TCP
          port: 5432
        - protocol: TCP
          port: 6379
        - protocol: TCP
          port: 9200
    - to: []
      ports:
        - protocol: TCP
          port: 443
        - protocol: TCP
          port: 53
        - protocol: UDP
          port: 53
