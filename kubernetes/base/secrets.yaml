# MedinovAI LIS Infrastructure - Base Secrets Configuration
# IMPORTANT: This file contains TEMPLATE secrets with placeholder values
# Actual secrets MUST be managed via:
#   - Azure Key Vault / AWS Secrets Manager / HashiCorp Vault
#   - External Secrets Operator
#   - Sealed Secrets
# NEVER commit actual secret values to version control

apiVersion: v1
kind: Secret
metadata:
  name: lis-database-credentials
  namespace: lis-platform
  labels:
    app.kubernetes.io/name: medinovai-lis
    app.kubernetes.io/component: database
    app.kubernetes.io/managed-by: external-secrets
  annotations:
    description: "Database credentials - managed by External Secrets Operator"
    external-secrets.io/source: "azure-keyvault"
type: Opaque
stringData:
  # PLACEHOLDER VALUES - Replace via External Secrets Operator
  DB_HOST: "mysql.lis-platform.svc.cluster.local"
  DB_PORT: "3306"
  DB_NAME: "LIS"
  DB_USER: "lis_app"
  DB_PASSWORD: "${DB_PASSWORD}"
  DB_CONNECTION_STRING: "Server=${DB_HOST};Port=${DB_PORT};Database=${DB_NAME};User=${DB_USER};Password=${DB_PASSWORD};SslMode=Required;AllowPublicKeyRetrieval=True"
---
apiVersion: v1
kind: Secret
metadata:
  name: lis-redis-credentials
  namespace: lis-platform
  labels:
    app.kubernetes.io/name: medinovai-lis
    app.kubernetes.io/component: cache
    app.kubernetes.io/managed-by: external-secrets
  annotations:
    description: "Redis credentials - managed by External Secrets Operator"
type: Opaque
stringData:
  REDIS_HOST: "redis.lis-platform.svc.cluster.local"
  REDIS_PORT: "6379"
  REDIS_PASSWORD: "${REDIS_PASSWORD}"
  REDIS_CONNECTION_STRING: "${REDIS_HOST}:${REDIS_PORT},password=${REDIS_PASSWORD},ssl=true,abortConnect=false"
---
apiVersion: v1
kind: Secret
metadata:
  name: lis-rabbitmq-credentials
  namespace: lis-platform
  labels:
    app.kubernetes.io/name: medinovai-lis
    app.kubernetes.io/component: messaging
    app.kubernetes.io/managed-by: external-secrets
  annotations:
    description: "RabbitMQ credentials - managed by External Secrets Operator"
type: Opaque
stringData:
  RABBITMQ_HOST: "rabbitmq.lis-platform.svc.cluster.local"
  RABBITMQ_PORT: "5672"
  RABBITMQ_USER: "lis_app"
  RABBITMQ_PASSWORD: "${RABBITMQ_PASSWORD}"
  RABBITMQ_VHOST: "/"
  RABBITMQ_CONNECTION_STRING: "amqp://${RABBITMQ_USER}:${RABBITMQ_PASSWORD}@${RABBITMQ_HOST}:${RABBITMQ_PORT}/${RABBITMQ_VHOST}"
---
apiVersion: v1
kind: Secret
metadata:
  name: lis-jwt-signing-key
  namespace: lis-platform
  labels:
    app.kubernetes.io/name: medinovai-lis
    app.kubernetes.io/component: security
    app.kubernetes.io/managed-by: external-secrets
  annotations:
    description: "JWT signing keys - managed by External Secrets Operator"
type: Opaque
stringData:
  JWT_SIGNING_KEY: "${JWT_SIGNING_KEY}"
  JWT_ISSUER: "https://auth.medinovai.com"
  JWT_AUDIENCE: "lis-api"
  JWT_EXPIRATION_MINUTES: "60"
  JWT_REFRESH_EXPIRATION_DAYS: "7"
---
apiVersion: v1
kind: Secret
metadata:
  name: lis-encryption-keys
  namespace: lis-platform
  labels:
    app.kubernetes.io/name: medinovai-lis
    app.kubernetes.io/component: security
    app.kubernetes.io/managed-by: external-secrets
  annotations:
    description: "Data encryption keys for PHI - managed by External Secrets Operator"
    compliance: "HIPAA"
type: Opaque
stringData:
  # AES-256 encryption key for PHI at rest
  DATA_ENCRYPTION_KEY: "${DATA_ENCRYPTION_KEY}"
  # Key for encrypting audit logs
  AUDIT_ENCRYPTION_KEY: "${AUDIT_ENCRYPTION_KEY}"
  # Key derivation salt
  KEY_DERIVATION_SALT: "${KEY_DERIVATION_SALT}"
---
apiVersion: v1
kind: Secret
metadata:
  name: lis-azure-credentials
  namespace: lis-platform
  labels:
    app.kubernetes.io/name: medinovai-lis
    app.kubernetes.io/component: cloud
    app.kubernetes.io/managed-by: external-secrets
  annotations:
    description: "Azure service credentials - managed by External Secrets Operator"
type: Opaque
stringData:
  AZURE_TENANT_ID: "${AZURE_TENANT_ID}"
  AZURE_CLIENT_ID: "${AZURE_CLIENT_ID}"
  AZURE_CLIENT_SECRET: "${AZURE_CLIENT_SECRET}"
  AZURE_SUBSCRIPTION_ID: "${AZURE_SUBSCRIPTION_ID}"
  AZURE_STORAGE_CONNECTION_STRING: "${AZURE_STORAGE_CONNECTION_STRING}"
---
apiVersion: v1
kind: Secret
metadata:
  name: lis-smtp-credentials
  namespace: lis-platform
  labels:
    app.kubernetes.io/name: medinovai-lis
    app.kubernetes.io/component: notification
    app.kubernetes.io/managed-by: external-secrets
  annotations:
    description: "SMTP credentials for email notifications"
type: Opaque
stringData:
  SMTP_HOST: "smtp.sendgrid.net"
  SMTP_PORT: "587"
  SMTP_USER: "apikey"
  SMTP_PASSWORD: "${SENDGRID_API_KEY}"
  SMTP_FROM_EMAIL: "noreply@medinovai.com"
  SMTP_FROM_NAME: "MedinovAI LIS"
---
apiVersion: v1
kind: Secret
metadata:
  name: lis-twilio-credentials
  namespace: lis-platform
  labels:
    app.kubernetes.io/name: medinovai-lis
    app.kubernetes.io/component: notification
    app.kubernetes.io/managed-by: external-secrets
  annotations:
    description: "Twilio credentials for SMS notifications"
type: Opaque
stringData:
  TWILIO_ACCOUNT_SID: "${TWILIO_ACCOUNT_SID}"
  TWILIO_AUTH_TOKEN: "${TWILIO_AUTH_TOKEN}"
  TWILIO_FROM_NUMBER: "${TWILIO_FROM_NUMBER}"
---
# External Secrets Store Configuration (for production use)
apiVersion: external-secrets.io/v1beta1
kind: SecretStore
metadata:
  name: azure-keyvault
  namespace: lis-platform
  labels:
    app.kubernetes.io/name: medinovai-lis
    app.kubernetes.io/component: secrets-management
spec:
  provider:
    azurekv:
      tenantId: "${AZURE_TENANT_ID}"
      vaultUrl: "https://medinovai-lis-vault.vault.azure.net"
      authSecretRef:
        clientId:
          name: azure-sp-credentials
          key: client-id
        clientSecret:
          name: azure-sp-credentials
          key: client-secret
---
