{{- /*
MedinovAI LIS API - Kubernetes Ingress
HTTPS ingress with security headers for healthcare compliance
*/ -}}
{{- if .Values.ingress.enabled -}}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "lis-api.fullname" . }}
  namespace: {{ .Values.global.namespace | default .Release.Namespace }}
  labels:
    {{- include "lis-api.labels" . | nindent 4 }}
  annotations:
    {{- with .Values.ingress.annotations }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
spec:
  {{- if .Values.ingress.className }}
  ingressClassName: {{ .Values.ingress.className }}
  {{- end }}
  {{- if .Values.ingress.tls }}
  tls:
    {{- range .Values.ingress.tls }}
    - hosts:
        {{- range .hosts }}
        - {{ . | quote }}
        {{- end }}
      secretName: {{ .secretName }}
    {{- end }}
  {{- end }}
  rules:
    {{- range .Values.ingress.hosts }}
    - host: {{ .host | quote }}
      http:
        paths:
          {{- range .paths }}
          - path: {{ .path }}
            pathType: {{ .pathType }}
            backend:
              service:
                name: {{ include "lis-api.fullname" $ }}
                port:
                  number: {{ $.Values.service.port }}
          {{- end }}
    {{- end }}
{{- end }}
---
{{- /*
Internal Ingress for service mesh scenarios
*/ -}}
{{- if and .Values.ingress.enabled .Values.ingress.internal -}}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "lis-api.fullname" . }}-internal
  namespace: {{ .Values.global.namespace | default .Release.Namespace }}
  labels:
    {{- include "lis-api.labels" . | nindent 4 }}
  annotations:
    kubernetes.io/ingress.class: nginx-internal
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/backend-protocol: "HTTP"
spec:
  {{- if .Values.ingress.className }}
  ingressClassName: {{ .Values.ingress.className }}-internal
  {{- end }}
  rules:
    - host: {{ include "lis-api.fullname" . }}.internal
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ include "lis-api.fullname" . }}
                port:
                  number: {{ .Values.service.port }}
{{- end }}
