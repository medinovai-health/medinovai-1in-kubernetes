subscriptions:
  # Events this module consumes from other modules
  - topic: "medinovai.security.auth.*"
    handler: src/handlers/auth_events
    description: "Auth events for session tracking"
  - topic: "medinovai.notification.delivery.*"
    handler: src/handlers/notification_events
    description: "Delivery confirmations for notification tracking"
