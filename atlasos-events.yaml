# AutonomyOS Domain Event Catalog
# Infrastructure Management (medinovai-infrastructure) — Tier 2
#
# Event-driven architecture for the MedinovAI AutonomyOS platform.
# All events are published to ActiveMQ topics and consumed by registered subscribers.
# Events follow CloudEvents v1.0 specification.

module: infrastructure
version: "1.0.0"
domain: Infrastructure Management
tier: 2

event_defaults:
  content_type: application/json
  encoding: utf-8
  broker: activemq
  dead_letter_topic: "medinovai.infrastructure.dlq"
  retry_policy:
    max_retries: 3
    backoff: exponential
    initial_delay_ms: 1000

events:
  infrastructure.resource.created:
    description: "Resource was created"
    schema:
      type: object
      required: [event_id, timestamp, org_id, actor_id, resource_id]
      properties:
        event_id:
          type: string
          format: uuid
        timestamp:
          type: string
          format: date-time
        org_id:
          type: string
          format: uuid
          description: Tenant organization
        actor_id:
          type: string
          format: uuid
          description: User who triggered the event
        resource_id:
          type: string
          format: uuid
        action:
          type: string
          enum: [created]
        correlation_id:
          type: string
          format: uuid
    topic: "medinovai.infrastructure.resource.created"
    retention: 30d
    consumers:
      - audit-trail
      - analytics-pipeline

  infrastructure.resource.updated:
