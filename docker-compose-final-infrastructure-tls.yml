version: '3.8'

services:
  # ======================
  # DATABASE SERVICES (WITH TLS/SSL)
  # ======================
  
  postgres:
    image: postgres:15-alpine
    container_name: medinovai-postgres-tls
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-medinovai}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-medinovai_secure_password}
      POSTGRES_DB: ${POSTGRES_DB:-medinovai}
      # Enable SSL
      POSTGRES_INITDB_ARGS: "-A md5"
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      # Mount SSL certificates
      - ./ssl/postgres/server.crt:/var/lib/postgresql/server.crt:ro
      - ./ssl/postgres/server.key:/var/lib/postgresql/server.key:ro
      - ./ssl/ca/ca.crt:/var/lib/postgresql/ca.crt:ro
      # Custom PostgreSQL config for SSL
      - ./postgres-ssl.conf:/etc/postgresql/postgresql.conf:ro
    command: 
      - "postgres"
      - "-c"
      - "config_file=/etc/postgresql/postgresql.conf"
    networks:
      - medinovai-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U medinovai"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  timescaledb:
    image: timescale/timescaledb:latest-pg15
    container_name: medinovai-timescaledb-tls
    environment:
      POSTGRES_USER: ${TIMESCALE_USER:-medinovai}
      POSTGRES_PASSWORD: ${TIMESCALE_PASSWORD:-timescale_secure_password}
      POSTGRES_DB: ${TIMESCALE_DB:-medinovai_timeseries}
    ports:
      - "5433:5432"
    volumes:
      - timescaledb_data:/var/lib/postgresql/data
      - ./ssl/postgres/server.crt:/var/lib/postgresql/server.crt:ro
      - ./ssl/postgres/server.key:/var/lib/postgresql/server.key:ro
      - ./ssl/ca/ca.crt:/var/lib/postgresql/ca.crt:ro
      - ./postgres-ssl.conf:/etc/postgresql/postgresql.conf:ro
    command: 
      - "postgres"
      - "-c"
      - "config_file=/etc/postgresql/postgresql.conf"
    networks:
      - medinovai-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U medinovai"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  mongodb:
    image: mongo:7.0
    container_name: medinovai-mongodb-tls
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USER:-admin}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD:-mongo_secure_password}
      MONGO_INITDB_DATABASE: ${MONGO_DB:-medinovai}
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
      # Mount TLS certificates
      - ./ssl/mongodb/server.pem:/etc/ssl/mongodb.pem:ro
      - ./ssl/ca/ca.crt:/etc/ssl/ca.crt:ro
    command: ["mongod", "--tlsMode", "requireTLS", "--tlsCertificateKeyFile", "/etc/ssl/mongodb.pem", "--tlsCAFile", "/etc/ssl/ca.crt"]
    networks:
      - medinovai-network
    healthcheck:
      test: ["CMD", "mongosh", "--tls", "--tlsCertificateKeyFile", "/etc/ssl/mongodb.pem", "--tlsCAFile", "/etc/ssl/ca.crt", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 40s
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: medinovai-redis-tls
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD:-redis_secure_password}
      --tls-port 6379
      --port 0
      --tls-cert-file /etc/ssl/redis/server.crt
      --tls-key-file /etc/ssl/redis/server.key
      --tls-ca-cert-file /etc/ssl/redis/ca.crt
      --maxmemory 2gb
      --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
      - ./ssl/redis/server.crt:/etc/ssl/redis/server.crt:ro
      - ./ssl/redis/server.key:/etc/ssl/redis/server.key:ro
      - ./ssl/ca/ca.crt:/etc/ssl/redis/ca.crt:ro
    networks:
      - medinovai-network
    healthcheck:
      test: ["CMD", "redis-cli", "--tls", "--cert", "/etc/ssl/redis/server.crt", "--key", "/etc/ssl/redis/server.key", "--cacert", "/etc/ssl/redis/ca.crt", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ======================
  # MESSAGE QUEUE SERVICES
  # ======================

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: medinovai-zookeeper-tls
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    volumes:
      - zookeeper_data:/var/lib/zookeeper/data
      - zookeeper_logs:/var/lib/zookeeper/log
    networks:
      - medinovai-network
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "2181"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: medinovai-kafka-tls
    depends_on:
      - zookeeper
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_PROCESS_ROLES: ""
    ports:
      - "9092:9092"
      - "29092:29092"
    volumes:
      - kafka_data:/var/lib/kafka/data
    networks:
      - medinovai-network
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 40s
    restart: unless-stopped

  rabbitmq:
    image: rabbitmq:3-management
    container_name: medinovai-rabbitmq-tls
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-medinovai}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-rabbitmq_secure_password}
    ports:
      - "5672:5672"   # AMQP
      - "15672:15672" # Management UI
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    networks:
      - medinovai-network
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ======================
  # MONITORING STACK
  # ======================

  prometheus:
    image: prom/prometheus:latest
    container_name: medinovai-prometheus-tls
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=30d'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus-config/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    networks:
      - medinovai-network
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:9090/-/healthy"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    container_name: medinovai-grafana-tls
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-grafana_secure_password}
      GF_INSTALL_PLUGINS: grafana-clock-panel
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana-provisioning:/etc/grafana/provisioning:ro
    networks:
      - medinovai-network
    depends_on:
      - prometheus
      - loki
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3000/api/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  loki:
    image: grafana/loki:latest
    container_name: medinovai-loki-tls
    ports:
      - "3100:3100"
    volumes:
      - ./loki-config/local-config.yaml:/etc/loki/local-config.yaml:ro
      - loki_data:/loki
    command: -config.file=/etc/loki/local-config.yaml
    networks:
      - medinovai-network
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3100/ready"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  promtail:
    image: grafana/promtail:latest
    container_name: medinovai-promtail-tls
    volumes:
      - ./promtail-config/config.yml:/etc/promtail/config.yml:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    command: -config.file=/etc/promtail/config.yml
    networks:
      - medinovai-network
    depends_on:
      - loki
    restart: unless-stopped

  # ======================
  # SECURITY SERVICES
  # ======================

  keycloak:
    image: quay.io/keycloak/keycloak:latest
    container_name: medinovai-keycloak-tls
    environment:
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN:-admin}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-keycloak_secure_password}
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/keycloak
      KC_DB_USERNAME: ${POSTGRES_USER:-medinovai}
      KC_DB_PASSWORD: ${POSTGRES_PASSWORD:-medinovai_secure_password}
      KC_HOSTNAME: localhost
      KC_HTTP_ENABLED: "true"
      KC_HTTP_PORT: 8080
    command: start-dev
    ports:
      - "8180:8080"
    networks:
      - medinovai-network
    depends_on:
      - postgres
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 90s
    restart: unless-stopped

  vault:
    image: hashicorp/vault:latest
    container_name: medinovai-vault-tls
    environment:
      VAULT_DEV_ROOT_TOKEN_ID: ${VAULT_TOKEN:-medinovai_vault_token}
      VAULT_DEV_LISTEN_ADDRESS: 0.0.0.0:8200
    ports:
      - "8200:8200"
    volumes:
      - vault_data:/vault/data
    cap_add:
      - IPC_LOCK
    networks:
      - medinovai-network
    healthcheck:
      test: ["CMD", "vault", "status"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  minio:
    image: minio/minio:latest
    container_name: medinovai-minio-tls
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-medinovai}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minio_secure_password}
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    networks:
      - medinovai-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ======================
  # API GATEWAY
  # ======================

  nginx:
    image: nginx:alpine
    container_name: medinovai-nginx-tls
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx-tls.conf:/etc/nginx/nginx.conf:ro
      - ./ssl/nginx/server.crt:/etc/nginx/ssl/server.crt:ro
      - ./ssl/nginx/server.key:/etc/nginx/ssl/server.key:ro
      - ./ssl/nginx/dhparam.pem:/etc/nginx/ssl/dhparam.pem:ro
    networks:
      - medinovai-network
    depends_on:
      - prometheus
      - grafana
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:80/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

networks:
  medinovai-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.25.0.0/16

volumes:
  postgres_data:
  timescaledb_data:
  mongodb_data:
  redis_data:
  zookeeper_data:
  zookeeper_logs:
  kafka_data:
  rabbitmq_data:
  prometheus_data:
  grafana_data:
  loki_data:
  vault_data:
  minio_data:

