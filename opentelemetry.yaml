# OpenTelemetry Configuration — medinovai-infrastructure
# medinovai-ai-standards/OBSERVABILITY.md v3.0.0

service:
  name: "medinovai-infrastructure"
  version: "${SERVICE_VERSION:-1.0.0}"
  namespace: "medinovai"
  environment: "${ENVIRONMENT:-development}"

exporters:
  otlp:
    endpoint: "${OTEL_ENDPOINT:-grpc-collector.medinovai.health:4317}"
    insecure: false
    headers:
      authorization: "Bearer ${OTEL_AUTH_TOKEN}"
  prometheus:
    endpoint: "0.0.0.0:9090"
    namespace: "medinovai"

traces:
  sampler:
    type: "parentbased_traceidratio"
    ratio: 0.1  # 100% for Tier 1 clinical, 10% otherwise
  propagators:
    - tracecontext
    - baggage
  batch:
    max_export_batch_size: 512
    schedule_delay_millis: 5000

metrics:
  interval_millis: 15000
  exporters: [prometheus, otlp]

logs:
  level: "${LOG_LEVEL:-INFO}"
  format: json
  include_trace_context: true
  exporters: [otlp]

resource:
  attributes:
    deployment.environment: "${ENVIRONMENT}"
    host.name: "${HOSTNAME}"
    k8s.pod.name: "${POD_NAME}"
    k8s.namespace.name: "${K8S_NAMESPACE:-default}"
    cloud.region: "${AWS_REGION:-us-east-1}"
