apiVersion: v1
kind: ConfigMap
metadata:
  name: medinovai-security-config
  namespace: medinovai
data:
  SECRET_KEY: "your-secret-key-here"
  ENCRYPTION_KEY: "your-encryption-key-here"
  DB_HOST: "postgresql-service"
  DB_PORT: "5432"
  DB_NAME: "medinovai_security"
  REDIS_HOST: "redis-service"
  REDIS_PORT: "6379"

---
apiVersion: v1
kind: Secret
metadata:
  name: medinovai-security-secrets
  namespace: medinovai
type: Opaque
data:
  DB_USER: bWVkaW5vdmFp  # medinovai
  DB_PASSWORD: bWVkaW5vdmFp  # medinovai
  REDIS_PASSWORD: ""  # Empty if no password

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: medinovai-security-services
  namespace: medinovai
  labels:
    app: medinovai-security-services
    version: v1.0.0
spec:
  replicas: 3
  selector:
    matchLabels:
      app: medinovai-security-services
  template:
    metadata:
      labels:
        app: medinovai-security-services
        version: v1.0.0
      annotations:
        sidecar.istio.io/inject: "false"
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      serviceAccountName: medinovai-admin
      containers:
      - name: medinovai-security-services
        image: medinovai/security-services:latest
        ports:
        - containerPort: 8000
          name: http
        env:
        - name: SECRET_KEY
          valueFrom:
            configMapKeyRef:
              name: medinovai-security-config
              key: SECRET_KEY
        - name: ENCRYPTION_KEY
          valueFrom:
            configMapKeyRef:
              name: medinovai-security-config
              key: ENCRYPTION_KEY
        - name: DB_HOST
          valueFrom:
            configMapKeyRef:
              name: medinovai-security-config
              key: DB_HOST
        - name: DB_PORT
          valueFrom:
            configMapKeyRef:
              name: medinovai-security-config
              key: DB_PORT
        - name: DB_NAME
          valueFrom:
            configMapKeyRef:
              name: medinovai-security-config
              key: DB_NAME
        - name: DB_USER
          valueFrom:
            secretKeyRef:
              name: medinovai-security-secrets
              key: DB_USER
        - name: DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: medinovai-security-secrets
              key: DB_PASSWORD
        - name: REDIS_HOST
          valueFrom:
            configMapKeyRef:
              name: medinovai-security-config
              key: REDIS_HOST
        - name: REDIS_PORT
          valueFrom:
            configMapKeyRef:
              name: medinovai-security-config
              key: REDIS_PORT
        - name: REDIS_PASSWORD
          valueFrom:
            secretKeyRef:
              name: medinovai-security-secrets
              key: REDIS_PASSWORD
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 5
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          runAsNonRoot: true
          runAsUser: 1000
          runAsGroup: 1000
          capabilities:
            drop:
            - ALL
          seccompProfile:
            type: RuntimeDefault
        volumeMounts:
        - name: tmp
          mountPath: /tmp
        - name: var-cache
          mountPath: /var/cache
        - name: var-log
          mountPath: /var/log
      volumes:
      - name: tmp
        emptyDir: {}
      - name: var-cache
        emptyDir: {}
      - name: var-log
        emptyDir: {}

---
apiVersion: v1
kind: Service
metadata:
  name: medinovai-security-services
  namespace: medinovai
  labels:
    app: medinovai-security-services
spec:
  selector:
    app: medinovai-security-services
  ports:
  - name: http
    port: 80
    targetPort: 8000
    protocol: TCP
  type: ClusterIP

---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: medinovai-security-services-hpa
  namespace: medinovai
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: medinovai-security-services
  minReplicas: 3
  maxReplicas: 10
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80

---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: medinovai-security-services-netpol
  namespace: medinovai
spec:
  podSelector:
    matchLabels:
      app: medinovai-security-services
  policyTypes:
  - Ingress
  - Egress
  ingress:
  - from:
    - namespaceSelector:
        matchLabels:
          name: medinovai
    - namespaceSelector:
        matchLabels:
          name: istio-system
    ports:
    - protocol: TCP
      port: 8000
  egress:
  - to:
    - namespaceSelector:
        matchLabels:
          name: medinovai
    ports:
    - protocol: TCP
      port: 5432  # PostgreSQL
    - protocol: TCP
      port: 6379  # Redis
  - to: []
    ports:
    - protocol: TCP
      port: 53    # DNS
    - protocol: UDP
      port: 53    # DNS
