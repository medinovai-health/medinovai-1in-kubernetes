# STAGE: TEST - Infrastructure Components
# ═══════════════════════════════════════════════════════════

test:tier1-containers:
  stage: test
  image: mcr.microsoft.com/playwright:v1.40.0-focal
  <<: *node_setup
  script:
    - npx playwright test playwright/tests/infrastructure/tier1-containers-orchestration.spec.ts --reporter=html,json
  artifacts:
    when: always
    paths:
      - playwright-report/
      - test-results/
    reports:
      junit: test-results/results.xml
    expire_in: 30 days
  only:
    - merge_requests
    - main

