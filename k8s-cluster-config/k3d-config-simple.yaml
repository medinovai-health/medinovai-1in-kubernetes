apiVersion: k3d.io/v1alpha4
kind: Simple
name: medinovai-cluster
servers: 2
agents: 3
kubeAPI:
  host: "0.0.0.0"
  hostPort: "6443"
ports:
  - port: 80:80
    nodeFilters:
      - loadbalancer
  - port: 443:443
    nodeFilters:
      - loadbalancer
  - port: 8080:8080
    nodeFilters:
      - loadbalancer
  - port: 30000-30100:30000-30100
    nodeFilters:
      - loadbalancer
volumes:
  - volume: /Users/dev1/github/medinovai-infrastructure:/var/lib/rancher/k3s/storage
    nodeFilters:
      - agent:*
options:
  k3s:
    extraArgs:
      - arg: --disable=traefik
        nodeFilters:
          - server:*
      - arg: --disable=servicelb
        nodeFilters:
          - server:*
      - arg: --disable=local-storage
        nodeFilters:
          - server:*
      - arg: --disable=metrics-server
        nodeFilters:
          - server:*
      - arg: --disable=coredns
        nodeFilters:
          - server:*
