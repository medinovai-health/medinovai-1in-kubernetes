---
apiVersion: v1
kind: Namespace
metadata:
  name: medinovai-module-dev
  labels:
    app.kubernetes.io/name: medinovai-module-dev
    app.kubernetes.io/part-of: medinovai-infrastructure
    healthcare.medinovai.com/compliance: hipaa
    istio-injection: enabled

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: module-development-service
  namespace: medinovai-module-dev
  labels:
    app: module-development-service
    version: v2.0.0
    tier: infrastructure
    component: development-framework
spec:
  replicas: 2
  selector:
    matchLabels:
      app: module-development-service
      version: v2.0.0
  template:
    metadata:
      labels:
        app: module-development-service
        version: v2.0.0
        tier: infrastructure
        component: development-framework
      annotations:
        sidecar.istio.io/inject: "true"
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
        prometheus.io/path: "/metrics"
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 2000
      containers:
      - name: module-dev-service
        image: medinovai/module-development-service:v2.0.0
        imagePullPolicy: Always
        ports:
        - name: http
          containerPort: 8080
          protocol: TCP
        - name: metrics
          containerPort: 9090
          protocol: TCP
        env:
        - name: ENVIRONMENT
          value: "production"
        - name: LOG_LEVEL
          value: "INFO"
        - name: HEALTHCARE_COMPLIANCE
          value: "HIPAA"
        - name: AI_INTEGRATION_ENABLED
          value: "true"
        - name: OLLAMA_BASE_URL
          value: "http://ollama.medinovai.svc.cluster.local:11434"
        - name: POSTGRES_HOST
          value: "postgresql.medinovai-data.svc.cluster.local"
        - name: REDIS_HOST
          value: "redis.medinovai-cache.svc.cluster.local"
        resources:
          requests:
            memory: "256Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /health
            port: http
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /ready
            port: http
          initialDelaySeconds: 5
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          runAsNonRoot: true
          runAsUser: 1000
          capabilities:
            drop:
            - ALL
        volumeMounts:
        - name: tmp
          mountPath: /tmp
        - name: var-tmp
          mountPath: /var/tmp
        - name: templates
          mountPath: /app/templates
          readOnly: true
        - name: config
          mountPath: /app/config
          readOnly: true
      volumes:
      - name: tmp
        emptyDir: {}
      - name: var-tmp
        emptyDir: {}
      - name: templates
        configMap:
          name: module-dev-templates
      - name: config
        configMap:
          name: module-dev-config

---
apiVersion: v1
kind: Service
metadata:
  name: module-development-service
  namespace: medinovai-module-dev
  labels:
    app: module-development-service
    version: v2.0.0
spec:
  type: ClusterIP
  ports:
  - name: http
    port: 8080
    targetPort: http
    protocol: TCP
  - name: metrics
    port: 9090
    targetPort: metrics
    protocol: TCP
  selector:
    app: module-development-service
    version: v2.0.0

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: module-dev-templates
  namespace: medinovai-module-dev
  labels:
    app: module-development-service
    component: templates
data:
  fastapi-template: |
    # FastAPI Healthcare Service Template
    # Generated by MedinovAI Module Development Package v2.0.0
    # HIPAA Compliant | AI Integrated | Production Ready
  kubernetes-template: |
    # Kubernetes Deployment Template
    # Healthcare-optimized with security hardening
    # Istio service mesh integration
  dockerfile-template: |
    # Multi-stage Healthcare Service Container
    # Security-hardened with non-root user
    # Minimal attack surface

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: module-dev-config
  namespace: medinovai-module-dev
  labels:
    app: module-development-service
    component: configuration
data:
  config.yaml: |
    service:
      name: "MedinovAI Module Development Service"
      version: "2.0.0"
      port: 8080
      
    healthcare:
      compliance: "HIPAA"
      audit_logging: true
      phi_encryption: true
      
    ai_integration:
      enabled: true
      models:
        - name: "qwen2.5:3b"
          purpose: "patient_interactions"
        - name: "meditron:7b"
          purpose: "medical_knowledge"
        - name: "deepseek-coder:latest"
          purpose: "code_generation"
          
    templates:
      categories:
        - api_services: "8000-8099"
        - frontend_services: "8100-8199"
        - database_services: "8200-8299"
        - analytics_services: "8300-8399"
        - ai_ml_services: "8400-8499"
        - integration_services: "8500-8599"

---
apiVersion: networking.istio.io/v1beta1
kind: VirtualService
metadata:
  name: module-development-service
  namespace: medinovai-module-dev
spec:
  hosts:
  - module-dev.medinovai.local
  - module-development-service.medinovai-module-dev.svc.cluster.local
  http:
  - match:
    - uri:
        prefix: /
    route:
    - destination:
        host: module-development-service.medinovai-module-dev.svc.cluster.local
        port:
          number: 8080
    timeout: 30s
    retries:
      attempts: 3
      perTryTimeout: 10s

---
apiVersion: networking.istio.io/v1beta1
kind: DestinationRule
metadata:
  name: module-development-service
  namespace: medinovai-module-dev
spec:
  host: module-development-service.medinovai-module-dev.svc.cluster.local
  trafficPolicy:
    tls:
      mode: ISTIO_MUTUAL
    connectionPool:
      tcp:
        maxConnections: 100
      http:
        http1MaxPendingRequests: 10
        maxRequestsPerConnection: 2
    circuitBreaker:
      consecutiveErrors: 3
      interval: 30s
      baseEjectionTime: 30s

---
apiVersion: security.istio.io/v1beta1
kind: AuthorizationPolicy
metadata:
  name: module-development-service
  namespace: medinovai-module-dev
spec:
  selector:
    matchLabels:
      app: module-development-service
  rules:
  - from:
    - source:
        principals: ["cluster.local/ns/medinovai/sa/api-gateway"]
    - source:
        principals: ["cluster.local/ns/medinovai-module-dev/sa/default"]
  - to:
    - operation:
        methods: ["GET", "POST", "PUT", "DELETE"]
        paths: ["/api/*", "/health", "/ready", "/metrics"]

---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: module-development-service
  namespace: medinovai-module-dev
spec:
  podSelector:
    matchLabels:
      app: module-development-service
  policyTypes:
  - Ingress
  - Egress
  ingress:
  - from:
    - namespaceSelector:
        matchLabels:
          name: medinovai
    - namespaceSelector:
        matchLabels:
          name: istio-system
    ports:
    - protocol: TCP
      port: 8080
    - protocol: TCP
      port: 9090
  egress:
  - to:
    - namespaceSelector:
        matchLabels:
          name: medinovai-data
    ports:
    - protocol: TCP
      port: 5432  # PostgreSQL
  - to:
    - namespaceSelector:
        matchLabels:
          name: medinovai-cache
    ports:
    - protocol: TCP
      port: 6379  # Redis
  - to:
    - namespaceSelector:
        matchLabels:
          name: medinovai
    ports:
    - protocol: TCP
      port: 11434  # Ollama
  - to: {}
    ports:
    - protocol: TCP
      port: 53   # DNS
    - protocol: UDP
      port: 53   # DNS
    - protocol: TCP
      port: 443  # HTTPS

---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: module-development-service
  namespace: medinovai-module-dev
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: module-development-service

---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: module-development-service
  namespace: medinovai-module-dev
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: module-development-service
  minReplicas: 2
  maxReplicas: 10
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 60
      policies:
      - type: Percent
        value: 100
        periodSeconds: 15
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
      - type: Percent
        value: 10
        periodSeconds: 60
