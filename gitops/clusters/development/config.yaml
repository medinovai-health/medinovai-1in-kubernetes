---
# Mock Services for Development
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: mock-services
  namespace: argocd
  labels:
    environment: development
    app.kubernetes.io/component: mocks
spec:
  project: medinovai-dev
  source:
    repoURL: https://github.com/medinovai/medinovai-infrastructure.git
    targetRevision: HEAD
    path: mocks/kubernetes
    helm:
      parameters:
        - name: mockHl7.enabled
          value: "true"
        - name: mockEdi.enabled
          value: "true"
        - name: mockFhir.enabled
          value: "true"
        - name: mockPayment.enabled
          value: "true"
  destination:
    server: https://dev.k8s.medinovai.com
    namespace: mock-services
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
