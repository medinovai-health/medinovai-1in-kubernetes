# External Secrets Operator - Sync secrets from external sources
# Integrates with AWS Secrets Manager, HashiCorp Vault, Azure Key Vault
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: external-secrets
  namespace: argocd
  labels:
    app.kubernetes.io/name: external-secrets
    app.kubernetes.io/component: security
    medinovai.com/infrastructure: core
  annotations:
    argocd.argoproj.io/sync-wave: "-5"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: infrastructure
  source:
    repoURL: https://charts.external-secrets.io
    chart: external-secrets
    targetRevision: 0.9.11
    helm:
      releaseName: external-secrets
      values: |
        # Operator configuration
        replicaCount: 2
        
        # Resource limits
        resources:
          requests:
            cpu: 50m
            memory: 64Mi
          limits:
            cpu: 200m
            memory: 256Mi
        
        # Security context
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
              - ALL
          readOnlyRootFilesystem: true
          runAsNonRoot: true
          runAsUser: 1000
        
        # Service account
        serviceAccount:
          create: true
          name: external-secrets
          annotations:
            eks.amazonaws.com/role-arn: arn:aws:iam::ACCOUNT_ID:role/external-secrets
        
        # Webhook configuration
        webhook:
          replicaCount: 2
          resources:
            requests:
              cpu: 25m
              memory: 64Mi
            limits:
              cpu: 100m
              memory: 128Mi
        
        # Cert controller
        certController:
          replicaCount: 2
          resources:
            requests:
              cpu: 25m
              memory: 64Mi
            limits:
              cpu: 100m
              memory: 128Mi
        
        # Metrics
        metrics:
          service:
            enabled: true
          serviceMonitor:
            enabled: true
            namespace: monitoring
        
        # CRDs
        installCRDs: true
  
  destination:
    server: https://kubernetes.default.svc
    namespace: external-secrets
  
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
---
# AWS Secrets Manager SecretStore (Production)
apiVersion: external-secrets.io/v1beta1
kind: ClusterSecretStore
metadata:
  name: aws-secrets-manager
  labels:
    medinovai.com/provider: aws
spec:
  provider:
    aws:
      service: SecretsManager
      region: us-east-1
      auth:
        jwt:
          serviceAccountRef:
            name: external-secrets
            namespace: external-secrets
---
# AWS Parameter Store SecretStore
apiVersion: external-secrets.io/v1beta1
kind: ClusterSecretStore
metadata:
  name: aws-parameter-store
  labels:
    medinovai.com/provider: aws
spec:
  provider:
    aws:
      service: ParameterStore
      region: us-east-1
      auth:
        jwt:
          serviceAccountRef:
            name: external-secrets
            namespace: external-secrets
---
# HashiCorp Vault SecretStore (Optional)
apiVersion: external-secrets.io/v1beta1
kind: ClusterSecretStore
metadata:
  name: hashicorp-vault
  labels:
    medinovai.com/provider: vault
spec:
  provider:
    vault:
      server: "https://vault.medinovai.com"
      path: "secret"
      version: "v2"
      auth:
        kubernetes:
          mountPath: "kubernetes"
          role: "external-secrets"
          serviceAccountRef:
            name: external-secrets
            namespace: external-secrets
---
# External Secret for LIS Platform Database
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: lis-database-credentials
  namespace: lis-platform
  labels:
    app.kubernetes.io/name: lis-platform
    medinovai.com/secret-type: database
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secrets-manager
    kind: ClusterSecretStore
  target:
    name: database-credentials
    creationPolicy: Owner
    template:
      type: Opaque
      metadata:
        labels:
          app.kubernetes.io/name: lis-platform
      data:
        connection-string: "Server={{ .DB_HOST }};Database={{ .DB_NAME }};User Id={{ .DB_USER }};Password={{ .DB_PASSWORD }};Encrypt=True;TrustServerCertificate=False;"
  data:
    - secretKey: DB_HOST
      remoteRef:
        key: medinovai/lis-platform/database
        property: host
    - secretKey: DB_NAME
      remoteRef:
        key: medinovai/lis-platform/database
        property: database
    - secretKey: DB_USER
      remoteRef:
        key: medinovai/lis-platform/database
        property: username
    - secretKey: DB_PASSWORD
      remoteRef:
        key: medinovai/lis-platform/database
        property: password
---
# External Secret for LIS Platform Redis
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: lis-redis-credentials
  namespace: lis-platform
  labels:
    app.kubernetes.io/name: lis-platform
    medinovai.com/secret-type: cache
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secrets-manager
    kind: ClusterSecretStore
  target:
    name: redis-credentials
    creationPolicy: Owner
  data:
    - secretKey: REDIS_HOST
      remoteRef:
        key: medinovai/lis-platform/redis
        property: host
    - secretKey: REDIS_PORT
      remoteRef:
        key: medinovai/lis-platform/redis
        property: port
    - secretKey: REDIS_PASSWORD
      remoteRef:
        key: medinovai/lis-platform/redis
        property: password
---
# External Secret for Billing PCI-DSS Secrets
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: billing-payment-credentials
  namespace: billing
  labels:
    app.kubernetes.io/name: billing
    medinovai.com/secret-type: payment
    medinovai.com/pci-scope: in-scope
spec:
  refreshInterval: 30m  # More frequent refresh for payment secrets
  secretStoreRef:
    name: aws-secrets-manager
    kind: ClusterSecretStore
  target:
    name: payment-credentials
    creationPolicy: Owner
    template:
      type: Opaque
      metadata:
        labels:
          app.kubernetes.io/name: billing
          medinovai.com/pci-scope: in-scope
  data:
    - secretKey: STRIPE_SECRET_KEY
      remoteRef:
        key: medinovai/billing/stripe
        property: secret_key
    - secretKey: STRIPE_WEBHOOK_SECRET
      remoteRef:
        key: medinovai/billing/stripe
        property: webhook_secret
    - secretKey: PAYMENT_ENCRYPTION_KEY
      remoteRef:
        key: medinovai/billing/encryption
        property: payment_key
---
# External Secret for CTMS 21 CFR Part 11 Signing Keys
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: ctms-signing-keys
  namespace: ctms
  labels:
    app.kubernetes.io/name: ctms
    medinovai.com/secret-type: signing
    medinovai.com/regulatory: 21cfr11
spec:
  refreshInterval: 24h
  secretStoreRef:
    name: aws-secrets-manager
    kind: ClusterSecretStore
  target:
    name: signing-keys
    creationPolicy: Owner
  data:
    - secretKey: SIGNATURE_PRIVATE_KEY
      remoteRef:
        key: medinovai/ctms/signing
        property: private_key
    - secretKey: SIGNATURE_PUBLIC_KEY
      remoteRef:
        key: medinovai/ctms/signing
        property: public_key
    - secretKey: TIMESTAMP_AUTHORITY_CERT
      remoteRef:
        key: medinovai/ctms/signing
        property: tsa_cert
---
# Push Secret - Sync secrets TO external stores (for secret rotation)
apiVersion: external-secrets.io/v1alpha1
kind: PushSecret
metadata:
  name: rotate-database-password
  namespace: lis-platform
spec:
  refreshInterval: 24h
  secretStoreRefs:
    - name: aws-secrets-manager
      kind: ClusterSecretStore
  selector:
    secret:
      name: rotated-database-password
  data:
    - match:
        secretKey: DB_PASSWORD
        remoteRef:
          remoteKey: medinovai/lis-platform/database
          property: password
