# Sealed Secrets Controller - Encrypted secrets for GitOps
# Allows storing encrypted secrets in Git repositories
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: sealed-secrets
  namespace: argocd
  labels:
    app.kubernetes.io/name: sealed-secrets
    app.kubernetes.io/component: security
    medinovai.com/infrastructure: core
  annotations:
    argocd.argoproj.io/sync-wave: "-5"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: infrastructure
  source:
    repoURL: https://bitnami-labs.github.io/sealed-secrets
    chart: sealed-secrets
    targetRevision: 2.15.0
    helm:
      releaseName: sealed-secrets
      values: |
        # Controller configuration
        fullnameOverride: sealed-secrets-controller
        
        # Resource limits
        resources:
          requests:
            cpu: 50m
            memory: 64Mi
          limits:
            cpu: 200m
            memory: 256Mi
        
        # Security context
        securityContext:
          runAsUser: 1001
          runAsNonRoot: true
          fsGroup: 65534
        
        containerSecurityContext:
          readOnlyRootFilesystem: true
          runAsNonRoot: true
          runAsUser: 1001
          allowPrivilegeEscalation: false
          capabilities:
            drop:
              - ALL
        
        # Service account
        serviceAccount:
          create: true
          name: sealed-secrets-controller
        
        # RBAC
        rbac:
          create: true
          pspEnabled: false
        
        # Metrics
        metrics:
          serviceMonitor:
            enabled: true
            namespace: monitoring
            labels:
              release: prometheus
        
        # Key management
        secretName: sealed-secrets-key
        
        # Certificate rotation
        keyrenewperiod: "720h"  # 30 days
        
        # Ingress for web UI (optional)
        ingress:
          enabled: false
  
  destination:
    server: https://kubernetes.default.svc
    namespace: kube-system
  
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=false
      - ServerSideApply=true
---
# Sealed Secrets Backup CronJob
apiVersion: batch/v1
kind: CronJob
metadata:
  name: sealed-secrets-backup
  namespace: kube-system
  labels:
    app.kubernetes.io/name: sealed-secrets-backup
spec:
  schedule: "0 0 * * *"  # Daily at midnight
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      template:
        spec:
          serviceAccountName: sealed-secrets-backup
          containers:
            - name: backup
              image: bitnami/kubectl:latest
              command:
                - /bin/bash
                - -c
                - |
                  kubectl get secret -n kube-system sealed-secrets-key -o yaml > /backup/sealed-secrets-key-$(date +%Y%m%d).yaml
                  # Upload to S3 backup bucket
                  aws s3 cp /backup/sealed-secrets-key-$(date +%Y%m%d).yaml s3://medinovai-secrets-backup/sealed-secrets/
              volumeMounts:
                - name: backup-volume
                  mountPath: /backup
              env:
                - name: AWS_REGION
                  value: "us-east-1"
              resources:
                requests:
                  cpu: 50m
                  memory: 64Mi
                limits:
                  cpu: 100m
                  memory: 128Mi
          volumes:
            - name: backup-volume
              emptyDir: {}
          restartPolicy: OnFailure
---
# ServiceAccount for backup job
apiVersion: v1
kind: ServiceAccount
metadata:
  name: sealed-secrets-backup
  namespace: kube-system
  annotations:
    eks.amazonaws.com/role-arn: arn:aws:iam::ACCOUNT_ID:role/sealed-secrets-backup
---
# RBAC for backup job
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: sealed-secrets-backup
  namespace: kube-system
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    resourceNames: ["sealed-secrets-key"]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: sealed-secrets-backup
  namespace: kube-system
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: sealed-secrets-backup
subjects:
  - kind: ServiceAccount
    name: sealed-secrets-backup
    namespace: kube-system
---
# Example SealedSecret template
# To create: kubeseal --controller-name=sealed-secrets-controller --controller-namespace=kube-system < secret.yaml > sealed-secret.yaml
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: database-credentials-template
  namespace: lis-platform
  annotations:
    # Scope: strict (default) - sealed for specific name and namespace
    sealedsecrets.bitnami.com/cluster-wide: "false"
    sealedsecrets.bitnami.com/namespace-wide: "false"
spec:
  encryptedData:
    # These would be actual encrypted values
    DB_HOST: AgBy8hDi...encrypted...
    DB_USER: AgCtr4Rj...encrypted...
    DB_PASSWORD: AgDk9iKm...encrypted...
    DB_NAME: AgEl0jLn...encrypted...
  template:
    metadata:
      name: database-credentials
      namespace: lis-platform
      labels:
        app.kubernetes.io/name: lis-platform
        medinovai.com/secret-type: database
    type: Opaque
