---
# Billing Ingress (PCI-DSS compliant)
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: billing-ingress
  namespace: billing
  labels:
    app.kubernetes.io/name: billing
    medinovai.com/pci-scope: in-scope
  annotations:
    kubernetes.io/ingress.class: nginx
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
    # Stricter rate limiting for payment endpoints
    nginx.ingress.kubernetes.io/rate-limit: "30"
    nginx.ingress.kubernetes.io/rate-limit-connections: "20"
    # Additional PCI-DSS headers
    nginx.ingress.kubernetes.io/configuration-snippet: |
      add_header X-PCI-Scope "true" always;
      add_header X-Frame-Options "DENY" always;
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - billing.medinovai.com
        - api.billing.medinovai.com
      secretName: billing-tls
  rules:
    - host: billing.medinovai.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: billing-web
                port:
                  number: 80
    - host: api.billing.medinovai.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: billing-api
                port:
                  number: 80
