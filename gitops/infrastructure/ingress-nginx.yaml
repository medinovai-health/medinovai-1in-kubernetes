# NGINX Ingress Controller - Healthcare-grade ingress configuration
# Provides SSL termination, rate limiting, and WAF capabilities
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: ingress-nginx
  namespace: argocd
  labels:
    app.kubernetes.io/name: ingress-nginx
    app.kubernetes.io/component: networking
    medinovai.com/infrastructure: core
  annotations:
    argocd.argoproj.io/sync-wave: "-8"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: infrastructure
  source:
    repoURL: https://kubernetes.github.io/ingress-nginx
    chart: ingress-nginx
    targetRevision: 4.9.1
    helm:
      releaseName: ingress-nginx
      values: |
        # Controller configuration
        controller:
          name: controller
          replicaCount: 3
          
          # Use deployment for easier updates
          kind: Deployment
          
          # Resource limits
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 1000m
              memory: 1Gi
          
          # Autoscaling
          autoscaling:
            enabled: true
            minReplicas: 3
            maxReplicas: 10
            targetCPUUtilizationPercentage: 70
            targetMemoryUtilizationPercentage: 80
          
          # Pod disruption budget
          minAvailable: 2
          
          # Service configuration
          service:
            enabled: true
            type: LoadBalancer
            annotations:
              service.beta.kubernetes.io/aws-load-balancer-type: "nlb"
              service.beta.kubernetes.io/aws-load-balancer-cross-zone-load-balancing-enabled: "true"
              service.beta.kubernetes.io/aws-load-balancer-backend-protocol: "tcp"
              service.beta.kubernetes.io/aws-load-balancer-ssl-ports: "443"
              service.beta.kubernetes.io/aws-load-balancer-connection-idle-timeout: "3600"
            externalTrafficPolicy: Local
          
          # Ingress class
          ingressClassResource:
            name: nginx
            enabled: true
            default: true
            controllerValue: "k8s.io/ingress-nginx"
          
          # Security configuration
          config:
            # TLS configuration
            ssl-protocols: "TLSv1.2 TLSv1.3"
            ssl-ciphers: "ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384"
            ssl-prefer-server-ciphers: "true"
            ssl-session-cache: "true"
            ssl-session-cache-size: "10m"
            ssl-session-timeout: "1d"
            ssl-session-tickets: "false"
            
            # Security headers (HIPAA/Healthcare compliance)
            add-headers: "ingress-nginx/custom-headers"
            
            # Proxy settings
            proxy-body-size: "50m"
            proxy-buffer-size: "128k"
            proxy-buffers-number: "4"
            proxy-connect-timeout: "60"
            proxy-read-timeout: "300"
            proxy-send-timeout: "300"
            
            # Rate limiting
            limit-req-status-code: "429"
            limit-conn-status-code: "429"
            
            # Logging (audit compliance)
            log-format-upstream: '$remote_addr - $remote_user [$time_local] "$request" $status $body_bytes_sent "$http_referer" "$http_user_agent" $request_length $request_time [$proxy_upstream_name] [$proxy_alternative_upstream_name] $upstream_addr $upstream_response_length $upstream_response_time $upstream_status $req_id'
            enable-access-log-for-default-backend: "true"
            
            # Server configuration
            server-tokens: "false"
            hide-headers: "X-Powered-By,Server"
            
            # Keep-alive
            keep-alive: "75"
            keep-alive-requests: "1000"
            
            # Client settings
            client-header-timeout: "60"
            client-body-timeout: "60"
            
            # ModSecurity WAF (optional, enable for production)
            enable-modsecurity: "true"
            enable-owasp-modsecurity-crs: "true"
            modsecurity-snippet: |
              SecRuleEngine On
              SecRequestBodyAccess On
              SecAuditEngine RelevantOnly
              SecAuditLogParts ABDEFHIJZ
              SecAuditLogType Serial
              SecAuditLog /var/log/modsec_audit.log
          
          # Admission webhooks
          admissionWebhooks:
            enabled: true
            failurePolicy: Fail
            port: 8443
          
          # Metrics
          metrics:
            enabled: true
            port: 10254
            serviceMonitor:
              enabled: true
              namespace: monitoring
              additionalLabels:
                release: prometheus
          
          # Pod security
          podSecurityContext:
            runAsUser: 101
            runAsGroup: 101
            fsGroup: 101
            runAsNonRoot: true
          
          containerSecurityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            runAsNonRoot: true
            runAsUser: 101
            capabilities:
              drop:
                - ALL
              add:
                - NET_BIND_SERVICE
          
          # Affinity and anti-affinity
          affinity:
            podAntiAffinity:
              requiredDuringSchedulingIgnoredDuringExecution:
                - labelSelector:
                    matchExpressions:
                      - key: app.kubernetes.io/name
                        operator: In
                        values:
                          - ingress-nginx
                  topologyKey: "kubernetes.io/hostname"
          
          # Topology spread
          topologySpreadConstraints:
            - maxSkew: 1
              topologyKey: topology.kubernetes.io/zone
              whenUnsatisfiable: ScheduleAnyway
              labelSelector:
                matchLabels:
                  app.kubernetes.io/name: ingress-nginx
        
        # Default backend
        defaultBackend:
          enabled: true
          name: default-backend
          replicaCount: 2
          resources:
            requests:
              cpu: 10m
              memory: 20Mi
            limits:
              cpu: 100m
              memory: 64Mi
  
  destination:
    server: https://kubernetes.default.svc
    namespace: ingress-nginx
  
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
---
# Custom Security Headers ConfigMap
apiVersion: v1
kind: ConfigMap
metadata:
  name: custom-headers
  namespace: ingress-nginx
  labels:
    medinovai.com/config-type: security-headers
data:
  # HIPAA/Healthcare Security Headers
  X-Frame-Options: "DENY"
  X-Content-Type-Options: "nosniff"
  X-XSS-Protection: "1; mode=block"
  Referrer-Policy: "strict-origin-when-cross-origin"
  Content-Security-Policy: "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self' data:; connect-src 'self' wss: https:; frame-ancestors 'none';"
  Permissions-Policy: "camera=(), microphone=(), geolocation=(self), payment=()"
  Strict-Transport-Security: "max-age=31536000; includeSubDomains; preload"
  Cache-Control: "no-store, no-cache, must-revalidate, proxy-revalidate"
  Pragma: "no-cache"
  X-Request-Id: "$req_id"
---
# Rate Limiting Configuration
apiVersion: v1
kind: ConfigMap
metadata:
  name: rate-limit-config
  namespace: ingress-nginx
  labels:
    medinovai.com/config-type: rate-limiting
data:
  # Global rate limits
  global-rate-limit: "100r/s"
  global-rate-limit-key: "$remote_addr"
  
  # API rate limits
  api-rate-limit: "30r/s"
  api-burst: "50"
  
  # Login rate limits (brute force protection)
  login-rate-limit: "5r/m"
  login-burst: "10"
---
# LIS Platform Ingress
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: lis-platform-ingress
  namespace: lis-platform
  labels:
    app.kubernetes.io/name: lis-platform
  annotations:
    kubernetes.io/ingress.class: nginx
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"
    nginx.ingress.kubernetes.io/rate-limit: "100"
    nginx.ingress.kubernetes.io/rate-limit-connections: "50"
    nginx.ingress.kubernetes.io/rate-limit-rps: "50"
    nginx.ingress.kubernetes.io/rate-limit-burst-multiplier: "5"
    # CORS configuration
    nginx.ingress.kubernetes.io/enable-cors: "true"
    nginx.ingress.kubernetes.io/cors-allow-origin: "https://lis.medinovai.com"
    nginx.ingress.kubernetes.io/cors-allow-methods: "GET, POST, PUT, DELETE, OPTIONS"
    nginx.ingress.kubernetes.io/cors-allow-headers: "DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization,X-Request-ID"
    nginx.ingress.kubernetes.io/cors-allow-credentials: "true"
    # Session affinity for WebSocket connections
    nginx.ingress.kubernetes.io/affinity: "cookie"
    nginx.ingress.kubernetes.io/session-cookie-name: "LISSERVERID"
    nginx.ingress.kubernetes.io/session-cookie-max-age: "3600"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - lis.medinovai.com
        - api.lis.medinovai.com
      secretName: lis-platform-tls
  rules:
    - host: lis.medinovai.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: lis-web
                port:
                  number: 80
    - host: api.lis.medinovai.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: lis-api
                port:
                  number: 80
---
# CTMS Ingress
