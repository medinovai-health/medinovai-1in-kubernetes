# ZTA Audit Log Configuration
# Auto-generated by Phase 2 Quality Uplift [build:20260413.1700.001]
# Zero Trust Architecture — Audit Trail Wiring

apiVersion: medinovai.io/v1
kind: ZTAAuditConfig
metadata:
  name: medinovai-1in-kubernetes-audit
  namespace: medinovai-security
  labels:
    repo: medinovai-1in-kubernetes
    build: "20260413.1700.001"
spec:
  # Audit log ingestion
  ingestTo:
    service: medinovai-1sc-audit-trail
    endpoint: https://audit.medinovai.internal/ingest
    format: structured-json

  # Events to audit
  events:
    - type: access
      level: INFO
    - type: mutation
      level: WARN
    - type: auth-failure
      level: ERROR
    - type: phi-access
      level: CRITICAL

  # PHI protection
  phi:
    maskInLogs: true
    maskFields:
      - patient_id
      - ssn
      - dob
      - mrn
      - email
      - phone

  # Retention
  retention:
    days: 2555  # 7 years for HIPAA compliance
    immutable: true
