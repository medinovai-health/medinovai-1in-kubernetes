# MedinovAI Kubernetes Deployment Template
# Healthcare-compliant microservice deployment with security hardening

---
# Namespace for MedinovAI services
apiVersion: v1
kind: Namespace
metadata:
  name: medinovai
  labels:
    istio-injection: enabled
    pod-security.kubernetes.io/enforce: restricted
    pod-security.kubernetes.io/audit: restricted
    pod-security.kubernetes.io/warn: restricted
    purpose: healthcare
    compliance: hipaa

---
# ConfigMap for service configuration
apiVersion: v1
kind: ConfigMap
metadata:
  name: [SERVICE_NAME]-config
  namespace: medinovai
  labels:
    app: [SERVICE_NAME]
    component: config
data:
  config.yaml: |
    service:
      name: [SERVICE_NAME]
      version: "2.0.0"
      port: [PORT]
    
    database:
      host: postgresql.medinovai.svc.cluster.local
      port: 5432
      name: medinovai
      ssl_mode: require
      pool_size: 20
      max_overflow: 30
    
    redis:
      host: redis.medinovai.svc.cluster.local
      port: 6379
      db: 0
      ssl: true
    
    ollama:
      base_url: http://ollama.medinovai.svc.cluster.local:11434
      default_model: qwen2.5:32b
      timeout: 30
      max_retries: 3
    
    security:
      jwt_algorithm: HS256
      access_token_expire_minutes: 30
      cors_origins:
        - "https://medinovai.local"
        - "https://*.medinovai.local"
    
    logging:
      level: INFO
      format: json
      audit_enabled: true
    
    monitoring:
      prometheus_enabled: true
      metrics_port: 9090
      health_check_interval: 30

---
# Secret for sensitive configuration
apiVersion: v1
kind: Secret
metadata:
  name: [SERVICE_NAME]-secret
  namespace: medinovai
  labels:
    app: [SERVICE_NAME]
    component: secret
type: Opaque
data:
  # Base64 encoded values - replace with actual values
  database-username: cG9zdGdyZXM=  # postgres
  database-password: bWVkaW5vdmFpMTIz  # medinovai123
  jwt-secret-key: eW91ci1zZWNyZXQta2V5LWhlcmU=  # your-secret-key-here
  redis-password: cmVkaXNwYXNzd29yZA==  # redispassword
  encryption-key: ZW5jcnlwdGlvbi1rZXktZm9yLXBoaQ==  # encryption-key-for-phi

---
# ServiceAccount with minimal permissions
apiVersion: v1
kind: ServiceAccount
metadata:
  name: [SERVICE_NAME]-sa
  namespace: medinovai
  labels:
    app: [SERVICE_NAME]
    component: serviceaccount
automountServiceAccountToken: false

---
# Role for service-specific permissions
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  namespace: medinovai
  name: [SERVICE_NAME]-role
  labels:
    app: [SERVICE_NAME]
    component: rbac
rules:
- apiGroups: [""]
  resources: ["configmaps", "secrets"]
  verbs: ["get", "list"]
- apiGroups: [""]
  resources: ["pods"]
  verbs: ["get", "list"]

---
# RoleBinding for service account
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: [SERVICE_NAME]-rolebinding
  namespace: medinovai
  labels:
    app: [SERVICE_NAME]
    component: rbac
subjects:
- kind: ServiceAccount
  name: [SERVICE_NAME]-sa
  namespace: medinovai
roleRef:
  kind: Role
  name: [SERVICE_NAME]-role
  apiGroup: rbac.authorization.k8s.io

---
# PersistentVolumeClaim for data storage (if needed)
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: [SERVICE_NAME]-data
  namespace: medinovai
  labels:
    app: [SERVICE_NAME]
    component: storage
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
  storageClassName: ""

---
# Deployment for the service
apiVersion: apps/v1
kind: Deployment
metadata:
  name: [SERVICE_NAME]
  namespace: medinovai
  labels:
    app: [SERVICE_NAME]
    version: v1
    component: application
spec:
  replicas: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 1
  selector:
    matchLabels:
      app: [SERVICE_NAME]
      version: v1
  template:
    metadata:
      labels:
        app: [SERVICE_NAME]
        version: v1
        component: application
      annotations:
        sidecar.istio.io/inject: "true"
        prometheus.io/scrape: "true"
        prometheus.io/port: "9090"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: [SERVICE_NAME]-sa
      automountServiceAccountToken: false
      
      # Security Context
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 2000
        fsGroup: 2000
        seccompProfile:
          type: RuntimeDefault
      
      # Init Container for database migrations (optional)
      initContainers:
      - name: db-migrate
        image: python:3.11-slim
        command: ["python", "-c", "print('Database migration placeholder')"]
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop: ["ALL"]
          seccompProfile:
            type: RuntimeDefault
        resources:
          requests:
            memory: "64Mi"
            cpu: "50m"
          limits:
            memory: "128Mi"
            cpu: "100m"
      
      containers:
      - name: [SERVICE_NAME]
        image: medinovai/[SERVICE_NAME]:2.0.0
        imagePullPolicy: Always
        
        ports:
        - containerPort: [PORT]
          name: http
          protocol: TCP
        - containerPort: 9090
          name: metrics
          protocol: TCP
        
        # Security Context
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop: ["ALL"]
          seccompProfile:
            type: RuntimeDefault
          readOnlyRootFilesystem: true
        
        # Environment Variables
        env:
        - name: SERVICE_NAME
          value: "[SERVICE_NAME]"
        - name: SERVICE_VERSION
          value: "2.0.0"
        - name: SERVICE_PORT
          value: "[PORT]"
        
        # Database Configuration
        - name: DATABASE_URL
          value: "postgresql://$(DATABASE_USERNAME):$(DATABASE_PASSWORD)@postgresql.medinovai.svc.cluster.local:5432/medinovai"
        - name: DATABASE_USERNAME
          valueFrom:
            secretKeyRef:
              name: [SERVICE_NAME]-secret
              key: database-username
        - name: DATABASE_PASSWORD
          valueFrom:
            secretKeyRef:
              name: [SERVICE_NAME]-secret
              key: database-password
        
        # Redis Configuration
        - name: REDIS_URL
          value: "redis://:$(REDIS_PASSWORD)@redis.medinovai.svc.cluster.local:6379/0"
        - name: REDIS_PASSWORD
          valueFrom:
            secretKeyRef:
              name: [SERVICE_NAME]-secret
              key: redis-password
        
        # AI Configuration
        - name: OLLAMA_BASE_URL
          value: "http://ollama.medinovai.svc.cluster.local:11434"
        
        # Security Configuration
        - name: JWT_SECRET_KEY
          valueFrom:
            secretKeyRef:
              name: [SERVICE_NAME]-secret
              key: jwt-secret-key
        - name: ENCRYPTION_KEY
          valueFrom:
            secretKeyRef:
              name: [SERVICE_NAME]-secret
              key: encryption-key
        
        # Resource Limits
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
            ephemeral-storage: "1Gi"
          limits:
            memory: "512Mi"
            cpu: "500m"
            ephemeral-storage: "2Gi"
        
        # Health Checks
        livenessProbe:
          httpGet:
            path: /health
            port: [PORT]
            scheme: HTTP
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          successThreshold: 1
          failureThreshold: 3
        
        readinessProbe:
          httpGet:
            path: /ready
            port: [PORT]
            scheme: HTTP
          initialDelaySeconds: 5
          periodSeconds: 5
          timeoutSeconds: 3
          successThreshold: 1
          failureThreshold: 3
        
        # Startup Probe (for slow-starting applications)
        startupProbe:
          httpGet:
            path: /health
            port: [PORT]
            scheme: HTTP
          initialDelaySeconds: 10
          periodSeconds: 10
          timeoutSeconds: 5
          successThreshold: 1
          failureThreshold: 30
        
        # Volume Mounts
        volumeMounts:
        - name: config
          mountPath: /app/config
          readOnly: true
        - name: tmp
          mountPath: /tmp
        - name: cache
          mountPath: /app/cache
        - name: data
          mountPath: /app/data
          readOnly: false
      
      # Volumes
      volumes:
      - name: config
        configMap:
          name: [SERVICE_NAME]-config
      - name: tmp
        emptyDir:
          sizeLimit: 1Gi
      - name: cache
        emptyDir:
          sizeLimit: 1Gi
      - name: data
        persistentVolumeClaim:
          claimName: [SERVICE_NAME]-data
      
      # Pod Disruption Budget
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchExpressions:
                - key: app
                  operator: In
                  values:
                  - [SERVICE_NAME]
              topologyKey: kubernetes.io/hostname

---
# Service for the deployment
apiVersion: v1
kind: Service
metadata:
  name: [SERVICE_NAME]
  namespace: medinovai
  labels:
    app: [SERVICE_NAME]
    component: service
  annotations:
    prometheus.io/scrape: "true"
    prometheus.io/port: "9090"
    prometheus.io/path: "/metrics"
spec:
  type: ClusterIP
  selector:
    app: [SERVICE_NAME]
  ports:
  - name: http
    port: 80
    targetPort: [PORT]
    protocol: TCP
  - name: metrics
    port: 9090
    targetPort: 9090
    protocol: TCP

---
# HorizontalPodAutoscaler for automatic scaling
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: [SERVICE_NAME]-hpa
  namespace: medinovai
  labels:
    app: [SERVICE_NAME]
    component: autoscaling
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: [SERVICE_NAME]
  minReplicas: 3
  maxReplicas: 10
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
      - type: Percent
        value: 50
        periodSeconds: 60
    scaleUp:
      stabilizationWindowSeconds: 60
      policies:
      - type: Percent
        value: 100
        periodSeconds: 15

---
# PodDisruptionBudget for high availability
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: [SERVICE_NAME]-pdb
  namespace: medinovai
  labels:
    app: [SERVICE_NAME]
    component: availability
spec:
  minAvailable: 2
  selector:
    matchLabels:
      app: [SERVICE_NAME]

---
# NetworkPolicy for secure communication
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: [SERVICE_NAME]-netpol
  namespace: medinovai
  labels:
    app: [SERVICE_NAME]
    component: security
spec:
  podSelector:
    matchLabels:
      app: [SERVICE_NAME]
  policyTypes:
  - Ingress
  - Egress
  ingress:
  - from:
    - namespaceSelector:
        matchLabels:
          name: medinovai
    - namespaceSelector:
        matchLabels:
          name: istio-system
    ports:
    - protocol: TCP
      port: [PORT]
    - protocol: TCP
      port: 9090
  egress:
  - to:
    - namespaceSelector:
        matchLabels:
          name: medinovai
    ports:
    - protocol: TCP
      port: 5432  # PostgreSQL
    - protocol: TCP
      port: 6379  # Redis
    - protocol: TCP
      port: 11434 # Ollama
  - to: []
    ports:
    - protocol: UDP
      port: 53    # DNS
    - protocol: TCP
      port: 53    # DNS

---
# ServiceMonitor for Prometheus monitoring
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: [SERVICE_NAME]
  namespace: medinovai
  labels:
    app: [SERVICE_NAME]
    component: monitoring
spec:
  selector:
    matchLabels:
      app: [SERVICE_NAME]
  endpoints:
  - port: metrics
    path: /metrics
    interval: 30s
    scrapeTimeout: 10s

---
# Istio VirtualService for traffic management
apiVersion: networking.istio.io/v1beta1
kind: VirtualService
metadata:
  name: [SERVICE_NAME]
  namespace: medinovai
  labels:
    app: [SERVICE_NAME]
    component: istio
spec:
  hosts:
  - [SERVICE_NAME].medinovai.local
  gateways:
  - medinovai-gateway
  http:
  - match:
    - uri:
        prefix: /
    route:
    - destination:
        host: [SERVICE_NAME].medinovai.svc.cluster.local
        port:
          number: 80
    timeout: 30s
    retries:
      attempts: 3
      perTryTimeout: 10s

---
# Istio DestinationRule for load balancing
apiVersion: networking.istio.io/v1beta1
kind: DestinationRule
metadata:
  name: [SERVICE_NAME]
  namespace: medinovai
  labels:
    app: [SERVICE_NAME]
    component: istio
spec:
  host: [SERVICE_NAME].medinovai.svc.cluster.local
  trafficPolicy:
    loadBalancer:
      simple: LEAST_CONN
    connectionPool:
      tcp:
        maxConnections: 100
      http:
        http1MaxPendingRequests: 50
        maxRequestsPerConnection: 10
    outlierDetection:
      consecutive5xxErrors: 3
      interval: 30s
      baseEjectionTime: 30s
      maxEjectionPercent: 50
