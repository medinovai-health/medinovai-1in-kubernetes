# MedinovAI API Gateway Kubernetes Deployment
# Production-ready deployment with Istio integration

---
# Namespace for MedinovAI services
apiVersion: v1
kind: Namespace
metadata:
  name: medinovai
  labels:
    istio-injection: enabled
    pod-security.kubernetes.io/enforce: restricted
    pod-security.kubernetes.io/audit: restricted
    pod-security.kubernetes.io/warn: restricted

---
# ConfigMap for API Gateway configuration
apiVersion: v1
kind: ConfigMap
metadata:
  name: medinovai-api-config
  namespace: medinovai
data:
  config.yaml: |
    database:
      host: postgresql.medinovai.svc.cluster.local
      port: 5432
      name: medinovai
      ssl_mode: require
    redis:
      host: redis.medinovai.svc.cluster.local
      port: 6379
    ollama:
      base_url: http://ollama.medinovai.svc.cluster.local:11434
    security:
      jwt_secret: medinovai-jwt-secret-key
      cors_origins: ["https://medinovai.local", "https://*.medinovai.local"]
    logging:
      level: INFO
      format: json

---
# Secret for database credentials
apiVersion: v1
kind: Secret
metadata:
  name: medinovai-db-secret
  namespace: medinovai
type: Opaque
data:
  username: cG9zdGdyZXM=  # postgres
  password: bWVkaW5vdmFpMTIz  # medinovai123

---
# Deployment for API Gateway
apiVersion: apps/v1
kind: Deployment
metadata:
  name: medinovai-api-gateway
  namespace: medinovai
  labels:
    app: medinovai-api-gateway
    version: v1
spec:
  replicas: 3
  selector:
    matchLabels:
      app: medinovai-api-gateway
  template:
    metadata:
      labels:
        app: medinovai-api-gateway
        version: v1
      annotations:
        sidecar.istio.io/inject: "false"
    spec:
      serviceAccountName: medinovai-admin
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 2000
      containers:
      - name: api-gateway
        image: python:3.11-slim
        ports:
        - containerPort: 8080
          name: http
        - containerPort: 9090
          name: metrics
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL
          seccompProfile:
            type: RuntimeDefault
        env:
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: medinovai-db-secret
              key: username
        - name: DATABASE_PASSWORD
          valueFrom:
            secretKeyRef:
              name: medinovai-db-secret
              key: password
        - name: REDIS_URL
          value: "redis://redis.medinovai.svc.cluster.local:6379"
        - name: OLLAMA_BASE_URL
          value: "http://ollama.medinovai.svc.cluster.local:11434"
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /ready
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 5
        volumeMounts:
        - name: config
          mountPath: /app/config
        - name: app-code
          mountPath: /app
        command: ["/bin/bash"]
        args: ["-c", "python -c 'import sys; print(sys.version)' && python /app/main.py"]
      volumes:
      - name: config
        configMap:
          name: medinovai-api-config
      - name: app-code
        configMap:
          name: medinovai-api-code
      # initContainers:
      # - name: wait-for-db
      #   image: postgres:15-alpine
      #   securityContext:
      #     allowPrivilegeEscalation: false
      #     capabilities:
      #       drop:
      #       - ALL
      #     seccompProfile:
      #       type: RuntimeDefault
      #   command: ['sh', '-c', 'until pg_isready -h postgresql.medinovai.svc.cluster.local -p 5432; do echo waiting for database; sleep 2; done;']

---
# Service for API Gateway
apiVersion: v1
kind: Service
metadata:
  name: medinovai-api-gateway
  namespace: medinovai
  labels:
    app: medinovai-api-gateway
spec:
  selector:
    app: medinovai-api-gateway
  ports:
  - name: http
    port: 8080
    targetPort: 8080
    protocol: TCP
  - name: metrics
    port: 9090
    targetPort: 9090
    protocol: TCP
  type: ClusterIP

---
# ConfigMap for API Gateway code
apiVersion: v1
kind: ConfigMap
metadata:
  name: medinovai-api-code
  namespace: medinovai
data:
  main.py: |
    import http.server
    import socketserver
    import json
    import os
    from urllib.parse import urlparse, parse_qs
    
    class MedinovAIHandler(http.server.BaseHTTPRequestHandler):
        def do_GET(self):
            parsed_path = urlparse(self.path)
            
            if parsed_path.path == '/health':
                self.send_response(200)
                self.send_header('Content-type', 'application/json')
                self.end_headers()
                response = {"status": "healthy", "service": "medinovai-api-gateway"}
                self.wfile.write(json.dumps(response).encode())
                
            elif parsed_path.path == '/ready':
                self.send_response(200)
                self.send_header('Content-type', 'application/json')
                self.end_headers()
                response = {"status": "ready", "service": "medinovai-api-gateway"}
                self.wfile.write(json.dumps(response).encode())
                
            elif parsed_path.path == '/metrics':
                self.send_response(200)
                self.send_header('Content-type', 'application/json')
                self.end_headers()
                response = {
                    "requests_total": 0,
                    "requests_duration_seconds": 0.0,
                    "active_connections": 0
                }
                self.wfile.write(json.dumps(response).encode())
                
            elif parsed_path.path == '/api/v1/patients':
                self.send_response(200)
                self.send_header('Content-type', 'application/json')
                self.end_headers()
                response = {"patients": [], "total": 0}
                self.wfile.write(json.dumps(response).encode())
                
            elif parsed_path.path == '/api/v1/fhir/metadata':
                self.send_response(200)
                self.send_header('Content-type', 'application/json')
                self.end_headers()
                response = {
                    "resourceType": "CapabilityStatement",
                    "status": "active",
                    "date": "2025-09-26",
                    "publisher": "MedinovAI",
                    "kind": "instance",
                    "software": {
                        "name": "MedinovAI FHIR Server",
                        "version": "1.0.0"
                    }
                }
                self.wfile.write(json.dumps(response).encode())
                
            else:
                self.send_response(404)
                self.send_header('Content-type', 'application/json')
                self.end_headers()
                response = {"error": "Not found", "path": parsed_path.path}
                self.wfile.write(json.dumps(response).encode())
        
        def do_POST(self):
            parsed_path = urlparse(self.path)
            
            if parsed_path.path == '/api/v1/patients':
                self.send_response(201)
                self.send_header('Content-type', 'application/json')
                self.end_headers()
                response = {"message": "Patient created", "id": "12345"}
                self.wfile.write(json.dumps(response).encode())
                
            elif parsed_path.path == '/api/v1/ai/query':
                self.send_response(200)
                self.send_header('Content-type', 'application/json')
                self.end_headers()
                response = {"response": "AI service not available", "model": "medinovai-emergency"}
                self.wfile.write(json.dumps(response).encode())
                
            else:
                self.send_response(404)
                self.send_header('Content-type', 'application/json')
                self.end_headers()
                response = {"error": "Not found", "path": parsed_path.path}
                self.wfile.write(json.dumps(response).encode())
        
        def log_message(self, format, *args):
            # Suppress default logging
            pass
    
    if __name__ == "__main__":
        PORT = 8080
        with socketserver.TCPServer(("", PORT), MedinovAIHandler) as httpd:
            print(f"MedinovAI API Gateway running on port {PORT}")
            httpd.serve_forever()

---
# Horizontal Pod Autoscaler
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: medinovai-api-gateway-hpa
  namespace: medinovai
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: medinovai-api-gateway
  minReplicas: 3
  maxReplicas: 10
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80

---
# Network Policy for API Gateway
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: medinovai-api-gateway-netpol
  namespace: medinovai
spec:
  podSelector:
    matchLabels:
      app: medinovai-api-gateway
  policyTypes:
  - Ingress
  - Egress
  ingress:
  - from:
    - namespaceSelector:
        matchLabels:
          name: istio-system
    ports:
    - protocol: TCP
      port: 8080
    - protocol: TCP
      port: 9090
  egress:
  - to: []
    ports:
    - protocol: TCP
      port: 5432  # PostgreSQL
    - protocol: TCP
      port: 6379  # Redis
    - protocol: TCP
      port: 11434 # Ollama
    - protocol: TCP
      port: 80    # HTTP
    - protocol: TCP
      port: 443   # HTTPS
