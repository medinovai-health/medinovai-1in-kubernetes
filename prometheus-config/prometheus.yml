global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: 'medinovai-infrastructure'
    environment: 'production'

# AlertManager configuration
alerting:
  alertmanagers:
    - static_configs:
        - targets:
          - 'medinovai-alertmanager-tls:9093'

# Alert rule files
rule_files:
  - '/etc/prometheus/alerts/*.yml'

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
  
  - job_name: 'alertmanager'
    static_configs:
      - targets: ['medinovai-alertmanager-tls:9093']
