# HashiCorp Vault Secret Definitions for MedinovAI Infrastructure
# All secrets are stored in Vault and injected at deployment time

# Vault Path Structure:
# secret/medinovai/infrastructure/{service}/{secret}
# secret/medinovai/shared/{secret}

apiVersion: v1
kind: Secret
metadata:
  name: vault-auth
  namespace: medinovai-vault
type: Opaque
stringData:
  # Vault server address
  VAULT_ADDR: "http://vault.medinovai-vault:8200"
  # Service account for Kubernetes auth
  VAULT_K8S_AUTH_PATH: "auth/kubernetes"
  VAULT_ROLE: "medinovai-infrastructure"

---
# External Secrets Operator - SecretStore
apiVersion: external-secrets.io/v1beta1
kind: SecretStore
metadata:
  name: vault-backend
  namespace: medinovai-services
spec:
  provider:
    vault:
      server: "http://vault.medinovai-vault:8200"
      path: "secret"
      version: "v2"
      auth:
        kubernetes:
          mountPath: "kubernetes"
          role: "medinovai-infrastructure"
          serviceAccountRef:
            name: "medinovai-vault-sa"

---
# Cluster-wide SecretStore
apiVersion: external-secrets.io/v1beta1
kind: ClusterSecretStore
metadata:
  name: vault-backend-cluster
spec:
  provider:
    vault:
      server: "http://vault.medinovai-vault:8200"
      path: "secret"
      version: "v2"
      auth:
        kubernetes:
          mountPath: "kubernetes"
          role: "medinovai-infrastructure"
          serviceAccountRef:
            name: "medinovai-vault-sa"
            namespace: medinovai-vault

---
# External Secret: Security Service
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: security-service-secrets
  namespace: medinovai-services
spec:
  refreshInterval: "1h"
  secretStoreRef:
    name: vault-backend
    kind: SecretStore
  target:
    name: security-service-secrets
    creationPolicy: Owner
  data:
    - secretKey: KEYCLOAK_ADMIN_PASSWORD
      remoteRef:
        key: secret/medinovai/infrastructure/security-service
        property: keycloak_admin_password
    - secretKey: KEYCLOAK_CLIENT_SECRET
      remoteRef:
        key: secret/medinovai/infrastructure/security-service
        property: keycloak_client_secret
    - secretKey: JWT_SECRET
      remoteRef:
        key: secret/medinovai/shared
        property: jwt_signing_key
    - secretKey: ENCRYPTION_KEY
      remoteRef:
        key: secret/medinovai/shared
        property: encryption_key
    - secretKey: SUPERADMIN_PASSWORD
      remoteRef:
        key: secret/medinovai/infrastructure/security-service
        property: superadmin_password

---
# External Secret: Grafana
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: grafana-secrets
  namespace: medinovai-monitoring
spec:
  refreshInterval: "1h"
  secretStoreRef:
    name: vault-backend-cluster
    kind: ClusterSecretStore
  target:
    name: grafana-admin-credentials
    creationPolicy: Owner
  data:
    - secretKey: admin-user
      remoteRef:
        key: secret/medinovai/infrastructure/monitoring/grafana
        property: admin_username
    - secretKey: admin-password
      remoteRef:
        key: secret/medinovai/infrastructure/monitoring/grafana
        property: admin_password
    - secretKey: secret-key
      remoteRef:
        key: secret/medinovai/infrastructure/monitoring/grafana
        property: secret_key

---
# External Secret: PostgreSQL
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: postgres-credentials
  namespace: medinovai-data
spec:
  refreshInterval: "1h"
  secretStoreRef:
    name: vault-backend-cluster
    kind: ClusterSecretStore
  target:
    name: postgres-credentials
    creationPolicy: Owner
  data:
    - secretKey: POSTGRES_USER
      remoteRef:
        key: secret/medinovai/infrastructure/database/postgres
        property: username
    - secretKey: POSTGRES_PASSWORD
      remoteRef:
        key: secret/medinovai/infrastructure/database/postgres
        property: password
    - secretKey: POSTGRES_DB
      remoteRef:
        key: secret/medinovai/infrastructure/database/postgres
        property: database

---
# External Secret: Redis
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: redis-credentials
  namespace: medinovai-data
spec:
  refreshInterval: "1h"
  secretStoreRef:
    name: vault-backend-cluster
    kind: ClusterSecretStore
  target:
    name: redis-credentials
    creationPolicy: Owner
  data:
    - secretKey: REDIS_PASSWORD
      remoteRef:
        key: secret/medinovai/infrastructure/cache/redis
        property: password

---
# External Secret: Elasticsearch
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: elasticsearch-credentials
  namespace: medinovai-monitoring
spec:
  refreshInterval: "1h"
  secretStoreRef:
    name: vault-backend-cluster
    kind: ClusterSecretStore
  target:
    name: elasticsearch-credentials
    creationPolicy: Owner
  data:
    - secretKey: ELASTIC_USERNAME
      remoteRef:
        key: secret/medinovai/infrastructure/monitoring/elasticsearch
        property: username
    - secretKey: ELASTIC_PASSWORD
      remoteRef:
        key: secret/medinovai/infrastructure/monitoring/elasticsearch
        property: password

---
# Vault Secret Template (for manual seeding)
apiVersion: v1
kind: ConfigMap
metadata:
  name: vault-seed-template
  namespace: medinovai-vault
data:
  seed-script.sh: |
    #!/bin/bash
    # Vault Secret Seeding Script
    # Run this after Vault is initialized
    
    vault kv put secret/medinovai/infrastructure/security-service \
      keycloak_admin_password="$(openssl rand -base64 32)" \
      keycloak_client_secret="$(openssl rand -base64 32)" \
      superadmin_password="$(openssl rand -base64 32)"
    
    vault kv put secret/medinovai/shared \
      jwt_signing_key="$(openssl rand -base64 64)" \
      encryption_key="$(openssl rand -base64 32)"
    
    vault kv put secret/medinovai/infrastructure/monitoring/grafana \
      admin_username="admin" \
      admin_password="$(openssl rand -base64 24)" \
      secret_key="$(openssl rand -base64 32)"
    
    vault kv put secret/medinovai/infrastructure/database/postgres \
      username="postgres" \
      password="$(openssl rand -base64 24)" \
      database="medinovai"
    
    vault kv put secret/medinovai/infrastructure/cache/redis \
      password="$(openssl rand -base64 24)"
    
    vault kv put secret/medinovai/infrastructure/monitoring/elasticsearch \
      username="elastic" \
      password="$(openssl rand -base64 24)"
