apiVersion: v1
kind: Service
metadata:
  name: medinovai-infrastructure
  labels:
    app: medinovai-infrastructure
spec:
  ports:
  - port: 80
    targetPort: 8080
    name: http
  selector:
    app: medinovai-infrastructure
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: medinovai-infrastructure
  labels:
    app: medinovai-infrastructure
spec:
  replicas: 2
  selector:
    matchLabels:
      app: medinovai-infrastructure
  template:
    metadata:
      labels:
        app: medinovai-infrastructure
    spec:
      containers:
      - name: medinovai-infrastructure
        image: myonsite-healthcare/medinovai-infrastructure:latest
        ports:
        - containerPort: 8080
        readinessProbe:
          httpGet:
            path: /health/ready
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 10
        livenessProbe:
          httpGet:
            path: /health/live
            port: 8080
          initialDelaySeconds: 15
          periodSeconds: 20
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: medinovai-infrastructure-hpa
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: medinovai-infrastructure
  minReplicas: 2
  maxReplicas: 5
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 80
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: medinovai-infrastructure-policy
spec:
  podSelector:
    matchLabels:
      app: medinovai-infrastructure
  policyTypes:
  - Ingress
  - Egress
  ingress:
  - from:
    - podSelector:
        matchLabels:
          app: medinovai-api-gateway
    ports:
    - protocol: TCP
      port: 8080
  egress:
  - to:
    - podSelector:
        matchLabels:
          app: medinovai-identity-service
    ports:
    - protocol: TCP
      port: 80
---
apiVersion: security.istio.io/v1beta1
kind: PeerAuthentication
metadata:
  name: medinovai-infrastructure-mtls
  namespace: default
spec:
  selector:
    matchLabels:
      app: medinovai-infrastructure
  mtls:
    mode: STRICT
