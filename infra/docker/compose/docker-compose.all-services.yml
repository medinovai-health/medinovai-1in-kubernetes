version: '3.8'
services:
  medinovai-deploy:
    image: medinovai-deploy:latest
    build:
      context: ${REPOS_PATH:-../../../../medinovai-all-repos}/medinovai-Deploy
      dockerfile: Dockerfile
    container_name: medinovai-deploy
    restart: unless-stopped
    environment:
      SERVICE_NAME: medinovai-deploy
      PORT: '8000'
      REGISTRY_URL: http://medinovai-registry:8000
      KEYCLOAK_URL: http://keycloak:8080
      KEYCLOAK_REALM: medinovai
      LOG_LEVEL: INFO
      PYTHONUNBUFFERED: '1'
    ports:
    - 8400:8000
    networks:
    - medinovai-net
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      keycloak:
        condition: service_healthy
      medinovai-registry:
        condition: service_healthy
    healthcheck:
      test:
      - CMD
      - python
      - -c
      - import urllib.request; urllib.request.urlopen('http://localhost:8000/health')
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
  medinovai-infrastructure:
    image: medinovai-infrastructure:latest
