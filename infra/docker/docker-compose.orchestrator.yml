# ─── MedinovAI Orchestrator Stack ─────────────────────────────────────────────
# Canonical production definition for the medinovai-orchestrator service.
# Source of truth: medinovai-Deploy (NOT worktrees or local dev directories).
#
# Usage:
#   ATLASOS_PATH=/path/to/medinovai-Atlas make orchestrator-start
#   make orchestrator-update   # pull latest + recreate
#   make orchestrator-rollback TAG=sha-abc123
#
# Volumes are NEVER deleted on update — only containers are recreated.
# Data safety: docker_backup.sh runs before any orchestrator-update.
# ─────────────────────────────────────────────────────────────────────────────

services:
  medinovai-orchestrator:
    build:
      context: ${ATLASOS_PATH:-/Users/mayanktrivedi/Github/medinovai-health/medinovai-Atlas}
      dockerfile: Dockerfile
    image: medinovai/orchestrator:${ORCHESTRATOR_TAG:-latest}
    container_name: medinovai-orchestrator
    hostname: orchestrator
    restart: unless-stopped

    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ${ATLASOS_PATH:-/Users/mayanktrivedi/Github/medinovai-health/medinovai-Atlas}:/workspace
      - ~/.ollama:/root/.ollama:ro
      - ~/.gitconfig:/root/.gitconfig:ro
      - ~/.ssh:/root/.ssh:ro
      - ${REPOS_PATH:-/Users/mayanktrivedi/Github}:/repos
      - orchestrator-data:/data

    environment:
      - PYTHONUNBUFFERED=1
      - OLLAMA_HOST=http://host.docker.internal:11434
      - GITHUB_TOKEN=${GITHUB_TOKEN:-}
      - GITHUB_ORG=myonsite-healthcare
      - DEPLOYMENT_ENV=orchestrator
      - AI_MODEL_PRIMARY=${AI_MODEL_PRIMARY:-deepseek-r1:70b}
      - AI_MODEL_FAST=${AI_MODEL_FAST:-qwen3:8b}
      - AI_MODEL_CODER=${AI_MODEL_CODER:-qwen3-coder:latest}
      - VECTOR_DB_PATH=/data/chromadb
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - REPO_BASE_PATH=/repos
      - REPO_ROOT=/workspace

    networks:
      - medinovai-orchestrator-network

    ports:
      - "8080:3000"
      - "8001:8001"
      - "8002:8002"

    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:3000/api/health || exit 0"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

    extra_hosts:
      - "host.docker.internal:host-gateway"

    labels:
      com.medinovai.service: orchestrator
      com.medinovai.managed-by: medinovai-Deploy
      com.medinovai.version: "${ORCHESTRATOR_TAG:-latest}"

  # ChromaDB vector database — persistent AI memory
  medinovai-chromadb:
    image: chromadb/chroma:latest
    container_name: medinovai-chromadb
    hostname: chromadb
    restart: unless-stopped

    volumes:
      - chromadb-data:/chroma/chroma

    environment:
      - IS_PERSISTENT=TRUE
      - ANONYMIZED_TELEMETRY=FALSE

    networks:
      - medinovai-orchestrator-network

    ports:
      - "8003:8000"

    healthcheck:
      disable: true

networks:
  medinovai-orchestrator-network:
    name: medinovai-orchestrator-network
    driver: bridge

volumes:
  orchestrator-data:
    name: medinovai-orchestrator-data
  chromadb-data:
    name: medinovai-chromadb-data
