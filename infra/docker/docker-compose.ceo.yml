# ─── AtlasOS CO-CEO Stack ────────────────────────────────────────────────────
# Full deployment for the AtlasOS CO-CEO Command Center
#
# FIXED PORT RANGE: 41000-41999 (see AtlasOS/config/PORT_REGISTRY.md)
# Zero-Trust: All secrets stored in Vault, never in .env
# Auth: Google OAuth + Keycloak OIDC (medinovai-security-service)
# Audit: Every action hash-chained in audit-chain service
#
# Usage:
#   ATLASOS_PATH=/path/to/AtlasOS ATLAS_COMMAND_PATH=/path/to/atlas-command \
#     docker compose -f infra/docker/docker-compose.ceo.yml up -d
#   make ceo-stack
# ─────────────────────────────────────────────────────────────────────────────

x-common-env: &common-env
  VAULT_ADDR: http://vault:8200
  VAULT_TOKEN: ${VAULT_DEV_ROOT_TOKEN_ID:-medinovai-dev-token}
  DATABASE_URL: postgresql://atlasos:atlasos-secure-change-me@postgres:5432/atlasos
  KEYCLOAK_URL: http://keycloak:8080
  KEYCLOAK_REALM: medinov-ai
  KEYCLOAK_AUDIENCE: medinovai-atlas
  AUTH_ENABLED: "false"
  ATLASOS_DEV_MODE: "true"

x-vault-env: &vault-env
  VAULT_ADDR: http://vault:8200
  VAULT_TOKEN: ${VAULT_DEV_ROOT_TOKEN_ID:-medinovai-dev-token}

# ─── Channel + AI credentials (passed from host .env or shell) ──────────────
x-channel-env: &channel-env
  ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
  OPENAI_API_KEY: ${OPENAI_API_KEY:-}
  TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
  TELEGRAM_WEBHOOK_URL: ${TELEGRAM_WEBHOOK_URL:-}
  TELEGRAM_WEBHOOK_SECRET: ${TELEGRAM_WEBHOOK_SECRET:-}
  TELEGRAM_WEBHOOK_PATH: ${TELEGRAM_WEBHOOK_PATH:-}
  WHATSAPP_PHONE_NUMBER_ID: ${WHATSAPP_PHONE_NUMBER_ID:-}
  WHATSAPP_ACCESS_TOKEN: ${WHATSAPP_ACCESS_TOKEN:-}
  WHATSAPP_OWNER_PHONE: ${WHATSAPP_OWNER_PHONE:-}
  WHATSAPP_RECIPIENT_PHONE: ${WHATSAPP_RECIPIENT_PHONE:-}
  WHATSAPP_WEBHOOK_VERIFY_TOKEN: ${WHATSAPP_WEBHOOK_VERIFY_TOKEN:-}
  MATTERMOST_URL: ${MATTERMOST_URL:-}
  MATTERMOST_TOKEN: ${MATTERMOST_TOKEN:-}
  MATTERMOST_WEBHOOK_URL: ${MATTERMOST_WEBHOOK_URL:-}
  HOOKS_TOKEN: ${HOOKS_TOKEN:-}

x-mcp-env: &mcp-env
  MCP_VTIGER_URL: http://mcp-vtiger:8080
  MCP_QUICKBOOKS_URL: http://mcp-quickbooks:8080
  MCP_GOOGLE_URL: http://mcp-google:8080
  MCP_LIS_URL: http://mcp-lis:8080
  MCP_MATTERMOST_URL: http://mcp-mattermost:8080
  MCP_TWILIO_URL: http://mcp-twilio:8080
  MCP_3CX_URL: http://mcp-3cx:8080
  MCP_GOOGLE_ADS_URL: http://mcp-google-ads:8080
  MCP_LINKEDIN_URL: http://mcp-linkedin:8080
  MCP_GA4_URL: http://mcp-google-analytics:8080
  MCP_PAGERDUTY_URL: http://mcp-pagerduty:8080
  MCP_LINEAR_URL: http://mcp-linear-jira:8080
  MCP_GOOGLE_TRENDS_URL: http://mcp-google-trends:8080
  MCP_GLASSDOOR_URL: http://mcp-glassdoor:8080
  MCP_CRUNCHBASE_URL: http://mcp-crunchbase:8080

x-restart: &restart
  restart: unless-stopped

x-network: &network
  networks:
    - ceo-network

x-hc: &hc
  interval: 30s
  timeout: 10s
  retries: 3
  start_period: 15s

services:

  # ═══════════════════════════════════════════════════════════════════════════
  # INFRASTRUCTURE
  # ═══════════════════════════════════════════════════════════════════════════

  postgres:
    image: pgvector/pgvector:pg16
    container_name: ceo-postgres
    ports:
      - "41200:5432"
    environment:
      POSTGRES_DB: atlas
      POSTGRES_USER: medinovai
      POSTGRES_HOST_AUTH_METHOD: trust
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ${ATLASOS_PATH:-../../repos/AtlasOS}/scripts/ceo-db-init.sql:/docker-entrypoint-initdb.d/01-ceo-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U medinovai -d atlas"]
      interval: 5s
      timeout: 5s
      retries: 5
    <<: [*restart, *network]

  atlasos-migrations:
    build:
      context: ${ATLASOS_PATH:-../../repos/AtlasOS}
      dockerfile: services/migrations/Dockerfile
    container_name: ceo-atlasos-migrations
    environment:
      DATABASE_URL: postgresql://atlasos:atlasos-secure-change-me@postgres:5432/atlasos
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"
    <<: *network

  vault:
    image: hashicorp/vault:1.15
    container_name: ceo-vault
    cap_add:
      - IPC_LOCK
    ports:
      - "41100:8200"
    environment:
      VAULT_DEV_ROOT_TOKEN_ID: ${VAULT_DEV_ROOT_TOKEN_ID:-medinovai-dev-token}
      VAULT_DEV_LISTEN_ADDRESS: "0.0.0.0:8200"
      VAULT_ADDR: "http://0.0.0.0:8200"
      VAULT_API_ADDR: "http://vault:8200"
    volumes:
      - vault-data:/vault/data
    healthcheck:
      test: ["CMD", "vault", "status"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    <<: [*restart, *network]

  vault-init:
    image: hashicorp/vault:1.15
    container_name: ceo-vault-init
    depends_on:
      vault:
        condition: service_healthy
    environment:
      VAULT_ADDR: "http://vault:8200"
      VAULT_TOKEN: ${VAULT_DEV_ROOT_TOKEN_ID:-medinovai-dev-token}
    entrypoint: /bin/sh
    command:
      - -c
      - |
        sleep 2
        vault secrets enable -path=medinovai-secrets kv-v2 2>/dev/null || true
        vault kv put medinovai-secrets/atlasos/config initialized=true created_at="$$(date -u +%Y-%m-%dT%H:%M:%SZ)"
        vault policy write atlasos-read - <<POLICY
        path "medinovai-secrets/data/atlasos/*" {
          capabilities = ["read", "list"]
        }
        path "medinovai-secrets/metadata/atlasos/*" {
          capabilities = ["read", "list"]
        }
        POLICY
        vault policy write atlasos-admin - <<POLICY
        path "medinovai-secrets/data/atlasos/*" {
          capabilities = ["create", "read", "update", "delete", "list"]
        }
        path "medinovai-secrets/metadata/atlasos/*" {
          capabilities = ["read", "list", "delete"]
        }
        POLICY
        echo "Vault initialized with AtlasOS secrets engine and policies"
    restart: "no"
    <<: *network

  redis:
    image: redis:7-alpine
    container_name: ceo-redis
    ports:
      - "41300:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    <<: [*restart, *network]

  chromadb:
    image: chromadb/chroma:latest
    container_name: ceo-chromadb
    ports:
      - "41400:8000"
    volumes:
      - chromadb-data:/chroma/chroma
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/localhost/8000'"]
      interval: 10s
      timeout: 5s
      retries: 5
    <<: [*restart, *network]

  # ─── Keycloak SSO ──────────────────────────────────────────────────────
  keycloak:
    image: quay.io/keycloak/keycloak:26.1
    container_name: ceo-keycloak
    command: start-dev --import-realm
    ports:
      - "41080:8080"
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: MedinovAI-Admin-2026!
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/atlas
      KC_DB_USERNAME: medinovai
      KC_DB_PASSWORD: ""
      KC_HOSTNAME_STRICT: "false"
      KC_HTTP_ENABLED: "true"
      KC_PROXY_HEADERS: xforwarded
      KC_HEALTH_ENABLED: "true"
    volumes:
      - ${ATLASOS_PATH:-../../repos/AtlasOS}/config/keycloak:/opt/keycloak/data/import:ro
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/localhost/8080 && echo -e 'GET /realms/master HTTP/1.1\\r\\nHost: localhost\\r\\nConnection: close\\r\\n\\r\\n' >&3 && cat <&3 | grep -q 'public_key'"]
      interval: 10s
      timeout: 10s
      retries: 15
      start_period: 45s
    <<: [*restart, *network]

  keycloak-init:
    image: python:3.12-slim
    container_name: ceo-keycloak-init
    depends_on:
      keycloak:
        condition: service_healthy
    environment:
      KEYCLOAK_URL: http://keycloak:8080
      KEYCLOAK_REALM: medinov-ai
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: MedinovAI-Admin-2026!
      ATLAS_ROOT: /app
    volumes:
      - ${ATLASOS_PATH:-../../repos/AtlasOS}/lib:/app/lib:ro
      - ${ATLASOS_PATH:-../../repos/AtlasOS}/config:/app/config:ro
      - ${ATLASOS_PATH:-../../repos/AtlasOS}/scripts:/app/scripts:ro
    entrypoint: /bin/sh
    command:
      - -c
      - |
        pip install -q requests pyyaml 2>/dev/null
        python3 /app/scripts/keycloak_bootstrap.py
    restart: "no"
    <<: *network

  stirling-pdf:
    image: docker.stirlingpdf.com/stirlingtools/stirling-pdf:latest
    container_name: ceo-stirling-pdf
    ports:
      - "41030:8080"
    environment:
      DOCKER_ENABLE_SECURITY: "false"
      INSTALL_BOOK_AND_ADVANCED_HTML_OPS: "true"
      LANGS: en_US
    volumes:
      - stirling-data:/customFiles
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/v1/info/status"]
      <<: *hc
      start_period: 30s
    <<: [*restart, *network]

  # ═══════════════════════════════════════════════════════════════════════════
  # CEO COMMAND CENTER (atlas-command + gateway)
  # ═══════════════════════════════════════════════════════════════════════════

  atlas-command:
    build:
      context: ${ATLAS_COMMAND_PATH:-../../repos/atlas-command}
      dockerfile: Dockerfile
    container_name: ceo-atlas-command
    ports:
      - "41000:3000"
    environment:
      NODE_ENV: production
      NEXTAUTH_URL: http://localhost:41000
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET:-atlas-ceo-secret-change-in-production}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      KEYCLOAK_URL: ${KEYCLOAK_URL:-http://host.docker.internal:41080}
      KEYCLOAK_REALM: ${KEYCLOAK_REALM:-medinov-ai}
      KEYCLOAK_CLIENT_ID: ${KEYCLOAK_CLIENT_ID:-atlas-command}
      KEYCLOAK_CLIENT_SECRET: ${KEYCLOAK_CLIENT_SECRET:-}
      ATLASOS_GATEWAY_URL: http://atlas-gateway:8080
      ATLASOS_TOKEN: ${ATLASOS_TOKEN:-}
      VAULT_ADDR: http://vault:8200
      VAULT_TOKEN: ${VAULT_DEV_ROOT_TOKEN_ID:-medinovai-dev-token}
      AUDIT_SERVICE_URL: http://audit-chain:8084
      <<: *mcp-env
    depends_on:
      vault:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1:3000 || exit 1"]
      <<: *hc
    <<: [*restart, *network]
    extra_hosts:
      - "host.docker.internal:host-gateway"

  atlas-gateway:
    build:
      context: ${ATLASOS_PATH:-../../repos/AtlasOS}
      dockerfile: Dockerfile
    container_name: ceo-atlas-gateway
    user: "${ATLAS_GATEWAY_UID:-0}:${ATLAS_GATEWAY_GID:-0}"
    ports:
      - "41010:8080"   # UI / API access
      - "18789:8080"   # Canonical public gateway endpoint (WhatsApp/Telegram)
    environment:
      PORT: "8080"
      NODE_ENV: production
      ATLASOS_CONFIG_PATH: /data/.atlas/atlasos.json
      ATLASOS_STATE_DIR: /data/.atlas
      # Local-first LLM fleet (Mac Studio GPU gateway on host)
      AIFACTORY_ENDPOINT: ${AIFACTORY_ENDPOINT:-http://host.docker.internal:8300}
      OLLAMA_HOST: http://host.docker.internal:11434
      OLLAMA_API_KEY: "ollama-local"
      CHROMADB_URL: http://chromadb:8000
      # AtlasOS support services
      REDIS_URL: redis://redis:6379
      POSTGRES_URL: postgresql://medinovai@postgres:5432/atlas
      AUDIT_SERVICE_URL: http://audit-chain:8084
      BRIEFING_ENGINE_URL: http://briefing-engine:8086
      MEMORY_SERVICE_URL: http://memory-service:8201
      EVENT_BUS_URL: http://event-bus:8088
      # Credentials (from host .env or shell environment)
      <<: [*vault-env, *channel-env, *mcp-env]
    volumes:
      - ${HOME}/.atlas:/data/.atlas
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ${ATLASOS_PATH:-../../repos/AtlasOS}/scripts:/app/scripts:ro
      - ${ATLASOS_PATH:-../../repos/AtlasOS}/docs:/app/docs:ro
      - ${ATLASOS_PATH:-../../repos/AtlasOS}/packages/engine/docs/reference/templates:/app/docs/reference/templates:ro
      - ${ATLASOS_PATH:-../../repos/AtlasOS}/skills:/app/skills:ro
    depends_on:
      vault:
        condition: service_healthy
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      audit-chain:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      <<: *hc
      start_period: 60s
    <<: [*restart, *network]
    extra_hosts:
      - "host.docker.internal:host-gateway"

  # ─── AtlasOS UI (Chat + Deployment) ────────────────────────────────────
  atlas-ui:
    profiles:
      - ui
    build:
      context: ${ATLASOS_PATH:-../../repos/AtlasOS}/ui
      dockerfile: Dockerfile
      args:
        ATLAS_VERSION: ${ATLAS_VERSION:-1.3.0}
        ATLAS_GIT_SHA: ${ATLAS_GIT_SHA:-unknown}
        BUILD_TIME: ${BUILD_TIME:-unknown}
        NEXT_PUBLIC_KEYCLOAK_URL: http://localhost:41080
        NEXT_PUBLIC_KEYCLOAK_REALM: medinov-ai
        NEXT_PUBLIC_KEYCLOAK_CLIENT_ID: medinovai-atlas
        NEXT_PUBLIC_AUTH_ENABLED: "true"
        NEXT_PUBLIC_DEMO_MODE: "true"
    container_name: ceo-atlas-ui
    ports:
      - "41020:3737"
    environment:
      NODE_ENV: production
      PORT: "3737"
      NEXTAUTH_URL: http://localhost:41020
      AUTH_BRIDGE_URL: http://auth-bridge:8250
      AIFACTORY_ENDPOINT: ${AIFACTORY_ENDPOINT:-http://host.docker.internal:5000}
      AI_MODEL: ${AI_MODEL:-qwen2.5:14b}
      OLLAMA_HOST: http://host.docker.internal:11434
      CHROMADB_URL: http://chromadb:8000
      POSTGRES_URL: postgresql://medinovai@postgres:5432/atlas
      REDIS_URL: redis://redis:6379
      VAULT_ADDR: http://vault:8200
      AUDIT_SERVICE_URL: http://audit-chain:8084
      ATLAS_HOME: /data/atlas
      ATLASOS_GATEWAY_URL: http://atlas-gateway:8080
      OODA_BRAIN_URL: http://ooda-brain:8000
      SERVICE_REGISTRY_URL: http://service-registry:8002
      HEALTH_PROBE_URL: http://health-probe:8003
      FLEET_MONITOR_URL: http://fleet-monitor:8014
      SQUAD_MANAGER_URL: http://squad-manager:8001
    volumes:
      - atlas-data:/data
      - /var/run/docker.sock:/var/run/docker.sock:ro
    depends_on:
      vault:
        condition: service_healthy
      keycloak:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3737/api/health"]
      <<: *hc
    <<: [*restart, *network]
    extra_hosts:
      - "host.docker.internal:host-gateway"

  # ─── Auth Bridge ────────────────────────────────────────────────────────
  auth-bridge:
    build:
      context: ${ATLASOS_PATH:-../../repos/AtlasOS}/services/auth-bridge
      dockerfile: Dockerfile
    container_name: ceo-auth-bridge
    ports:
      - "41250:8250"
    environment:
      PORT: "8250"
      KEYCLOAK_URL: http://keycloak:8080
      KEYCLOAK_REALM: medinov-ai
      KEYCLOAK_CLIENT_ID: medinovai-atlas
      OIDC_DISCOVERY_URL: http://keycloak:8080/realms/medinov-ai/.well-known/openid-configuration
      OIDC_AUDIENCE: medinovai-atlas
      AUTH_SECRET: ${AUTH_SECRET:-ceo-auth-bridge-secret}
      EVENT_BUS_URL: http://event-bus:8088
      TENANCY_ENGINE_URL: http://tenancy-engine:8204
    volumes:
      - ${ATLASOS_PATH:-../../repos/AtlasOS}/lib:/app/lib:ro
      - ${ATLASOS_PATH:-../../repos/AtlasOS}/config:/app/config:ro
    depends_on:
      keycloak:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import urllib.request; urllib.request.urlopen('http://localhost:8250/health', timeout=5)\" 2>/dev/null || exit 1"]
      <<: *hc
    <<: [*restart, *network]
    extra_hosts:
      - "host.docker.internal:host-gateway"

  # ═══════════════════════════════════════════════════════════════════════════
  # CEO INTELLIGENCE SERVICES
  # ═══════════════════════════════════════════════════════════════════════════

  audit-chain:
    build:
      context: ${ATLASOS_PATH:-../../repos/AtlasOS}
      dockerfile: services/audit-chain/Dockerfile
    container_name: ceo-audit-chain
    ports:
      - "41500:8084"
    environment:
      <<: *common-env
      AUDIT_LOG_PATH: /data/audit/audit.jsonl
      FLASK_ENV: production
    volumes:
      - audit-data:/data/audit
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8084/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    <<: [*restart, *network]

  correlation-engine:
    build:
      context: ${ATLASOS_PATH:-../../repos/AtlasOS}
      dockerfile: services/correlation-engine/Dockerfile
    container_name: ceo-correlation-engine
    ports:
      - "41510:8085"
    environment:
      <<: [*vault-env, *mcp-env]
      AUDIT_SERVICE_URL: http://audit-chain:8084
      CORRELATION_INTERVAL_MIN: "${CORRELATION_INTERVAL_MIN:-15}"
    volumes:
      - correlation-data:/data/correlations
    depends_on:
      vault:
        condition: service_healthy
      audit-chain:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8085/health"]
      <<: *hc
    <<: [*restart, *network]

  briefing-engine:
    build:
      context: ${ATLASOS_PATH:-../../repos/AtlasOS}
      dockerfile: services/briefing-engine/Dockerfile
    container_name: ceo-briefing-engine
    ports:
      - "41520:8086"
    environment:
      <<: [*vault-env, *mcp-env]
      AUDIT_SERVICE_URL: http://audit-chain:8084
      CORRELATION_ENGINE_URL: http://correlation-engine:8085
      MORNING_BRIEFING_HOUR: "${MORNING_BRIEFING_HOUR:-7}"
      EOD_BRIEFING_HOUR: "${EOD_BRIEFING_HOUR:-18}"
    volumes:
      - briefing-data:/data/briefings
    depends_on:
      vault:
        condition: service_healthy
      audit-chain:
        condition: service_healthy
      correlation-engine:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8086/health"]
      <<: *hc
    <<: [*restart, *network]

  decision-tracker:
    build:
      context: ${ATLASOS_PATH:-../../repos/AtlasOS}
      dockerfile: services/decision-tracker/Dockerfile
    container_name: ceo-decision-tracker
    ports:
      - "41530:8087"
    environment:
      <<: *vault-env
      AUDIT_SERVICE_URL: http://audit-chain:8084
      CORRELATION_ENGINE_URL: http://correlation-engine:8085
    volumes:
      - decision-data:/data/decisions
    depends_on:
      vault:
        condition: service_healthy
      audit-chain:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8087/health"]
      <<: *hc
    <<: [*restart, *network]

  # ═══════════════════════════════════════════════════════════════════════════
  # MCP CONNECTORS — Core Business Integrations (ports 41601-41607)
  # ═══════════════════════════════════════════════════════════════════════════

  mcp-vtiger:
    build:
      context: ${ATLASOS_PATH:-../../repos/AtlasOS}/services/mcp-connectors
      dockerfile: Dockerfile
      args:
        CONNECTOR_NAME: vtiger
    container_name: ceo-mcp-vtiger
    ports:
      - "41601:8080"
    environment:
      PORT: "8080"
      <<: *vault-env
      VAULT_SECRET_PATH: medinovai-secrets/atlasos/vtiger
      AUDIT_SERVICE_URL: http://audit-chain:8084
      CONNECTOR_NAME: vtiger
    volumes:
      - ${ATLASOS_PATH:-../../repos/AtlasOS}/lib:/app/lib:ro
    depends_on:
      vault:
        condition: service_healthy
      audit-chain:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      <<: *hc
    <<: [*restart, *network]

  mcp-quickbooks:
    build:
      context: ${ATLASOS_PATH:-../../repos/AtlasOS}/services/mcp-connectors
      dockerfile: Dockerfile
      args:
        CONNECTOR_NAME: quickbooks
    container_name: ceo-mcp-quickbooks
    ports:
      - "41602:8080"
    environment:
      PORT: "8080"
      <<: *vault-env
      VAULT_SECRET_PATH: medinovai-secrets/atlasos/quickbooks
      AUDIT_SERVICE_URL: http://audit-chain:8084
      CONNECTOR_NAME: quickbooks
    volumes:
      - ${ATLASOS_PATH:-../../repos/AtlasOS}/lib:/app/lib:ro
    depends_on:
      vault:
        condition: service_healthy
      audit-chain:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      <<: *hc
    <<: [*restart, *network]

  mcp-google:
    build:
      context: ${ATLASOS_PATH:-../../repos/AtlasOS}/services/mcp-connectors
      dockerfile: Dockerfile
      args:
        CONNECTOR_NAME: google_workspace
    container_name: ceo-mcp-google
    ports:
      - "41603:8080"
    environment:
      PORT: "8080"
      <<: *vault-env
      VAULT_SECRET_PATH: medinovai-secrets/atlasos/google-workspace
      AUDIT_SERVICE_URL: http://audit-chain:8084
      CONNECTOR_NAME: google_workspace
    volumes:
      - ${ATLASOS_PATH:-../../repos/AtlasOS}/lib:/app/lib:ro
    depends_on:
      vault:
        condition: service_healthy
      audit-chain:
        condition: service_healthy
    healthcheck:
