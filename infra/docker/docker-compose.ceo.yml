# ─── AtlasOS CO-CEO Stack ────────────────────────────────────────────────────
# Full deployment for the AtlasOS CO-CEO Command Center
#
# FIXED PORT RANGE: 41000-41999 (see AtlasOS/config/PORT_REGISTRY.md)
# Zero-Trust: All secrets stored in Vault, never in .env
# Auth: Google OAuth + Keycloak OIDC (medinovai-security-service)
# Audit: Every action hash-chained in audit-chain service
#
# Usage:
#   ATLASOS_PATH=/path/to/AtlasOS ATLAS_COMMAND_PATH=/path/to/atlas-command \
#     docker compose -f infra/docker/docker-compose.ceo.yml up -d
#   make ceo-stack
# ─────────────────────────────────────────────────────────────────────────────

services:
  # ─── Secrets Management ──────────────────────────────────────────────────
  vault:
    image: hashicorp/vault:1.15
    container_name: ceo-vault
    cap_add:
      - IPC_LOCK
    ports:
      - "41100:8200"
    environment:
      VAULT_DEV_ROOT_TOKEN_ID: ${VAULT_DEV_ROOT_TOKEN_ID:-medinovai-dev-token}
      VAULT_DEV_LISTEN_ADDRESS: "0.0.0.0:8200"
      VAULT_ADDR: "http://0.0.0.0:8200"
      VAULT_API_ADDR: "http://vault:8200"
    volumes:
      - vault-data:/vault/data
    healthcheck:
      test: ["CMD", "vault", "status"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    networks:
      - ceo-network

  vault-init:
    image: hashicorp/vault:1.15
    container_name: ceo-vault-init
    depends_on:
      vault:
        condition: service_healthy
    environment:
      VAULT_ADDR: "http://vault:8200"
      VAULT_TOKEN: ${VAULT_DEV_ROOT_TOKEN_ID:-medinovai-dev-token}
    entrypoint: /bin/sh
    command:
      - -c
      - |
        sleep 2
        vault secrets enable -path=medinovai-secrets kv-v2 2>/dev/null || true
        vault kv put medinovai-secrets/atlasos/config initialized=true created_at="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
        vault policy write atlasos-read - <<POLICY
        path "medinovai-secrets/data/atlasos/*" {
          capabilities = ["read", "list"]
        }
        path "medinovai-secrets/metadata/atlasos/*" {
          capabilities = ["read", "list"]
        }
        POLICY
        vault policy write atlasos-admin - <<POLICY
        path "medinovai-secrets/data/atlasos/*" {
          capabilities = ["create", "read", "update", "delete", "list"]
        }
        path "medinovai-secrets/metadata/atlasos/*" {
          capabilities = ["read", "list", "delete"]
        }
        POLICY
        echo "Vault initialized with AtlasOS secrets engine and policies"
    networks:
      - ceo-network

  # ─── Infrastructure ──────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: ceo-postgres
    ports:
      - "41200:5432"
    environment:
      POSTGRES_DB: atlas
      POSTGRES_USER: medinovai
      POSTGRES_HOST_AUTH_METHOD: trust
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U medinovai -d atlas"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - ceo-network

  redis:
    image: redis:7-alpine
    container_name: ceo-redis
    ports:
      - "41300:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - ceo-network

  chromadb:
    image: chromadb/chroma:latest
    container_name: ceo-chromadb
    ports:
      - "41400:8000"
    volumes:
      - chromadb-data:/chroma/chroma
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/localhost/8000'"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - ceo-network

  # ─── AtlasOS CO-CEO Command Center UI ──────────────────────────────────
  atlas-command:
    build:
      context: ${ATLAS_COMMAND_PATH:-../../repos/atlas-command}
      dockerfile: Dockerfile
    container_name: ceo-atlas-command
    ports:
      - "41000:3000"
    environment:
      NODE_ENV: production
      NEXTAUTH_URL: http://localhost:41000
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET:-atlas-ceo-secret-change-in-production}
      # Google OAuth (direct)
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      # Keycloak OIDC (medinovai-security-service)
      KEYCLOAK_URL: ${KEYCLOAK_URL:-http://host.docker.internal:9080}
      KEYCLOAK_REALM: ${KEYCLOAK_REALM:-medinovai}
      KEYCLOAK_CLIENT_ID: ${KEYCLOAK_CLIENT_ID:-atlas-command}
      KEYCLOAK_CLIENT_SECRET: ${KEYCLOAK_CLIENT_SECRET:-}
      # Backend connections (internal Docker network)
      ATLASOS_GATEWAY_URL: http://atlas-gateway:18789
      ATLASOS_TOKEN: ${ATLASOS_TOKEN:-}
      VAULT_ADDR: http://vault:8200
      VAULT_TOKEN: ${VAULT_DEV_ROOT_TOKEN_ID:-medinovai-dev-token}
      AUDIT_SERVICE_URL: http://audit-chain:8084
      MCP_VTIGER_URL: http://mcp-vtiger:8080
      MCP_QUICKBOOKS_URL: http://mcp-quickbooks:8080
      MCP_GOOGLE_URL: http://mcp-google:8080
      MCP_LIS_URL: http://mcp-lis:8080
      MCP_MATTERMOST_URL: http://mcp-mattermost:8080
      MCP_TWILIO_URL: http://mcp-twilio:8080
      MCP_3CX_URL: http://mcp-3cx:8080
    depends_on:
      vault:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1:3000 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    restart: unless-stopped
    networks:
      - ceo-network
    extra_hosts:
      - "host.docker.internal:host-gateway"

  # ─── AtlasOS Gateway (Agent Runtime) ───────────────────────────────────
  atlas-gateway:
    build:
      context: ${ATLASOS_PATH:-../../repos/AtlasOS}
      dockerfile: Dockerfile
    container_name: ceo-atlas-gateway
    ports:
      - "41010:8080"    # Direct access → localhost:41010
      # NOTE: port 18789 is reserved for the native AtlasOS gateway process
      # (LaunchAgent: ai.atlasos.gateway). Tailscale Funnel → localhost:18789 → AtlasOS.
      # DO NOT map 18789 here or WhatsApp will stop working.
    environment:
      PYTHONUNBUFFERED: "1"
      PORT: "8080"
      VAULT_ADDR: http://vault:8200
      VAULT_TOKEN: ${VAULT_DEV_ROOT_TOKEN_ID:-medinovai-dev-token}
      AUDIT_SERVICE_URL: http://audit-chain:8084
      REDIS_URL: redis://redis:6379
      POSTGRES_URL: postgresql://medinovai@postgres:5432/atlas
      AIFACTORY_ENDPOINT: ${AIFACTORY_ENDPOINT:-http://host.docker.internal:5000}
      OLLAMA_HOST: ${OLLAMA_HOST:-http://host.docker.internal:11434}
      CHROMADB_URL: http://chromadb:8000
    volumes:
      - atlas-data:/data
      - /var/run/docker.sock:/var/run/docker.sock:ro
    depends_on:
      vault:
        condition: service_healthy
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      audit-chain:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    restart: unless-stopped
    networks:
      - ceo-network
    extra_hosts:
      - "host.docker.internal:host-gateway"

  # ─── AtlasOS UI (Chat + Deployment) ────────────────────────────────────
  # Use profile "ui" to build: docker compose --profile ui up -d atlas-ui
  atlas-ui:
    profiles:
      - ui
    build:
      context: ${ATLASOS_PATH:-../../repos/AtlasOS}/ui
      dockerfile: Dockerfile
    container_name: ceo-atlas-ui
    ports:
      - "41020:3737"
    environment:
      NODE_ENV: production
      PORT: "3737"
      AIFACTORY_ENDPOINT: ${AIFACTORY_ENDPOINT:-http://host.docker.internal:5000}
      AI_MODEL: ${AI_MODEL:-qwen2.5:32b}
      OLLAMA_HOST: ${OLLAMA_HOST:-http://host.docker.internal:11434}
      CHROMADB_URL: http://chromadb:8000
      POSTGRES_URL: postgresql://medinovai@postgres:5432/atlas
      REDIS_URL: redis://redis:6379
      VAULT_ADDR: http://vault:8200
      AUDIT_SERVICE_URL: http://audit-chain:8084
    volumes:
      - atlas-data:/data
      - /var/run/docker.sock:/var/run/docker.sock:ro
    depends_on:
      vault:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3737/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped
    networks:
      - ceo-network
    extra_hosts:
      - "host.docker.internal:host-gateway"

  # ─── Zero-Trust Audit Chain ────────────────────────────────────────────
  audit-chain:
    build:
      context: ${ATLASOS_PATH:-../../repos/AtlasOS}/services/audit-chain
      dockerfile: Dockerfile
    container_name: ceo-audit-chain
    ports:
      - "41500:8084"
    environment:
      AUDIT_LOG_PATH: /data/audit/audit.jsonl
      FLASK_ENV: production
    volumes:
      - audit-data:/data/audit
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8084/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - ceo-network

  # ─── Intelligence Services ─────────────────────────────────────────────
  correlation-engine:
    build:
      context: ${ATLASOS_PATH:-../../repos/AtlasOS}/services/correlation-engine
      dockerfile: Dockerfile
    container_name: ceo-correlation-engine
    depends_on:
      vault:
        condition: service_healthy
      audit-chain:
        condition: service_healthy
    ports:
      - "41510:8085"
    environment:
      VAULT_ADDR: "http://vault:8200"
      VAULT_TOKEN: ${VAULT_DEV_ROOT_TOKEN_ID:-medinovai-dev-token}
      AUDIT_SERVICE_URL: "http://audit-chain:8084"
      MCP_VTIGER_URL: "http://mcp-vtiger:8080"
      MCP_QUICKBOOKS_URL: "http://mcp-quickbooks:8080"
      MCP_GOOGLE_URL: "http://mcp-google:8080"
      MCP_LIS_URL: "http://mcp-lis:8080"
      MCP_MATTERMOST_URL: "http://mcp-mattermost:8080"
      MCP_TWILIO_URL: "http://mcp-twilio:8080"
      MCP_3CX_URL: "http://mcp-3cx:8080"
      CORRELATION_INTERVAL_MIN: "${CORRELATION_INTERVAL_MIN:-15}"
    volumes:
      - correlation-data:/data/correlations
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8085/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    restart: unless-stopped
    networks:
      - ceo-network

  briefing-engine:
    build:
      context: ${ATLASOS_PATH:-../../repos/AtlasOS}/services/briefing-engine
      dockerfile: Dockerfile
    container_name: ceo-briefing-engine
    depends_on:
      vault:
        condition: service_healthy
      audit-chain:
        condition: service_healthy
      correlation-engine:
        condition: service_healthy
    ports:
      - "41520:8086"
    environment:
      VAULT_ADDR: "http://vault:8200"
      VAULT_TOKEN: ${VAULT_DEV_ROOT_TOKEN_ID:-medinovai-dev-token}
      AUDIT_SERVICE_URL: "http://audit-chain:8084"
      CORRELATION_ENGINE_URL: "http://correlation-engine:8085"
      MCP_VTIGER_URL: "http://mcp-vtiger:8080"
      MCP_QUICKBOOKS_URL: "http://mcp-quickbooks:8080"
      MCP_GOOGLE_URL: "http://mcp-google:8080"
      MCP_LIS_URL: "http://mcp-lis:8080"
      MCP_MATTERMOST_URL: "http://mcp-mattermost:8080"
      MCP_TWILIO_URL: "http://mcp-twilio:8080"
      MCP_3CX_URL: "http://mcp-3cx:8080"
      MORNING_BRIEFING_HOUR: "${MORNING_BRIEFING_HOUR:-7}"
      EOD_BRIEFING_HOUR: "${EOD_BRIEFING_HOUR:-18}"
    volumes:
      - briefing-data:/data/briefings
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8086/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    restart: unless-stopped
    networks:
      - ceo-network

  decision-tracker:
    build:
      context: ${ATLASOS_PATH:-../../repos/AtlasOS}/services/decision-tracker
      dockerfile: Dockerfile
    container_name: ceo-decision-tracker
    depends_on:
      vault:
        condition: service_healthy
      audit-chain:
        condition: service_healthy
    ports:
      - "41530:8087"
    environment:
      VAULT_ADDR: "http://vault:8200"
      VAULT_TOKEN: ${VAULT_DEV_ROOT_TOKEN_ID:-medinovai-dev-token}
      AUDIT_SERVICE_URL: "http://audit-chain:8084"
      CORRELATION_ENGINE_URL: "http://correlation-engine:8085"
    volumes:
      - decision-data:/data/decisions
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8087/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    restart: unless-stopped
    networks:
      - ceo-network

  # ─── MCP Connectors ───────────────────────────────────────────────────
  # All connectors run on internal port 8080 (set via PORT env var).
  # base_connector.py reads PORT env and uses it, overriding per-connector defaults.
  # Host ports: 41601-41607 (see infra/PORT_REGISTRY.md)
  #
  # Internal URLs (used by intelligence services):
  #   VTiger:          http://mcp-vtiger:8080
  #   QuickBooks:      http://mcp-quickbooks:8080
  #   Google:          http://mcp-google:8080
  #   LIS:             http://mcp-lis:8080
  #   Mattermost:      http://mcp-mattermost:8080
  #   Twilio:          http://mcp-twilio:8080
  #   3CX:             http://mcp-3cx:8080

  mcp-vtiger:
    build:
      context: ${ATLASOS_PATH:-../../repos/AtlasOS}/services/mcp-connectors
      dockerfile: Dockerfile
      args:
        CONNECTOR_NAME: vtiger
    container_name: ceo-mcp-vtiger
    ports:
      - "41601:8080"
    environment:
      PORT: "8080"
      VAULT_ADDR: http://vault:8200
      VAULT_TOKEN: ${VAULT_DEV_ROOT_TOKEN_ID:-medinovai-dev-token}
      VAULT_SECRET_PATH: medinovai-secrets/atlasos/vtiger
      AUDIT_SERVICE_URL: http://audit-chain:8084
      CONNECTOR_NAME: vtiger
    depends_on:
      vault:
        condition: service_healthy
      audit-chain:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    restart: unless-stopped
    networks:
      - ceo-network

  mcp-quickbooks:
    build:
      context: ${ATLASOS_PATH:-../../repos/AtlasOS}/services/mcp-connectors
      dockerfile: Dockerfile
      args:
        CONNECTOR_NAME: quickbooks
    container_name: ceo-mcp-quickbooks
    ports:
      - "41602:8080"
    environment:
      PORT: "8080"
      VAULT_ADDR: http://vault:8200
      VAULT_TOKEN: ${VAULT_DEV_ROOT_TOKEN_ID:-medinovai-dev-token}
      VAULT_SECRET_PATH: medinovai-secrets/atlasos/quickbooks
      AUDIT_SERVICE_URL: http://audit-chain:8084
      CONNECTOR_NAME: quickbooks
    depends_on:
      vault:
        condition: service_healthy
      audit-chain:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    restart: unless-stopped
    networks:
      - ceo-network

  mcp-google:
    build:
      context: ${ATLASOS_PATH:-../../repos/AtlasOS}/services/mcp-connectors
      dockerfile: Dockerfile
      args:
        CONNECTOR_NAME: google_workspace
    container_name: ceo-mcp-google
    ports:
      - "41603:8080"
    environment:
      PORT: "8080"
      VAULT_ADDR: http://vault:8200
      VAULT_TOKEN: ${VAULT_DEV_ROOT_TOKEN_ID:-medinovai-dev-token}
      VAULT_SECRET_PATH: medinovai-secrets/atlasos/google-workspace
      AUDIT_SERVICE_URL: http://audit-chain:8084
      CONNECTOR_NAME: google_workspace
    depends_on:
      vault:
        condition: service_healthy
      audit-chain:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    restart: unless-stopped
    networks:
      - ceo-network

  mcp-lis:
    build:
      context: ${ATLASOS_PATH:-../../repos/AtlasOS}/services/mcp-connectors
      dockerfile: Dockerfile
      args:
        CONNECTOR_NAME: lis
    container_name: ceo-mcp-lis
    ports:
      - "41604:8080"
    environment:
      PORT: "8080"
      VAULT_ADDR: http://vault:8200
      VAULT_TOKEN: ${VAULT_DEV_ROOT_TOKEN_ID:-medinovai-dev-token}
      VAULT_SECRET_PATH: medinovai-secrets/atlasos/lis
      AUDIT_SERVICE_URL: http://audit-chain:8084
      CONNECTOR_NAME: lis
    depends_on:
      vault:
        condition: service_healthy
      audit-chain:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    restart: unless-stopped
    networks:
      - ceo-network

  mcp-mattermost:
    build:
      context: ${ATLASOS_PATH:-../../repos/AtlasOS}/services/mcp-connectors
      dockerfile: Dockerfile
      args:
        CONNECTOR_NAME: mattermost
    container_name: ceo-mcp-mattermost
    ports:
      - "41605:8080"
    environment:
      PORT: "8080"
      VAULT_ADDR: http://vault:8200
      VAULT_TOKEN: ${VAULT_DEV_ROOT_TOKEN_ID:-medinovai-dev-token}
      VAULT_SECRET_PATH: medinovai-secrets/atlasos/mattermost
      AUDIT_SERVICE_URL: http://audit-chain:8084
      CONNECTOR_NAME: mattermost
    depends_on:
      vault:
        condition: service_healthy
      audit-chain:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    restart: unless-stopped
    networks:
      - ceo-network

  mcp-twilio:
    build:
      context: ${ATLASOS_PATH:-../../repos/AtlasOS}/services/mcp-connectors
      dockerfile: Dockerfile
      args:
        CONNECTOR_NAME: twilio
    container_name: ceo-mcp-twilio
    ports:
      - "41606:8080"
    environment:
      PORT: "8080"
      VAULT_ADDR: http://vault:8200
      VAULT_TOKEN: ${VAULT_DEV_ROOT_TOKEN_ID:-medinovai-dev-token}
      VAULT_SECRET_PATH: medinovai-secrets/atlasos/twilio
      AUDIT_SERVICE_URL: http://audit-chain:8084
      CONNECTOR_NAME: twilio
    depends_on:
      vault:
        condition: service_healthy
      audit-chain:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    restart: unless-stopped
    networks:
      - ceo-network

  mcp-3cx:
    build:
      context: ${ATLASOS_PATH:-../../repos/AtlasOS}/services/mcp-connectors
      dockerfile: Dockerfile
      args:
        CONNECTOR_NAME: threecx
    container_name: ceo-mcp-3cx
    ports:
      - "41607:8080"
    environment:
      PORT: "8080"
      VAULT_ADDR: http://vault:8200
      VAULT_TOKEN: ${VAULT_DEV_ROOT_TOKEN_ID:-medinovai-dev-token}
      VAULT_SECRET_PATH: medinovai-secrets/atlasos/threecx
      AUDIT_SERVICE_URL: http://audit-chain:8084
      CONNECTOR_NAME: threecx
    depends_on:
      vault:
        condition: service_healthy
      audit-chain:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    restart: unless-stopped
    networks:
      - ceo-network

  # ─── PDF Processing ────────────────────────────────────────────────────
  stirling-pdf:
    image: docker.stirlingpdf.com/stirlingtools/stirling-pdf:latest
    container_name: ceo-stirling-pdf
    ports:
      - "41030:8080"
    environment:
      DOCKER_ENABLE_SECURITY: "false"
      INSTALL_BOOK_AND_ADVANCED_HTML_OPS: "true"
      LANGS: en_US
    volumes:
      - stirling-data:/customFiles
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/v1/info/status"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    restart: unless-stopped
    networks:
      - ceo-network

volumes:
  vault-data:
  postgres-data:
  chromadb-data:
  atlas-data:
  audit-data:
  stirling-data:
  correlation-data:
  briefing-data:
  decision-data:
  # No named volumes for MCP connectors — stateless, credentials from Vault

networks:
  ceo-network:
    driver: bridge
    name: medinovai-ceo-network
