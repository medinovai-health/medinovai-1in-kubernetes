# ─── Docker Compose — MedinovAI Platform (Local Development) ───────────────────
# Full greenfield deployment with restart/crash resilience.
name: medinovai-dev
# All data persisted to named volumes. Survives host restarts.
#
# Usage:
#   docker compose -f infra/docker/docker-compose.dev.yml up -d
#   bash scripts/backup.sh  # Before any infra changes
#
# Backup location: ~/medinovai-backups/medinovai-Deploy/
# See: docs/DOCKER_GREENFIELD_DEPLOYMENT.md
# ─────────────────────────────────────────────────────────────────────────────

services:
  postgres:
    image: postgres:16-alpine
    container_name: medinovai-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: medinovai
      POSTGRES_USER: medinovai
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-localdev}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U medinovai -d medinovai"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - medinovai-dev

  redis:
    image: redis:7-alpine
    container_name: medinovai-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:-localdev}
    command: redis-server --requirepass ${REDIS_PASSWORD:-localdev} --appendonly yes
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a \"$$REDIS_PASSWORD\" ping"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 5s
    networks:
      - medinovai-dev

  prometheus:
    image: prom/prometheus:latest
    container_name: medinovai-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=15d
      - --web.enable-lifecycle
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://localhost:9090/-/healthy"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s
    networks:
      - medinovai-dev

  grafana:
    image: grafana/grafana:latest
    container_name: medinovai-grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
    volumes:
      - grafana-data:/var/lib/grafana
    depends_on:
      prometheus:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://localhost:3000/api/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - medinovai-dev

  mailhog:
    image: mailhog/mailhog:latest
    container_name: medinovai-mailhog
    restart: unless-stopped
    ports:
      - "1025:1025"   # SMTP
      - "8025:8025"   # Web UI
    networks:
      - medinovai-dev

  localstack:
    image: localstack/localstack:latest
    container_name: medinovai-localstack
    restart: unless-stopped
    ports:
      - "4566:4566"
    environment:
      SERVICES: s3,secretsmanager,sqs,sns
      PERSISTENCE: 1
    volumes:
      - localstack-data:/var/lib/localstack
    networks:
      - medinovai-dev

  # ─── AI Layer ─────────────────────────────────────────────────────────────────
  # Local LLM inference — PHI-safe, runs fully on-device.
  # Default model pulled by: make ollama-pull-default (qwen2.5:1.5b ~1 GB)
  # Models persist across restarts via ollama-data volume.
  ollama:
    image: ollama/ollama:latest
    container_name: medinovai-ollama
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ollama-data:/root/.ollama
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:11434/api/tags || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks:
      - medinovai-dev

  open-webui:
    image: ghcr.io/open-webui/open-webui:main
    container_name: medinovai-open-webui
    restart: unless-stopped
    ports:
      - "8090:8080"
    environment:
      # Point at sibling Ollama container — no external API calls for inference
      OLLAMA_BASE_URL: http://ollama:11434
      # Disable telemetry / phone-home
      SCARF_NO_ANALYTICS: "true"
      DO_NOT_TRACK: "true"
      ANONYMIZED_TELEMETRY: "false"
    volumes:
      - open-webui-data:/app/backend/data
    depends_on:
      ollama:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - medinovai-dev

volumes:
  postgres-data:
  redis-data:
  prometheus-data:
  grafana-data:
  localstack-data:
  ollama-data:
  open-webui-data:

networks:
  medinovai-dev:
    driver: bridge
