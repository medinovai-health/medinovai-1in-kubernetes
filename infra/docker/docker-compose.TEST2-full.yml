# TEST2 — Full Greenfield Stack (Tiers 0–6)
# Port range: 16610-16999 ONLY. No other host ports used.
# Requires TEST2-brain to be running first (creates TEST2-network).
# Ollama: host machine at host.docker.internal:11434 (no new install)
# S3: real AWS bucket agentos-mjt (us-west-1) — no LocalStack
#
# Deploy (from repo root):
#   docker compose -p TEST2 --env-file infra/docker/test2.env \
#     -f infra/docker/docker-compose.TEST2-full.yml up -d
#
# Or let the orchestrator brain do it:
#   docker exec -it TEST2-orchestrator python3 /app/ai-deployment-agent/autonomous_orchestrator.py
#
# Tier boot order (enforced via depends_on + condition: service_healthy):
#   Tier 0 Infra → Tier 0 Monitoring → Tier 1 Security →
#   Tier 2 Platform → Tier 3 AI/ML → Tier 5 Apps → Tier 6 UI
# ─────────────────────────────────────────────────────────────────────────────

services:

  # ═══════════════════════════════════════════════════════════════════════════
  # TIER 0 — INFRASTRUCTURE (16610-16623)
  # ═══════════════════════════════════════════════════════════════════════════

  postgres-primary:
    image: postgres:16-alpine
    container_name: TEST2-postgres-primary
    restart: unless-stopped
    environment:
      POSTGRES_DB: medinovai_main
      POSTGRES_USER: medinovai
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-TEST2_pg_pw_2026}
    ports:
      - "16610:5432"
    volumes:
      - test2-postgres-primary-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U medinovai -d medinovai_main"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - TEST2-network
    labels:
      com.medinovai.project: TEST2
      com.medinovai.tier: "0"

  postgres-clinical:
    image: postgres:16-alpine
    container_name: TEST2-postgres-clinical
    restart: unless-stopped
    environment:
      POSTGRES_DB: medinovai_clinical
      POSTGRES_USER: medinovai
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-TEST2_pg_pw_2026}
    ports:
      - "16611:5432"
    volumes:
      - test2-postgres-clinical-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U medinovai -d medinovai_clinical"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - TEST2-network
    labels:
      com.medinovai.project: TEST2
      com.medinovai.tier: "0"

  redis-cache:
    image: redis:7-alpine
    container_name: TEST2-redis
    restart: unless-stopped
    command: >
      redis-server
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
      --requirepass ${REDIS_PASSWORD:-TEST2_redis_pw_2026}
      --appendonly yes
    ports:
      - "16612:6379"
    volumes:
      - test2-redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-TEST2_redis_pw_2026}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - TEST2-network
    labels:
      com.medinovai.project: TEST2
      com.medinovai.tier: "0"

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: TEST2-zookeeper
    restart: unless-stopped
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "16613:2181"
    volumes:
      - test2-zookeeper-data:/var/lib/zookeeper/data
    healthcheck:
      test: ["CMD-SHELL", "nc -zw1 localhost 2181 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
    networks:
      - TEST2-network
    labels:
      com.medinovai.project: TEST2
      com.medinovai.tier: "0"

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: TEST2-kafka
    restart: unless-stopped
    depends_on:
      zookeeper:
        condition: service_healthy
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      # Internal: kafka:29092 | External host: localhost:16614
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:16614
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    ports:
      - "16614:9092"
    volumes:
      - test2-kafka-data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics --bootstrap-server localhost:29092 --list"]
      interval: 15s
      timeout: 10s
      retries: 10
    networks:
      - TEST2-network
    labels:
      com.medinovai.project: TEST2
      com.medinovai.tier: "0"

  mongodb:
    image: mongo:7.0
    container_name: TEST2-mongodb
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: medinovai
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD:-TEST2_mongo_pw_2026}
    ports:
      - "16615:27017"
    volumes:
      - test2-mongodb-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 15s
      timeout: 5s
      retries: 5
    networks:
      - TEST2-network
    labels:
      com.medinovai.project: TEST2
      com.medinovai.tier: "0"

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.11.0
    container_name: TEST2-elasticsearch
    restart: unless-stopped
    environment:
      discovery.type: single-node
      xpack.security.enabled: "false"
      ES_JAVA_OPTS: "-Xms512m -Xmx512m"
    ports:
      - "16616:9200"
    volumes:
      - test2-elasticsearch-data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9200/_cluster/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
    networks:
      - TEST2-network
    labels:
      com.medinovai.project: TEST2
      com.medinovai.tier: "0"

  rabbitmq:
    image: rabbitmq:3.12-management-alpine
    container_name: TEST2-rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: medinovai
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-TEST2_rmq_pw_2026}
    ports:
      - "16617:5672"     # AMQP
      - "16618:15672"    # Management UI  →  http://localhost:16618
    volumes:
      - test2-rabbitmq-data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 15s
      timeout: 5s
      retries: 5
    networks:
      - TEST2-network
    labels:
      com.medinovai.project: TEST2
      com.medinovai.tier: "0"

  vault:
    image: hashicorp/vault:1.15
    container_name: TEST2-vault
    restart: unless-stopped
    environment:
      VAULT_DEV_ROOT_TOKEN_ID: ${VAULT_TOKEN:-TEST2-vault-dev-token-2026}
      VAULT_DEV_LISTEN_ADDRESS: "0.0.0.0:8200"
    ports:
      - "16619:8200"    # Vault UI/API  →  http://localhost:16619
    cap_add:
      - IPC_LOCK
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8200/v1/sys/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - TEST2-network
    labels:
      com.medinovai.project: TEST2
      com.medinovai.tier: "0"

  keycloak:
    image: quay.io/keycloak/keycloak:23.0
    container_name: TEST2-keycloak
    restart: unless-stopped
    depends_on:
      postgres-primary:
        condition: service_healthy
    environment:
      KC_DB: postgres
      KC_DB_URL_HOST: postgres-primary
      KC_DB_URL_DATABASE: medinovai_main
      KC_DB_USERNAME: medinovai
      KC_DB_PASSWORD: ${POSTGRES_PASSWORD:-TEST2_pg_pw_2026}
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN:-admin}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-TEST2_kc_admin_2026}
    command: start-dev
    ports:
      - "16620:8080"    # Keycloak admin  →  http://localhost:16620/admin
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/localhost/8080' 2>/dev/null && exit 0 || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 60s
    networks:
      - TEST2-network
    labels:
      com.medinovai.project: TEST2
      com.medinovai.tier: "0"

  mailhog:
    image: mailhog/mailhog:latest
    container_name: TEST2-mailhog
    restart: unless-stopped
    ports:
      - "16622:1025"    # SMTP
      - "16623:8025"    # Web UI  →  http://localhost:16623
    networks:
      - TEST2-network
    labels:
      com.medinovai.project: TEST2
      com.medinovai.tier: "0"

  # ═══════════════════════════════════════════════════════════════════════════
  # TIER 0 — MONITORING (16630-16635)
  # ═══════════════════════════════════════════════════════════════════════════

  prometheus:
    image: prom/prometheus:v2.48.0
    container_name: TEST2-prometheus
    restart: unless-stopped
    ports:
      - "16630:9090"    # Prometheus  →  http://localhost:16630
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - test2-prometheus-data:/prometheus
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:9090/-/healthy"]
      interval: 15s
      timeout: 5s
      retries: 5
    networks:
      - TEST2-network
    labels:
      com.medinovai.project: TEST2
      com.medinovai.tier: "0-monitoring"

  grafana:
    image: grafana/grafana:10.2.2
    container_name: TEST2-grafana
    restart: unless-stopped
    depends_on:
      - prometheus
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
    ports:
      - "16631:3000"    # Grafana  →  http://localhost:16631
    volumes:
      - test2-grafana-data:/var/lib/grafana
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:3000/api/health"]
      interval: 15s
      timeout: 5s
      retries: 5
    networks:
      - TEST2-network
    labels:
      com.medinovai.project: TEST2
      com.medinovai.tier: "0-monitoring"

  loki:
    image: grafana/loki:2.9.2
    container_name: TEST2-loki
    restart: unless-stopped
    ports:
      - "16632:3100"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3100/ready || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s
    networks:
      - TEST2-network
    labels:
      com.medinovai.project: TEST2
      com.medinovai.tier: "0-monitoring"

  jaeger:
    image: jaegertracing/all-in-one:1.51
    container_name: TEST2-jaeger
    restart: unless-stopped
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    ports:
      - "16634:16686"    # Jaeger UI  →  http://localhost:16634
      - "16635:14268"    # Collector
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:16686/ > /dev/null 2>&1 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks:
      - TEST2-network
    labels:
      com.medinovai.project: TEST2
      com.medinovai.tier: "0-monitoring"

  # ═══════════════════════════════════════════════════════════════════════════
  # TIER 1 — SECURITY & SECRETS (16650-16661)
  # ═══════════════════════════════════════════════════════════════════════════

  medinovai-secrets-manager-bridge:
    image: ${REGISTRY:-ghcr.io/myonsite-healthcare}/medinovai-secrets-manager-bridge:${TAG:-latest}
    pull_policy: never
    container_name: TEST2-secrets-manager-bridge
    restart: unless-stopped
    depends_on:
      vault:
        condition: service_healthy
    environment:
      VAULT_ADDR: http://vault:8200
      VAULT_TOKEN: ${VAULT_TOKEN:-TEST2-vault-dev-token-2026}
      PORT: 8000
    ports:
      - "16650:8000"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - TEST2-network
    labels:
      com.medinovai.project: TEST2
      com.medinovai.tier: "1"

  medinovai-security:
    image: ${REGISTRY:-ghcr.io/myonsite-healthcare}/medinovai-security:${TAG:-latest}
    pull_policy: never
    container_name: TEST2-security
    restart: unless-stopped
    depends_on:
      medinovai-secrets-manager-bridge:
        condition: service_healthy
      keycloak:
        condition: service_healthy
    environment:
      KEYCLOAK_URL: http://keycloak:8080
      DATABASE_URL: postgresql://medinovai:${POSTGRES_PASSWORD:-TEST2_pg_pw_2026}@postgres-primary:5432/medinovai_main
      REDIS_URL: redis://:${REDIS_PASSWORD:-TEST2_redis_pw_2026}@redis-cache:6379
      PORT: 9000
    ports:
      - "16651:9000"    # Main security service
      - "16652:9010"    # Token validator
      - "16653:9011"    # Audit service
      - "16654:9012"    # Tenant onboarding
      - "16655:9013"    # Policy engine
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - TEST2-network
    labels:
      com.medinovai.project: TEST2
      com.medinovai.tier: "1"

  medinovai-universal-sign-on:
    image: ${REGISTRY:-ghcr.io/myonsite-healthcare}/medinovai-universal-sign-on:${TAG:-latest}
    pull_policy: never
    container_name: TEST2-universal-sign-on
    restart: unless-stopped
    depends_on:
      medinovai-security:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://medinovai:${POSTGRES_PASSWORD:-TEST2_pg_pw_2026}@postgres-primary:5432/medinovai_main
      REDIS_URL: redis://:${REDIS_PASSWORD:-TEST2_redis_pw_2026}@redis-cache:6379
      SECURITY_SERVICE_URL: http://medinovai-security:9000
      KAFKA_BROKERS: kafka:29092
      PORT: 8000
    ports:
      - "16656:8000"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - TEST2-network
    labels:
      com.medinovai.project: TEST2
      com.medinovai.tier: "1"

  medinovai-role-based-permissions:
    image: ${REGISTRY:-ghcr.io/myonsite-healthcare}/medinovai-role-based-permissions:${TAG:-latest}
    pull_policy: never
    container_name: TEST2-rbac
    restart: unless-stopped
    depends_on:
      medinovai-security:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://medinovai:${POSTGRES_PASSWORD:-TEST2_pg_pw_2026}@postgres-primary:5432/medinovai_main
      REDIS_URL: redis://:${REDIS_PASSWORD:-TEST2_redis_pw_2026}@redis-cache:6379
      SECURITY_SERVICE_URL: http://medinovai-security:9000
      PORT: 8000
    ports:
      - "16657:8000"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - TEST2-network
    labels:
      com.medinovai.project: TEST2
      com.medinovai.tier: "1"

  medinovai-encryption-vault:
    image: ${REGISTRY:-ghcr.io/myonsite-healthcare}/medinovai-encryption-vault:${TAG:-latest}
    pull_policy: never
    container_name: TEST2-encryption-vault
    restart: unless-stopped
    depends_on:
      medinovai-secrets-manager-bridge:
        condition: service_healthy
    environment:
      VAULT_ADDR: http://vault:8200
      VAULT_TOKEN: ${VAULT_TOKEN:-TEST2-vault-dev-token-2026}
      PORT: 8000
    ports:
      - "16658:8000"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - TEST2-network
    labels:
      com.medinovai.project: TEST2
      com.medinovai.tier: "1"

  medinovai-hipaa-gdpr-guard:
    image: ${REGISTRY:-ghcr.io/myonsite-healthcare}/medinovai-hipaa-gdpr-guard:${TAG:-latest}
    pull_policy: never
    container_name: TEST2-hipaa-gdpr-guard
    restart: unless-stopped
    depends_on:
      medinovai-security:
        condition: service_healthy
      medinovai-role-based-permissions:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://medinovai:${POSTGRES_PASSWORD:-TEST2_pg_pw_2026}@postgres-primary:5432/medinovai_main
      REDIS_URL: redis://:${REDIS_PASSWORD:-TEST2_redis_pw_2026}@redis-cache:6379
      SECURITY_SERVICE_URL: http://medinovai-security:9000
      PORT: 8000
    ports:
      - "16659:8000"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - TEST2-network
    labels:
      com.medinovai.project: TEST2
      com.medinovai.tier: "1"

  medinovai-consent-preference-api:
    image: ${REGISTRY:-ghcr.io/myonsite-healthcare}/medinovai-consent-preference-api:${TAG:-latest}
    pull_policy: never
    container_name: TEST2-consent-preference-api
    restart: unless-stopped
    depends_on:
      medinovai-hipaa-gdpr-guard:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://medinovai:${POSTGRES_PASSWORD:-TEST2_pg_pw_2026}@postgres-primary:5432/medinovai_main
      REDIS_URL: redis://:${REDIS_PASSWORD:-TEST2_redis_pw_2026}@redis-cache:6379
      SECURITY_SERVICE_URL: http://medinovai-security:9000
      PORT: 8000
    ports:
      - "16660:8000"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - TEST2-network
    labels:
      com.medinovai.project: TEST2
      com.medinovai.tier: "1"

  medinovai-audit-trail-explorer:
    image: ${REGISTRY:-ghcr.io/myonsite-healthcare}/medinovai-audit-trail-explorer:${TAG:-latest}
    pull_policy: never
    container_name: TEST2-audit-trail-explorer
    restart: unless-stopped
    depends_on:
      medinovai-security:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://medinovai:${POSTGRES_PASSWORD:-TEST2_pg_pw_2026}@postgres-primary:5432/medinovai_main
      REDIS_URL: redis://:${REDIS_PASSWORD:-TEST2_redis_pw_2026}@redis-cache:6379
      ELASTICSEARCH_URL: http://elasticsearch:9200
      SECURITY_SERVICE_URL: http://medinovai-security:9000
      PORT: 8000
    ports:
      - "16661:8000"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - TEST2-network
    labels:
      com.medinovai.project: TEST2
      com.medinovai.tier: "1"

  # ═══════════════════════════════════════════════════════════════════════════
  # TIER 2 — PLATFORM CORE (16670-16677)
  # ═══════════════════════════════════════════════════════════════════════════

  medinovai-registry:
    image: ${REGISTRY:-ghcr.io/myonsite-healthcare}/medinovai-registry:${TAG:-latest}
    pull_policy: never
    container_name: TEST2-registry
    restart: unless-stopped
    depends_on:
      medinovai-security:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://medinovai:${POSTGRES_PASSWORD:-TEST2_pg_pw_2026}@postgres-primary:5432/medinovai_main
      REDIS_URL: redis://:${REDIS_PASSWORD:-TEST2_redis_pw_2026}@redis-cache:6379
      SECURITY_SERVICE_URL: http://medinovai-security:9000
      PORT: 8080
    ports:
      - "16670:8080"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - TEST2-network
    labels:
      com.medinovai.project: TEST2
      com.medinovai.tier: "2"

  medinovai-data-services:
    image: ${REGISTRY:-ghcr.io/myonsite-healthcare}/medinovai-data-services:${TAG:-latest}
    pull_policy: never
    container_name: TEST2-data-services
    restart: unless-stopped
    depends_on:
      medinovai-security:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://medinovai:${POSTGRES_PASSWORD:-TEST2_pg_pw_2026}@postgres-primary:5432/medinovai_main
      CLINICAL_DATABASE_URL: postgresql://medinovai:${POSTGRES_PASSWORD:-TEST2_pg_pw_2026}@postgres-clinical:5432/medinovai_clinical
      REDIS_URL: redis://:${REDIS_PASSWORD:-TEST2_redis_pw_2026}@redis-cache:6379
      SECURITY_SERVICE_URL: http://medinovai-security:9000
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      AWS_REGION: ${AWS_REGION:-us-west-1}
      S3_BUCKET_NAME: ${S3_BUCKET_NAME:-agentos-mjt}
      PORT: 8000
    ports:
      - "16671:8000"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8300/api/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - TEST2-network
    labels:
      com.medinovai.project: TEST2
