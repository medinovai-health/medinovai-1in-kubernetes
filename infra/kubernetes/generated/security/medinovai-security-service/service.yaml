apiVersion: v1
kind: Service
metadata:
  name: medinovai-security-service
  namespace: security
  labels:
    app: medinovai-security-service
    atlasos.io/managed: "true"
spec:
  selector:
    app: medinovai-security-service
  ports:
  - port: 5000
    targetPort: 5000
    protocol: TCP
    name: http
  type: ClusterIP
