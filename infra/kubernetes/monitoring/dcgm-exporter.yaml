apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: dcgm-exporter
  namespace: medinovai-monitoring
  labels:
    app.kubernetes.io/name: dcgm-exporter
    medinovai.com/tier: monitoring
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: dcgm-exporter
  template:
    metadata:
      labels:
        app.kubernetes.io/name: dcgm-exporter
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9400"
    spec:
      nodeSelector:
        gpu: "true"
      tolerations:
        - key: nvidia.com/gpu
          operator: Exists
          effect: NoSchedule
      containers:
        - name: dcgm-exporter
          image: nvcr.io/nvidia/k8s/dcgm-exporter:3.3.5-3.4.1-ubuntu22.04
          ports:
            - containerPort: 9400
              name: metrics
          resources:
            requests:
              memory: 64Mi
              cpu: 50m
            limits:
              memory: 256Mi
              cpu: 200m
          securityContext:
            privileged: true
          env:
            - name: DCGM_EXPORTER_LISTEN
              value: ":9400"
---
apiVersion: v1
kind: Service
metadata:
  name: dcgm-exporter
  namespace: medinovai-monitoring
spec:
  selector:
    app.kubernetes.io/name: dcgm-exporter
  ports:
    - port: 9400
      targetPort: 9400
      name: metrics
