# Ingress for AI service (medinovai-ai namespace)
# Merged with main ingress when using nginx ingress controller with same host
# TLS is configured on the main ingress (ingress.yaml)
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: medinovai-ingress-ai
  namespace: medinovai-ai
  annotations:
    kubernetes.io/ingress.class: nginx
spec:
  ingressClassName: nginx
  rules:
    - host: DOMAIN
      http:
        paths:
          - path: /api/ai
            pathType: Prefix
            backend:
              service:
                name: ai-inference
                port:
                  number: 8080
