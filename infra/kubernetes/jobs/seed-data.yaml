# Seed data Job for MedinovAI
apiVersion: batch/v1
kind: Job
metadata:
  name: seed-data
  namespace: medinovai-data
  labels:
    app.kubernetes.io/name: seed-data
    app.kubernetes.io/component: seeding
spec:
  backoffLimit: 1
  restartPolicy: Never
  template:
    metadata:
      labels:
        app.kubernetes.io/name: seed-data
    spec:
      restartPolicy: Never
      containers:
        - name: seed
          image: python:3.11-slim
          command:
            - /bin/sh
            - -c
            - "python scripts/seed_data.py"
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: db-credentials
                  key: url
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
