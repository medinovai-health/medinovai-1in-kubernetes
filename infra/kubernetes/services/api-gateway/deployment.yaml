apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: medinovai-services
  labels:
    app.kubernetes.io/name: api-gateway
    app.kubernetes.io/component: gateway
    app.kubernetes.io/part-of: medinovai
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: api-gateway
  template:
    metadata:
      labels:
        app.kubernetes.io/name: api-gateway
        app.kubernetes.io/component: gateway
        app.kubernetes.io/part-of: medinovai
      annotations:
        vault.hashicorp.com/agent-inject: "true"
        vault.hashicorp.com/agent-inject-secret-postgres: "secret/medinovai/infra/postgres"
        vault.hashicorp.com/agent-inject-template-postgres: |
          {{- with secret "secret/medinovai/infra/postgres" -}}
          export DATABASE_PASSWORD="{{ .Data.data.password }}"
          {{- end }}
        vault.hashicorp.com/agent-inject-secret-redis: "secret/medinovai/infra/redis"
        vault.hashicorp.com/agent-inject-template-redis: |
          {{- with secret "secret/medinovai/infra/redis" -}}
          export REDIS_PASSWORD="{{ .Data.data.password }}"
          {{- end }}
        vault.hashicorp.com/role: "api-gateway"
    spec:
      serviceAccountName: api-gateway
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app.kubernetes.io/name: api-gateway
                topologyKey: kubernetes.io/hostname
      securityContext:
        runAsNonRoot: true
      containers:
        - name: api-gateway
          image: REGISTRY/api-gateway:IMAGE_TAG
          ports:
            - containerPort: 3000
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: 1000m
              memory: 1Gi
          env:
            - name: NODE_ENV
              value: production
            - name: LOG_FORMAT
              value: json
            - name: LOG_LEVEL
              value: info
          readinessProbe:
            httpGet:
              path: /ready
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 20
          startupProbe:
            httpGet:
              path: /health
              port: 3000
            failureThreshold: 30
            periodSeconds: 10
