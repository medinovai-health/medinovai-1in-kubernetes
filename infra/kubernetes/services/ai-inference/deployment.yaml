apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-inference
  namespace: medinovai-ai
  labels:
    app.kubernetes.io/name: ai-inference
    app.kubernetes.io/component: inference
    app.kubernetes.io/part-of: medinovai
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: ai-inference
  template:
    metadata:
      labels:
        app.kubernetes.io/name: ai-inference
        app.kubernetes.io/component: inference
        app.kubernetes.io/part-of: medinovai
    spec:
      tolerations:
        - key: nvidia.com/gpu
          operator: Exists
          effect: NoSchedule
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app.kubernetes.io/name: ai-inference
                topologyKey: kubernetes.io/hostname
      securityContext:
        runAsNonRoot: true
      containers:
        - name: ai-inference
          image: REGISTRY/ai-inference:IMAGE_TAG
          ports:
            - containerPort: 8080
          resources:
            requests:
              cpu: 1000m
              memory: 2Gi
            limits:
              cpu: 4000m
              memory: 8Gi
              nvidia.com/gpu: 1
          env:
            - name: PYTHON_ENV
              value: production
            - name: LOG_FORMAT
              value: json
            - name: LOG_LEVEL
              value: info
          readinessProbe:
            httpGet:
              path: /ready
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 20
          startupProbe:
            httpGet:
              path: /health
              port: 8080
            failureThreshold: 30
            periodSeconds: 10
