apiVersion: apps/v1
kind: Deployment
metadata:
  name: aifactory
  namespace: medinovai-ai
  labels:
    app: aifactory
    tier: "2"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: aifactory
  template:
    metadata:
      labels:
        app: aifactory
        tier: "2"
      annotations:
        atlasos.medinovai.com/sidecar: "enabled"
    spec:
      affinity:
        nodeAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 90
              preference:
                matchExpressions:
                  - key: gpu
                    operator: In
                    values: ["true"]
      containers:
        - name: aifactory
          image: medinovai-aifactory:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 5000
          env:
            - name: OLLAMA_HOST
              value: http://ollama.medinovai-ai.svc:11434
          envFrom:
            - secretRef:
                name: ai-ml-secrets
          resources:
            requests:
              cpu: 500m
              memory: 2Gi
            limits:
              cpu: "4"
              memory: 8Gi
          readinessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 15
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: aifactory
  namespace: medinovai-ai
spec:
  type: ClusterIP
  ports:
    - port: 5000
      targetPort: 5000
  selector:
    app: aifactory
