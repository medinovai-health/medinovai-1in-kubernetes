apiVersion: apps/v1
kind: Deployment
metadata:
  name: atlasos-cluster-brain
  namespace: medinovai-atlasos
  labels:
    app.kubernetes.io/name: atlasos-cluster-brain
    app.kubernetes.io/part-of: atlasos
    medinovai.com/component: cluster-brain
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: atlasos-cluster-brain
  template:
    metadata:
      labels:
        app.kubernetes.io/name: atlasos-cluster-brain
        app.kubernetes.io/part-of: atlasos
        medinovai.com/component: cluster-brain
    spec:
      serviceAccountName: atlasos-cluster-brain
      affinity:
        nodeAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              preference:
                matchExpressions:
                  - key: role
                    operator: In
                    values:
                      - control-plane
      containers:
        - name: cluster-brain
          image: medinovai-atlasos-cluster-brain:latest
          ports:
            - containerPort: 8090
          env:
            - name: CLUSTER_NAME
              value: medinovai-onprem
            - name: EVENT_BUS_URL
              value: "http://event-bus.medinovai-services:8085"
            - name: SLACK_APPROVAL_CHANNEL
              valueFrom:
                secretKeyRef:
                  name: atlasos-channel-secrets
                  key: SLACK_APPROVAL_CHANNEL
            - name: APPROVAL_MODE
              value: slack
          envFrom:
            - secretRef:
                name: atlasos-api-keys
          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "1Gi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /health
              port: 8090
            initialDelaySeconds: 10
            periodSeconds: 10
