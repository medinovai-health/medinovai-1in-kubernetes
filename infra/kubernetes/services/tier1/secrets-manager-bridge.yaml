apiVersion: apps/v1
kind: Deployment
metadata:
  name: medinovai-secrets-manager-bridge
  namespace: medinovai-security
  labels:
    app: medinovai-secrets-manager-bridge
    tier: security
    app.kubernetes.io/managed-by: medinovai-deploy
spec:
  replicas: 1
  selector:
    matchLabels:
      app: medinovai-secrets-manager-bridge
  template:
    metadata:
      labels:
        app: medinovai-secrets-manager-bridge
        tier: security
    spec:
      containers:
        - name: secrets-manager-bridge
          image: medinovai-secrets-manager-bridge:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 8000
          env:
            - name: SERVICE_NAME
              value: "medinovai-secrets-manager-bridge"
            - name: PORT
              value: "8000"
            - name: REGISTRY_URL
              value: "http://medinovai-registry.medinovai-services:8080"
            - name: VAULT_ADDR
              value: "http://vault.medinovai-data:8200"
            - name: VAULT_TOKEN
              valueFrom:
                secretKeyRef:
                  name: vault-token
                  key: token
                  optional: true
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 10
            failureThreshold: 2
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 45
            periodSeconds: 15
            failureThreshold: 3
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "512Mi"
              cpu: "500m"
---
apiVersion: v1
kind: Service
metadata:
  name: medinovai-secrets-manager-bridge
  namespace: medinovai-security
spec:
  selector:
    app: medinovai-secrets-manager-bridge
  ports:
    - port: 8000
      targetPort: 8000
