apiVersion: v1
kind: Service
metadata:
  name: secrets-manager-bridge
  namespace: medinovai-security
  labels:
    app.kubernetes.io/name: secrets-manager-bridge
    medinovai.com/tier: security
spec:
  type: ClusterIP
  ports:
    - port: 8443
      targetPort: 8443
      name: https
  selector:
    app.kubernetes.io/name: secrets-manager-bridge
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: secrets-manager-bridge
  namespace: medinovai-security
  labels:
    app.kubernetes.io/name: secrets-manager-bridge
    medinovai.com/tier: security
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: secrets-manager-bridge
  template:
    metadata:
      labels:
        app.kubernetes.io/name: secrets-manager-bridge
        medinovai.com/tier: security
    spec:
      containers:
        - name: secrets-manager-bridge
          image: medinovai-secrets-manager-bridge:latest
          ports:
            - containerPort: 8443
              name: https
          env:
            - name: VAULT_ADDR
              value: "http://vault.vault.svc:8200"
          envFrom:
            - secretRef:
                name: jwt-signing-key
          resources:
            requests:
              memory: 128Mi
            limits:
              memory: 256Mi
          livenessProbe:
            httpGet:
              path: /health
              port: 8443
            initialDelaySeconds: 15
            periodSeconds: 20
            timeoutSeconds: 5
