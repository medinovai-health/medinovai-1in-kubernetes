apiVersion: apps/v1
kind: Deployment
metadata:
  name: medinovai-security
  namespace: medinovai-security
  labels:
    app: medinovai-security
    tier: security
    app.kubernetes.io/managed-by: medinovai-deploy
spec:
  replicas: 1
  selector:
    matchLabels:
      app: medinovai-security
  template:
    metadata:
      labels:
        app: medinovai-security
        tier: security
    spec:
      containers:
        - name: security
          image: medinovai-security:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 9000
            - containerPort: 9010
            - containerPort: 9011
            - containerPort: 9012
            - containerPort: 9013
          env:
            - name: SERVICE_NAME
              value: "medinovai-security"
            - name: PORT
              value: "9000"
            - name: REGISTRY_URL
              value: "http://medinovai-registry.medinovai-services:8080"
            - name: KEYCLOAK_URL
              value: "http://keycloak.medinovai-data:8080"
            - name: DATABASE_URL
              value: "postgresql://medinovai:medinovai_dev@postgres-primary.medinovai-data:5432/medinovai_main"
            - name: REDIS_URL
              value: "redis://:medinovai_dev@redis.medinovai-data:6379"
          readinessProbe:
            httpGet:
              path: /health
              port: 9000
            initialDelaySeconds: 15
            periodSeconds: 10
            failureThreshold: 2
          livenessProbe:
            httpGet:
              path: /health
              port: 9000
            initialDelaySeconds: 45
            periodSeconds: 15
            failureThreshold: 3
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "512Mi"
              cpu: "500m"
---
apiVersion: v1
kind: Service
metadata:
  name: medinovai-security
  namespace: medinovai-security
spec:
  selector:
    app: medinovai-security
  ports:
    - name: main
      port: 9000
      targetPort: 9000
    - name: token-validator
      port: 9010
      targetPort: 9010
    - name: audit-service
      port: 9011
      targetPort: 9011
    - name: tenant-onboarding
      port: 9012
      targetPort: 9012
    - name: policy-engine
      port: 9013
      targetPort: 9013
