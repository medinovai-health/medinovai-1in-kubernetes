apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service
  namespace: medinovai-services
  labels:
    app.kubernetes.io/name: auth-service
    app.kubernetes.io/component: auth
    app.kubernetes.io/part-of: medinovai
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: auth-service
  template:
    metadata:
      labels:
        app.kubernetes.io/name: auth-service
        app.kubernetes.io/component: auth
        app.kubernetes.io/part-of: medinovai
      annotations:
        vault.hashicorp.com/agent-inject: "true"
        vault.hashicorp.com/agent-inject-secret-keycloak: "secret/medinovai/keycloak/deploy"
        vault.hashicorp.com/agent-inject-template-keycloak: |
          {{- with secret "secret/medinovai/keycloak/deploy" -}}
          export KEYCLOAK_ADMIN_PASSWORD="{{ .Data.data.admin_password }}"
          export KC_DB_PASSWORD="{{ .Data.data.db_password }}"
          {{- end }}
        vault.hashicorp.com/role: "auth-service"
    spec:
      serviceAccountName: auth-service
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app.kubernetes.io/name: auth-service
                topologyKey: kubernetes.io/hostname
      securityContext:
        runAsNonRoot: true
      containers:
        - name: auth-service
          image: REGISTRY/auth-service:IMAGE_TAG
          ports:
            - containerPort: 3000
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: 1000m
              memory: 1Gi
          env:
            - name: NODE_ENV
              value: production
            - name: LOG_FORMAT
              value: json
            - name: LOG_LEVEL
              value: info
          readinessProbe:
            httpGet:
              path: /ready
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 20
          startupProbe:
            httpGet:
              path: /health
              port: 3000
            failureThreshold: 30
            periodSeconds: 10
