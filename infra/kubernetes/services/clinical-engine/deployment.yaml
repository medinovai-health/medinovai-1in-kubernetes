apiVersion: apps/v1
kind: Deployment
metadata:
  name: clinical-engine
  namespace: medinovai-services
  labels:
    app.kubernetes.io/name: clinical-engine
    app.kubernetes.io/component: engine
    app.kubernetes.io/part-of: medinovai
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: clinical-engine
  template:
    metadata:
      labels:
        app.kubernetes.io/name: clinical-engine
        app.kubernetes.io/component: engine
        app.kubernetes.io/part-of: medinovai
      annotations:
        vault.hashicorp.com/agent-inject: "true"
        vault.hashicorp.com/agent-inject-secret-postgres: "secret/medinovai/infra/postgres"
        vault.hashicorp.com/agent-inject-template-postgres: |
          {{- with secret "secret/medinovai/infra/postgres" -}}
          export DATABASE_PASSWORD="{{ .Data.data.password }}"
          {{- end }}
        vault.hashicorp.com/role: "clinical-engine"
    spec:
      serviceAccountName: clinical-engine
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app.kubernetes.io/name: clinical-engine
                topologyKey: kubernetes.io/hostname
      securityContext:
        runAsNonRoot: true
      containers:
        - name: clinical-engine
          image: REGISTRY/clinical-engine:IMAGE_TAG
          securityContext:
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
          ports:
            - containerPort: 8080
          volumeMounts:
            - name: tmp
              mountPath: /tmp
          resources:
            requests:
              cpu: 500m
              memory: 512Mi
            limits:
              cpu: 2000m
              memory: 2Gi
          env:
            - name: PYTHON_ENV
              value: production
            - name: LOG_FORMAT
              value: json
            - name: LOG_LEVEL
              value: info
          readinessProbe:
            httpGet:
              path: /ready
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 20
          startupProbe:
            httpGet:
              path: /health
              port: 8080
            failureThreshold: 30
            periodSeconds: 10
      volumes:
        - name: tmp
          emptyDir: {}
