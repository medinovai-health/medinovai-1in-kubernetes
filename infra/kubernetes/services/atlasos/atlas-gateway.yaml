apiVersion: v1
kind: Service
metadata:
  name: atlas-gateway
  namespace: medinovai-services
  labels:
    app.kubernetes.io/name: atlas-gateway
    app.kubernetes.io/part-of: atlasos
    medinovai.com/tier: intelligence
spec:
  type: ClusterIP
  ports:
    - port: 18789
      targetPort: 18789
      name: http
  selector:
    app.kubernetes.io/name: atlas-gateway
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: atlas-workspaces
  namespace: medinovai-services
  labels:
    app.kubernetes.io/name: atlas-gateway
    app.kubernetes.io/part-of: atlasos
spec:
  accessModes: ["ReadWriteOnce"]
  storageClassName: longhorn
  resources:
    requests:
      storage: 20Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: atlas-gateway
  namespace: medinovai-services
  labels:
    app.kubernetes.io/name: atlas-gateway
    app.kubernetes.io/part-of: atlasos
    medinovai.com/tier: intelligence
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: atlas-gateway
  template:
    metadata:
      labels:
        app.kubernetes.io/name: atlas-gateway
        app.kubernetes.io/part-of: atlasos
        medinovai.com/tier: intelligence
      annotations:
        atlasos.medinovai.com/sidecar: "enabled"
    spec:
      containers:
        - name: atlas-gateway
          image: medinovai-atlas-gateway:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 18789
          envFrom:
            - secretRef:
                name: atlasos-api-keys
            - secretRef:
                name: atlasos-channel-secrets
            - secretRef:
                name: atlasos-integration-secrets
          volumeMounts:
            - name: atlas-workspaces
              mountPath: /data/workspaces
          resources:
            requests:
              memory: 256Mi
              cpu: 100m
            limits:
              memory: 512Mi
              cpu: 500m
          livenessProbe:
            httpGet:
              path: /health
              port: 18789
            initialDelaySeconds: 15
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health
              port: 18789
            initialDelaySeconds: 10
            periodSeconds: 10
      volumes:
        - name: atlas-workspaces
          persistentVolumeClaim:
            claimName: atlas-workspaces
