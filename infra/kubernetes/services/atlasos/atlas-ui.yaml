apiVersion: v1
kind: Service
metadata:
  name: atlas-ui
  namespace: atlasos
spec:
  ports:
    - port: 3737
      targetPort: 3000
  selector:
    app: atlas-ui
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: atlas-ui
  namespace: atlasos
  labels:
    app: atlas-ui
    medinovai.com/tier: "2"
spec:
  replicas: 2
  selector:
    matchLabels:
      app: atlas-ui
  template:
    metadata:
      labels:
        app: atlas-ui
        atlasos.medinovai.com/sidecar: "enabled"
    spec:
      serviceAccountName: atlasos-sa
      containers:
        - name: atlas-ui
          image: medinovai-atlas-1-ui:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3000
          envFrom:
            - secretRef:
                name: atlasos-secrets
            - secretRef:
                name: atlasos-infra-secrets
          env:
            - name: AIFACTORY_ENDPOINT
              value: "http://aifactory.ai-ml.svc.cluster.local:5000"
            - name: OLLAMA_HOST
              value: "http://ollama.ai-ml.svc.cluster.local:11434"
            - name: CHROMADB_URL
              value: "http://chromadb.ai-ml.svc.cluster.local:8000"
            - name: NODE_ENV
              value: production
          resources:
            requests:
              memory: 256Mi
              cpu: 100m
            limits:
              memory: 1Gi
              cpu: "1"
          readinessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 30
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: atlas-ui-pdb
  namespace: atlasos
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: atlas-ui
