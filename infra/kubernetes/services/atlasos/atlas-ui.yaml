apiVersion: v1
kind: Service
metadata:
  name: atlas-ui
  namespace: medinovai-services
  labels:
    app.kubernetes.io/name: atlas-ui
    app.kubernetes.io/part-of: atlasos
    medinovai.com/tier: intelligence
spec:
  type: ClusterIP
  ports:
    - port: 3737
      targetPort: 3737
      name: http
  selector:
    app.kubernetes.io/name: atlas-ui
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: atlas-ui
  namespace: medinovai-services
  labels:
    app.kubernetes.io/name: atlas-ui
    app.kubernetes.io/part-of: atlasos
    medinovai.com/tier: intelligence
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: atlas-ui
  template:
    metadata:
      labels:
        app.kubernetes.io/name: atlas-ui
        app.kubernetes.io/part-of: atlasos
        medinovai.com/tier: intelligence
      annotations:
        atlasos.medinovai.com/sidecar: "enabled"
    spec:
      containers:
        - name: atlas-ui
          image: medinovai-atlas-ui:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3737
          envFrom:
            - secretRef:
                name: atlasos-api-keys
            - secretRef:
                name: atlasos-channel-secrets
          resources:
            requests:
              memory: 256Mi
              cpu: 100m
            limits:
              memory: 512Mi
              cpu: 500m
          livenessProbe:
            httpGet:
              path: /api/health
              port: 3737
            initialDelaySeconds: 15
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /api/health
              port: 3737
            initialDelaySeconds: 10
            periodSeconds: 10
