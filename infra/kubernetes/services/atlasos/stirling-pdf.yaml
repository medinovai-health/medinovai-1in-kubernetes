apiVersion: v1
kind: Service
metadata:
  name: stirling-pdf
  namespace: medinovai-services
  labels:
    app.kubernetes.io/name: stirling-pdf
    app.kubernetes.io/part-of: atlasos
    medinovai.com/tier: intelligence
spec:
  type: ClusterIP
  ports:
    - port: 8083
      targetPort: 8080
      name: http
  selector:
    app.kubernetes.io/name: stirling-pdf
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: stirling-data
  namespace: medinovai-services
  labels:
    app.kubernetes.io/name: stirling-pdf
    app.kubernetes.io/part-of: atlasos
spec:
  accessModes: ["ReadWriteOnce"]
  storageClassName: longhorn
  resources:
    requests:
      storage: 5Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: stirling-pdf
  namespace: medinovai-services
  labels:
    app.kubernetes.io/name: stirling-pdf
    app.kubernetes.io/part-of: atlasos
    medinovai.com/tier: intelligence
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: stirling-pdf
  template:
    metadata:
      labels:
        app.kubernetes.io/name: stirling-pdf
        app.kubernetes.io/part-of: atlasos
        medinovai.com/tier: intelligence
      annotations:
        atlasos.medinovai.com/sidecar: "enabled"
    spec:
      containers:
        - name: stirling-pdf
          image: frooodle/s-pdf:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          env:
            - name: DOCKER_ENABLE_SECURITY
              value: "false"
          volumeMounts:
            - name: stirling-data
              mountPath: /configs
          resources:
            requests:
              memory: 256Mi
              cpu: 100m
            limits:
              memory: 1Gi
              cpu: 500m
          livenessProbe:
            httpGet:
              path: /api/v1/info/status
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /api/v1/info/status
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 10
      volumes:
        - name: stirling-data
          persistentVolumeClaim:
            claimName: stirling-data
