apiVersion: batch/v1
kind: CronJob
metadata:
  name: rollup-engine
  namespace: atlasos
spec:
  schedule: "*/15 * * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      template:
        spec:
          containers:
            - name: rollup
              image: python:3.12-slim
              command: ["python3", "-m", "rollup_engine", "company"]
              volumeMounts:
                - name: atlas-state
                  mountPath: /data/atlas
              resources:
                requests:
                  memory: 128Mi
                  cpu: 50m
                limits:
                  memory: 512Mi
                  cpu: 500m
          volumes:
            - name: atlas-state
              persistentVolumeClaim:
                claimName: atlas-state-pvc
          restartPolicy: OnFailure
