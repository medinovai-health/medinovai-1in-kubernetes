apiVersion: v1
kind: Service
metadata:
  name: ai-orchestrator
  namespace: medinovai-services
  labels:
    app.kubernetes.io/name: ai-orchestrator
    app.kubernetes.io/part-of: atlasos
    medinovai.com/tier: intelligence
spec:
  type: ClusterIP
  ports:
    - port: 3003
      targetPort: 3000
      name: http
  selector:
    app.kubernetes.io/name: ai-orchestrator
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-orchestrator
  namespace: medinovai-services
  labels:
    app.kubernetes.io/name: ai-orchestrator
    app.kubernetes.io/part-of: atlasos
    medinovai.com/tier: intelligence
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: ai-orchestrator
  template:
    metadata:
      labels:
        app.kubernetes.io/name: ai-orchestrator
        app.kubernetes.io/part-of: atlasos
        medinovai.com/tier: intelligence
      annotations:
        atlasos.medinovai.com/sidecar: "enabled"
    spec:
      affinity:
        nodeAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              preference:
                matchExpressions:
                  - key: gpu
                    operator: In
                    values: ["true"]
      containers:
        - name: ai-orchestrator
          image: medinovai-ai-orchestrator:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3000
          envFrom:
            - secretRef:
                name: atlasos-api-keys
            - secretRef:
                name: aifactory-credentials
            - secretRef:
                name: ollama-config
          resources:
            requests:
              memory: 512Mi
              cpu: 250m
            limits:
              memory: 1Gi
              cpu: 500m
          livenessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 10
