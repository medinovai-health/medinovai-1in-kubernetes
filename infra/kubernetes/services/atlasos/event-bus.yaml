apiVersion: v1
kind: Service
metadata:
  name: event-bus
  namespace: atlasos
  labels:
    app.kubernetes.io/name: event-bus
    app.kubernetes.io/part-of: atlasos
spec:
  ports:
    - port: 8088
      targetPort: 8088
  selector:
    app: event-bus
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: event-bus
  namespace: atlasos
  labels:
    app: event-bus
    app.kubernetes.io/name: event-bus
    app.kubernetes.io/part-of: atlasos
    app.kubernetes.io/version: "1.2.0"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: event-bus
  template:
    metadata:
      labels:
        app: event-bus
        atlasos.medinovai.com/sidecar: "enabled"
    spec:
      containers:
        - name: event-bus
          image: atlasos/event-bus:1.2.0
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8088
          volumeMounts:
            - name: events-data
              mountPath: /data/events
          resources:
            requests:
              memory: 128Mi
              cpu: 50m
            limits:
              memory: 512Mi
              cpu: 500m
          readinessProbe:
            httpGet:
              path: /health
              port: 8088
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8088
            initialDelaySeconds: 30
            periodSeconds: 30
      volumes:
        - name: events-data
          persistentVolumeClaim:
            claimName: events-data-pvc
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: events-data-pvc
  namespace: atlasos
spec:
  accessModes: ["ReadWriteOnce"]
  storageClassName: hostpath
  resources:
    requests:
      storage: 10Gi
