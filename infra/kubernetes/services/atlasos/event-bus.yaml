apiVersion: v1
kind: Service
metadata:
  name: event-bus
  namespace: medinovai-services
  labels:
    app.kubernetes.io/name: event-bus
    app.kubernetes.io/part-of: atlasos
    medinovai.com/tier: intelligence
spec:
  type: ClusterIP
  ports:
    - port: 8085
      targetPort: 8085
      name: http
  selector:
    app.kubernetes.io/name: event-bus
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: event-bus-data
  namespace: medinovai-services
  labels:
    app.kubernetes.io/name: event-bus
    app.kubernetes.io/part-of: atlasos
spec:
  accessModes: ["ReadWriteOnce"]
  storageClassName: longhorn
  resources:
    requests:
      storage: 10Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: event-bus
  namespace: medinovai-services
  labels:
    app.kubernetes.io/name: event-bus
    app.kubernetes.io/part-of: atlasos
    medinovai.com/tier: intelligence
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: event-bus
  template:
    metadata:
      labels:
        app.kubernetes.io/name: event-bus
        app.kubernetes.io/part-of: atlasos
        medinovai.com/tier: intelligence
      annotations:
        atlasos.medinovai.com/sidecar: "enabled"
    spec:
      containers:
        - name: event-bus
          image: medinovai-event-bus:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8085
          volumeMounts:
            - name: event-bus-data
              mountPath: /data
          resources:
            requests:
              memory: 256Mi
              cpu: 100m
            limits:
              memory: 512Mi
              cpu: 500m
          livenessProbe:
            httpGet:
              path: /health
              port: 8085
            initialDelaySeconds: 15
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health
              port: 8085
            initialDelaySeconds: 10
            periodSeconds: 10
      volumes:
        - name: event-bus-data
          persistentVolumeClaim:
            claimName: event-bus-data
