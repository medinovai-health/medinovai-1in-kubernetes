apiVersion: v1
kind: Service
metadata:
  name: event-bus
  namespace: atlasos
spec:
  ports:
    - port: 8085
      targetPort: 8085
  selector:
    app: event-bus
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: event-bus
  namespace: atlasos
spec:
  replicas: 1
  selector:
    matchLabels:
      app: event-bus
  template:
    metadata:
      labels:
        app: event-bus
    spec:
      containers:
        - name: event-bus
          image: python:3.12-slim
          command: ["python3", "-m", "event_bus", "serve"]
          ports:
            - containerPort: 8085
          volumeMounts:
            - name: events-data
              mountPath: /data/events
          resources:
            requests:
              memory: 128Mi
              cpu: 50m
            limits:
              memory: 512Mi
              cpu: 500m
      volumes:
        - name: events-data
          persistentVolumeClaim:
            claimName: events-data-pvc
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: events-data-pvc
  namespace: atlasos
spec:
  accessModes: ["ReadWriteOnce"]
  storageClassName: longhorn
  resources:
    requests:
      storage: 10Gi
