apiVersion: v1
kind: Service
metadata:
  name: correlation-engine
  namespace: atlasos
  labels:
    app.kubernetes.io/name: correlation-engine
    app.kubernetes.io/part-of: atlasos
spec:
  ports:
    - port: 8085
      targetPort: 8085
  selector:
    app: correlation-engine
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: correlation-engine
  namespace: atlasos
  labels:
    app: correlation-engine
    app.kubernetes.io/name: correlation-engine
    app.kubernetes.io/part-of: atlasos
    app.kubernetes.io/version: "1.2.0"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: correlation-engine
  template:
    metadata:
      labels:
        app: correlation-engine
        atlasos.medinovai.com/sidecar: "enabled"
    spec:
      serviceAccountName: atlasos-sa
      containers:
        - name: correlation-engine
          image: atlasos/correlation-engine:1.2.0
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8085
          envFrom:
            - secretRef:
                name: atlasos-infra-secrets
          resources:
            requests:
              memory: 128Mi
              cpu: 50m
            limits:
              memory: 256Mi
              cpu: 250m
          readinessProbe:
            httpGet:
              path: /health
              port: 8085
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8085
            initialDelaySeconds: 30
            periodSeconds: 30
