apiVersion: v1
kind: Service
metadata:
  name: webhook-handler
  namespace: atlasos
  labels:
    app.kubernetes.io/name: webhook-handler
    app.kubernetes.io/part-of: atlasos
spec:
  ports:
    - port: 8081
      targetPort: 8080
  selector:
    app: webhook-handler
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: webhook-handler
  namespace: atlasos
  labels:
    app: webhook-handler
    app.kubernetes.io/name: webhook-handler
    app.kubernetes.io/part-of: atlasos
    app.kubernetes.io/version: "1.2.0"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: webhook-handler
  template:
    metadata:
      labels:
        app: webhook-handler
        atlasos.medinovai.com/sidecar: "enabled"
    spec:
      serviceAccountName: atlasos-sa
      containers:
        - name: webhook-handler
          image: medinovai-atlas-1-webhook-handler:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          envFrom:
            - secretRef:
                name: atlasos-secrets
          resources:
            requests:
              memory: 64Mi
              cpu: 50m
            limits:
              memory: 256Mi
              cpu: 250m
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 30
