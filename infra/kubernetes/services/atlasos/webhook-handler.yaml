apiVersion: v1
kind: Service
metadata:
  name: webhook-handler
  namespace: medinovai-services
  labels:
    app.kubernetes.io/name: webhook-handler
    app.kubernetes.io/part-of: atlasos
    medinovai.com/tier: intelligence
spec:
  type: ClusterIP
  ports:
    - port: 8081
      targetPort: 8080
      name: http
  selector:
    app.kubernetes.io/name: webhook-handler
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: webhook-handler
  namespace: medinovai-services
  labels:
    app.kubernetes.io/name: webhook-handler
    app.kubernetes.io/part-of: atlasos
    medinovai.com/tier: intelligence
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: webhook-handler
  template:
    metadata:
      labels:
        app.kubernetes.io/name: webhook-handler
        app.kubernetes.io/part-of: atlasos
        medinovai.com/tier: intelligence
      annotations:
        atlasos.medinovai.com/sidecar: "enabled"
    spec:
      containers:
        - name: webhook-handler
          image: medinovai-webhook-handler:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          envFrom:
            - secretRef:
                name: github-webhook-secret
          resources:
            requests:
              memory: 128Mi
              cpu: 50m
            limits:
              memory: 256Mi
              cpu: 250m
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
