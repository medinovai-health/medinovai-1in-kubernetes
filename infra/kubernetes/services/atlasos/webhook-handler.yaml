apiVersion: v1
kind: Service
metadata:
  name: webhook-handler
  namespace: atlasos
spec:
  ports:
    - port: 8081
      targetPort: 8080
  selector:
    app: webhook-handler
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: webhook-handler
  namespace: atlasos
spec:
  replicas: 1
  selector:
    matchLabels:
      app: webhook-handler
  template:
    metadata:
      labels:
        app: webhook-handler
    spec:
      containers:
        - name: webhook-handler
          image: medinovai-atlas-1-webhook-handler:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          envFrom:
            - secretRef:
                name: atlasos-secrets
          resources:
            requests:
              memory: 64Mi
              cpu: 50m
            limits:
              memory: 256Mi
              cpu: 250m
