apiVersion: v1
kind: Service
metadata:
  name: atlas-orchestrator
  namespace: medinovai-services
  labels:
    app.kubernetes.io/name: atlas-orchestrator
    app.kubernetes.io/part-of: atlasos
    medinovai.com/tier: intelligence
spec:
  type: ClusterIP
  ports:
    - name: http
      port: 8888
      targetPort: 8000
    - name: grpc
      port: 8889
      targetPort: 8001
    - name: metrics
      port: 8890
      targetPort: 8002
  selector:
    app.kubernetes.io/name: atlas-orchestrator
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: atlas-state
  namespace: medinovai-services
  labels:
    app.kubernetes.io/name: atlas-orchestrator
    app.kubernetes.io/part-of: atlasos
spec:
  accessModes: ["ReadWriteOnce"]
  storageClassName: longhorn
  resources:
    requests:
      storage: 10Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: atlas-orchestrator
  namespace: medinovai-services
  labels:
    app.kubernetes.io/name: atlas-orchestrator
    app.kubernetes.io/part-of: atlasos
    medinovai.com/tier: intelligence
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: atlas-orchestrator
  template:
    metadata:
      labels:
        app.kubernetes.io/name: atlas-orchestrator
        app.kubernetes.io/part-of: atlasos
        medinovai.com/tier: intelligence
      annotations:
        atlasos.medinovai.com/sidecar: "enabled"
    spec:
      containers:
        - name: atlas-orchestrator
          image: medinovai-atlas-orchestrator:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
            - containerPort: 8001
            - containerPort: 8002
          envFrom:
            - secretRef:
                name: atlasos-api-keys
          volumeMounts:
            - name: atlas-state
              mountPath: /data/atlas
          resources:
            requests:
              memory: 256Mi
              cpu: 100m
            limits:
              memory: 512Mi
              cpu: 500m
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
      volumes:
        - name: atlas-state
          persistentVolumeClaim:
            claimName: atlas-state
