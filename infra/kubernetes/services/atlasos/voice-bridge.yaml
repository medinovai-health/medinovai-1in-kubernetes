apiVersion: v1
kind: Service
metadata:
  name: voice-bridge
  namespace: medinovai-services
  labels:
    app.kubernetes.io/name: voice-bridge
    app.kubernetes.io/part-of: atlasos
    medinovai.com/tier: intelligence
spec:
  type: ClusterIP
  ports:
    - port: 7100
      targetPort: 7100
      name: http
  selector:
    app.kubernetes.io/name: voice-bridge
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: voice-bridge
  namespace: medinovai-services
  labels:
    app.kubernetes.io/name: voice-bridge
    app.kubernetes.io/part-of: atlasos
    medinovai.com/tier: intelligence
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: voice-bridge
  template:
    metadata:
      labels:
        app.kubernetes.io/name: voice-bridge
        app.kubernetes.io/part-of: atlasos
        medinovai.com/tier: intelligence
      annotations:
        atlasos.medinovai.com/sidecar: "enabled"
    spec:
      containers:
        - name: voice-bridge
          image: medinovai-voice-bridge:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 7100
          envFrom:
            - secretRef:
                name: atlasos-voice-secrets
          resources:
            requests:
              memory: 128Mi
              cpu: 100m
            limits:
              memory: 512Mi
              cpu: 500m
          livenessProbe:
            httpGet:
              path: /health
              port: 7100
            initialDelaySeconds: 15
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health
              port: 7100
            initialDelaySeconds: 10
            periodSeconds: 10
