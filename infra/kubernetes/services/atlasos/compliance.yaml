# Compliance + Clinical services
---
apiVersion: v1
kind: Service
metadata:
  name: explainability
  namespace: atlasos
  labels:
    app.kubernetes.io/name: explainability
    app.kubernetes.io/part-of: atlasos
spec:
  ports:
    - port: 8220
      targetPort: 8220
  selector:
    app: explainability
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: explainability
  namespace: atlasos
  labels:
    app: explainability
    app.kubernetes.io/name: explainability
    app.kubernetes.io/part-of: atlasos
    app.kubernetes.io/version: "4.0.0"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: explainability
  template:
    metadata:
      labels:
        app: explainability
        atlasos.medinovai.com/sidecar: "enabled"
    spec:
      serviceAccountName: atlasos-sa
      containers:
        - name: explainability
          image: atlasos/explainability:4.0.0
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8220
          envFrom:
            - secretRef:
                name: atlasos-integration-secrets
            - secretRef:
                name: atlasos-infra-secrets
          resources:
            requests:
              memory: 128Mi
              cpu: 50m
            limits:
              memory: 256Mi
              cpu: 250m
          readinessProbe:
            httpGet:
              path: /health
              port: 8220
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8220
            initialDelaySeconds: 30
            periodSeconds: 30
---
