apiVersion: v1
kind: Service
metadata:
  name: mcp-gateway
  namespace: medinovai-services
  labels:
    app.kubernetes.io/name: mcp-gateway
    app.kubernetes.io/part-of: atlasos
    medinovai.com/tier: intelligence
spec:
  type: ClusterIP
  ports:
    - name: http
      port: 8082
      targetPort: 8080
    - name: metrics
      port: 9090
      targetPort: 9090
  selector:
    app.kubernetes.io/name: mcp-gateway
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: mcp-sessions
  namespace: medinovai-services
  labels:
    app.kubernetes.io/name: mcp-gateway
    app.kubernetes.io/part-of: atlasos
spec:
  accessModes: ["ReadWriteOnce"]
  storageClassName: longhorn
  resources:
    requests:
      storage: 5Gi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: mcp-logs
  namespace: medinovai-services
  labels:
    app.kubernetes.io/name: mcp-gateway
    app.kubernetes.io/part-of: atlasos
spec:
  accessModes: ["ReadWriteOnce"]
  storageClassName: longhorn
  resources:
    requests:
      storage: 5Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mcp-gateway
  namespace: medinovai-services
  labels:
    app.kubernetes.io/name: mcp-gateway
    app.kubernetes.io/part-of: atlasos
    medinovai.com/tier: intelligence
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: mcp-gateway
  template:
    metadata:
      labels:
        app.kubernetes.io/name: mcp-gateway
        app.kubernetes.io/part-of: atlasos
        medinovai.com/tier: intelligence
      annotations:
        atlasos.medinovai.com/sidecar: "enabled"
    spec:
      containers:
        - name: mcp-gateway
          image: medinovai-mcp-gateway:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
            - containerPort: 9090
          envFrom:
            - secretRef:
                name: atlasos-api-keys
          volumeMounts:
            - name: mcp-sessions
              mountPath: /app/sessions
            - name: mcp-logs
              mountPath: /app/logs
          resources:
            requests:
              memory: 256Mi
              cpu: 100m
            limits:
              memory: 512Mi
              cpu: 500m
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
      volumes:
        - name: mcp-sessions
          persistentVolumeClaim:
            claimName: mcp-sessions
        - name: mcp-logs
          persistentVolumeClaim:
            claimName: mcp-logs
