apiVersion: v1
kind: Service
metadata:
  name: mcp-gateway
  namespace: atlasos
spec:
  ports:
    - name: http
      port: 8082
      targetPort: 8080
    - name: metrics
      port: 9090
      targetPort: 9090
  selector:
    app: mcp-gateway
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mcp-gateway
  namespace: atlasos
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mcp-gateway
  template:
    metadata:
      labels:
        app: mcp-gateway
    spec:
      serviceAccountName: atlasos-sa
      containers:
        - name: mcp-gateway
          image: medinovai-atlas-1-mcp-gateway:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
            - containerPort: 9090
          envFrom:
            - secretRef:
                name: atlasos-infra-secrets
          env:
            - name: OLLAMA_HOST
              value: "http://ollama.ai-ml.svc.cluster.local:11434"
          resources:
            requests:
              memory: 128Mi
              cpu: 100m
            limits:
              memory: 512Mi
              cpu: 500m
