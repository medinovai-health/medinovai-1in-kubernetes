# Agent Platform Core services (event-bus has separate manifest with PVC)
---
apiVersion: v1
kind: Service
metadata:
  name: memory-service
  namespace: atlasos
  labels:
    app.kubernetes.io/name: memory-service
    app.kubernetes.io/part-of: atlasos
spec:
  ports:
    - port: 8201
      targetPort: 8201
  selector:
    app: memory-service
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: memory-service
  namespace: atlasos
  labels:
    app: memory-service
    app.kubernetes.io/name: memory-service
    app.kubernetes.io/part-of: atlasos
    app.kubernetes.io/version: "4.0.0"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: memory-service
  template:
    metadata:
      labels:
        app: memory-service
        atlasos.medinovai.com/sidecar: "enabled"
    spec:
      serviceAccountName: atlasos-sa
      containers:
        - name: memory-service
          image: atlasos/memory-service:4.0.0
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8201
          envFrom:
            - secretRef:
                name: atlasos-integration-secrets
            - secretRef:
                name: atlasos-infra-secrets
          resources:
            requests:
              memory: 128Mi
              cpu: 50m
            limits:
              memory: 256Mi
              cpu: 250m
          readinessProbe:
            httpGet:
              path: /health
              port: 8201
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8201
            initialDelaySeconds: 30
            periodSeconds: 30
---
