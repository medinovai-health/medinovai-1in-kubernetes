apiVersion: v1
kind: Service
metadata:
  name: audit-chain
  namespace: medinovai-services
  labels:
    app.kubernetes.io/name: audit-chain
    app.kubernetes.io/part-of: atlasos
    medinovai.com/tier: intelligence
spec:
  type: ClusterIP
  ports:
    - port: 8084
      targetPort: 8084
      name: http
  selector:
    app.kubernetes.io/name: audit-chain
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: audit-data
  namespace: medinovai-services
  labels:
    app.kubernetes.io/name: audit-chain
    app.kubernetes.io/part-of: atlasos
spec:
  accessModes: ["ReadWriteOnce"]
  storageClassName: longhorn
  resources:
    requests:
      storage: 10Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: audit-chain
  namespace: medinovai-services
  labels:
    app.kubernetes.io/name: audit-chain
    app.kubernetes.io/part-of: atlasos
    medinovai.com/tier: intelligence
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: audit-chain
  template:
    metadata:
      labels:
        app.kubernetes.io/name: audit-chain
        app.kubernetes.io/part-of: atlasos
        medinovai.com/tier: intelligence
      annotations:
        atlasos.medinovai.com/sidecar: "enabled"
    spec:
      containers:
        - name: audit-chain
          image: medinovai-audit-chain:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8084
          env:
            - name: AUDIT_PATH
              value: /data/audit/audit.jsonl
          volumeMounts:
            - name: audit-data
              mountPath: /data/audit
          resources:
            requests:
              memory: 128Mi
              cpu: 50m
            limits:
              memory: 256Mi
              cpu: 250m
          livenessProbe:
            httpGet:
              path: /health
              port: 8084
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health
              port: 8084
            initialDelaySeconds: 5
            periodSeconds: 10
      volumes:
        - name: audit-data
          persistentVolumeClaim:
            claimName: audit-data
