apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: atlasos-node-agent
  labels:
    app.kubernetes.io/name: atlasos-node-agent
    app.kubernetes.io/part-of: atlasos
    medinovai.com/component: node-agent
rules:
  - apiGroups: [""]
    resources: ["nodes"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["nodes/status"]
    verbs: ["get"]
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch", "delete"]
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["get", "list", "watch", "create"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: atlasos-node-agent
  labels:
    app.kubernetes.io/name: atlasos-node-agent
    app.kubernetes.io/part-of: atlasos
subjects:
  - kind: ServiceAccount
    name: atlasos-node-agent
    namespace: medinovai-atlasos
roleRef:
  kind: ClusterRole
  name: atlasos-node-agent
  apiGroup: rbac.authorization.k8s.io
