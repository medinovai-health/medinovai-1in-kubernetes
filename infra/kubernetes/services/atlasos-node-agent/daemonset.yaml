apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: atlasos-node-agent
  namespace: medinovai-atlasos
  labels:
    app.kubernetes.io/name: atlasos-node-agent
    app.kubernetes.io/part-of: atlasos
    medinovai.com/component: node-agent
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: atlasos-node-agent
  template:
    metadata:
      labels:
        app.kubernetes.io/name: atlasos-node-agent
        app.kubernetes.io/part-of: atlasos
        medinovai.com/component: node-agent
    spec:
      serviceAccountName: atlasos-node-agent
      tolerations:
        - operator: Exists
      containers:
        - name: node-agent
          image: medinovai-atlasos-node-agent:latest
          env:
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
            - name: EVENT_BUS_URL
              value: "http://event-bus.medinovai-services:8085"
          volumeMounts:
            - name: proc
              mountPath: /proc
              readOnly: true
            - name: sys
              mountPath: /sys
              readOnly: true
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "200m"
      volumes:
        - name: proc
          hostPath:
            path: /proc
            type: Directory
        - name: sys
          hostPath:
            path: /sys
            type: Directory
