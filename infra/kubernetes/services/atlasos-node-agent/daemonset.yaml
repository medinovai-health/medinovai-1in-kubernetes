apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: atlasos-node-agent
  namespace: medinovai-system
  labels:
    app: atlasos-node-agent
    component: atlasos-infra
spec:
  selector:
    matchLabels:
      app: atlasos-node-agent
  template:
    metadata:
      labels:
        app: atlasos-node-agent
        component: atlasos-infra
    spec:
      serviceAccountName: atlasos-node-agent
      hostPID: false
      hostNetwork: false
      tolerations:
        - key: nvidia.com/gpu
          operator: Exists
          effect: NoSchedule
      containers:
        - name: node-agent
          image: python:3.12-slim
          command:
            - python3
            - -c
            - |
              import os, time, json, subprocess, socket, datetime

              NODE_NAME = os.environ.get('NODE_NAME', socket.gethostname())
              HEARTBEAT_INTERVAL = int(os.environ.get('HEARTBEAT_INTERVAL', '300'))
              GPU_NODE = os.path.exists('/host/proc/driver/nvidia')

              def collect_metrics():
                  metrics = {
                      'node': NODE_NAME,
                      'timestamp': datetime.datetime.utcnow().isoformat() + 'Z',
                      'type': 'node_agent.pulse',
                  }
                  # CPU/Memory from /proc
                  try:
                      with open('/host/proc/meminfo') as f:
                          for line in f:
                              if line.startswith('MemTotal:'):
                                  metrics['mem_total_kb'] = int(line.split()[1])
                              elif line.startswith('MemAvailable:'):
                                  metrics['mem_available_kb'] = int(line.split()[1])
                      with open('/host/proc/loadavg') as f:
                          parts = f.read().split()
                          metrics['load_1m'] = float(parts[0])
                          metrics['load_5m'] = float(parts[1])
                  except Exception as e:
                      metrics['error'] = str(e)

                  # GPU metrics if available
                  if GPU_NODE:
                      try:
                          result = subprocess.run(
                              ['nvidia-smi', '--query-gpu=utilization.gpu,temperature.gpu,memory.used,memory.total',
                               '--format=csv,noheader,nounits'],
                              capture_output=True, text=True, timeout=10
                          )
                          if result.returncode == 0:
                              gpus = []
                              for line in result.stdout.strip().split('\n'):
                                  parts = [p.strip() for p in line.split(',')]
                                  if len(parts) == 4:
                                      gpus.append({
                                          'utilization_pct': int(parts[0]),
                                          'temperature_c': int(parts[1]),
                                          'memory_used_mb': int(parts[2]),
                                          'memory_total_mb': int(parts[3]),
                                      })
                              metrics['gpus'] = gpus
                      except Exception:
                          pass

                  return metrics

              print(f'[AtlasOS Node Agent] Starting on {NODE_NAME} (GPU: {GPU_NODE})')
              while True:
                  try:
                      metrics = collect_metrics()
                      print(json.dumps(metrics))
                      # Future: POST to event-bus service
                  except Exception as e:
                      print(json.dumps({'error': str(e), 'node': NODE_NAME}))
                  time.sleep(HEARTBEAT_INTERVAL)
          env:
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
            - name: HEARTBEAT_INTERVAL
              value: "300"
          volumeMounts:
            - name: host-proc
              mountPath: /host/proc
              readOnly: true
            - name: host-sys
              mountPath: /host/sys
              readOnly: true
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 256Mi
      volumes:
        - name: host-proc
          hostPath:
            path: /proc
        - name: host-sys
          hostPath:
            path: /sys
