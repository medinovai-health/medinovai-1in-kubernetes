apiVersion: apps/v1
kind: Deployment
metadata:
  name: data-pipeline
  namespace: medinovai-services
  labels:
    app.kubernetes.io/name: data-pipeline
    app.kubernetes.io/component: pipeline
    app.kubernetes.io/part-of: medinovai
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: data-pipeline
  template:
    metadata:
      labels:
        app.kubernetes.io/name: data-pipeline
        app.kubernetes.io/component: pipeline
        app.kubernetes.io/part-of: medinovai
    spec:
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app.kubernetes.io/name: data-pipeline
                topologyKey: kubernetes.io/hostname
      securityContext:
        runAsNonRoot: true
        readOnlyRootFilesystem: true
        allowPrivilegeEscalation: false
      containers:
        - name: data-pipeline
          image: REGISTRY/data-pipeline:IMAGE_TAG
          ports:
            - containerPort: 8080
          resources:
            requests:
              cpu: 500m
              memory: 512Mi
            limits:
              cpu: 2000m
              memory: 4Gi
          env:
            - name: PYTHON_ENV
              value: production
            - name: LOG_FORMAT
              value: json
            - name: LOG_LEVEL
              value: info
          readinessProbe:
            httpGet:
              path: /ready
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 20
          startupProbe:
            httpGet:
              path: /health
              port: 8080
            failureThreshold: 30
            periodSeconds: 10
