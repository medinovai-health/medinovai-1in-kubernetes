# ─── medinovaiOS Deployment ───────────────────────────────────────────────────
# Unified portal — serves the React SPA + health aggregator + SSO relay.
# 2 replicas, pod anti-affinity, non-root, health probes on /health.
# ─────────────────────────────────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: medinovaios
  namespace: medinovai-os
  labels:
    app.kubernetes.io/name: medinovaios
    app.kubernetes.io/component: portal
    app.kubernetes.io/part-of: medinovai
    medinovai/tier: portal
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: medinovaios
  template:
    metadata:
      labels:
        app.kubernetes.io/name: medinovaios
        app.kubernetes.io/component: portal
        app.kubernetes.io/part-of: medinovai
    spec:
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app.kubernetes.io/name: medinovaios
                topologyKey: kubernetes.io/hostname
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
        - name: medinovaios
          image: REGISTRY/medinovaios:IMAGE_TAG
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 3030
              protocol: TCP
          env:
            - name: NODE_ENV
              value: production
            - name: PORT
              value: "3030"
            - name: AUTH_SERVICE_URL
              valueFrom:
                configMapKeyRef:
                  name: medinovaios-config
                  key: AUTH_SERVICE_URL
                  optional: true
            - name: ATLAS_UI_URL
              valueFrom:
                configMapKeyRef:
                  name: medinovaios-config
                  key: ATLAS_UI_URL
                  optional: true
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          readinessProbe:
            httpGet:
              path: /health
              port: 3030
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health
              port: 3030
            initialDelaySeconds: 15
            periodSeconds: 20
            failureThreshold: 3
          startupProbe:
            httpGet:
              path: /health
              port: 3030
            failureThreshold: 20
            periodSeconds: 5
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: medinovaios-config
  namespace: medinovai-os
  labels:
    app.kubernetes.io/name: medinovaios
    app.kubernetes.io/part-of: medinovai
data:
  AUTH_SERVICE_URL: "http://auth-service.medinovai-services.svc.cluster.local:3000"
  ATLAS_UI_URL: "http://atlas.medinovai-system.svc.cluster.local:3000"
