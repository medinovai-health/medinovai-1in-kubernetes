apiVersion: v1
kind: Service
metadata:
  name: aifactory
  labels:
    app.kubernetes.io/name: aifactory
    medinovai.com/tier: ai
spec:
  type: ClusterIP
  ports:
    - port: 5000
      targetPort: 5000
      name: http
  selector:
    app.kubernetes.io/name: aifactory
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: aifactory
  labels:
    app.kubernetes.io/name: aifactory
    medinovai.com/tier: ai
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: aifactory
  template:
    metadata:
      labels:
        app.kubernetes.io/name: aifactory
        medinovai.com/tier: ai
      annotations:
        atlasos.medinovai.com/sidecar: "enabled"
    spec:
      affinity:
        nodeAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              preference:
                matchExpressions:
                  - key: gpu
                    operator: In
                    values:
                      - "true"
      containers:
        - name: aifactory
          image: medinovai-aifactory:latest
          ports:
            - containerPort: 5000
              name: http
          env:
            - name: OLLAMA_ENDPOINTS
              value: "http://ollama:11434"
            - name: MCP_ENABLED
              value: "true"
          envFrom:
            - secretRef:
                name: aifactory-credentials
                optional: true
            - secretRef:
                name: atlasos-api-keys
                optional: true
          resources:
            requests:
              memory: 2Gi
            limits:
              memory: 4Gi
          livenessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 15
            periodSeconds: 20
            timeoutSeconds: 5
