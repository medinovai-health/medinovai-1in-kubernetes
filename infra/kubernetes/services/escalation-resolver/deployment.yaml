apiVersion: apps/v1
kind: Deployment
metadata:
  name: escalation-resolver
  namespace: medinovai
  labels:
    app: escalation-resolver
    app.kubernetes.io/name: escalation-resolver
    app.kubernetes.io/part-of: atlasos
spec:
  replicas: 1
  selector:
    matchLabels:
      app: escalation-resolver
  template:
    metadata:
      labels:
        app: escalation-resolver
    spec:
      containers:
        - name: escalation-resolver
          image: atlasos-escalation-resolver:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 3117
          env:
            - name: REGISTRY_URL
              value: "http://medinovai-registry.medinovai:8000"
            - name: SERVICE_NAME
              value: "escalation-resolver"
            - name: PORT
              value: "3117"
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          readinessProbe:
            httpGet:
              path: /health
              port: 3117
            initialDelaySeconds: 15
            periodSeconds: 10
            failureThreshold: 2
          livenessProbe:
            httpGet:
              path: /health
              port: 3117
            initialDelaySeconds: 45
            periodSeconds: 15
            failureThreshold: 3
