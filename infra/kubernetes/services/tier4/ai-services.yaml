---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: medinovai-chatbot
  namespace: medinovai-services
  labels:
    app: medinovai-chatbot
    tier: domain
    app.kubernetes.io/managed-by: medinovai-deploy
spec:
  replicas: 1
  selector:
    matchLabels:
      app: medinovai-chatbot
  template:
    metadata:
      labels:
        app: medinovai-chatbot
        tier: domain
        app.kubernetes.io/managed-by: medinovai-deploy
    spec:
      containers:
        - name: medinovai-chatbot
          image: medinovai-chatbot:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 8000
          env:
            - name: SERVICE_NAME
              value: "medinovai-chatbot"
            - name: PORT
              value: "8000"
            - name: REGISTRY_URL
              value: "http://medinovai-registry.medinovai-services:8080"
          readinessProbe:
            httpGet:
              path: /api/health
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 10
            failureThreshold: 2
          livenessProbe:
            httpGet:
              path: /api/health
              port: 8000
            initialDelaySeconds: 45
            periodSeconds: 15
            failureThreshold: 3
          resources:
            requests:
              memory: "256Mi"
              cpu: "200m"
            limits:
              memory: "2Gi"
              cpu: "2000m"
---
apiVersion: v1
kind: Service
metadata:
  name: medinovai-chatbot
  namespace: medinovai-services
  labels:
    app: medinovai-chatbot
    tier: domain
    app.kubernetes.io/managed-by: medinovai-deploy
spec:
  selector:
    app: medinovai-chatbot
  ports:
    - port: 8000
      targetPort: 8000
      protocol: TCP
      name: http
