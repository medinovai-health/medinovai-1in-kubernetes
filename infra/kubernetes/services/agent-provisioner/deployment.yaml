apiVersion: apps/v1
kind: Deployment
metadata:
  name: agent-provisioner
  namespace: medinovai
  labels:
    app: agent-provisioner
    app.kubernetes.io/name: agent-provisioner
    app.kubernetes.io/part-of: atlasos
spec:
  replicas: 1
  selector:
    matchLabels:
      app: agent-provisioner
  template:
    metadata:
      labels:
        app: agent-provisioner
    spec:
      containers:
        - name: agent-provisioner
          image: atlasos-agent-provisioner:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 3111
          env:
            - name: REGISTRY_URL
              value: "http://medinovai-registry.medinovai:8000"
            - name: SERVICE_NAME
              value: "agent-provisioner"
            - name: PORT
              value: "3111"
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          readinessProbe:
            httpGet:
              path: /health
              port: 3111
            initialDelaySeconds: 15
            periodSeconds: 10
            failureThreshold: 2
          livenessProbe:
            httpGet:
              path: /health
              port: 3111
            initialDelaySeconds: 45
            periodSeconds: 15
            failureThreshold: 3
