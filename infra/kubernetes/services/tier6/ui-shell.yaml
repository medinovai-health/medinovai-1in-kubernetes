apiVersion: apps/v1
kind: Deployment
metadata:
  name: medinovai-multimodal-ui-shell
  namespace: medinovai-services
  labels:
    app: medinovai-multimodal-ui-shell
    tier: ui
    app.kubernetes.io/managed-by: medinovai-deploy
spec:
  replicas: 1
  selector:
    matchLabels:
      app: medinovai-multimodal-ui-shell
  template:
    metadata:
      labels:
        app: medinovai-multimodal-ui-shell
        tier: ui
        app.kubernetes.io/managed-by: medinovai-deploy
    spec:
      containers:
        - name: medinovai-multimodal-ui-shell
          image: medinovai-multimodal-ui-shell:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 3000
          env:
            - name: SERVICE_NAME
              value: medinovai-multimodal-ui-shell
            - name: PORT
              value: "3000"
            - name: REGISTRY_URL
              value: http://medinovai-registry.medinovai-services:8080
          readinessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 10
            failureThreshold: 2
          livenessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 45
            periodSeconds: 15
            failureThreshold: 3
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "512Mi"
              cpu: "500m"
---
apiVersion: v1
kind: Service
metadata:
  name: medinovai-multimodal-ui-shell
  namespace: medinovai-services
  labels:
    app: medinovai-multimodal-ui-shell
    tier: ui
    app.kubernetes.io/managed-by: medinovai-deploy
spec:
  selector:
    app: medinovai-multimodal-ui-shell
  ports:
    - port: 3000
      targetPort: 3000
      protocol: TCP
      name: http
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: medinovaios
  namespace: medinovai-services
  labels:
    app: medinovaios
    tier: ui
    app.kubernetes.io/managed-by: medinovai-deploy
spec:
  replicas: 1
  selector:
    matchLabels:
      app: medinovaios
  template:
    metadata:
      labels:
        app: medinovaios
        tier: ui
        app.kubernetes.io/managed-by: medinovai-deploy
    spec:
      containers:
        - name: medinovaios
          image: medinovaios:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 3030
          env:
            - name: SERVICE_NAME
              value: medinovaios
            - name: PORT
              value: "3030"
            - name: REGISTRY_URL
              value: http://medinovai-registry.medinovai-services:8080
            - name: SECURITY_SERVICE_URL
              value: http://medinovai-security.medinovai-security:9000
          readinessProbe:
            httpGet:
              path: /health
              port: 3030
            initialDelaySeconds: 15
            periodSeconds: 10
            failureThreshold: 2
          livenessProbe:
            httpGet:
              path: /health
              port: 3030
            initialDelaySeconds: 45
            periodSeconds: 15
            failureThreshold: 3
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "512Mi"
              cpu: "500m"
---
apiVersion: v1
kind: Service
metadata:
  name: medinovaios
  namespace: medinovai-services
  labels:
    app: medinovaios
    tier: ui
    app.kubernetes.io/managed-by: medinovai-deploy
spec:
  type: NodePort
  selector:
    app: medinovaios
  ports:
    - port: 3030
      targetPort: 3030
      nodePort: 30030
      protocol: TCP
      name: http
