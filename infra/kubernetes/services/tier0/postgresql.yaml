apiVersion: v1
kind: Service
metadata:
  name: postgres-primary
  namespace: medinovai-data
  labels:
    app.kubernetes.io/name: postgres-primary
    app.kubernetes.io/component: database
    app.kubernetes.io/managed-by: medinovai-deploy
spec:
  type: ClusterIP
  ports:
    - port: 5432
      targetPort: 5432
      protocol: TCP
      name: postgres
  selector:
    app.kubernetes.io/name: postgres-primary
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres-primary
  namespace: medinovai-data
  labels:
    app.kubernetes.io/name: postgres-primary
    app.kubernetes.io/component: database
    app.kubernetes.io/managed-by: medinovai-deploy
spec:
  serviceName: postgres-primary
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: postgres-primary
  template:
    metadata:
      labels:
        app.kubernetes.io/name: postgres-primary
        app.kubernetes.io/component: database
        app.kubernetes.io/managed-by: medinovai-deploy
    spec:
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: role
                    operator: In
                    values:
                      - control-plane
      containers:
        - name: postgres
          image: postgres:16-alpine
          ports:
            - containerPort: 5432
              name: postgres
          env:
            - name: POSTGRES_DB
              value: medinovai
            - name: POSTGRES_USER
              value: medinovai
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: infra-db-secrets
                  key: POSTGRES_PASSWORD
          livenessProbe:
            exec:
              command:
                - pg_isready
                - -U
                - medinovai
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "2Gi"
              cpu: "1000m"
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes:
          - ReadWriteOnce
        storageClassName: longhorn
        resources:
          requests:
            storage: 50Gi
