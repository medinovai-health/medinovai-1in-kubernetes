apiVersion: v1
kind: Service
metadata:
  name: chromadb
  namespace: medinovai-data
  labels:
    app.kubernetes.io/name: chromadb
    app.kubernetes.io/component: vector-store
    app.kubernetes.io/managed-by: medinovai-deploy
spec:
  type: ClusterIP
  ports:
    - port: 8000
      targetPort: 8000
      protocol: TCP
      name: chroma
  selector:
    app.kubernetes.io/name: chromadb
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: chromadb
  namespace: medinovai-data
  labels:
    app.kubernetes.io/name: chromadb
    app.kubernetes.io/component: vector-store
    app.kubernetes.io/managed-by: medinovai-deploy
spec:
  serviceName: chromadb
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: chromadb
  template:
    metadata:
      labels:
        app.kubernetes.io/name: chromadb
        app.kubernetes.io/component: vector-store
        app.kubernetes.io/managed-by: medinovai-deploy
    spec:
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: role
                    operator: In
                    values:
                      - control-plane
      containers:
        - name: chromadb
          image: chromadb/chroma:latest
          ports:
            - containerPort: 8000
              name: chroma
          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "2Gi"
              cpu: "1000m"
          volumeMounts:
            - name: data
              mountPath: /data
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes:
          - ReadWriteOnce
        storageClassName: hostpath
        resources:
          requests:
            storage: 20Gi
