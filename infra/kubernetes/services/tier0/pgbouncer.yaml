apiVersion: v1
kind: Service
metadata:
  name: pgbouncer
  namespace: infra
spec:
  ports:
    - port: 6432
      targetPort: 6432
  selector:
    app: pgbouncer
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: pgbouncer
  namespace: infra
spec:
  replicas: 1
  selector:
    matchLabels:
      app: pgbouncer
  template:
    metadata:
      labels:
        app: pgbouncer
    spec:
      nodeSelector:
        role: control-plane
      containers:
        - name: pgbouncer
          image: bitnami/pgbouncer:1
          ports:
            - containerPort: 6432
          env:
            - name: POSTGRESQL_HOST
              value: postgres-primary.infra.svc.cluster.local
            - name: POSTGRESQL_PORT
              value: "5432"
            - name: POSTGRESQL_DATABASE
              value: medinovai
            - name: POSTGRESQL_USERNAME
              value: medinovai
            - name: POSTGRESQL_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: infra-secrets
                  key: POSTGRES_PRIMARY_PASSWORD
            - name: PGBOUNCER_POOL_MODE
              value: transaction
            - name: PGBOUNCER_MAX_CLIENT_CONN
              value: "200"
            - name: PGBOUNCER_DEFAULT_POOL_SIZE
              value: "25"
          resources:
            requests:
              memory: 64Mi
              cpu: 50m
            limits:
              memory: 128Mi
              cpu: 250m
