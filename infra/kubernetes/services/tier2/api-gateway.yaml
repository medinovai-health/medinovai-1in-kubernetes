apiVersion: v1
kind: Service
metadata:
  name: api-gateway
  namespace: medinovai-services
  labels:
    app.kubernetes.io/name: api-gateway
    medinovai.com/tier: platform
spec:
  type: ClusterIP
  ports:
    - port: 3000
      targetPort: 3000
      name: http
  selector:
    app.kubernetes.io/name: api-gateway
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: api-gateway
  namespace: medinovai-services
  labels:
    app.kubernetes.io/name: api-gateway
    medinovai.com/tier: platform
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: api-gateway
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: medinovai-services
  labels:
    app.kubernetes.io/name: api-gateway
    medinovai.com/tier: platform
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: api-gateway
  template:
    metadata:
      labels:
        app.kubernetes.io/name: api-gateway
        medinovai.com/tier: platform
      annotations:
        atlasos.medinovai.com/sidecar: "enabled"
    spec:
      containers:
        - name: api-gateway
          image: medinovai-api-gateway:latest
          ports:
            - containerPort: 3000
              name: http
          envFrom:
            - secretRef:
                name: jwt-signing-key
            - secretRef:
                name: postgres-primary-credentials
            - secretRef:
                name: redis-credentials
          resources:
            requests:
              memory: 256Mi
            limits:
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 20
            timeoutSeconds: 5
