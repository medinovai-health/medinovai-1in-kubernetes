apiVersion: v1
kind: Service
metadata:
  name: notification-service
  namespace: medinovai-services
  labels:
    app.kubernetes.io/name: notification-service
    medinovai.com/tier: platform
spec:
  type: ClusterIP
  ports:
    - port: 3001
      targetPort: 3001
      name: http
  selector:
    app.kubernetes.io/name: notification-service
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: notification-service
  namespace: medinovai-services
  labels:
    app.kubernetes.io/name: notification-service
    medinovai.com/tier: platform
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: notification-service
  template:
    metadata:
      labels:
        app.kubernetes.io/name: notification-service
        medinovai.com/tier: platform
      annotations:
        atlasos.medinovai.com/sidecar: "enabled"
    spec:
      containers:
        - name: notification-service
          image: medinovai-notification-center:latest
          ports:
            - containerPort: 3001
              name: http
          envFrom:
            - secretRef:
                name: notification-credentials
            - secretRef:
                name: redis-credentials
            - secretRef:
                name: kafka-credentials
          resources:
            requests:
              memory: 256Mi
            limits:
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /health
              port: 3001
            initialDelaySeconds: 15
            periodSeconds: 20
            timeoutSeconds: 5
