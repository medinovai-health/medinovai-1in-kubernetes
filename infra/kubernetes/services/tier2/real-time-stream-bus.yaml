apiVersion: apps/v1
kind: Deployment
metadata:
  name: medinovai-real-time-stream-bus
  namespace: medinovai-services
  labels:
    app: medinovai-real-time-stream-bus
    tier: platform
    app.kubernetes.io/managed-by: medinovai-deploy
spec:
  replicas: 1
  selector:
    matchLabels:
      app: medinovai-real-time-stream-bus
  template:
    metadata:
      labels:
        app: medinovai-real-time-stream-bus
        tier: platform
        app.kubernetes.io/managed-by: medinovai-deploy
    spec:
      containers:
        - name: medinovai-real-time-stream-bus
          image: medinovai-real-time-stream-bus:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 3000
          env:
            - name: SERVICE_NAME
              value: medinovai-real-time-stream-bus
            - name: PORT
              value: "3000"
            - name: REGISTRY_URL
              value: http://medinovai-registry.medinovai-services:8080
            - name: KAFKA_BROKERS
              value: kafka.medinovai-data:29092
            - name: REDIS_URL
              value: redis://:medinovai_dev@redis.medinovai-data:6379
            - name: SECURITY_SERVICE_URL
              value: http://medinovai-security.medinovai-security:9000
          readinessProbe:
            httpGet:
              path: /health/ready
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 10
            failureThreshold: 2
          livenessProbe:
            httpGet:
              path: /health/ready
              port: 3000
            initialDelaySeconds: 45
            periodSeconds: 15
            failureThreshold: 3
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "512Mi"
              cpu: "500m"
---
apiVersion: v1
kind: Service
metadata:
  name: medinovai-real-time-stream-bus
  namespace: medinovai-services
  labels:
    app: medinovai-real-time-stream-bus
    tier: platform
    app.kubernetes.io/managed-by: medinovai-deploy
spec:
  selector:
    app: medinovai-real-time-stream-bus
  ports:
    - port: 3000
      targetPort: 3000
      protocol: TCP
      name: http
