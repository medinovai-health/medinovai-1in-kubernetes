apiVersion: apps/v1
kind: Deployment
metadata:
  name: rbac-guard
  namespace: medinovai
  labels:
    app: rbac-guard
    app.kubernetes.io/name: rbac-guard
    app.kubernetes.io/part-of: atlasos
spec:
  replicas: 1
  selector:
    matchLabels:
      app: rbac-guard
  template:
    metadata:
      labels:
        app: rbac-guard
    spec:
      containers:
        - name: rbac-guard
          image: atlasos-rbac-guard:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 3113
          env:
            - name: REGISTRY_URL
              value: "http://medinovai-registry.medinovai:8000"
            - name: SERVICE_NAME
              value: "rbac-guard"
            - name: PORT
              value: "3113"
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          readinessProbe:
            httpGet:
              path: /health
              port: 3113
            initialDelaySeconds: 15
            periodSeconds: 10
            failureThreshold: 2
          livenessProbe:
            httpGet:
              path: /health
              port: 3113
            initialDelaySeconds: 45
            periodSeconds: 15
            failureThreshold: 3
