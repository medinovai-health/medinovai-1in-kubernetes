# ExternalSecret resources — sync Vault secrets into K8s Secrets
# ─── AtlasOS Secrets (medinovai-services namespace) ──────────────────────────
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: atlasos-api-keys
  namespace: medinovai-services
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: SecretStore
  target:
    name: atlasos-api-keys
    creationPolicy: Owner
  data:
    - secretKey: ANTHROPIC_API_KEY
      remoteRef:
        key: atlasos/anthropic
        property: api_key
    - secretKey: OPENAI_API_KEY
      remoteRef:
        key: atlasos/openai
        property: api_key
    - secretKey: GOOGLE_AI_API_KEY
      remoteRef:
        key: atlasos/google-ai
        property: api_key
---
