apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: platform-github
  namespace: medinovai-services
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: github-webhook-secret
    creationPolicy: Owner
  data:
    - secretKey: GITHUB_WEBHOOK_SECRET
      remoteRef:
        key: platform/github
        property: GITHUB_WEBHOOK_SECRET
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: platform-notification
  namespace: medinovai-services
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: notification-credentials
    creationPolicy: Owner
  data:
    - secretKey: SMTP_HOST
      remoteRef:
        key: platform/notification
        property: SMTP_HOST
    - secretKey: SMTP_USER
      remoteRef:
        key: platform/notification
        property: SMTP_USER
    - secretKey: SMTP_PASSWORD
      remoteRef:
        key: platform/notification
        property: SMTP_PASSWORD
