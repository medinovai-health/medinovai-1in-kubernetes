apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: platform-secrets
  namespace: platform
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: platform-secrets
    creationPolicy: Owner
  data:
    - secretKey: API_GATEWAY_SECRET
      remoteRef:
        key: platform/api-gateway
        property: secret
    - secretKey: REGISTRY_TOKEN
      remoteRef:
        key: platform/registry
        property: token
    - secretKey: NOTIFICATION_SMTP_PASSWORD
      remoteRef:
        key: platform/notification-center
        property: smtp_password
    - secretKey: POSTGRES_URL
      remoteRef:
        key: infra/postgres-primary
        property: url
    - secretKey: REDIS_URL
      remoteRef:
        key: infra/redis
        property: url
