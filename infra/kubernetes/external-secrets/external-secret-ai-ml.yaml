apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: ai-ml-secrets
  namespace: ai-ml
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: ai-ml-secrets
    creationPolicy: Owner
  data:
    - secretKey: AIFACTORY_API_KEY
      remoteRef:
        key: ai-ml/aifactory
        property: api_key
    - secretKey: ANTHROPIC_API_KEY
      remoteRef:
        key: atlasos/anthropic
        property: api_key
    - secretKey: OPENAI_API_KEY
      remoteRef:
        key: atlasos/openai
        property: api_key
    - secretKey: POSTGRES_URL
      remoteRef:
        key: infra/postgres-primary
        property: url
    - secretKey: REDIS_URL
      remoteRef:
        key: infra/redis
        property: url
