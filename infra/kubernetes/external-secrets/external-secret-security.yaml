apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: security-keycloak
  namespace: medinovai-security
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: keycloak-credentials
    creationPolicy: Owner
  data:
    - secretKey: KEYCLOAK_ADMIN
      remoteRef:
        key: security/keycloak
        property: KEYCLOAK_ADMIN
    - secretKey: KEYCLOAK_ADMIN_PASSWORD
      remoteRef:
        key: security/keycloak
        property: KEYCLOAK_ADMIN_PASSWORD
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: security-jwt
  namespace: medinovai-security
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: jwt-signing-key
    creationPolicy: Owner
  data:
    - secretKey: JWT_SECRET
      remoteRef:
        key: security/jwt
        property: JWT_SECRET
