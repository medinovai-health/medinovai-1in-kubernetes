apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: security-secrets
  namespace: security
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: security-secrets
    creationPolicy: Owner
  data:
    - secretKey: KEYCLOAK_ADMIN_PASSWORD
      remoteRef:
        key: security/keycloak
        property: admin_password
    - secretKey: JWT_SIGNING_KEY
      remoteRef:
        key: security/jwt-signing
        property: private_key
    - secretKey: ENCRYPTION_KEY
      remoteRef:
        key: security/encryption-keys
        property: master_key
