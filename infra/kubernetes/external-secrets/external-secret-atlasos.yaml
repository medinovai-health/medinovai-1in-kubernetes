apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: atlasos-secrets
  namespace: atlasos
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: atlasos-secrets
    creationPolicy: Owner
  data:
    # AI Model API Keys
    - secretKey: ANTHROPIC_API_KEY
      remoteRef:
        key: atlasos/anthropic
        property: api_key
    - secretKey: OPENAI_API_KEY
      remoteRef:
        key: atlasos/openai
        property: api_key
    - secretKey: GOOGLE_AI_API_KEY
      remoteRef:
        key: atlasos/google-ai
        property: api_key
    # Slack
    - secretKey: SLACK_APP_TOKEN
      remoteRef:
        key: atlasos/slack
        property: app_token
    - secretKey: SLACK_BOT_TOKEN
      remoteRef:
        key: atlasos/slack
        property: bot_token
    # Webhooks
    - secretKey: HOOKS_TOKEN
      remoteRef:
        key: atlasos/hooks
        property: token
    # 3CX Voice
    - secretKey: THREECX_HOST
      remoteRef:
        key: atlasos/threecx
        property: host
    - secretKey: THREECX_CLIENT_ID
      remoteRef:
        key: atlasos/threecx
        property: client_id
    - secretKey: THREECX_CLIENT_SECRET
      remoteRef:
        key: atlasos/threecx
        property: client_secret
    # Voice (TTS/STT)
    - secretKey: ELEVENLABS_API_KEY
      remoteRef:
        key: atlasos/voice
        property: elevenlabs_api_key
    - secretKey: DEEPGRAM_API_KEY
      remoteRef:
        key: atlasos/voice
        property: deepgram_api_key
    # WhatsApp
    - secretKey: WA_PHONE_NUMBER_ID
      remoteRef:
        key: atlasos/whatsapp
        property: phone_number_id
    - secretKey: WA_ACCESS_TOKEN
      remoteRef:
        key: atlasos/whatsapp
        property: access_token
    # Integrations
    - secretKey: CRM_API_KEY
      remoteRef:
        key: atlasos/crm
        property: api_key
    - secretKey: TICKETS_API_KEY
      remoteRef:
        key: atlasos/ticketing
        property: api_key
    - secretKey: ACCOUNTING_API_KEY
      remoteRef:
        key: atlasos/accounting
        property: api_key
    # Stirling PDF
    - secretKey: STIRLING_PDF_API_KEY
      remoteRef:
        key: atlasos/stirling-pdf
        property: api_key
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: atlasos-infra-secrets
  namespace: atlasos
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: atlasos-infra-secrets
    creationPolicy: Owner
  data:
    - secretKey: POSTGRES_URL
      remoteRef:
        key: infra/postgres-primary
        property: url
    - secretKey: REDIS_URL
      remoteRef:
        key: infra/redis
        property: url
