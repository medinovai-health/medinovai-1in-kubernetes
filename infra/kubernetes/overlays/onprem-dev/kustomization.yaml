apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Dev overlay: Mac Studio only, critical-path services (~12 services)
# For fast iteration during development. Single-node cluster.

resources:
  - ../../services/tier0
  - ../../services/atlasos
  - ../../services/atlasos-cluster-brain
  - ../../vault
  - ../../external-secrets

patches:
  # Reduce replicas to 1 for dev
  - target:
      kind: Deployment
    patch: |-
      - op: replace
        path: /spec/replicas
        value: 1
  # Reduce storage for dev
  - target:
      kind: PersistentVolumeClaim
    patch: |-
      - op: replace
        path: /spec/resources/requests/storage
        value: 5Gi
  # Reduce resource requests for dev
  - target:
      kind: Deployment
    patch: |-
      - op: replace
        path: /spec/template/spec/containers/0/resources/requests/memory
        value: 64Mi
      - op: replace
        path: /spec/template/spec/containers/0/resources/requests/cpu
        value: 25m

commonLabels:
  medinovai.com/overlay: onprem-dev

commonAnnotations:
  medinovai.com/environment: dev
  medinovai.com/cluster: mac-studio-only
