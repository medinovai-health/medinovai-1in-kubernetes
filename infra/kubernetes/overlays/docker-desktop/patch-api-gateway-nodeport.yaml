# Expose api-gateway as NodePort so it's reachable via Tailscale IP from other machines.
# Access: http://<tailscale-ip>:30080
apiVersion: v1
kind: Service
metadata:
  name: api-gateway
  namespace: medinovai-services
spec:
  type: NodePort
  ports:
    - port: 3000
      targetPort: 80
      nodePort: 30080
      protocol: TCP
      name: http
