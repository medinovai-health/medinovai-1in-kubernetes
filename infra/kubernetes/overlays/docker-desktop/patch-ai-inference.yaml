apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-inference
  namespace: medinovai-ai
spec:
  template:
    spec:
      securityContext:
        runAsNonRoot: false
      containers:
        - name: ai-inference
          image: traefik/whoami:latest
          ports:
            - containerPort: 80
          readinessProbe:
            httpGet:
              path: /health
              port: 80
            initialDelaySeconds: 3
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: 80
            initialDelaySeconds: 3
            periodSeconds: 10
          startupProbe:
            httpGet:
              path: /health
              port: 80
            failureThreshold: 10
            periodSeconds: 3
          resources:
            requests:
              cpu: 50m
              memory: 32Mi
            limits:
              cpu: 200m
              memory: 128Mi
              # nvidia.com/gpu: 0  — GPU removed for local Docker Desktop

          envFrom:
            - configMapRef:
                name: medinovai-env
