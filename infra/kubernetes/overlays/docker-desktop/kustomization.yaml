# ─── docker-desktop overlay ───────────────────────────────────────────────────
# Clean single-node install for Docker Desktop Kubernetes.
# Uses traefik/whoami as stub service images (real images not required).
# Connects to Docker Compose infra via host.docker.internal.
# Suitable for local testing and multi-machine HA validation.
#
# Apply: kubectl apply -k infra/kubernetes/overlays/docker-desktop
# Reset: bash scripts/bootstrap/uninstall-k8s.sh
# ─────────────────────────────────────────────────────────────────────────────
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../base
  - ../../services/api-gateway
  - ../../services/auth-service
  - ../../services/clinical-engine
  - ../../services/data-pipeline
  - ../../services/ai-inference
  - ../../services/notification-service
  # configmap-env-local.yaml is generated by tailscale-config.sh (gitignored, per-machine).
  # Falls back to configmap-env.yaml (uses host.docker.internal) if not present.
  - configmap-env.yaml
  - configmap-env-ai.yaml

# Single replica per service on a single node
replicas:
  - name: api-gateway
    count: 1
  - name: auth-service
    count: 1
  - name: clinical-engine
    count: 1
  - name: data-pipeline
    count: 1
  - name: ai-inference
    count: 1
  - name: notification-service
    count: 1

patches:
  # Swap placeholder images with traefik/whoami stubs + reduce resources
  - path: patch-api-gateway.yaml
  - path: patch-auth-service.yaml
  - path: patch-notification-service.yaml
  - path: patch-data-pipeline.yaml
  - path: patch-clinical-engine.yaml
  - path: patch-ai-inference.yaml
  # NodePort: expose api-gateway + auth-service via Tailscale IP
  - path: patch-api-gateway-nodeport.yaml
  - path: patch-auth-service-nodeport.yaml
  # JSON patches: remove GPU requirement and GPU toleration from ai-inference
  - target:
      group: apps
      version: v1
      kind: Deployment
      name: ai-inference
      namespace: medinovai-ai
    patch: |
      - op: remove
        path: /spec/template/spec/tolerations
      - op: remove
        path: /spec/template/spec/containers/0/resources/limits/nvidia.com~1gpu
  # Reduce resource quotas for single-node laptop
  - path: patch-quota-services.yaml
  - path: patch-quota-ai.yaml
  - path: patch-quota-monitoring.yaml

labels:
  - pairs:
      environment: docker-desktop
      managed-by: medinovai-deploy
    includeSelectors: false
