apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# GPU-specific overlay for DGX nodes

resources:
  - ../../services/ai-inference

patches:
  # DGX Spark (GB10 Superchip) presents as 1 GPU device — do NOT patch gpu count.
  # Base ollama.yaml already requests/limits nvidia.com/gpu: "1" which is correct.
  # Increase memory limits to take advantage of GB10's 128 GB unified memory.
  - target:
      kind: DaemonSet
      name: ollama
    patch: |-
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits/memory
        value: "64Gi"
      - op: replace
        path: /spec/template/spec/containers/0/resources/requests/memory
        value: "16Gi"
