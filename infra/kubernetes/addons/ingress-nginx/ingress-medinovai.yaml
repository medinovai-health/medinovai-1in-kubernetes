# Ingress routes for all MedinovAI services
# Apply after ingress-nginx controller is running
# Access via: http://localhost:30800/<path>
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: medinovai-ingress
  namespace: medinovai-services
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
    nginx.ingress.kubernetes.io/proxy-connect-timeout: "10"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "60"
spec:
  ingressClassName: nginx
  rules:
    - host: medinovai.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: api-gateway
                port:
                  number: 3000
          - path: /auth
            pathType: Prefix
            backend:
              service:
                name: auth-service
                port:
                  number: 3000
          - path: /clinical
            pathType: Prefix
            backend:
              service:
                name: clinical-engine
                port:
                  number: 8080
          - path: /pipeline
            pathType: Prefix
            backend:
              service:
                name: data-pipeline
                port:
                  number: 8080
          - path: /notify
            pathType: Prefix
            backend:
              service:
                name: notification-service
                port:
                  number: 3000
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: medinovai-ai-ingress
  namespace: medinovai-ai
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
spec:
  ingressClassName: nginx
  rules:
    - host: medinovai.local
      http:
        paths:
          - path: /ai
            pathType: Prefix
            backend:
              service:
                name: ai-inference
                port:
                  number: 8080
