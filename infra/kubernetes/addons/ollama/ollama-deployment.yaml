# Ollama — local LLM inference server
# PHI-safe: all inference runs on-device, no external API calls.
# CPU-mode on Docker Desktop (Apple Silicon); GPU mode when nvidia-device-plugin is present.
# Default model pulled by: make ollama-pull-default
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ollama
  namespace: medinovai-ai-local
  labels:
    app: ollama
    app.kubernetes.io/name: ollama
    app.kubernetes.io/component: ai-inference
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ollama
  strategy:
    type: Recreate   # Single replica + PVC — Recreate avoids mount conflicts
  template:
    metadata:
      labels:
        app: ollama
    spec:
      containers:
        - name: ollama
          image: ollama/ollama:latest
          ports:
            - containerPort: 11434
              name: http
          env:
            - name: OLLAMA_HOST
              value: "0.0.0.0"
            - name: OLLAMA_KEEP_ALIVE
              value: "24h"
          resources:
            requests:
              cpu: 500m
              memory: 1Gi
            limits:
              cpu: "4"
              memory: 6Gi
          volumeMounts:
            - name: ollama-data
              mountPath: /root/.ollama
          livenessProbe:
            httpGet:
              path: /api/tags
              port: 11434
            initialDelaySeconds: 20
            periodSeconds: 30
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /api/tags
              port: 11434
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 5
      volumes:
        - name: ollama-data
          persistentVolumeClaim:
            claimName: ollama-data
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: ollama-data
  namespace: medinovai-ai-local
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 20Gi
