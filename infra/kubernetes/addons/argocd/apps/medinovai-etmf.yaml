# medinovai-etmf — Electronic Trial Master File (port 3000)
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: medinovai-etmf
  namespace: argocd
  labels:
    app.kubernetes.io/part-of: medinovai
    medinovai/tier: product
spec:
  project: default
  source:
    repoURL: https://github.com/myonsite-healthcare/medinovai-etmf.git
    targetRevision: main
    path: infra/kubernetes
  destination:
    server: https://kubernetes.default.svc
    namespace: medinovai-etmf
  syncPolicy:
    automated:
      prune: false
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
    retry:
      limit: 3
      backoff: {duration: 5s, maxDuration: 3m, factor: 2}
