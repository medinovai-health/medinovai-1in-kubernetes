# medinovai-lis — Laboratory Information System (.NET 8 API :5050, React UI :3000)
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: medinovai-lis
  namespace: argocd
  labels:
    app.kubernetes.io/part-of: medinovai
    medinovai/tier: product
spec:
  project: default
  source:
    repoURL: https://github.com/myonsite-healthcare/medinovai-lis.git
    targetRevision: main
    path: infra/kubernetes
  destination:
    server: https://kubernetes.default.svc
    namespace: medinovai-lis
  syncPolicy:
    automated:
      prune: false
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
    retry:
      limit: 3
      backoff: {duration: 5s, maxDuration: 3m, factor: 2}
