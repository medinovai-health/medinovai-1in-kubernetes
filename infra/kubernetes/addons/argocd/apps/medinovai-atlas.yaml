# medinovai-Atlas — AI orchestration platform (ports 8080/8001-8003)
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: medinovai-atlas-platform
  namespace: argocd
  labels:
    app.kubernetes.io/part-of: medinovai
    medinovai/tier: platform
spec:
  project: default
  source:
    repoURL: git@github.com:myonsite-healthcare/medinovai-Deploy.git
    targetRevision: main
    path: infra/kubernetes/services/atlas
  destination:
    server: https://kubernetes.default.svc
    namespace: medinovai-system
  syncPolicy:
    automated:
      prune: false
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
    retry:
      limit: 3
      backoff: {duration: 5s, maxDuration: 3m, factor: 2}
