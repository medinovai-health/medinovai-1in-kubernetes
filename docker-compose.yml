'''version: '3.8'

services:
  medinovai-real-time-stream-bus:
    build:
      context: .
      dockerfile: Dockerfile
    image: myonsite-healthcare/medinovai-real-time-stream-bus:latest
    container_name: medinovai-real-time-stream-bus
    restart: unless-stopped
    env_file:
      - .env
    networks:
      - medinovai-network
    ports:
      - "3000:3000"
    healthcheck:
      test: ["CMD", "node", "dist/healthcheck.js"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"
        tag: "{{.ImageName}}|{{.Name}}|{{.ImageFullID}}|{{.ContainerID}}"
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 256M

networks:
  medinovai-network:
    driver: bridge
    name: medinovai-network
'''
