version: '3.8'

services:
  medinovai-event-bus:
    build: .
    image: medinovai-event-bus
    container_name: medinovai-event-bus
    restart: unless-stopped
    env_file:
      - .env
    networks:
      - medinovai-network
    ports:
      - "3000:3000"
    healthcheck:
      test: ["CMD", "node", "healthcheck.js"]
      interval: 30s
      timeout: 30s
      retries: 3
      start_period: 5s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M

networks:
  medinovai-network:
    driver: bridge
