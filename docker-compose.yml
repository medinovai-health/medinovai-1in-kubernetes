version: '3.8'
# medinovai-1in-kubernetes — Docker Compose
# Build: 20260413.2400.001 | © 2026 DescartesBio / MedinovAI Health.
services:
  app:
    build: .
    image: medinovai/medinovai-1in-kubernetes:latest
    container_name: medinovai-1in-kubernetes-app
    ports:
      - "8080:8080"
    environment:
      - NODE_ENV=production
      - ATLAS_OS_GATEWAY_URL=http://atlas-gateway:8000
      - ZTA_AUDIT_ENABLED=true
    networks:
      - medinovai-mesh
networks:
  medinovai-mesh:
    external: true
