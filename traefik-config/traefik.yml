api:
  dashboard: true
  insecure: true

entryPoints:
  web:
    address: ":80"
  websecure:
    address: ":443"

providers:
  docker:
    endpoint: "unix:///var/run/docker.sock"
    exposedByDefault: false
    network: medinovai-network

  kubernetes:
    endpoint: "https://kubernetes.default.svc:443"
    token: "/var/run/secrets/kubernetes.io/serviceaccount/token"
    certAuthFilePath: "/var/run/secrets/kubernetes.io/serviceaccount/ca.crt"
    namespaces: ["medinovai-production", "medinovai-data", "medinovai-monitoring", "medinovai-security", "medinovai-testing", "medinovai-enterprise"]

log:
  level: INFO

accessLog: {}
