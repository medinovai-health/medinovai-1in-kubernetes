# Branch Protection Rules for MedinovAI Infrastructure
# This file defines branch protection rules that should be applied to all branches

branches:
  main:
    required_status_checks:
      strict: true
      contexts:
        - "CI / lint"
        - "CI / security"
        - "CI / policy-test"
        - "CI / build-and-push"
    enforce_admins: true
    required_pull_request_reviews:
      required_approving_review_count: 2
      dismiss_stale_reviews: true
      require_code_owner_reviews: true
      require_last_push_approval: true
    restrictions:
      users: []
      teams:
        - "platform-team"
        - "security-team"
    allow_force_pushes: false
    allow_deletions: false
    block_creations: false
    required_conversation_resolution: true
    lock_branch: false
    allow_fork_syncing: true

  develop:
    required_status_checks:
      strict: true
      contexts:
        - "CI / lint"
        - "CI / security"
        - "CI / policy-test"
    enforce_admins: false
    required_pull_request_reviews:
      required_approving_review_count: 1
      dismiss_stale_reviews: true
      require_code_owner_reviews: false
      require_last_push_approval: false
    restrictions:
      users: []
      teams:
        - "platform-team"
    allow_force_pushes: false
    allow_deletions: false
    block_creations: false
    required_conversation_resolution: true
    lock_branch: false
    allow_fork_syncing: true

  # Protection for release branches
  "release/*":
    required_status_checks:
      strict: true
      contexts:
        - "CI / lint"
        - "CI / security"
        - "CI / policy-test"
        - "CI / build-and-push"
    enforce_admins: true
    required_pull_request_reviews:
      required_approving_review_count: 2
      dismiss_stale_reviews: true
      require_code_owner_reviews: true
      require_last_push_approval: true
    restrictions:
      users: []
      teams:
        - "platform-team"
        - "security-team"
    allow_force_pushes: false
    allow_deletions: false
    block_creations: false
    required_conversation_resolution: true
    lock_branch: false
    allow_fork_syncing: true

