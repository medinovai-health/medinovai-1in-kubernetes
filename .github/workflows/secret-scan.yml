name: Secret Scan

# Calls the org-wide reusable secret-scan workflow at
#   medinovai-health/medinovai-infrastructure/.github/workflows/secret-scan.yml
# Added by the MedinovAI org-wide secret-hygiene adoption (CyberSecurity#14).
#
# This repository is one of the seven flagged in CyberSecurity#14 as having
# already-leaked secrets in its history. The scheduled full-history scan is
# therefore expected to surface known leaks until the per-repo
# `git filter-repo` cleanup lands. Until that happens, scheduled runs are
# observe-only (fail_on_findings=false on schedule) so the nightly job
# stays green and actionable SARIF still uploads to code-scanning.

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  schedule:
    - cron: "0 5 * * *"   # nightly full-history scan

permissions:
  contents: read
  security-events: write

jobs:
  secrets:
    uses: medinovai-health/medinovai-infrastructure/.github/workflows/secret-scan.yml@main
    with:
      fetch_depth: ${{ github.event_name == 'schedule' && 0 || 1 }}
      upload_sarif: true
      fail_on_findings: ${{ github.event_name != 'schedule' }}
