name: Advanced Security Scanning

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  schedule:
    - cron: '0 2 * * *'  # Daily at 2 AM

jobs:
  security-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'
      
      - name: Run Bandit security linter
        run: |
          pip install bandit
          bandit -r . -f json -o bandit-results.json || true
      
      - name: Run Safety check
        run: |
          pip install safety
          safety check --json --output safety-results.json || true
      
      - name: Run Semgrep
        uses: returntocorp/semgrep-action@v1
        with:
          config: >-
            p/security-audit
            p/secrets
            p/owasp-top-ten
      
      - name: Upload security results
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-results.sarif
      
      - name: Security summary
        run: |
          echo "## Security Scan Results" >> $GITHUB_STEP_SUMMARY
          echo "- Trivy: Vulnerability scan completed" >> $GITHUB_STEP_SUMMARY
          echo "- Bandit: Python security analysis completed" >> $GITHUB_STEP_SUMMARY
          echo "- Safety: Dependency vulnerability check completed" >> $GITHUB_STEP_SUMMARY
          echo "- Semgrep: Static analysis completed" >> $GITHUB_STEP_SUMMARY
