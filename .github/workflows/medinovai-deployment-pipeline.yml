name: 🚀 MedinovAI Infrastructure Deployment Pipeline

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'medinovai-deployment/**'
      - 'scripts/**'
      - 'k8s-cluster-config/**'
      - '.github/workflows/**'
  pull_request:
    branches: [ main ]
    paths:
      - 'medinovai-deployment/**'
      - 'scripts/**'
      - 'k8s-cluster-config/**'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment environment'
        required: true
        default: 'development'
        type: choice
        options:
        - development
        - staging
        - production
      services:
        description: 'Services to deploy (comma-separated)'
        required: false
        default: 'all'
      force_deploy:
        description: 'Force deployment even if tests fail'
        required: false
        default: false
        type: boolean

env:
  KUBERNETES_NAMESPACE: medinovai
  DOCKER_REGISTRY: ghcr.io
  IMAGE_TAG: ${{ github.sha }}
  PYTHON_VERSION: 3.11.9
  NODE_VERSION: 18

jobs:
  # =============================================================================
  # Prerequisites and Validation
  # =============================================================================
  prerequisites:
    name: 🔍 Prerequisites & Validation
    runs-on: ubuntu-latest
    outputs:
      cluster-ready: ${{ steps.cluster-check.outputs.ready }}
      services-ready: ${{ steps.services-check.outputs.ready }}
    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4

      - name: 🐍 Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: 📦 Install Dependencies
        run: |
          pip install -r requirements.txt
          pip install kubectl-helm

      - name: 🔧 Setup kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: 'v1.28.0'

      - name: 🔧 Setup Helm
        uses: azure/setup-helm@v3
        with:
          version: 'v3.12.0'

      - name: 🏗️ Setup k3d
        run: |
          curl -s https://raw.githubusercontent.com/k3d-io/k3d/main/install.sh | bash
          k3d version

      - name: 🔍 Cluster Health Check
        id: cluster-check
        run: |
          echo "Checking cluster health..."
          if kubectl cluster-info &> /dev/null; then
            echo "✅ Cluster is accessible"
            echo "ready=true" >> $GITHUB_OUTPUT
          else
            echo "❌ Cluster is not accessible"
            echo "ready=false" >> $GITHUB_OUTPUT
          fi

      - name: 🔍 Services Health Check
        id: services-check
        run: |
          echo "Checking existing services..."
          if kubectl get pods -n ${{ env.KUBERNETES_NAMESPACE }} &> /dev/null; then
            echo "✅ Services namespace exists"
            echo "ready=true" >> $GITHUB_OUTPUT
          else
            echo "❌ Services namespace not found"
            echo "ready=false" >> $GITHUB_OUTPUT
          fi

      - name: 📊 Port Conflict Check
        run: |
          echo "Checking for port conflicts..."
          python scripts/port-conflict-checker.py

      - name: 🐍 Python Version Check
        run: |
          echo "Validating Python version consistency..."
          python scripts/python-version-validator.py

  # =============================================================================
  # Security and Compliance Validation
  # =============================================================================
  security-validation:
    name: 🔒 Security & Compliance Validation
    runs-on: ubuntu-latest
    needs: prerequisites
    if: needs.prerequisites.outputs.cluster-ready == 'true'
    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4

      - name: 🐍 Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: 📦 Install Security Tools
        run: |
          pip install bandit safety semgrep
          npm install -g @semgrep/semgrep

      - name: 🔍 Security Scan - Python
        run: |
          echo "Running Python security scan..."
          bandit -r medinovai-deployment/ -f json -o security-scan-python.json || true
          safety check --json --output security-deps.json || true

      - name: 🔍 Security Scan - Kubernetes
        run: |
          echo "Running Kubernetes security scan..."
          semgrep --config=auto k8s-cluster-config/ --json --output=security-scan-k8s.json || true

      - name: 🔍 Security Scan - Docker
        run: |
          echo "Running Docker security scan..."
          find . -name "Dockerfile" -exec semgrep --config=auto {} \; --json --output=security-scan-docker.json || true

      - name: 📊 Security Report
        run: |
          echo "Generating security report..."
          python scripts/security-report-generator.py

      - name: 🚨 Security Gate
        run: |
          echo "Checking security compliance..."
          if python scripts/security-compliance-checker.py; then
            echo "✅ Security validation passed"
          else
            echo "❌ Security validation failed"
            exit 1
          fi

  # =============================================================================
  # Build and Test
  # =============================================================================
  build-and-test:
    name: 🏗️ Build & Test
    runs-on: ubuntu-latest
    needs: [prerequisites, security-validation]
    if: needs.prerequisites.outputs.cluster-ready == 'true'
    strategy:
      matrix:
        service: [
          'api-gateway',
          'authentication',
          'data-services',
          'monitoring-services'
        ]
    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4

      - name: 🐍 Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: 📦 Install Dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest pytest-cov black flake8

      - name: 🧪 Unit Tests
        run: |
          echo "Running unit tests for ${{ matrix.service }}..."
          if [ -d "medinovai-deployment/services/${{ matrix.service }}" ]; then
            cd medinovai-deployment/services/${{ matrix.service }}
            python -m pytest tests/ -v --cov=. --cov-report=xml
          else
            echo "Service ${{ matrix.service }} not found, skipping tests"
          fi

      - name: 🎨 Code Quality Check
        run: |
          echo "Running code quality checks for ${{ matrix.service }}..."
          if [ -d "medinovai-deployment/services/${{ matrix.service }}" ]; then
            cd medinovai-deployment/services/${{ matrix.service }}
            black --check .
            flake8 . --max-line-length=100
          else
            echo "Service ${{ matrix.service }} not found, skipping quality checks"
          fi

      - name: 🐳 Build Docker Image
        run: |
          echo "Building Docker image for ${{ matrix.service }}..."
          if [ -d "medinovai-deployment/services/${{ matrix.service }}" ]; then
            cd medinovai-deployment/services/${{ matrix.service }}
            docker build -t ${{ env.DOCKER_REGISTRY }}/medinovai/${{ matrix.service }}:${{ env.IMAGE_TAG }} .
            docker tag ${{ env.DOCKER_REGISTRY }}/medinovai/${{ matrix.service }}:${{ env.IMAGE_TAG }} ${{ env.DOCKER_REGISTRY }}/medinovai/${{ matrix.service }}:latest
          else
            echo "Service ${{ matrix.service }} not found, skipping build"
          fi

      - name: 🚀 Push Docker Image
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          echo "Pushing Docker image for ${{ matrix.service }}..."
          if [ -d "medinovai-deployment/services/${{ matrix.service }}" ]; then
            echo ${{ secrets.GITHUB_TOKEN }} | docker login ${{ env.DOCKER_REGISTRY }} -u ${{ github.actor }} --password-stdin
            docker push ${{ env.DOCKER_REGISTRY }}/medinovai/${{ matrix.service }}:${{ env.IMAGE_TAG }}
            docker push ${{ env.DOCKER_REGISTRY }}/medinovai/${{ matrix.service }}:latest
          fi

  # =============================================================================
  # Infrastructure Deployment
  # =============================================================================
  infrastructure-deployment:
    name: 🏗️ Infrastructure Deployment
    runs-on: ubuntu-latest
    needs: [prerequisites, security-validation, build-and-test]
    if: needs.prerequisites.outputs.cluster-ready == 'true'
    environment: ${{ github.event.inputs.environment || 'development' }}
    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4

      - name: 🔧 Setup kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: 'v1.28.0'

      - name: 🔧 Setup Helm
        uses: azure/setup-helm@v3
        with:
          version: 'v3.12.0'

      - name: 🏗️ Deploy Core Infrastructure
        run: |
          echo "Deploying core infrastructure..."
          ./scripts/deploy-core-infrastructure.sh

      - name: 🔍 Validate Infrastructure
        run: |
          echo "Validating infrastructure deployment..."
          ./scripts/validate-infrastructure.sh

      - name: 📊 Infrastructure Health Check
        run: |
          echo "Checking infrastructure health..."
          ./scripts/infrastructure-health-check.sh

  # =============================================================================
  # Service Deployment
  # =============================================================================
  service-deployment:
    name: 🚀 Service Deployment
    runs-on: ubuntu-latest
    needs: [prerequisites, security-validation, build-and-test, infrastructure-deployment]
    if: needs.prerequisites.outputs.cluster-ready == 'true'
    environment: ${{ github.event.inputs.environment || 'development' }}
    strategy:
      matrix:
        service: [
          'api-gateway',
          'authentication',
          'data-services',
          'monitoring-services',
          'backup-services',
          'disaster-recovery'
        ]
    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4

      - name: 🔧 Setup kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: 'v1.28.0'

      - name: 🚀 Deploy Service
        run: |
          echo "Deploying ${{ matrix.service }}..."
          ./scripts/deploy-service.sh ${{ matrix.service }}

      - name: 🔍 Validate Service
        run: |
          echo "Validating ${{ matrix.service }} deployment..."
          ./scripts/validate-service.sh ${{ matrix.service }}

      - name: 📊 Service Health Check
        run: |
          echo "Checking ${{ matrix.service }} health..."
          ./scripts/service-health-check.sh ${{ matrix.service }}

  # =============================================================================
  # Integration Testing
  # =============================================================================
  integration-testing:
    name: 🔗 Integration Testing
    runs-on: ubuntu-latest
    needs: [prerequisites, security-validation, build-and-test, infrastructure-deployment, service-deployment]
    if: needs.prerequisites.outputs.cluster-ready == 'true'
    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4

      - name: 🐍 Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: 📦 Install Test Dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest pytest-asyncio httpx

      - name: 🔗 End-to-End Testing
        run: |
          echo "Running end-to-end integration tests..."
          python scripts/integration-tests.py

      - name: 📊 Performance Testing
        run: |
          echo "Running performance tests..."
          python scripts/performance-tests.py

      - name: 🔒 Security Integration Testing
        run: |
          echo "Running security integration tests..."
          python scripts/security-integration-tests.py

  # =============================================================================
  # Monitoring and Alerting Setup
  # =============================================================================
  monitoring-setup:
    name: 📊 Monitoring & Alerting Setup
    runs-on: ubuntu-latest
    needs: [prerequisites, security-validation, build-and-test, infrastructure-deployment, service-deployment]
    if: needs.prerequisites.outputs.cluster-ready == 'true'
    environment: ${{ github.event.inputs.environment || 'development' }}
    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4

      - name: 🔧 Setup kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: 'v1.28.0'

      - name: 🔧 Setup Helm
        uses: azure/setup-helm@v3
        with:
          version: 'v3.12.0'

      - name: 📊 Deploy Monitoring Stack
        run: |
          echo "Deploying monitoring stack..."
          ./scripts/deploy-monitoring-stack.sh

      - name: 🚨 Configure Alerting
        run: |
          echo "Configuring alerting rules..."
          ./scripts/configure-alerting.sh

      - name: 📈 Setup Dashboards
        run: |
          echo "Setting up monitoring dashboards..."
          ./scripts/setup-dashboards.sh

      - name: 🔍 Validate Monitoring
        run: |
          echo "Validating monitoring setup..."
          ./scripts/validate-monitoring.sh

  # =============================================================================
  # Final Validation and Cleanup
  # =============================================================================
  final-validation:
    name: ✅ Final Validation & Cleanup
    runs-on: ubuntu-latest
    needs: [prerequisites, security-validation, build-and-test, infrastructure-deployment, service-deployment, integration-testing, monitoring-setup]
    if: needs.prerequisites.outputs.cluster-ready == 'true'
    environment: ${{ github.event.inputs.environment || 'development' }}
    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4

      - name: 🔧 Setup kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: 'v1.28.0'

      - name: ✅ Comprehensive System Validation
        run: |
          echo "Running comprehensive system validation..."
          ./scripts/comprehensive-system-validation.sh

      - name: 📊 Generate Deployment Report
        run: |
          echo "Generating deployment report..."
          ./scripts/generate-deployment-report.sh

      - name: 🧹 Cleanup Temporary Resources
        if: always()
        run: |
          echo "Cleaning up temporary resources..."
          ./scripts/cleanup-temp-resources.sh

      - name: 📧 Send Notification
        if: always()
        run: |
          echo "Sending deployment notification..."
          ./scripts/send-deployment-notification.sh

  # =============================================================================
  # Rollback Job (Manual Trigger)
  # =============================================================================
  rollback:
    name: 🔄 Rollback Deployment
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.force_deploy == 'true'
    environment: ${{ github.event.inputs.environment || 'development' }}
    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4

      - name: 🔧 Setup kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: 'v1.28.0'

      - name: 🔄 Execute Rollback
        run: |
          echo "Executing rollback..."
          ./scripts/rollback-deployment.sh

      - name: 🔍 Validate Rollback
        run: |
          echo "Validating rollback..."
          ./scripts/validate-rollback.sh
