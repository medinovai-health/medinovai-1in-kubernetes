name: medinovai-standard-ci

on:
  workflow_call:
    inputs:
      coverage-threshold:
        required: false
        type: number
        default: 80
  workflow_dispatch: {}

jobs:
  build_test_scan:
    name: Build, Test, Scan, Policy Gates
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        lang: [python, dotnet, rust, swift, kotlin]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        if: matrix.lang == 'python'
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Set up .NET
        if: matrix.lang == 'dotnet'
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Set up Rust
        if: matrix.lang == 'rust'
        uses: dtolnay/rust-toolchain@stable

      - name: Set up Swift
        if: matrix.lang == 'swift'
        uses: swift-actions/setup-swift@v1
        with:
          swift-version: '5.10'

      - name: Set up Java (for Kotlin)
        if: matrix.lang == 'kotlin'
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      # ----- Build & Test -----
      - name: Install deps (Python)
        if: matrix.lang == 'python' && hashFiles('requirements.txt') != ''
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov

      - name: Test (Python)
        if: matrix.lang == 'python' && hashFiles('**/*_test.py') != ''
        run: |
          pytest -q --cov=. --cov-report=xml

      - name: Build & Test (.NET)
        if: matrix.lang == 'dotnet' && hashFiles('**/*.csproj') != ''
        run: |
          dotnet restore
          dotnet build --configuration Release --nologo
          dotnet test --configuration Release --collect:"XPlat Code Coverage" --logger "trx;LogFileName=test_results.trx"

      - name: Build & Test (Rust)
        if: matrix.lang == 'rust' && hashFiles('**/Cargo.toml') != ''
        run: |
          cargo build --release
          cargo test --all --quiet

      - name: Build & Test (Swift)
        if: matrix.lang == 'swift' && hashFiles('Package.swift') != ''
        run: |
          swift build -c release
          swift test -c release

      - name: Build & Test (Kotlin/Gradle)
        if: matrix.lang == 'kotlin' && hashFiles('**/build.gradle*') != ''
        run: |
          ./gradlew build test

      # ----- Coverage Gate (Python/.NET/Rust/Swift/Kotlin) -----
      - name: Coverage Gate
        if: always()
        run: |
          python .github/scripts/coverage_gate.py ${{ inputs.coverage-threshold }}

      # ----- Security Scans -----
      - name: Gitleaks (secrets)
        uses: zricethezav/gitleaks-action@v2
        with:
          config-path: .gitleaks.toml
        continue-on-error: false

      - name: SBOM (Syft)
        uses: anchore/syft-action@v0.17.0
        with:
          output: cyclonedx-json=sbom.json
        continue-on-error: true

      - name: Trivy FS scan
        uses: aquasecurity/trivy-action@0.24.0
        with:
          scan-type: 'fs'
          ignore-unfixed: true
          format: 'sarif'
          output: 'trivy-results.sarif'
        continue-on-error: false

      - name: Upload Trivy results
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-results.sarif
        continue-on-error: true

      # ----- Policy Gates (OPA/Conftest) -----
      - name: Install conftest
        run: |
          curl -L -o conftest.tar.gz https://github.com/open-policy-agent/conftest/releases/download/v0.59.0/conftest_0.59.0_Linux_x86_64.tar.gz
          tar -xzf conftest.tar.gz
          sudo mv conftest /usr/local/bin/conftest

      - name: Run Terraform policies
        if: hashFiles('**/*.tf') != ''
        run: |
          conftest test -p org-templates/policy/terraform policies/terraform || conftest test -p org-templates/policy/terraform .

      - name: Run Kubernetes policies
        if: hashFiles('**/*.yaml') != '' || hashFiles('**/*.yml') != ''
        run: |
          conftest test -p org-templates/policy/kubernetes k8s || conftest test -p org-templates/policy/kubernetes .

      - name: Run Repo policies
        run: |
          conftest test -p org-templates/policy/github .

  codeql:
    name: CodeQL (language-auto)
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write
    strategy:
      fail-fast: false
      matrix:
        language: ['javascript', 'python', 'csharp', 'go', 'java', 'ruby', 'cpp']
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
      - name: Autobuild
        uses: github/codeql-action/autobuild@v3
      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
