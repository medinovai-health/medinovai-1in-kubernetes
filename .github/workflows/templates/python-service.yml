name: Python Service CI
on:
  workflow_call:
    inputs:
      service-path:
        required: true
        type: string
      service-name:
        required: true
        type: string

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ inputs.service-path }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          if [ -f requirements-dev.txt ]; then pip install -r requirements-dev.txt; fi
          pip install pytest pytest-cov bandit safety mypy
      - name: Run tests
        run: pytest --cov --cov-report=xml -q || true
      - name: Security scan
        run: bandit -r src/ -f json -o bandit-report.json || bandit -r . -f json -o bandit-report.json --exclude tests || true
      - name: Dependency check
        run: safety check --output json || true

  build:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker image
        run: |
          docker build \
            -t ${{ inputs.service-name }}:${{ github.sha }} \
            -t ${{ inputs.service-name }}:latest \
            ${{ inputs.service-path }}
