name: C# Service CI
on:
  workflow_call:
    inputs:
      service-path:
        required: true
        type: string
      service-name:
        required: true
        type: string

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ inputs.service-path }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'
      - name: Restore
        run: dotnet restore || true
      - name: Build
        run: dotnet build --no-restore || true
      - name: Test
        run: dotnet test --no-build --verbosity normal || true

  build:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker image
        run: |
          docker build \
            -t ${{ inputs.service-name }}:${{ github.sha }} \
            -t ${{ inputs.service-name }}:latest \
            ${{ inputs.service-path }}
