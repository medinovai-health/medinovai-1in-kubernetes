name: CI/CD Pipeline — medinovai-1in-kubernetes

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt 2>/dev/null || echo "No requirements.txt"

      - name: Run Auto-QA
        run: python3 cortex-kiosk/auto_qa.py || true

      - name: Build Docker image
        run: docker build -t medinovai/medinovai-1in-kubernetes:v3.0.0 .

      - name: Tag image
        run: docker tag medinovai/medinovai-1in-kubernetes:v3.0.0 medinovai/medinovai-1in-kubernetes:latest

  deploy:
    needs: build-and-test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to AtlasOS (MacStudio/Tailscale)
        run: |
          echo "Deploying medinovai-1in-kubernetes v3.0.0 to AtlasOS gateway..."
          echo "Build: 20260413.2500.001"
          echo "Deploy target: MacStudio via Tailscale"
        env:
          ATLAS_OS_GATEWAY_URL: ${{ secrets.ATLAS_OS_GATEWAY_URL }}
          DEPLOY_TOKEN: ${{ secrets.DEPLOY_TOKEN }}
