name: Deploy to Production

on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_TAG: ${{ github.sha }}

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v4
    
    - name: Login to Container Registry
      uses: docker/login-action@v3
      with:
        registry: ${{ env.REGISTRY }}
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    
    - name: Build and push images
      run: |
        for service in deploy canary stream-bus; do
          docker build -t ${{ env.REGISTRY }}/medinovai/${service}:${{ env.IMAGE_TAG }} services/${service}/
          docker push ${{ env.REGISTRY }}/medinovai/${service}:${{ env.IMAGE_TAG }}
        done
    
    - name: Setup kubectl
      uses: azure/setup-kubectl@v3
    
    - name: Deploy to Production
      run: |
        kubectl set image deployment/medinovai-deploy app=${{ env.REGISTRY }}/medinovai/deploy:${{ env.IMAGE_TAG }} -n medinovai-production
        kubectl rollout status deployment/medinovai-deploy -n medinovai-production
