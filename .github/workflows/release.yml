# Release Pipeline — medinovai-infrastructure
# Medinovai Infrastructure | Tier 2
# Auto-generated by MedinovAI Standards Phase 6
name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write
  packages: write
  id-token: write

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Verify tag on main
        run: |
          git branch --contains ${{ github.ref_name }} | grep -q main || \
            (echo "ERROR: Tag must be on main branch" && exit 1)

      - name: Run full test suite
        run: |
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt pytest pytest-cov
            python -m pytest tests/ --cov=src -v
          elif [ -f package.json ]; then
            npm ci && npm test
          fi

  release:
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - uses: actions/checkout@v6

      - name: Build container image
        if: hashFiles('Dockerfile') != ''
        run: |
          docker build -t ghcr.io/medinovai-health/medinovai-infrastructure:${{ github.ref_name }} .
          docker tag ghcr.io/medinovai-health/medinovai-infrastructure:${{ github.ref_name }} \
                     ghcr.io/medinovai-health/medinovai-infrastructure:latest

      - name: Push to GHCR
        if: hashFiles('Dockerfile') != ''
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
          docker push ghcr.io/medinovai-health/medinovai-infrastructure:${{ github.ref_name }}
          docker push ghcr.io/medinovai-health/medinovai-infrastructure:latest

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          draft: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Notify release
        run: |
          echo "Released medinovai-infrastructure ${{ github.ref_name }}"
          echo "Tier: 2 | Domain: Medinovai Infrastructure"
