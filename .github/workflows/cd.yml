name: Continuous Deployment

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Build and push to registry
      run: |
        echo ${{ secrets.REGISTRY_TOKEN }} | docker login medinovai-registry.com -u ${{ secrets.REGISTRY_USERNAME }} --password-stdin
        docker build -t medinovai/medinovai-infrastructure:${{ github.sha }} .
        docker push medinovai/medinovai-infrastructure:${{ github.sha }}
        docker push medinovai/medinovai-infrastructure:latest
    
    - name: Deploy to Kubernetes
      run: |
        kubectl set image deployment/medinovai-infrastructure medinovai-infrastructure=medinovai/medinovai-infrastructure:${{ github.sha }}
