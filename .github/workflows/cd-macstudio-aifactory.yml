name: CD — Deploy to MacStudio AIFactory

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Tailscale
        uses: tailscale/github-action@v2
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_CLIENT_SECRET }}
          tags: tag:ci

      - name: Pre-Flight Check — Ollama Health
        run: |
          echo "Checking Ollama health on MacStudio over Tailscale..."
          curl -sf http://${{ secrets.MACSTUDIO_TS_IP }}:11434/api/tags \
            || (echo "❌ CRITICAL: Ollama is unreachable on MacStudio Tailscale IP" && exit 1)
          echo "✅ Ollama is healthy and responding."

      - name: Deploy via SSH to MacStudio
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.MACSTUDIO_TS_IP }}
          username: ${{ secrets.MACSTUDIO_USER }}
          key: ${{ secrets.MACSTUDIO_SSH_KEY }}
          script: |
            set -e
            REPO_NAME="${{ github.event.repository.name }}"
            DEPLOY_DIR=~/AIFactory/deployments/${REPO_NAME}

            # Create deployment directory and sync code
            mkdir -p "${DEPLOY_DIR}"
            cd "${DEPLOY_DIR}"

            if [ -d .git ]; then
              echo "📥 Pulling latest code..."
              git pull origin main
            else
              echo "📥 Cloning repository..."
              git clone https://github.com/${{ github.repository }}.git .
            fi

            # Find docker-compose file — optional for docs/spec repos
            COMPOSE_FILE=$(find . -maxdepth 3 -name "docker-compose*.yml" | head -n 1)

            if [ -z "$COMPOSE_FILE" ]; then
              echo "ℹ️  No docker-compose file found — sync-only deployment complete."
              echo "✅ ${REPO_NAME} synced to MacStudio at ${DEPLOY_DIR}"
              exit 0
            fi

            echo "🐳 Deploying ${COMPOSE_FILE}..."
            docker compose -f "${COMPOSE_FILE}" up -d --build --remove-orphans
            docker image prune -f
            echo "✅ ${REPO_NAME} deployed successfully via Docker Compose."