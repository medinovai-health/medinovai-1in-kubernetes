# Security Scan — medinovai-infrastructure
# Medinovai Infrastructure | Tier 2
# Auto-generated by MedinovAI Standards Phase 6
name: Security Scan

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 6 * * 1'  # Weekly Monday 6AM UTC

permissions:
  contents: read
  security-events: write

jobs:
  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: CodeQL Init
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language || 'javascript' }}

      - name: CodeQL Analyze
        uses: github/codeql-action/analyze@v3

      - name: Trivy vulnerability scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          severity: CRITICAL,HIGH
          format: sarif
          output: trivy-results.sarif
        continue-on-error: true

      - name: Upload Trivy SARIF
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-results.sarif
        continue-on-error: true

      - name: Dependency audit (pip-audit)
        run: |
          pip install pip-audit
          pip-audit -r requirements.txt 2>/dev/null || echo "No requirements.txt"
      - name: Bandit SAST
        run: |
          pip install bandit
          bandit -r src/ -f json -o bandit-report.json || true
      - uses: actions/upload-artifact@v4
        with:
          name: security-reports
          path: bandit-report.json
