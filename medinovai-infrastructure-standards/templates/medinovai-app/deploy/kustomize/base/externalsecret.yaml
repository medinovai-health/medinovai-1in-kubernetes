apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: APP_NAME-secrets
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: org-aws-secrets-manager
  target:
    name: APP_NAME-secrets
    creationPolicy: Owner
  data:
  - secretKey: APP_API_KEY
    remoteRef:
      key: APP_NAME/config
      property: APP_API_KEY
