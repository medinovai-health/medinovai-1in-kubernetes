apiVersion: apps/v1
kind: Deployment
metadata:
  name: APP_NAME
  labels: { app.kubernetes.io/name: APP_NAME }
spec:
  replicas: 2
  selector: { matchLabels: { app.kubernetes.io/name: APP_NAME } }
  template:
    metadata:
      labels: { app.kubernetes.io/name: APP_NAME }
    spec:
      containers:
      - name: app
        image: ghcr.io/myonsite-healthcare/APP_NAME:0.1.0
        ports: [{ containerPort: 8080, name: http }]
        resources:
          requests: { cpu: "50m", memory: "128Mi" }
          limits: { memory: "256Mi" }
        readinessProbe:
          httpGet: { path: /healthz, port: http }
          initialDelaySeconds: 5
        livenessProbe:
          httpGet: { path: /livez, port: http }
          initialDelaySeconds: 10
        envFrom:
        - configMapRef: { name: APP_NAME }
        - secretRef: { name: APP_NAME-secrets }
