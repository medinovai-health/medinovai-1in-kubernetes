# MedinovAI Healthcare LIS - Secrets Management Policy
# Secure handling of credentials, keys, and sensitive configuration
# Compliant with: HIPAA, SOC2, NIST 800-53, PCI-DSS

apiVersion: policy.medinovai.com/v1
kind: SecretsManagementPolicy
metadata:
  name: healthcare-secrets-management-policy
  version: "2026.1"
  lastUpdated: "2026-01-27"
  owner: security@medinovai.com
  compliance:
    - HIPAA
    - SOC2
    - NIST-800-53
    - PCI-DSS

spec:
  # ============================================================================
  # SECRET CLASSIFICATION
  # ============================================================================
  secretClassification:
    levels:
      - name: critical
        description: "Secrets that protect PHI or enable system-wide access"
        examples:
          - Database master credentials
          - Encryption keys for PHI
          - Admin API keys
          - Certificate private keys
          - HSM access credentials
        requirements:
          storage: HSM-backed
          rotation: 30 days
          accessControl: "need-to-know"
          audit: "all-access"
          mfa: required

      - name: high
        description: "Secrets for production services and external integrations"
        examples:
          - Service account credentials
          - External API keys
          - OAuth client secrets
          - Database connection strings
          - Message queue credentials
        requirements:
          storage: encrypted-secrets-manager
          rotation: 90 days
          accessControl: "role-based"
          audit: "all-access"
          mfa: recommended

      - name: medium
        description: "Secrets for internal services and development"
        examples:
          - Internal service tokens
          - CI/CD credentials
          - Monitoring API keys
          - Cache passwords
        requirements:
          storage: secrets-manager
          rotation: 180 days
          accessControl: "role-based"
          audit: "modifications"

      - name: low
        description: "Non-sensitive configuration secrets"
        examples:
          - Public API keys (read-only)
          - Analytics tokens
          - Feature flags
        requirements:
          storage: encrypted-configmap
          rotation: 365 days
          accessControl: "team-based"
          audit: "none"

  # ============================================================================
  # SECRETS STORAGE
  # ============================================================================
  secretsStorage:
    # Primary secrets manager
    primary:
      provider: "AWS Secrets Manager"
      region: us-east-1
      
      encryption:
        kmsKey: "alias/medinovai-secrets-key"
        algorithm: "AES-256"
      
      replication:
        enabled: true
        regions:
          - us-west-2
          - eu-west-1

    # Kubernetes secrets (for runtime)
    kubernetes:
      provider: "External Secrets Operator"
      
      encryption:
        enabled: true
        provider: "AWS KMS"
        
      sync:
        refreshInterval: 1h
        deletionPolicy: Delete

    # HSM for critical keys
    hsm:
      provider: "AWS CloudHSM"
      usage:
        - "PHI encryption keys"
        - "Database master keys"
        - "Certificate signing keys"

    # Prohibited storage locations
    prohibited:
      - "Source code repositories"
      - "Environment variables in Dockerfile"
      - "ConfigMaps (unencrypted)"
      - "Local files"
      - "Logs"
      - "Error messages"
      - "URLs/query parameters"
      - "Client-side storage"

  # ============================================================================
  # SECRET ROTATION
  # ============================================================================
  secretRotation:
    # Automatic rotation configuration
    automatic:
      enabled: true
      
      schedules:
        critical:
          interval: 30 days
          notification: 7 days before
          
        high:
          interval: 90 days
          notification: 14 days before
          
        medium:
          interval: 180 days
          notification: 30 days before
          
        low:
          interval: 365 days
          notification: 60 days before

    # Rotation procedures by secret type
    procedures:
      databaseCredentials:
        method: dual-user
        steps:
          - Create new credentials
          - Update application configuration
          - Verify connectivity
          - Disable old credentials
          - Update audit records
        rollback:
          automatic: true
          trigger: "connection failure"

      apiKeys:
        method: overlap
        steps:
          - Generate new key
          - Configure both keys active
          - Update all consumers
          - Deprecate old key
          - Remove old key
        gracePeriod: 24 hours

      certificates:
        method: automated
        provider: cert-manager
        renewBefore: 30 days
        notification: 45 days before expiry

      encryptionKeys:
        method: key-version
        steps:
          - Create new key version
          - Re-encrypt data with new version
          - Verify decryption
          - Disable old version
          - Delete old version (after retention)
        dataReEncryption:
          parallel: true
          verification: required

    # Emergency rotation
    emergency:
      triggers:
        - "Suspected compromise"
        - "Employee termination with access"
        - "Security incident"
        - "Audit finding"
      
      procedure:
        - "Immediately revoke suspect credentials"
        - "Generate new credentials"
        - "Update all dependent systems"
        - "Verify no unauthorized access"
        - "Document incident"
        - "Notify security team"

  # ============================================================================
  # ACCESS CONTROL
  # ============================================================================
  accessControl:
    # Principle of least privilege
    principles:
      - "Need-to-know basis"
      - "Minimum necessary access"
      - "Time-limited access"
      - "Separation of duties"

    # Role-based access
    roles:
      - name: secrets-admin
        permissions:
          - create
          - read
          - update
          - delete
          - rotate
          - grant-access
        requirements:
          - mfa-required
          - manager-approval
          - security-clearance

      - name: secrets-operator
        permissions:
          - read
          - rotate
        requirements:
          - mfa-required
          - team-lead-approval

      - name: service-account
        permissions:
          - read
        requirements:
          - automated-provisioning
          - namespace-scoped

    # Access request workflow
    accessRequest:
      workflow:
        - "Submit request with justification"
        - "Manager approval"
        - "Security review (for critical)"
        - "Automated provisioning"
        - "Access logged"
      
      timeLimit:
        default: 90 days
        maximum: 365 days
        
      review:
        frequency: quarterly
        action: "revoke-if-unused"

    # Service account management
    serviceAccounts:
      naming: "svc-{service-name}-{environment}"
      
      creation:
        automated: true
        approval: required
        
      permissions:
        scope: "minimum-necessary"
        namespaceIsolated: true
        
      rotation:
        automatic: true
        interval: 90 days

  # ============================================================================
  # SECRET INJECTION
  # ============================================================================
  secretInjection:
    # Kubernetes secrets injection
    kubernetes:
      method: "External Secrets Operator"
      
      patterns:
        # Volume mount (preferred for files)
        volumeMount:
          use: "certificates, config files"
          example: |
            spec:
              containers:
                - name: app
                  volumeMounts:
                    - name: secrets
                      mountPath: /secrets
                      readOnly: true
              volumes:
                - name: secrets
                  secret:
                    secretName: app-secrets
        
        # Environment variables (for simple values)
        environmentVariable:
          use: "connection strings, API keys"
          example: |
            spec:
              containers:
                - name: app
                  env:
                    - name: DB_PASSWORD
                      valueFrom:
                        secretKeyRef:
                          name: db-secrets
                          key: password

    # Application-level injection
    application:
      # SDK-based retrieval
      sdk:
        supported:
          - dotnet: "AWSSDK.SecretsManager"
          - node: "aws-sdk"
          - python: "boto3"
        
        caching:
          enabled: true
          ttl: 300 seconds
          refreshOnError: true

      # Sidecar injection
      sidecar:
        enabled: true
        image: "medinovai/secrets-sidecar:latest"
        port: 8200

    # Prohibited injection methods
    prohibited:
      - "Hardcoded in source code"
      - "Passed as command-line arguments"
      - "Stored in git repository"
      - "Embedded in container image"
      - "Passed in URL parameters"

  # ============================================================================
  # AUDIT AND MONITORING
  # ============================================================================
  auditMonitoring:
    # Audit logging
    logging:
      events:
        - secretCreated
        - secretUpdated
        - secretDeleted
        - secretAccessed
        - secretRotated
        - accessGranted
        - accessRevoked
        - rotationFailed
        
      fields:
        - timestamp
        - secretId
        - action
        - userId
        - sourceIp
        - result
        - requestId
        
      retention: 7 years
      
      storage:
        primary: CloudWatch Logs
        archive: S3 (encrypted)

    # Monitoring
    monitoring:
      metrics:
        - name: secret-access-count
          threshold: "anomaly-detection"
          
        - name: rotation-failures
          threshold: 0
          
        - name: expiring-secrets
          threshold: "7 days warning"
          
        - name: unauthorized-access-attempts
          threshold: 0

      alerts:
        - name: unusual-secret-access
          condition: "access-count > baseline * 2"
          severity: high
          notification:
            - slack: "#security-alerts"
            - pagerduty: security-oncall
            
        - name: secret-rotation-failed
          condition: "rotation-status = failed"
          severity: critical
          notification:
            - slack: "#security-critical"
            - pagerduty: security-oncall
            - email: security@medinovai.com
            
        - name: secret-expiring-soon
          condition: "expiry < 7 days"
          severity: warning
          notification:
            - slack: "#infrastructure"
            
        - name: unauthorized-access
          condition: "access-denied"
          severity: high
          notification:
            - slack: "#security-alerts"

  # ============================================================================
  # DEVELOPMENT & CI/CD
  # ============================================================================
  developmentCiCd:
    # Development environment
    development:
      secrets:
        source: "development secrets manager"
        isolation: "per-developer"
        
      localDevelopment:
        method: ".env files (git-ignored)"
        template: ".env.example"
        
      mockSecrets:
        allowed: true
        scope: "local development only"

    # CI/CD pipelines
    ciCd:
      secretsInjection:
        method: "GitHub Secrets / AWS Secrets Manager"
        
      permissions:
        deploymentPipeline:
          - read: deployment-secrets
          - write: none
          
      scanning:
        preCommit: gitleaks
        pipeline: truffleHog
        blockOnDetection: true

    # Secret detection
    secretDetection:
      tools:
        - name: gitleaks
          stage: pre-commit
          action: block
          
        - name: truffleHog
          stage: ci-pipeline
          action: block
          
        - name: semgrep
          stage: ci-pipeline
          action: warn

      response:
        onDetection:
          - "Block commit/merge"
          - "Alert security team"
          - "Rotate affected secret"
          - "Audit access logs"

  # ============================================================================
  # INCIDENT RESPONSE
  # ============================================================================
  incidentResponse:
    # Secret compromise procedure
    compromiseProcedure:
      immediate:
        - "Revoke compromised secret immediately"
        - "Generate new secret"
        - "Update all dependent systems"
        - "Document incident"
        
      investigation:
        - "Determine scope of exposure"
        - "Review access logs"
        - "Identify unauthorized access"
        - "Assess data impact"
        
      remediation:
        - "Rotate all related secrets"
        - "Review access controls"
        - "Implement additional monitoring"
        - "Update procedures if needed"
        
      reporting:
        - "Internal security team"
        - "Management"
        - "Regulatory (if PHI affected)"
        - "Affected customers (if applicable)"

    # Contact information
    contacts:
      primary: security@medinovai.com
      oncall: pagerduty://security-oncall
      escalation: ciso@medinovai.com

# External Secrets Operator configuration
externalSecretsOperator:
  version: "0.9.0"
  
  clusterSecretStore: |
    apiVersion: external-secrets.io/v1beta1
    kind: ClusterSecretStore
    metadata:
      name: aws-secrets-manager
    spec:
      provider:
        aws:
          service: SecretsManager
          region: us-east-1
          auth:
            jwt:
              serviceAccountRef:
                name: external-secrets
                namespace: external-secrets
  
  externalSecretTemplate: |
    apiVersion: external-secrets.io/v1beta1
    kind: ExternalSecret
    metadata:
      name: {{ .SecretName }}
      namespace: {{ .Namespace }}
    spec:
      refreshInterval: 1h
      secretStoreRef:
        name: aws-secrets-manager
        kind: ClusterSecretStore
      target:
        name: {{ .SecretName }}
        creationPolicy: Owner
      dataFrom:
        - extract:
            key: {{ .AWSSecretPath }}

# Compliance verification
complianceVerification:
  automated: true
  frequency: daily
  
  checks:
    - name: no-hardcoded-secrets
      tool: gitleaks
      
    - name: rotation-compliance
      script: "./security/scripts/secrets/verify-rotation.sh"
      
    - name: access-audit
      script: "./security/scripts/secrets/verify-access.sh"
      
    - name: encryption-verification
      script: "./security/scripts/secrets/verify-encryption.sh"
