groups:
- name: application_alerts
  rules:
  - alert: HighErrorRate
    expr: rate(http_requests_total{status=~"5.."}[5m]) > 0.05
    for: 1m
    labels:
      severity: critical
    annotations:
      summary: "High error rate detected"
      description: "The error rate is {{ $value }}%, which is above the 5% threshold."

  - alert: HighLatency
    expr: histogram_quantile(0.99, rate(http_request_duration_seconds_bucket[5m])) > 1
    for: 1m
    labels:
      severity: warning
    annotations:
      summary: "High latency detected"
      description: "The 99th percentile latency is {{ $value }}s, which is above the 1s threshold."

  - alert: HighMemoryUsage
    expr: (sum(container_memory_usage_bytes{container!=""}) by (pod) / sum(kube_pod_container_resource_limits{resource="memory"}) by (pod)) * 100 > 80
    for: 5m
    labels:
      severity: warning
    annotations:
      summary: "High memory usage detected"
      description: "Memory usage is at {{ $value }}%, which is above the 80% threshold."

  - alert: HighDiskUsage
    expr: (node_filesystem_avail_bytes / node_filesystem_size_bytes) * 100 < 10
    for: 5m
    labels:
      severity: critical
    annotations:
      summary: "High disk usage detected"
      description: "Disk usage is at {{ $value }}%, which is below the 10% threshold."
