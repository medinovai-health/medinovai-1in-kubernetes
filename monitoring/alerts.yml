'''groups: - name: application_alerts rules: - alert: HighErrorRate expr: rate(http_requests_total{status=~"5.."}[5m]) > 0.05 for: 5m labels: severity: critical annotations: summary: "High API error rate" description: "The API error rate is above 5% for the last 5 minutes." - alert: HighLatency expr: histogram_quantile(0.99, rate(http_request_duration_seconds_bucket[5m])) > 1.5 for: 5m labels: severity: warning annotations: summary: "High API latency" description: "The 99th percentile API latency is above 1.5s for the last 5 minutes." - alert: HighMemoryUsage expr: (container_memory_usage_bytes / container_spec_memory_limit_bytes) > 0.8 for: 10m labels: severity: warning annotations: summary: "High memory usage" description: "Memory usage is above 80% for the last 10 minutes." - alert: LowDiskSpace expr: (node_filesystem_avail_bytes / node_filesystem_size_bytes) < 0.1 for: 30m labels: severity: critical annotations: summary: "Low disk space" description: "Disk space is below 10%."'''
