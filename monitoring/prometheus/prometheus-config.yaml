# MedinovAI LIS - Prometheus Configuration
# Healthcare-specific monitoring with HIPAA-compliant alerting
# Monitors all LIS components for availability and performance

apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: monitoring
  labels:
    app.kubernetes.io/name: prometheus
    app.kubernetes.io/part-of: medinovai-monitoring
data:
  prometheus.yml: |
    # Global configuration
    global:
      scrape_interval: 15s
      evaluation_interval: 15s
      external_labels:
        cluster: medinovai-lis-production
        environment: production
    
    # Alertmanager configuration
    alerting:
      alertmanagers:
        - static_configs:
            - targets:
                - alertmanager:9093
          timeout: 10s
          api_version: v2
    
    # Rule files
    rule_files:
      - /etc/prometheus/rules/*.yml
      - /etc/prometheus/alerts/*.yml
    
    # Scrape configurations
    scrape_configs:
      # Prometheus self-monitoring
      - job_name: 'prometheus'
        static_configs:
          - targets: ['localhost:9090']
        metrics_path: /metrics
        scheme: http
      
      # Kubernetes API server
      - job_name: 'kubernetes-apiservers'
        kubernetes_sd_configs:
          - role: endpoints
        scheme: https
        tls_config:
          ca_file: /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
          insecure_skip_verify: true
        bearer_token_file: /var/run/secrets/kubernetes.io/serviceaccount/token
        relabel_configs:
          - source_labels: [__meta_kubernetes_namespace, __meta_kubernetes_service_name, __meta_kubernetes_endpoint_port_name]
            action: keep
            regex: default;kubernetes;https
      
      # Kubernetes nodes
      - job_name: 'kubernetes-nodes'
        kubernetes_sd_configs:
          - role: node
        scheme: https
        tls_config:
          ca_file: /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
          insecure_skip_verify: true
        bearer_token_file: /var/run/secrets/kubernetes.io/serviceaccount/token
        relabel_configs:
          - action: labelmap
            regex: __meta_kubernetes_node_label_(.+)
          - target_label: __address__
            replacement: kubernetes.default.svc:443
          - source_labels: [__meta_kubernetes_node_name]
            regex: (.+)
            target_label: __metrics_path__
            replacement: /api/v1/nodes/${1}/proxy/metrics
      
      # Kubernetes pods
      - job_name: 'kubernetes-pods'
        kubernetes_sd_configs:
          - role: pod
        relabel_configs:
          - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_scrape]
            action: keep
            regex: true
          - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_path]
            action: replace
            target_label: __metrics_path__
            regex: (.+)
          - source_labels: [__address__, __meta_kubernetes_pod_annotation_prometheus_io_port]
            action: replace
            regex: ([^:]+)(?::\d+)?;(\d+)
            replacement: $1:$2
            target_label: __address__
          - action: labelmap
            regex: __meta_kubernetes_pod_label_(.+)
          - source_labels: [__meta_kubernetes_namespace]
            action: replace
            target_label: kubernetes_namespace
          - source_labels: [__meta_kubernetes_pod_name]
            action: replace
            target_label: kubernetes_pod_name
          - source_labels: [__meta_kubernetes_pod_node_name]
            action: replace
            target_label: kubernetes_node
      
      # LIS API Services
      - job_name: 'lis-api'
        kubernetes_sd_configs:
          - role: endpoints
            namespaces:
              names:
                - lis-platform
                - lis-staging
        relabel_configs:
          - source_labels: [__meta_kubernetes_service_label_app_kubernetes_io_name]
            action: keep
            regex: lis-api
          - source_labels: [__meta_kubernetes_endpoint_port_name]
            action: keep
            regex: http|metrics
          - source_labels: [__meta_kubernetes_namespace]
            target_label: namespace
          - source_labels: [__meta_kubernetes_service_name]
            target_label: service
          - source_labels: [__meta_kubernetes_pod_name]
            target_label: pod
        metrics_path: /metrics
        scrape_interval: 15s
        scrape_timeout: 10s
      
      # MySQL Exporter
      - job_name: 'mysql'
        kubernetes_sd_configs:
          - role: endpoints
            namespaces:
              names:
                - lis-platform
        relabel_configs:
          - source_labels: [__meta_kubernetes_service_label_app_kubernetes_io_component]
            action: keep
            regex: database
          - source_labels: [__meta_kubernetes_namespace]
            target_label: namespace
        metrics_path: /metrics
        scrape_interval: 30s
      
      # Redis Exporter
      - job_name: 'redis'
        kubernetes_sd_configs:
          - role: endpoints
            namespaces:
              names:
                - lis-platform
        relabel_configs:
          - source_labels: [__meta_kubernetes_service_label_app_kubernetes_io_component]
            action: keep
            regex: cache
          - source_labels: [__meta_kubernetes_namespace]
            target_label: namespace
        metrics_path: /metrics
        scrape_interval: 15s
      
      # RabbitMQ
      - job_name: 'rabbitmq'
        kubernetes_sd_configs:
          - role: endpoints
            namespaces:
              names:
                - lis-platform
        relabel_configs:
          - source_labels: [__meta_kubernetes_service_label_app_kubernetes_io_component]
            action: keep
            regex: messaging
          - source_labels: [__meta_kubernetes_namespace]
            target_label: namespace
        metrics_path: /metrics
        scrape_interval: 30s
      
      # Node Exporter
      - job_name: 'node-exporter'
        kubernetes_sd_configs:
          - role: endpoints
        relabel_configs:
          - source_labels: [__meta_kubernetes_endpoints_name]
            action: keep
            regex: node-exporter
          - source_labels: [__meta_kubernetes_namespace]
            target_label: namespace
        scrape_interval: 30s
      
      # Kube State Metrics
      - job_name: 'kube-state-metrics'
        kubernetes_sd_configs:
          - role: endpoints
        relabel_configs:
          - source_labels: [__meta_kubernetes_endpoints_name]
            action: keep
            regex: kube-state-metrics
          - source_labels: [__meta_kubernetes_namespace]
            target_label: namespace
        scrape_interval: 30s

  # Recording rules for efficient queries
  recording_rules.yml: |
    groups:
      - name: lis_api_recording_rules
        rules:
          # Request rate
          - record: lis:http_requests:rate5m
            expr: sum(rate(http_requests_total{job="lis-api"}[5m])) by (service, method, status_code)
          
          # Error rate
          - record: lis:http_errors:rate5m
            expr: sum(rate(http_requests_total{job="lis-api", status_code=~"5.."}[5m])) by (service)
          
          # Request latency percentiles
          - record: lis:http_request_duration_seconds:p50
            expr: histogram_quantile(0.50, sum(rate(http_request_duration_seconds_bucket{job="lis-api"}[5m])) by (service, le))
          
          - record: lis:http_request_duration_seconds:p95
            expr: histogram_quantile(0.95, sum(rate(http_request_duration_seconds_bucket{job="lis-api"}[5m])) by (service, le))
          
          - record: lis:http_request_duration_seconds:p99
            expr: histogram_quantile(0.99, sum(rate(http_request_duration_seconds_bucket{job="lis-api"}[5m])) by (service, le))
          
          # Availability
          - record: lis:availability:ratio5m
            expr: 1 - (sum(rate(http_requests_total{job="lis-api", status_code=~"5.."}[5m])) / sum(rate(http_requests_total{job="lis-api"}[5m])))
      
      - name: lis_database_recording_rules
        rules:
          # Database connection pool utilization
          - record: lis:db_connections:utilization
            expr: sum(mysql_global_status_threads_connected) / sum(mysql_global_variables_max_connections)
          
          # Query rate
          - record: lis:db_queries:rate5m
            expr: sum(rate(mysql_global_status_queries[5m]))
          
          # Slow queries
          - record: lis:db_slow_queries:rate5m
            expr: sum(rate(mysql_global_status_slow_queries[5m]))
      
      - name: lis_cache_recording_rules
        rules:
          # Cache hit ratio
          - record: lis:cache_hit_ratio
            expr: sum(rate(redis_keyspace_hits_total[5m])) / (sum(rate(redis_keyspace_hits_total[5m])) + sum(rate(redis_keyspace_misses_total[5m])))
          
          # Memory utilization
          - record: lis:cache_memory_utilization
            expr: redis_memory_used_bytes / redis_memory_max_bytes
---
# Prometheus ServiceMonitor for LIS API
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: lis-api-monitor
  namespace: monitoring
  labels:
    app.kubernetes.io/name: lis-api
    app.kubernetes.io/part-of: medinovai-monitoring
    release: prometheus
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: lis-api
  namespaceSelector:
    matchNames:
      - lis-platform
      - lis-staging
  endpoints:
    - port: http
      path: /metrics
      interval: 15s
      scrapeTimeout: 10s
      honorLabels: true
    - port: metrics
      path: /metrics
      interval: 15s
      scrapeTimeout: 10s
      honorLabels: true
---
# PrometheusRule for LIS-specific alerts
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: lis-prometheus-rules
  namespace: monitoring
  labels:
    app.kubernetes.io/name: prometheus-rules
    app.kubernetes.io/part-of: medinovai-monitoring
    release: prometheus
spec:
  groups:
    - name: lis_slo_rules
      rules:
        # SLO: 99.9% availability
        - record: lis:slo:availability_target
          expr: "0.999"
        
        # SLO burn rate
        - record: lis:slo:error_budget_remaining
          expr: 1 - ((1 - lis:availability:ratio5m) / (1 - 0.999))
