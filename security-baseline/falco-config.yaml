apiVersion: v1
kind: ConfigMap
metadata:
  name: falco-config
  namespace: medinovai-monitoring
data:
  falco.yaml: |
    rules_file:
      - /etc/falco/falco_rules.yaml
      - /etc/falco/falco_rules.local.yaml
      - /etc/falco/k8s_audit_rules.yaml
      - /etc/falco/rules.d
    
    time_format_iso_8601: true
    
    json_output: true
    json_include_output_property: true
    
    priority: debug
    min_priority: info
    
    buffered_outputs: true
    outputs:
      - file:
          enabled: true
          keep_alive: false
          filename: /var/log/falco.log
      - stdout:
          enabled: true
      - http_output:
          enabled: true
          url: http://falco-webhook:8080/webhook
    
    syscall_event_drops:
      actions:
        - log
        - alert
    
    syscall_event_drops.rate: 0.05
    syscall_event_drops.max_burst: 1000
    
    http_output:
      enabled: true
      url: http://falco-webhook:8080/webhook
      user_agent: "falcosecurity/falco"
      timeout: 5000
      method: POST
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: falco
  namespace: medinovai-monitoring
spec:
  replicas: 1
  selector:
    matchLabels:
      app: falco
  template:
    metadata:
      labels:
        app: falco
    spec:
      serviceAccountName: falco
      containers:
      - name: falco
        image: falcosecurity/falco:latest
        securityContext:
          privileged: true
        volumeMounts:
        - name: falco-config
          mountPath: /etc/falco
        - name: falco-rules
          mountPath: /etc/falco/rules.d
        - name: proc
          mountPath: /host/proc
          readOnly: true
        - name: sys
          mountPath: /host/sys
          readOnly: true
        - name: dev
          mountPath: /host/dev
          readOnly: true
        - name: var-log
          mountPath: /host/var/log
          readOnly: true
        - name: var-run
          mountPath: /host/var/run
          readOnly: true
        - name: etc
          mountPath: /host/etc
          readOnly: true
        - name: boot
          mountPath: /host/boot
          readOnly: true
        - name: lib-modules
          mountPath: /host/lib/modules
          readOnly: true
        - name: usr
          mountPath: /host/usr
          readOnly: true
      volumes:
      - name: falco-config
        configMap:
          name: falco-config
      - name: falco-rules
        configMap:
          name: falco-rules
      - name: proc
        hostPath:
          path: /proc
      - name: sys
        hostPath:
          path: /sys
      - name: dev
        hostPath:
          path: /dev
      - name: var-log
        hostPath:
          path: /var/log
      - name: var-run
        hostPath:
          path: /var/run
      - name: etc
        hostPath:
          path: /etc
      - name: boot
        hostPath:
          path: /boot
      - name: lib-modules
        hostPath:
          path: /lib/modules
      - name: usr
        hostPath:
          path: /usr
