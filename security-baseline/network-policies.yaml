apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: medinovai-deny-all
  namespace: medinovai
spec:
  podSelector: {}
  policyTypes:
  - Ingress
  - Egress
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: medinovai-allow-internal
  namespace: medinovai
spec:
  podSelector: {}
  policyTypes:
  - Ingress
  - Egress
  ingress:
  - from:
    - namespaceSelector:
        matchLabels:
          name: medinovai
    - namespaceSelector:
        matchLabels:
          name: medinovai-monitoring
    - namespaceSelector:
        matchLabels:
          name: medinovai-ai
    - namespaceSelector:
        matchLabels:
          name: medinovai-database
  egress:
  - to:
    - namespaceSelector:
        matchLabels:
          name: medinovai
    - namespaceSelector:
        matchLabels:
          name: medinovai-monitoring
    - namespaceSelector:
        matchLabels:
          name: medinovai-ai
    - namespaceSelector:
        matchLabels:
          name: medinovai-database
  - to: []
    ports:
    - protocol: TCP
      port: 53
    - protocol: UDP
      port: 53
    - protocol: TCP
      port: 443
    - protocol: TCP
      port: 80
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: medinovai-database-access
  namespace: medinovai-database
spec:
  podSelector:
    matchLabels:
      app: postgres
  policyTypes:
  - Ingress
  ingress:
  - from:
    - namespaceSelector:
        matchLabels:
          name: medinovai
    ports:
    - protocol: TCP
      port: 5432
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: medinovai-redis-access
  namespace: medinovai-database
spec:
  podSelector:
    matchLabels:
      app: redis
  policyTypes:
  - Ingress
  ingress:
  - from:
    - namespaceSelector:
        matchLabels:
          name: medinovai
    ports:
    - protocol: TCP
      port: 6379
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: medinovai-mongodb-access
  namespace: medinovai-database
spec:
  podSelector:
    matchLabels:
      app: mongodb
  policyTypes:
  - Ingress
  ingress:
  - from:
    - namespaceSelector:
        matchLabels:
          name: medinovai
    ports:
    - protocol: TCP
      port: 27017
