version: '3.8'

services:
  # OpenSearch - Search and Analytics Engine
  opensearch:
    image: opensearchproject/opensearch:2.11.0
    container_name: medinovai-opensearch-phase4
    hostname: opensearch
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '4'
          memory: 8G
        reservations:
          cpus: '2'
          memory: 4G
    environment:
      - cluster.name=medinovai-search-cluster
      - node.name=opensearch-node1
      - discovery.type=single-node
      - bootstrap.memory_lock=true
      - "OPENSEARCH_JAVA_OPTS=-Xms2g -Xmx2g"
      - OPENSEARCH_INITIAL_ADMIN_PASSWORD=MedinovAI_Secure_2025!
      # Security settings (disabled for dev - re-enable with TLS for prod)
      - DISABLE_SECURITY_PLUGIN=true
      - DISABLE_INSTALL_DEMO_CONFIG=true
      # Performance
      - indices.query.bool.max_clause_count=4096
      - action.auto_create_index=true
    ulimits:
      memlock:
        soft: -1
        hard: -1
      nofile:
        soft: 65536
        hard: 65536
    ports:
      - "9200:9200"  # REST API
      - "9300:9300"  # Transport
    volumes:
      - /Users/dev1/medinovai-data/opensearch:/usr/share/opensearch/data
    networks:
      - medinovai_search
      - medinovai_backend
    healthcheck:
      test: ["CMD-SHELL", "curl -XGET http://localhost:9200 -s"]
      interval: 30s
      timeout: 10s
      retries: 5

  # OpenSearch Dashboards - Visualization
  opensearch-dashboards:
    image: opensearchproject/opensearch-dashboards:2.11.0
    container_name: medinovai-opensearch-dashboards-phase4
    hostname: opensearch-dashboards
    restart: unless-stopped
    depends_on:
      - opensearch
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G
        reservations:
          cpus: '1'
          memory: 1G
    environment:
      - OPENSEARCH_HOSTS=["http://opensearch:9200"]
      - DISABLE_SECURITY_DASHBOARDS_PLUGIN=true
      - SERVER_NAME=medinovai-dashboards
      - SERVER_HOST=0.0.0.0
    ports:
      - "5601:5601"
    volumes: []
    networks:
      - medinovai_search
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:5601/api/status"]
      interval: 30s
      timeout: 10s
      retries: 5

volumes:
  opensearch-data:

networks:
  medinovai_search:
    driver: bridge
  medinovai_backend:
    external: true

